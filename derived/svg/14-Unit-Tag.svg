<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1140">
<defs>
  <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2D6BE4"/>
    <stop offset="100%" stop-color="#4A3F6B"/>
  </linearGradient>
  <filter id="card">
    <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
  </filter>
  <filter id="elevated">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
  </filter>
</defs>

<rect width="1200" height="1140" fill="#F9F7F2"/>
<rect width="1200" height="6" fill="url(#topGrad)"/>

<rect x="100" y="24" width="1000" height="70" rx="14" fill="#FFF" filter="url(#elevated)"/>
<rect x="100" y="24" width="4" height="70" fill="#2D6BE4" rx="2"/>
<text x="120" y="58" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="24" font-weight="bold" fill="#1A1B2E">Unit Tag</text>
<text x="120" y="76" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#8B8DA0">Unit tag system for filtering, identification, and node graph integration</text>

<text x="100" y="124" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">I. What are Unit Tags</text>

<rect x="100" y="142" width="1000" height="100" rx="14" fill="#FFF" filter="url(#card)"/>
<text x="120" y="166" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Unit Tag Definition</text>
<text x="120" y="190" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Unit Tags provide special markers for units. Creators use unit tags to quickly locate and filter all units with a specific tag when writing stage logic.</text>
<text x="120" y="210" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">All unit types with physical entities in the scene can be configured with unit tags: <tspan font-weight="bold" fill="#1A1B2E">Creations</tspan>, <tspan font-weight="bold" fill="#1A1B2E">Characters</tspan>, and <tspan font-weight="bold" fill="#1A1B2E">Objects</tspan>.</text>
<text x="120" y="230" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">The same entity can be assigned multiple unit tags simultaneously.</text>

<text x="100" y="282" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">II. Creating &amp; Managing Tags</text>

<rect x="100" y="300" width="1000" height="90" rx="14" fill="#FFF" filter="url(#card)"/>
<text x="120" y="324" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Manage Unit Label Tool — Entry Points</text>
<text x="120" y="348" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Left System Menu:</tspan> Click "Manage Unit Label" in the system menu to open the tool.</text>
<text x="120" y="368" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Basic Information Panel:</tspan> Click "Open Unit Label Manager" in the Manage Unit Label section.</text>

<rect x="100" y="410" width="1000" height="90" rx="14" fill="#FFF" filter="url(#card)"/>
<text x="120" y="434" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Defining Unit Tags</text>
<text x="120" y="458" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">In the Manage Unit Label interface, click "Create New Unit Tag" to add a new tag.</text>
<text x="120" y="481" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Unit Tag Name:</tspan> A descriptive name serving as a reminder (not used for logical indexing).</text>
<text x="120" y="501" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Index:</tspan> Unique identifier used for identifying and modifying Unit Tag data in node graphs.</text>

<text x="100" y="540" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">III. Configuring Unit Tags</text>

<rect x="100" y="558" width="1000" height="70" rx="14" fill="#FFF" filter="url(#card)"/>
<text x="120" y="582" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Assigning Tags to Entities</text>
<text x="120" y="606" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">On the basic information page of prefabs or entities, click "Add Unit Tags" to select from globally defined tags. These tags take effect as initial data.</text>
<text x="120" y="623" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#8B8DA0">A prefab or entity can carry multiple tags simultaneously. The "Find References" button displays all entities referencing a tag.</text>

<text x="100" y="668" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">IV. Using Tags in Node Graphs</text>

<rect x="100" y="686" width="1000" height="135" rx="14" fill="#FFF" filter="url(#card)"/>
<text x="120" y="710" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Server Nodes</text>
<text x="120" y="734" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Clear Unit Tags From Entity:</tspan> Removes all unit tags from a specified entity</text>
<text x="120" y="754" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Add Unit Tag to Entity:</tspan> Assigns a unit tag to an entity</text>
<text x="120" y="774" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Remove Unit Tag From Entity:</tspan> Removes a specific unit tag from an entity</text>
<text x="120" y="794" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Get Entity List by Unit Tag:</tspan> Retrieves all entities with a specified unit tag</text>
<text x="120" y="814" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Get Entity Unit Tag List:</tspan> Retrieves all unit tags assigned to an entity</text>

<rect x="100" y="841" width="1000" height="80" rx="14" fill="#FFF" filter="url(#card)"/>
<text x="120" y="865" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Client Nodes</text>
<text x="120" y="889" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Get Entity List by Unit Tag:</tspan> Client-side retrieval of entities by tag</text>
<text x="120" y="909" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Get Entity's Unit Tag List:</tspan> Client-side retrieval of tags for an entity</text>

<text x="100" y="961" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">V. Scan Tag Integration</text>

<rect x="100" y="979" width="1000" height="70" rx="14" fill="#FFF" filter="url(#card)"/>
<text x="120" y="1003" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Scan Tag Component</text>
<text x="120" y="1027" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Scan Tag is a component available on character entities. It works with Scan Tag Recognition Rules defined in Class settings to filter and prioritize active units from scannable objects, enabling targeted interaction and combat systems.</text>

<text x="100" y="1078" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#8B8DA0">Related Documentation:</text>
<a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh8pro09mf5k" target="_blank"><text x="100" y="1098" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Unit Tag</text></a>

<text x="600" y="1130" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="11" fill="#8B8DA0" text-anchor="middle">Generated by AI based on official Miliastra Academy documentation. Version: Luminary</text>
</svg>