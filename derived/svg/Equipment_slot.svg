<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 3000" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1A1B2E" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1A1B2E" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="3000" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">28-Equipment Slot: Equipment Definition, Slots &amp; Node Graphs</text>

  <!-- I. Definition -->
  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. Definition of Equipment</text>

  <g transform="translate(60, 164)">
    <rect width="1080" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" fill="#4A4B65">Equipment is a sub-type of items managed through the inventory like regular items. The key difference</text>
    <text x="20" y="50" font-size="14" fill="#4A4B65">is that equipment can be equipped in <tspan font-weight="bold" fill="#1A1B2E">Equip Slots</tspan> to provide attribute bonuses or additional</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">logic functions for the wearer. Equipment supports affixes, types, tags, and node graph integration.</text>
    <text x="20" y="98" font-size="13" fill="#4A4B65">• Equipment does not support stacking configuration</text>
    <text x="360" y="98" font-size="13" fill="#4A4B65">• Equipment can have multiple affixes</text>
    <text x="700" y="98" font-size="13" fill="#4A4B65">• Equipment slots are character-only components</text>
  </g>

  <!-- II. Editing Equipment -->
  <circle cx="80" cy="320" r="16" fill="#2D6BE4"/>
  <text x="80" y="321" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="321" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. Editing Equipment</text>

  <g transform="translate(60, 348)">
    <rect width="1080" height="364" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" font-weight="bold" fill="#1A1B2E">1. Create New Equipment</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">In the item editing tab, click "New Item". In the popup, scroll down to Select Type and choose</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">Equipment to create a new equipment template.</text>

    <text x="20" y="100" font-size="14" font-weight="bold" fill="#1A1B2E">2. Basic Settings &amp; Interaction Settings</text>
    <text x="20" y="124" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Equipment Type</tspan> — Defined in the Equipment Type tab. An Equipment Slot must support</text>
    <text x="20" y="144" font-size="13" fill="#4A4B65">the equipment type for equipping to succeed.</text>
    <text x="20" y="168" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Show Type in Details</tspan> — Whether to display equipment type in the gameplay interface.</text>
    <text x="20" y="192" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Show Tags in Details</tspan> — Whether to display tag information on the interface.</text>
    <text x="20" y="216" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Select Tag</tspan> — Choose tags for this equipment from all pre-configured equipment tags.</text>
    <text x="20" y="240" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Select Initial Affixes</tspan> — Choose initial affixes that the equipment should carry.</text>

    <text x="20" y="272" font-size="14" font-weight="bold" fill="#1A1B2E">3. Equipment Type</text>
    <text x="20" y="296" font-size="13" fill="#4A4B65">Equipment type is an attribute referenced by two working functions:</text>
    <text x="20" y="320" font-size="13" fill="#4A4B65">• <tspan font-weight="bold" fill="#1A1B2E">Equipment Template</tspan> — Defines the type of the equipment itself.</text>
    <text x="20" y="340" font-size="13" fill="#4A4B65">• <tspan font-weight="bold" fill="#1A1B2E">Equipment Slot Template</tspan> — Defines which types can be equipped in each slot.</text>
  </g>

  <!-- III. Equipment Tags & Affixes -->
  <circle cx="80" cy="748" r="16" fill="#2D6BE4"/>
  <text x="80" y="749" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="749" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. Equipment Tags &amp; Affixes</text>

  <g transform="translate(60, 776)">
    <rect width="1080" height="576" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" font-weight="bold" fill="#1A1B2E">1. Equipment Tags</text>
    <text x="20" y="52" font-size="13" fill="#4A4B65">Tags are visible annotations for equipment that convey characteristics to players.</text>
    <text x="20" y="76" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Tag Name</tspan> — Name defined by the creator for the tag.</text>
    <text x="20" y="96" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Configuration ID</tspan> — Unique identifier of the equipment tag data.</text>
    <text x="20" y="116" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Reference List</tspan> — View all equipment templates using this tag.</text>

    <text x="20" y="148" font-size="14" font-weight="bold" fill="#1A1B2E">2. Equipment Affixes</text>
    <text x="20" y="172" font-size="13" fill="#4A4B65">Equipment affixes are the only source of equipment attribute bonuses and mechanical bonuses.</text>
    <text x="20" y="192" font-size="13" fill="#4A4B65">Each piece of equipment can have multiple affixes. When the equipment enters the inventory or</text>
    <text x="20" y="212" font-size="13" fill="#4A4B65">is equipped, the bonuses provided by the affixes will be applied to the owner or wearer entity.</text>

    <text x="20" y="240" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Effective Timing</tspan> — When the affix's bonus effects come into effect:</text>
    <text x="40" y="264" font-size="13" fill="#4A4B65">• <tspan font-weight="bold" fill="#1A1B2E">Effective When Obtained</tspan> — Takes effect as soon as equipment enters inventory.</text>
    <text x="40" y="284" font-size="13" fill="#4A4B65">• <tspan font-weight="bold" fill="#1A1B2E">Effective When Equipped</tspan> — Only takes effect when equipped in a slot.</text>

    <text x="20" y="312" font-size="13" font-weight="bold" fill="#1A1B2E">Affix Types:</text>

    <rect x="20" y="324" width="500" height="80" rx="8" fill="#E8EEFB"/>
    <text x="36" y="346" font-size="13" font-weight="bold" fill="#1A1B2E">Base Attributes Bonus</text>
    <text x="36" y="366" font-size="12" fill="#4A4B65">Provides basic combat attribute bonuses.</text>
    <text x="36" y="386" font-size="12" fill="#4A4B65">Supports Random Value or Fixed Value types.</text>

    <rect x="540" y="324" width="520" height="80" rx="8" fill="#E8EEFB"/>
    <text x="556" y="346" font-size="13" font-weight="bold" fill="#1A1B2E">Apply Node Graph</text>
    <text x="556" y="366" font-size="12" fill="#4A4B65">Provides creator-defined node graph logic.</text>
    <text x="556" y="386" font-size="12" fill="#4A4B65">Select the Node Graph to be assigned.</text>

    <rect x="20" y="416" width="500" height="80" rx="8" fill="#E8EEFB"/>
    <text x="36" y="438" font-size="13" font-weight="bold" fill="#1A1B2E">Apply Unit Status</text>
    <text x="36" y="458" font-size="12" fill="#4A4B65">Affixes can be bound to a unit status.</text>
    <text x="36" y="478" font-size="12" fill="#4A4B65">Select the unit status to be related.</text>

    <text x="20" y="528" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Description Type</tspan> — Fixed Description (preset text) or Custom Description (creator-defined).</text>
    <text x="20" y="552" font-size="13" fill="#4A4B65">Supports variable insertion for displaying bonus range and actual bonus values.</text>
  </g>

  <!-- IV. Equipment Entities -->
  <circle cx="80" cy="1388" r="16" fill="#2D6BE4"/>
  <text x="80" y="1389" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IV</text>
  <text x="108" y="1389" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">IV. Equipment Entities</text>

  <g transform="translate(60, 1416)">
    <rect width="1080" height="140" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" fill="#4A4B65">When equipment is not picked up, it exists as a template in the loot component. When the equipment</text>
    <text x="20" y="50" font-size="14" fill="#4A4B65">template is first obtained and enters the inventory, it will be initialized. At this time:</text>
    <text x="20" y="76" font-size="13" fill="#4A4B65">• Affix values will be randomized</text>
    <text x="20" y="96" font-size="13" fill="#4A4B65">• A "When Equipment Is Initialized" event is triggered, returning the unique index of the equipment</text>
    <text x="20" y="116" font-size="13" fill="#4A4B65">  entity through which attribute affixes can be dynamically modified</text>
  </g>

  <!-- V. Equipment Slots -->
  <circle cx="80" cy="1592" r="16" fill="#2D6BE4"/>
  <text x="80" y="1593" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">V</text>
  <text x="108" y="1593" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">V. Equipment Slots</text>

  <g transform="translate(60, 1620)">
    <rect width="1080" height="320" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" font-weight="bold" fill="#1A1B2E">1. Equipment Slot Template</text>
    <text x="20" y="52" font-size="13" fill="#4A4B65">Used to define the style, quantity, and equipment tags for each Equipment Slot. Accessible</text>
    <text x="20" y="72" font-size="13" fill="#4A4B65">through the Currency and Inventory button, then the Equipment Slots tab.</text>
    <text x="20" y="96" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Template Name</tspan> — Creator-defined name for the equipment slot template.</text>
    <text x="20" y="116" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Configuration ID</tspan> — Unique identifier for the Equip Slot template data.</text>
    <text x="20" y="136" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Equipment Slot Style</tspan> — Dynamically stack and configure detailed settings per slot.</text>

    <text x="20" y="164" font-size="13" font-weight="bold" fill="#1A1B2E">Slot Settings (per slot):</text>
    <text x="40" y="188" font-size="13" fill="#4A4B65">• <tspan font-weight="bold" fill="#1A1B2E">Current Slot Name</tspan> — Displayed at the bottom of the slot interface.</text>
    <text x="40" y="208" font-size="13" fill="#4A4B65">• <tspan font-weight="bold" fill="#1A1B2E">Equippable Types</tspan> — Select the types of equipment that can be equipped.</text>
    <text x="40" y="228" font-size="13" fill="#4A4B65">• <tspan font-weight="bold" fill="#1A1B2E">Icon</tspan> — Background displayed in the slot when no equipment is equipped.</text>

    <text x="20" y="260" font-size="14" font-weight="bold" fill="#1A1B2E">2. Equipment Slot Component</text>
    <text x="20" y="284" font-size="13" fill="#4A4B65">Can only be added to characters. Add via Add Common Component → Add Equipment Slot</text>
    <text x="20" y="304" font-size="13" fill="#4A4B65">Component. References pre-defined Equip Slot templates.</text>
  </g>

  <!-- VI. Node Graph Operations -->
  <circle cx="80" cy="1976" r="16" fill="#2D6BE4"/>
  <text x="80" y="1977" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">VI</text>
  <text x="108" y="1977" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">VI. Modifying Equipment Attributes in Node Graphs</text>

  <g transform="translate(60, 2004)">
    <rect width="1080" height="584" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" font-weight="bold" fill="#1A1B2E">Execution Nodes</text>

    <rect x="20" y="44" width="500" height="60" rx="8" fill="#E8EEFB"/>
    <text x="36" y="66" font-size="13" font-weight="bold" fill="#1A1B2E">Modify Equipment Affix Value</text>
    <text x="36" y="86" font-size="12" fill="#4A4B65">Dynamically modifies an affix value on equipment.</text>

    <rect x="540" y="44" width="520" height="60" rx="8" fill="#E8EEFB"/>
    <text x="556" y="66" font-size="13" font-weight="bold" fill="#1A1B2E">Remove Equipment Affix</text>
    <text x="556" y="86" font-size="12" fill="#4A4B65">Removes a specific affix from equipment.</text>

    <rect x="20" y="116" width="500" height="60" rx="8" fill="#E8EEFB"/>
    <text x="36" y="138" font-size="13" font-weight="bold" fill="#1A1B2E">Add Affix to Equipment</text>
    <text x="36" y="158" font-size="12" fill="#4A4B65">Adds a new affix to the target equipment.</text>

    <rect x="540" y="116" width="520" height="60" rx="8" fill="#E8EEFB"/>
    <text x="556" y="138" font-size="13" font-weight="bold" fill="#1A1B2E">Add Affix to Equipment at Specified ID</text>
    <text x="556" y="158" font-size="12" fill="#4A4B65">Adds an affix to equipment at a specific position.</text>

    <text x="20" y="208" font-size="14" font-weight="bold" fill="#1A1B2E">Event Nodes</text>

    <rect x="20" y="224" width="330" height="60" rx="8" fill="#E8EEFB"/>
    <text x="36" y="246" font-size="12" font-weight="bold" fill="#1A1B2E">When Equipment Is Initialized</text>
    <text x="36" y="266" font-size="11" fill="#4A4B65">Triggered on first inventory entry.</text>

    <rect x="370" y="224" width="330" height="60" rx="8" fill="#E8EEFB"/>
    <text x="386" y="246" font-size="12" font-weight="bold" fill="#1A1B2E">When Equipment Affix Value Changes</text>
    <text x="386" y="266" font-size="11" fill="#4A4B65">Triggered when an affix value is modified.</text>

    <rect x="720" y="224" width="330" height="60" rx="8" fill="#E8EEFB"/>
    <text x="736" y="246" font-size="12" font-weight="bold" fill="#1A1B2E">When Equipment Is Equipped</text>
    <text x="736" y="266" font-size="11" fill="#4A4B65">Triggered when equipment is equipped.</text>

    <rect x="20" y="296" width="500" height="60" rx="8" fill="#E8EEFB"/>
    <text x="36" y="318" font-size="12" font-weight="bold" fill="#1A1B2E">When Equipment Is Unequipped</text>
    <text x="36" y="338" font-size="11" fill="#4A4B65">Triggered when equipment is removed from a slot.</text>

    <text x="20" y="388" font-size="14" font-weight="bold" fill="#1A1B2E">Search Nodes</text>

    <rect x="20" y="404" width="330" height="60" rx="8" fill="#E8EEFB"/>
    <text x="36" y="426" font-size="12" font-weight="bold" fill="#1A1B2E">Query Equipment Tag List</text>
    <text x="36" y="446" font-size="11" fill="#4A4B65">Returns all tags on the equipment.</text>

    <rect x="370" y="404" width="330" height="60" rx="8" fill="#E8EEFB"/>
    <text x="386" y="426" font-size="12" font-weight="bold" fill="#1A1B2E">Get Equipment Affix Config ID</text>
    <text x="386" y="446" font-size="11" fill="#4A4B65">Returns the config ID of an affix.</text>

    <rect x="720" y="404" width="330" height="60" rx="8" fill="#E8EEFB"/>
    <text x="736" y="426" font-size="12" font-weight="bold" fill="#1A1B2E">Get Equipment Affix List</text>
    <text x="736" y="446" font-size="11" fill="#4A4B65">Returns all affixes on equipment.</text>

    <rect x="20" y="476" width="500" height="60" rx="8" fill="#E8EEFB"/>
    <text x="36" y="498" font-size="12" font-weight="bold" fill="#1A1B2E">Get Equipment Affix Value</text>
    <text x="36" y="518" font-size="11" fill="#4A4B65">Returns the current value of a specific affix.</text>
  </g>

