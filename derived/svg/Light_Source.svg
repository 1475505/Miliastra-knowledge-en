<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1450" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1200" height="1450" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="72" font-size="34" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Light Source</text>

  <text x="48" y="148" font-size="18" font-weight="700" fill="#2D6BE4">I. Light Source Component Functions</text>

  <g transform="translate(48, 168)">
    <rect width="1104" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="24" y="28" font-size="15" font-weight="500" fill="#1A1B2E">Purpose</text>
    <text x="24" y="52" font-size="14" fill="#4A4B65">Mount lights on Entities. Light sources provide basic illumination and can alter the environment's lighting and atmosphere.</text>
    <text x="24" y="76" font-size="14" fill="#4A4B65">Multiple light sources can be active within a single Light Source Component at the same time.</text>
    <text x="24" y="100" font-size="14" fill="#4A4B65">Supports Point Light and Spotlight types.</text>
  </g>

  <text x="48" y="328" font-size="18" font-weight="700" fill="#2D6BE4">II. Editing the Light Source Component</text>

  <g transform="translate(48, 348)">
    <rect width="1104" height="200" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="20" y="14" width="170" height="26" rx="13" fill="#E8EEFB"/>
    <text x="105" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Adding Light Source Component</text>

    <circle cx="36" cy="64" r="14" fill="#2D6BE4"/>
    <text x="36" y="65" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">1</text>
    <text x="60" y="65" font-size="14" fill="#4A4B65" dominant-baseline="middle">In the Entity/Prefab Editing interface, open the Component Editing Tab</text>

    <circle cx="36" cy="100" r="14" fill="#2D6BE4"/>
    <text x="36" y="101" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">2</text>
    <text x="60" y="101" font-size="14" fill="#4A4B65" dominant-baseline="middle">Click "Add Common Component", select "Light Source", then click to add</text>

    <circle cx="36" cy="136" r="14" fill="#2D6BE4"/>
    <text x="36" y="137" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">3</text>
    <text x="60" y="137" font-size="14" fill="#4A4B65" dominant-baseline="middle">Click "Advanced Editing" to expand the editing tab</text>

    <text x="24" y="176" font-size="14" fill="#4A4B65">Click [Add Light Source] to add additional light sources to the same component.</text>
  </g>

  <text x="48" y="588" font-size="18" font-weight="700" fill="#2D6BE4">III. Light Source Parameters</text>

  <g transform="translate(48, 608)">
    <rect width="1104" height="460" rx="14" fill="#FFFFFF" filter="url(#card)"/>

    <rect x="16" y="14" width="1072" height="44" rx="14" fill="#2D6BE4"/>
    <rect x="16" y="46" width="1072" height="12" fill="#2D6BE4"/>
    <text x="160" y="38" font-size="15" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Parameter</text>
    <text x="600" y="38" font-size="15" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Description</text>

    <text x="24" y="84" font-size="14" fill="#1A1B2E" font-weight="500">Initially Effective</text>
    <text x="200" y="84" font-size="14" fill="#4A4B65">When enabled, the light source becomes effective when the entity is created</text>
    <line x1="24" y1="98" x2="1080" y2="98" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="118" font-size="14" fill="#1A1B2E" font-weight="500">Light Source ID</text>
    <text x="200" y="118" font-size="14" fill="#4A4B65">Distinguishes this light source from others on the entity; cannot be edited</text>
    <line x1="24" y1="132" x2="1080" y2="132" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="152" font-size="14" fill="#1A1B2E" font-weight="500">Light Source Name</text>
    <text x="200" y="152" font-size="14" fill="#4A4B65">Customizable name used for notes</text>
    <line x1="24" y1="166" x2="1080" y2="166" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="186" font-size="14" fill="#1A1B2E" font-weight="500">Light Source Type</text>
    <text x="200" y="186" font-size="14" fill="#4A4B65">Currently supports Point Light and Spotlight</text>
    <line x1="24" y1="200" x2="1080" y2="200" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="220" font-size="14" fill="#1A1B2E" font-weight="500">Color</text>
    <text x="200" y="220" font-size="14" fill="#4A4B65">Sets the color shown on illuminated models</text>
    <line x1="24" y1="234" x2="1080" y2="234" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="254" font-size="14" fill="#1A1B2E" font-weight="500">Radius</text>
    <text x="200" y="254" font-size="14" fill="#4A4B65">Illumination radius of the light source</text>
    <line x1="24" y1="268" x2="1080" y2="268" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="288" font-size="14" fill="#1A1B2E" font-weight="500">Intensity</text>
    <text x="200" y="288" font-size="14" fill="#4A4B65">Degree of color or brightness change on the illuminated model</text>
    <line x1="24" y1="302" x2="1080" y2="302" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="322" font-size="14" fill="#1A1B2E" font-weight="500">Effective Range</text>
    <text x="200" y="322" font-size="14" fill="#4A4B65">Light source is loaded only when a character enters this range (performance optimization)</text>
    <line x1="24" y1="336" x2="1080" y2="336" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="356" font-size="14" fill="#1A1B2E" font-weight="500">Effect Range Preview</text>
    <text x="200" y="356" font-size="14" fill="#4A4B65">When enabled, displays the active range of this light source in the Editing interface</text>
    <line x1="24" y1="370" x2="1080" y2="370" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="390" font-size="14" fill="#1A1B2E" font-weight="500">Attachment Point</text>
    <text x="200" y="390" font-size="14" fill="#4A4B65">Specifies the Attachment Point the light source follows; defaults to the root node</text>
    <line x1="24" y1="404" x2="1080" y2="404" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="424" font-size="14" fill="#1A1B2E" font-weight="500">Location, Rotation</text>
    <text x="200" y="424" font-size="14" fill="#4A4B65">Controls Location and Rotation relative to the Attachment Point</text>
  </g>

  <text x="48" y="1108" font-size="18" font-weight="700" fill="#2D6BE4">IV. Node Graph Control</text>

  <g transform="translate(48, 1128)">
    <rect width="1104" height="100" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="180" height="26" rx="13" fill="#E8EEFB"/>
    <text x="106" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Toggle Entity Light Source</text>
    <text x="24" y="60" font-size="14" fill="#4A4B65">Use the "Toggle Entity Light Source" node to enable or disable specific light sources on an entity at runtime.</text>
    <text x="24" y="84" font-size="14" fill="#4A4B65">Target the entity and specify the Light Source ID to toggle.</text>
  </g>

  <g transform="translate(48, 1252)">
    <rect width="1104" height="82" rx="14" fill="#E8EEFB"/>
    <rect x="0" y="0" width="4" height="82" rx="2" fill="#2D6BE4"/>
    <text x="20" y="22" font-size="14" font-weight="bold" fill="#2D6BE4">Light Source Workflow</text>
    <text x="20" y="44" font-size="13" fill="#4A4B65">Add Light Source Component → Configure Type, Color, Radius, Intensity → Set Attachment Point →</text>
    <text x="20" y="64" font-size="13" fill="#4A4B65">Add Multiple Lights → Toggle via Node Graph at Runtime</text>
  </g>

  <text x="48" y="1378" font-size="12" fill="#8B8DA0">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhgkan9wgil6" target="_blank">
    <text x="48" y="1400" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Light Source</text>
  </a>
  <text x="600" y="1428" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>