<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 2132">
<defs>
  <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2D6BE4"/>
    <stop offset="100%" stop-color="#4A3F6B"/>
  </linearGradient>
  <filter id="card">
    <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
  </filter>
  <filter id="elevated">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
  </filter>
</defs>
<style>
  text { font-family: 'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif; }
</style>

<!-- Page Background -->
<rect width="1200" height="2132" fill="#F9F7F2"/>

<!-- Top Color Bar -->
<rect width="1200" height="6" fill="url(#topGrad)"/>

<!-- Title Card -->
<rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
<rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
<text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold">Interface Layout</text>
<text x="420" y="82" fill="#4A4B65" font-size="16">Screen layout for player information and interactions</text>

<!-- I. Definition -->
<text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Definition of Interface Layout</text>

<rect x="48" y="162" width="1104" height="110" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="190" fill="#4A4B65" font-size="14">The Interface Layout is the screen players use to obtain information and perform interactions during stage runtime.</text>
<text x="72" y="216" fill="#4A4B65" font-size="14">In addition to the Default Layout with basic features, players can customize the Interface Layout.</text>
<text x="72" y="242" fill="#4A4B65" font-size="14">The Interface Layout runs per player; during runtime, each player has exactly one active Interface Layout.</text>

<!-- II. Interface Layout Management -->
<text x="48" y="308" fill="#2D6BE4" font-size="18" font-weight="700">II. Interface Layout Management</text>
<text x="340" y="308" fill="#8B8DA0" font-size="13">Centrally managed via Manage UI Control Groups</text>

<!-- Management Overview Card -->
<rect x="48" y="322" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="350" fill="#1A1B2E" font-size="14" font-weight="500">Management Scope</text>
<text x="72" y="374" fill="#4A4B65" font-size="14">Only supports editing and referencing the interface displayed during stage runtime. Does not support editing interfaces for essential processes such as matching and settlement.</text>

<!-- Default Configuration Card -->
<rect x="48" y="414" width="540" height="120" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="442" r="14" fill="#2D6BE4"/>
<text x="76" y="447" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">1</text>
<text x="100" y="447" fill="#1A1B2E" font-size="16" font-weight="500">Default Configuration</text>
<text x="72" y="474" fill="#4A4B65" font-size="14">The Interface Layout used during Stage gameplay</text>
<text x="72" y="496" fill="#4A4B65" font-size="14">must be configured via Class.</text>
<text x="72" y="522" fill="#4A4B65" font-size="14">Open Class editing, then use Select Layout to reference.</text>

<!-- Node Graph: Switch Layout Card -->
<rect x="612" y="414" width="540" height="120" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="640" cy="442" r="14" fill="#2D6BE4"/>
<text x="640" y="447" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">2</text>
<text x="664" y="447" fill="#1A1B2E" font-size="16" font-weight="500">Switch Current Interface Layout</text>
<text x="636" y="474" fill="#4A4B65" font-size="14">Use the Layout ID to switch the Target Player's</text>
<text x="636" y="496" fill="#4A4B65" font-size="14">current Interface Layout as needed.</text>
<rect x="636" y="508" width="100" height="20" rx="10" fill="#E8EEFB"/>
<text x="686" y="522" fill="#2D6BE4" font-size="11" text-anchor="middle">Node Graph</text>

<!-- Node Graph Parameters Card -->
<rect x="48" y="546" width="540" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="574" fill="#1A1B2E" font-size="14" font-weight="500">Switch Layout Parameters</text>
<rect x="72" y="586" width="130" height="24" rx="12" fill="#E8EEFB"/>
<text x="137" y="602" fill="#2D6BE4" font-size="12" text-anchor="middle">Target Player</text>
<text x="212" y="602" fill="#4A4B65" font-size="13">The Player Entity that needs to switch</text>
<rect x="72" y="616" width="110" height="24" rx="12" fill="#E8EEFB"/>
<text x="127" y="632" fill="#2D6BE4" font-size="12" text-anchor="middle">Layout Index</text>
<text x="192" y="632" fill="#4A4B65" font-size="13">The ID of the specified layout</text>

<!-- Get Current Layout Card -->
<rect x="612" y="546" width="540" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="640" cy="574" r="14" fill="#2D6BE4"/>
<text x="640" y="579" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">3</text>
<text x="664" y="579" fill="#1A1B2E" font-size="16" font-weight="500">Get Current Interface Layout</text>
<text x="636" y="606" fill="#4A4B65" font-size="14">At runtime, get the player's current Interface Layout ID.</text>
<text x="636" y="628" fill="#4A4B65" font-size="14">Returns the layout index value for use in conditional logic.</text>

<!-- III. Interface Layout Adaptation -->
<text x="48" y="690" fill="#2D6BE4" font-size="18" font-weight="700">III. Interface Layout Adaptation Instructions</text>

<!-- Device Selection Card -->
<rect x="48" y="704" width="1104" height="180" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="732" fill="#1A1B2E" font-size="16" font-weight="500">1. Device Selection</text>
<text x="72" y="756" fill="#4A4B65" font-size="14">Due to significant differences across devices (resolution and button arrangement), if you want to create Stages playable on PC/Mobile/Console,</text>
<text x="72" y="776" fill="#4A4B65" font-size="14">you need to adjust UI Controls' Location, Size, and Waypoint for each device.</text>

<text x="72" y="804" fill="#1A1B2E" font-size="14" font-weight="500">Two places to adjust device settings:</text>
<rect x="72" y="816" width="20" height="20" rx="4" fill="#E8EEFB"/>
<text x="82" y="830" fill="#2D6BE4" font-size="11" text-anchor="middle">A</text>
<text x="100" y="830" fill="#4A4B65" font-size="14">Top bar: Select device and resolution</text>
<rect x="72" y="844" width="20" height="20" rx="4" fill="#E8EEFB"/>
<text x="82" y="858" fill="#2D6BE4" font-size="11" text-anchor="middle">B</text>
<text x="100" y="858" fill="#4A4B65" font-size="14">UI Control Details — Transform: Click to select a device</text>

<!-- Device Table -->
<rect x="48" y="896" width="1104" height="44" rx="14" fill="#2D6BE4"/>
<rect x="48" y="926" width="1104" height="14" fill="#2D6BE4"/>
<text x="200" y="924" fill="#fff" font-size="15" text-anchor="middle" font-weight="500">Device</text>
<text x="600" y="924" fill="#fff" font-size="15" text-anchor="middle" font-weight="500">Main Interface (16:9 Resolution)</text>
<text x="980" y="924" fill="#fff" font-size="15" text-anchor="middle" font-weight="500">Input Method</text>

<rect x="48" y="940" width="1104" height="36" fill="#fff"/>
<line x1="48" y1="976" x2="1152" y2="976" stroke="#E8E4DA" stroke-width="1"/>
<text x="200" y="964" fill="#1A1B2E" font-size="14" text-anchor="middle" font-weight="500">PC</text>
<text x="600" y="964" fill="#4A4B65" font-size="14" text-anchor="middle">Standard desktop layout</text>
<text x="980" y="964" fill="#4A4B65" font-size="14" text-anchor="middle">Keyboard + Mouse</text>

<rect x="48" y="976" width="1104" height="36" fill="#F4F1EA"/>
<line x1="48" y1="1012" x2="1152" y2="1012" stroke="#E8E4DA" stroke-width="1"/>
<text x="200" y="1000" fill="#1A1B2E" font-size="14" text-anchor="middle" font-weight="500">Mobile</text>
<text x="600" y="1000" fill="#4A4B65" font-size="14" text-anchor="middle">Touch-optimized layout</text>
<text x="980" y="1000" fill="#4A4B65" font-size="14" text-anchor="middle">Touch Screen</text>

<rect x="48" y="1012" width="1104" height="36" fill="#fff"/>
<line x1="48" y1="1048" x2="1152" y2="1048" stroke="#E8E4DA" stroke-width="1"/>
<text x="200" y="1036" fill="#1A1B2E" font-size="14" text-anchor="middle" font-weight="500">Console</text>
<text x="600" y="1036" fill="#4A4B65" font-size="14" text-anchor="middle">Console-optimized layout</text>
<text x="980" y="1036" fill="#4A4B65" font-size="14" text-anchor="middle">Gamepad</text>

<rect x="48" y="1048" width="1104" height="36" rx="0" fill="#F4F1EA"/>
<rect x="48" y="1070" width="1104" height="14" rx="14" fill="#F4F1EA"/>
<text x="200" y="1072" fill="#1A1B2E" font-size="14" text-anchor="middle" font-weight="500">Mobile Controller</text>
<text x="600" y="1072" fill="#4A4B65" font-size="14" text-anchor="middle">Mobile with controller overlay</text>
<text x="980" y="1072" fill="#4A4B65" font-size="14" text-anchor="middle">Touch + Gamepad</text>

<!-- Location and Size Card -->
<rect x="48" y="1100" width="540" height="140" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="1128" fill="#1A1B2E" font-size="16" font-weight="500">2. Adjust Location</text>
<text x="72" y="1154" fill="#4A4B65" font-size="14">Using the bottom-left corner of the canvas as the</text>
<text x="72" y="1174" fill="#4A4B65" font-size="14">origin, displays the relative location of the UI Controls'</text>
<text x="72" y="1194" fill="#4A4B65" font-size="14">center point to the origin.</text>
<text x="72" y="1220" fill="#1A1B2E" font-size="14" font-weight="500">Each device needs to be set up separately.</text>

<rect x="612" y="1100" width="540" height="140" rx="14" fill="#fff" filter="url(#card)"/>
<text x="636" y="1128" fill="#1A1B2E" font-size="16" font-weight="500">3. Adjust Size</text>
<text x="636" y="1154" fill="#4A4B65" font-size="14">Adjust the current size of the UI Control.</text>
<text x="636" y="1178" fill="#4A4B65" font-size="14">Click the chain button in the top right corner to lock</text>
<text x="636" y="1198" fill="#4A4B65" font-size="14">the current aspect ratio.</text>
<text x="636" y="1224" fill="#1A1B2E" font-size="14" font-weight="500">Some UI Controls cannot be resized.</text>

<!-- Waypoints Card -->
<rect x="48" y="1256" width="1104" height="180" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="1284" fill="#1A1B2E" font-size="16" font-weight="500">4. Waypoints (Anchors)</text>
<text x="72" y="1310" fill="#1A1B2E" font-size="14" font-weight="500">Definition</text>
<text x="72" y="1332" fill="#4A4B65" font-size="14">When resolution changes, UI Controls automatically adapt their location while maintaining their relative location to the set waypoint.</text>

<text x="72" y="1362" fill="#1A1B2E" font-size="14" font-weight="500">Waypoint Selection Guidelines</text>
<rect x="72" y="1374" width="16" height="16" rx="8" fill="#2D6BE4"/>
<text x="80" y="1386" fill="#fff" font-size="10" text-anchor="middle" font-weight="500">A</text>
<text x="96" y="1386" fill="#4A4B65" font-size="14">Based on UI Control Location: Select the waypoint corresponding to the section of the nine-grid where the element is placed.</text>
<rect x="72" y="1398" width="16" height="16" rx="8" fill="#2D6BE4"/>
<text x="80" y="1410" fill="#fff" font-size="10" text-anchor="middle" font-weight="500">B</text>
<text x="96" y="1410" fill="#4A4B65" font-size="14">Based on functional areas: For example, waypoint selections for quest descriptions and multiple text boxes should remain consistent.</text>

<!-- Waypoint Nine-Grid Reference -->
<rect x="48" y="1448" width="1104" height="130" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="1476" fill="#1A1B2E" font-size="14" font-weight="500">Nine-Grid Waypoint Reference</text>

<!-- Nine-grid visualization -->
<rect x="72" y="1490" width="100" height="30" rx="6" fill="#E8EEFB"/>
<text x="122" y="1510" fill="#2D6BE4" font-size="12" text-anchor="middle">Top-Left</text>
<rect x="182" y="1490" width="100" height="30" rx="6" fill="#E8EEFB"/>
<text x="232" y="1510" fill="#2D6BE4" font-size="12" text-anchor="middle">Top</text>
<rect x="292" y="1490" width="100" height="30" rx="6" fill="#E8EEFB"/>
<text x="342" y="1510" fill="#2D6BE4" font-size="12" text-anchor="middle">Top-Right</text>

<rect x="72" y="1526" width="100" height="30" rx="6" fill="#F4F1EA"/>
<text x="122" y="1546" fill="#4A4B65" font-size="12" text-anchor="middle">Left</text>
<rect x="182" y="1526" width="100" height="30" rx="6" fill="#F4F1EA"/>
<text x="232" y="1546" fill="#4A4B65" font-size="12" text-anchor="middle">Center</text>
<rect x="292" y="1526" width="100" height="30" rx="6" fill="#F4F1EA"/>
<text x="342" y="1546" fill="#4A4B65" font-size="12" text-anchor="middle">Right</text>

<rect x="72" y="1562" width="100" height="30" rx="6" fill="#E8EEFB"/>
<text x="122" y="1582" fill="#2D6BE4" font-size="12" text-anchor="middle">Bottom-Left</text>
<rect x="182" y="1562" width="100" height="30" rx="6" fill="#E8EEFB"/>
<text x="232" y="1582" fill="#2D6BE4" font-size="12" text-anchor="middle">Bottom</text>
<rect x="292" y="1562" width="100" height="30" rx="6" fill="#E8EEFB"/>
<text x="342" y="1582" fill="#2D6BE4" font-size="12" text-anchor="middle">Bottom-Right</text>

<text x="440" y="1510" fill="#4A4B65" font-size="13">Select the waypoint that matches where the UI element</text>
<text x="440" y="1530" fill="#4A4B65" font-size="13">is positioned on screen. This ensures correct adaptation</text>
<text x="440" y="1550" fill="#4A4B65" font-size="13">when resolution or aspect ratio changes.</text>

<!-- Interface Dead Zone Card -->
<rect x="48" y="1608" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="1636" fill="#1A1B2E" font-size="16" font-weight="500">5. Interface Dead Zone</text>
<text x="72" y="1660" fill="#4A4B65" font-size="14">The mobile Interface has the smallest screen. Use the 16:9 mobile adaptation as the baseline to ensure clickable UI Controls remain within the safe area (red zone boundary).</text>

<!-- Tip Box -->
<rect x="48" y="1700" width="1104" height="44" rx="10" fill="#E8EEFB"/>
<rect x="48" y="1700" width="4" height="44" rx="2" fill="#2D6BE4"/>
<text x="72" y="1726" fill="#4A4B65" font-size="14">Tip: Always test your Interface Layout on all target devices and resolutions before publishing to ensure proper adaptation.</text>

<!-- IV. Interface Specification Reference -->
<text x="48" y="1782" fill="#2D6BE4" font-size="18" font-weight="700">IV. Interface Specification Reference</text>

<!-- Font Size Card -->
<rect x="48" y="1796" width="540" height="170" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="1824" fill="#1A1B2E" font-size="16" font-weight="500">Font Size Reference</text>

<rect x="72" y="1838" width="160" height="24" rx="12" fill="#E8EEFB"/>
<text x="152" y="1854" fill="#2D6BE4" font-size="12" text-anchor="middle">Large Title</text>
<text x="242" y="1854" fill="#4A4B65" font-size="14">36 - 32</text>

<rect x="72" y="1868" width="160" height="24" rx="12" fill="#E8EEFB"/>
<text x="152" y="1884" fill="#2D6BE4" font-size="12" text-anchor="middle">Subtitle / Button</text>
<text x="242" y="1884" fill="#4A4B65" font-size="14">24</text>

<rect x="72" y="1898" width="160" height="24" rx="12" fill="#E8EEFB"/>
<text x="152" y="1914" fill="#2D6BE4" font-size="12" text-anchor="middle">Body Text</text>
<text x="242" y="1914" fill="#1A1B2E" font-size="14" font-weight="500">20 (Most Common)</text>

<rect x="72" y="1928" width="160" height="24" rx="12" fill="#E8EEFB"/>
<text x="152" y="1944" fill="#2D6BE4" font-size="12" text-anchor="middle">Secondary Text</text>
<text x="242" y="1944" fill="#4A4B65" font-size="14">18</text>

<text x="72" y="1964" fill="#1A1B2E" font-size="13" font-weight="500">Recommended Minimum Font Size: 16</text>

<!-- Text Color Card -->
<rect x="612" y="1796" width="540" height="170" rx="14" fill="#fff" filter="url(#card)"/>
<text x="636" y="1824" fill="#1A1B2E" font-size="16" font-weight="500">Text Color Reference</text>

<text x="636" y="1848" fill="#1A1B2E" font-size="13" font-weight="500">Dark Background (Pop-ups / Main Interface)</text>
<text x="636" y="1868" fill="#4A4B65" font-size="13">Title / Secondary: #D3BC8E   |   Normal: #FFFFFF</text>
<text x="636" y="1886" fill="#4A4B65" font-size="13">Keyword 1: #FFCC33   |   Keyword 2: #37FFFF   |   Warning: #FF5E41</text>

<text x="636" y="1912" fill="#1A1B2E" font-size="13" font-weight="500">Light Background (Tips etc.)</text>
<text x="636" y="1932" fill="#4A4B65" font-size="13">Normal: #4A5366   |   Secondary (75%): #4A5366BF</text>
<text x="636" y="1950" fill="#4A4B65" font-size="13">Keyword 1: #F39000   |   Keyword 2: #3399CC   |   Warning: #FF5E41</text>

<!-- Elemental Colors Card -->
<rect x="48" y="1978" width="1104" height="56" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="2004" fill="#1A1B2E" font-size="14" font-weight="500">Elemental Type Colors:</text>
<text x="260" y="2004" fill="#4A4B65" font-size="13">Hydro #80C0FF</text>
<text x="380" y="2004" fill="#4A4B65" font-size="13">Pyro #FF9999</text>
<text x="490" y="2004" fill="#4A4B65" font-size="13">Anemo #80FFD7</text>
<text x="620" y="2004" fill="#4A4B65" font-size="13">Electro #FFACFF</text>
<text x="750" y="2004" fill="#4A4B65" font-size="13">Dendro #99FF88</text>
<text x="880" y="2004" fill="#4A4B65" font-size="13">Cryo #99FFFF</text>
<text x="1000" y="2004" fill="#4A4B65" font-size="13">Geo #FFE699</text>
<text x="72" y="2026" fill="#4A4B65" font-size="13">Quest: Main Quest font 20, Side Quest font 18, waypoint top-left. Hint: font 20, center-aligned, length 5000, waypoint top. Success: #ACFF44, Failure: #FFFFFFBF.</text>

