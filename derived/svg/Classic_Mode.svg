<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1596">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <style>
    text { font-family: 'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif; }
  </style>

  <!-- Background -->
  <rect width="1200" height="1596" fill="#F9F7F2"/>
  <!-- Top bar -->
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold">Classic Mode</text>
  <text x="380" y="82" fill="#4A4B65" font-size="16">Compare to Overlimit Mode</text>

  <!-- I. Mode Comparison -->
  <text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Classic Mode vs Beyond Mode</text>

  <!-- Comparison Table -->
  <rect x="48" y="164" width="1104" height="180" rx="14" fill="#fff" filter="url(#card)"/>
  <!-- Header -->
  <rect x="48" y="164" width="1104" height="44" rx="14" fill="#2D6BE4"/>
  <rect x="48" y="194" width="1104" height="14" fill="#2D6BE4"/>
  <text x="200" y="192" fill="#fff" font-size="15" font-weight="500" text-anchor="middle">Feature</text>
  <text x="550" y="192" fill="#fff" font-size="15" font-weight="500" text-anchor="middle">Classic Mode</text>
  <text x="900" y="192" fill="#fff" font-size="15" font-weight="500" text-anchor="middle">Beyond Mode</text>
  <!-- Row 1 -->
  <line x1="72" y1="252" x2="1128" y2="252" stroke="#E8E4DA" stroke-width="1"/>
  <text x="200" y="236" fill="#1A1B2E" font-size="14" font-weight="500" text-anchor="middle">Player Count</text>
  <text x="550" y="236" fill="#4A4B65" font-size="14" text-anchor="middle">Up to 4 Players</text>
  <text x="900" y="236" fill="#4A4B65" font-size="14" text-anchor="middle">Up to 8 Players</text>
  <!-- Row 2 -->
  <line x1="72" y1="296" x2="1128" y2="296" stroke="#E8E4DA" stroke-width="1"/>
  <text x="200" y="280" fill="#1A1B2E" font-size="14" font-weight="500" text-anchor="middle">Teyvat Characters</text>
  <text x="550" y="280" fill="#34A853" font-size="14" font-weight="500" text-anchor="middle">Allowed</text>
  <text x="900" y="280" fill="#D93025" font-size="14" font-weight="500" text-anchor="middle">Not Allowed</text>
  <!-- Row 3 -->
  <text x="200" y="324" fill="#1A1B2E" font-size="14" font-weight="500" text-anchor="middle">Manekins</text>
  <text x="550" y="324" fill="#34A853" font-size="14" font-weight="500" text-anchor="middle">Allowed</text>
  <text x="900" y="324" fill="#34A853" font-size="14" font-weight="500" text-anchor="middle">Allowed</text>

  <!-- Tip Box -->
  <rect x="48" y="356" width="1104" height="56" rx="10" fill="#FDE8E6"/>
  <rect x="48" y="356" width="4" height="56" rx="2" fill="#D93025"/>
  <text x="72" y="380" fill="#D93025" font-size="13" font-weight="500">Save files (.gil) created in Classic Mode and Beyond Mode are not compatible and cannot be converted between modes.</text>
  <text x="72" y="398" fill="#D93025" font-size="13" font-weight="500">Exported asset files (.gia) cannot be imported across modes.</text>

  <!-- II. Creating a Classic Mode Save -->
  <text x="48" y="448" fill="#2D6BE4" font-size="18" font-weight="700">II. Creating a Classic Mode Save</text>

  <rect x="48" y="464" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <!-- Step flow -->
  <circle cx="100" cy="504" r="16" fill="#2D6BE4"/>
  <text x="100" y="509" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">1</text>
  <text x="128" y="509" fill="#1A1B2E" font-size="14" font-weight="500">Open Save Menu</text>
  <text x="270" y="509" fill="#8B8DA0" font-size="16">&#x203A;</text>
  <circle cx="310" cy="504" r="16" fill="#2D6BE4"/>
  <text x="310" y="509" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">2</text>
  <text x="338" y="509" fill="#1A1B2E" font-size="14" font-weight="500">Click "Create New Save"</text>
  <text x="530" y="509" fill="#8B8DA0" font-size="16">&#x203A;</text>
  <circle cx="570" cy="504" r="16" fill="#2D6BE4"/>
  <text x="570" y="509" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">3</text>
  <text x="598" y="509" fill="#1A1B2E" font-size="14" font-weight="500">Select Classic Mode</text>
  <text x="760" y="509" fill="#8B8DA0" font-size="16">&#x203A;</text>
  <circle cx="800" cy="504" r="16" fill="#1B4FC0"/>
  <text x="800" y="509" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">4</text>
  <text x="828" y="509" fill="#1A1B2E" font-size="14" font-weight="500">Click "Confirm"</text>

  <!-- III. Basic Parameter Configuration -->
  <text x="48" y="580" fill="#2D6BE4" font-size="18" font-weight="700">III. Basic Parameter Configuration</text>
  <text x="380" y="580" fill="#8B8DA0" font-size="13">Esc menu &gt; Stage Settings icon</text>

  <!-- Card: Character Settings -->
  <rect x="48" y="596" width="540" height="200" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="624" fill="#1A1B2E" font-size="16" font-weight="500">Number of Principal Cast Members</text>
  <text x="72" y="650" fill="#4A4B65" font-size="14">Determines the max number of characters per player.</text>
  <text x="72" y="676" fill="#4A4B65" font-size="14">Default: 1 player = up to 4 characters</text>
  <text x="72" y="698" fill="#4A4B65" font-size="14">2 players = up to 2 characters each</text>
  <text x="72" y="720" fill="#4A4B65" font-size="14">3+ players = 1 character each</text>
  <text x="72" y="746" fill="#4A4B65" font-size="14">The first two values are adjustable.</text>
  <rect x="72" y="760" width="120" height="26" rx="13" fill="#E8EEFB"/>
  <text x="132" y="778" fill="#2D6BE4" font-size="12" font-weight="500" text-anchor="middle">Adjustable</text>

  <!-- Card: Character Restrictions -->
  <rect x="612" y="596" width="540" height="200" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="636" y="624" fill="#1A1B2E" font-size="16" font-weight="500">Character Restrictions</text>
  <text x="636" y="650" fill="#4A4B65" font-size="14">Switches from unrestricted to restricted mode.</text>
  <text x="636" y="676" fill="#4A4B65" font-size="14">Click "+" to add permitted characters.</text>
  <text x="636" y="702" fill="#4A4B65" font-size="14">Filter by element or weapon type in top-left.</text>
  <text x="636" y="728" fill="#4A4B65" font-size="14">Use "Select All" to add all filtered results.</text>
  <text x="636" y="754" fill="#4A4B65" font-size="14">Use "Cancel All" to clear current selection.</text>
  <rect x="636" y="766" width="100" height="26" rx="13" fill="#FFF3E0"/>
  <text x="686" y="784" fill="#4A4B65" font-size="12" font-weight="500" text-anchor="middle">Restricted</text>

  <!-- IV. Playtest -->
  <text x="48" y="836" fill="#2D6BE4" font-size="18" font-weight="700">IV. Classic Mode Stage Playtest</text>

  <rect x="48" y="852" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="100" cy="892" r="16" fill="#2D6BE4"/>
  <text x="100" y="897" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">1</text>
  <text x="128" y="897" fill="#1A1B2E" font-size="14" font-weight="500">Esc menu &gt; System &gt; Test Play</text>
  <text x="420" y="897" fill="#8B8DA0" font-size="16">&#x203A;</text>
  <circle cx="460" cy="892" r="16" fill="#2D6BE4"/>
  <text x="460" y="897" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">2</text>
  <text x="488" y="897" fill="#1A1B2E" font-size="14" font-weight="500">Select characters for party</text>
  <text x="710" y="897" fill="#8B8DA0" font-size="16">&#x203A;</text>
  <circle cx="750" cy="892" r="16" fill="#1B4FC0"/>
  <text x="750" y="897" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">3</text>
  <text x="778" y="897" fill="#1A1B2E" font-size="14" font-weight="500">Start playtest</text>

  <!-- Tip -->
  <rect x="48" y="944" width="1104" height="40" rx="10" fill="#E8EEFB"/>
  <rect x="48" y="944" width="4" height="40" rx="2" fill="#2D6BE4"/>
  <text x="72" y="969" fill="#4A4B65" font-size="13">When Character Restrictions are enabled, only permitted characters can be selected in playtest.</text>

  <!-- V. Extended Application -->
  <text x="48" y="1020" fill="#2D6BE4" font-size="18" font-weight="700">V. Extended Application: Modify Character Energy</text>

  <rect x="48" y="1036" width="1104" height="200" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1064" fill="#1A1B2E" font-size="16" font-weight="500">Feature Example: Interaction Option Changes Energy</text>
  <text x="72" y="1090" fill="#4A4B65" font-size="14">Option 1: Set Energy to 100</text>
  <text x="72" y="1112" fill="#4A4B65" font-size="14">Option 2: Set Energy to 0</text>
  <text x="72" y="1134" fill="#4A4B65" font-size="14">Option 3: Add 10 Energy</text>
  <text x="72" y="1156" fill="#4A4B65" font-size="14">Option 4: Subtract 10 Energy</text>
  <text x="72" y="1186" fill="#1A1B2E" font-size="14" font-weight="500">Implementation Steps:</text>
  <text x="72" y="1208" fill="#4A4B65" font-size="14">1. Create prefab as interactive object  2. Add Components tab with options + trigger area</text>
  <text x="72" y="1228" fill="#4A4B65" font-size="14">3. Configure node graph  4. Mount node graph on prefab  5. Place in scene  6. Test Play</text>

