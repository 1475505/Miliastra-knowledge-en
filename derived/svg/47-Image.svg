<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 2380" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="2380" fill="#F9F7F2"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">47-Image: Image UI Control, Sizing Modes &amp; Properties</text>

  <!-- ==================== SECTION I ==================== -->
  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. Image Features</text>

  <g transform="translate(60, 164)">
    <rect width="1080" height="140" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">What are Image UI Controls?</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">Images can be configured in the UI Layout to display corresponding images</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">in the UI Layout. They are a type of UI control used to beautify the interface</text>
    <text x="20" y="92" font-size="14" fill="#4A4B65">and enrich its visual presentation.</text>
    <text x="20" y="120" font-size="14" fill="#4A4B65">During stage runtime, Image Controls can be triggered through Node Graphs.</text>
  </g>

  <!-- ==================== SECTION II ==================== -->
  <circle cx="80" cy="340" r="16" fill="#2D6BE4"/>
  <text x="80" y="341" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="341" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. Adding &amp; Editing Images</text>

  <g transform="translate(60, 368)">
    <rect width="1080" height="100" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">1. Add an Image</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">In the UI Control Group Editor window, add the UI Control Template — Image.</text>
    <text x="20" y="76" font-size="13" fill="#8B8DA0">Images are placed on the UI canvas alongside other controls like Text Boxes and Buttons.</text>
  </g>

  <!-- ==================== SECTION III ==================== -->
  <circle cx="80" cy="504" r="16" fill="#2D6BE4"/>
  <text x="80" y="505" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="505" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. Image Settings &amp; Source Types</text>

  <!-- Image Source Types -->
  <g transform="translate(60, 532)">
    <rect width="1080" height="300" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">2. Image Settings — Image Source</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">The Image Source determines where the image content comes from.</text>
    <text x="20" y="76" font-size="13" fill="#8B8DA0">The selected option affects the subsequent configuration parameters.</text>

    <text x="20" y="106" font-size="14" font-weight="bold" fill="#1A1B2E">Available Image Source Types:</text>

    <!-- Source type boxes -->
    <rect x="20" y="126" width="248" height="32" rx="6" fill="#E8EEFB"/>
    <text x="144" y="142" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Static Reference</text>

    <rect x="276" y="126" width="248" height="32" rx="6" fill="#E8EEFB"/>
    <text x="400" y="142" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Dynamic Reference</text>

    <rect x="532" y="126" width="248" height="32" rx="6" fill="#E8EEFB"/>
    <text x="656" y="142" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Item</text>

    <rect x="788" y="126" width="248" height="32" rx="6" fill="#E8EEFB"/>
    <text x="912" y="142" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">State</text>

    <rect x="20" y="166" width="248" height="32" rx="6" fill="#E8EEFB"/>
    <text x="144" y="182" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Skill</text>

    <rect x="276" y="166" width="248" height="32" rx="6" fill="#E8EEFB"/>
    <text x="400" y="182" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Unit Status</text>

    <text x="20" y="220" font-size="13" fill="#4A4B65">When Image Source is set to Static Reference, select a preset asset from the</text>
    <text x="20" y="240" font-size="13" fill="#4A4B65">Asset Library. Some assets support color configuration.</text>
    <text x="20" y="264" font-size="13" fill="#4A4B65">When set to other types (Dynamic Reference, Item, State, Skill, Unit Status),</text>
    <text x="20" y="284" font-size="13" fill="#4A4B65">configure custom variables as identifiers for the corresponding images.</text>
  </g>

  <!-- Image Type and Stretch -->
  <g transform="translate(60, 848)">
    <rect width="1080" height="260" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">Image Type &amp; Stretch Behavior</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">Image assets support different stretch (sizing) types. Use the filter options</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">in the Image Asset Library to find suitable assets.</text>

    <text x="20" y="102" font-size="14" font-weight="bold" fill="#1A1B2E">Image Type Comparison:</text>

    <rect x="20" y="120" width="30" height="30" rx="4" fill="#2D6BE4"/>
    <text x="35" y="135" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">N</text>
    <text x="60" y="135" font-size="12" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Normal</text>
    <text x="60" y="160" font-size="11" fill="#4A4B65">All four corners deform when stretched.</text>
    <text x="60" y="180" font-size="11" fill="#4A4B65">Best for combining specific shapes or basic patterns.</text>

    <rect x="20" y="198" width="30" height="30" rx="4" fill="#2D6BE4"/>
    <text x="35" y="213" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">3</text>
    <text x="60" y="213" font-size="12" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">3-Panel Layout</text>
    <text x="60" y="238" font-size="11" fill="#4A4B65">Four corners retain shape when stretched horizontally/vertically.</text>
    <text x="60" y="258" font-size="11" fill="#4A4B65">Surface images for custom-styled buttons, tabs, and similar controls.</text>
  </g>

  <!-- 3x3 Grid -->
  <g transform="translate(60, 1124)">
    <rect width="1080" height="100" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="20" y="20" width="30" height="30" rx="4" fill="#2D6BE4"/>
    <text x="35" y="35" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">#</text>
    <text x="60" y="35" font-size="14" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">3x3 Grid</text>
    <text x="60" y="60" font-size="13" fill="#4A4B65">Four corners retain shape when stretched in any direction.</text>
    <text x="60" y="84" font-size="13" fill="#4A4B65">Surfaces for list items in single-choice windows, or background images for tabs and dialogs.</text>
  </g>

  <!-- ==================== SECTION IV ==================== -->
  <circle cx="80" cy="1260" r="16" fill="#2D6BE4"/>
  <text x="80" y="1261" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IV</text>
  <text x="108" y="1261" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">IV. Image Properties: Color, Opacity &amp; Tiling</text>

  <g transform="translate(60, 1288)">
    <rect width="1080" height="200" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">Fill Color</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">Image assets are divided into monochrome and full-color types. Colors can</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">be adjusted using the color selector. Monochrome assets generally produce</text>
    <text x="20" y="92" font-size="14" fill="#4A4B65">better results when recolored.</text>

    <text x="20" y="122" font-size="14" font-weight="bold" fill="#1A1B2E">Opacity &amp; Tiling</text>
    <text x="20" y="148" font-size="14" fill="#4A4B65">Configure image opacity to create transparent overlays and visual effects.</text>
    <text x="20" y="172" font-size="14" fill="#4A4B65">Tiling allows repeating the image pattern across the UI control bounds,</text>
    <text x="20" y="192" font-size="14" fill="#4A4B65">useful for backgrounds, borders, and decorative elements.</text>
  </g>

  <!-- ==================== SECTION V ==================== -->
  <circle cx="80" cy="1524" r="16" fill="#2D6BE4"/>
  <text x="80" y="1525" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">V</text>
  <text x="108" y="1525" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">V. Sizing Modes</text>

  <g transform="translate(60, 1552)">
    <rect width="1080" height="280" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">Image Sizing Modes</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">Different sizing modes determine how the image source is fitted into</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">the UI Control's bounding box:</text>

    <text x="20" y="104" font-size="14" font-weight="bold" fill="#1A1B2E">Fill</text>
    <text x="20" y="126" font-size="13" fill="#4A4B65">Stretches the image to fill the entire control area, potentially distorting</text>
    <text x="20" y="146" font-size="13" fill="#4A4B65">the aspect ratio if the control proportions differ from the source.</text>

    <text x="20" y="176" font-size="14" font-weight="bold" fill="#1A1B2E">Fit</text>
    <text x="20" y="198" font-size="13" fill="#4A4B65">Scales the image to fit within the control while maintaining aspect ratio.</text>
    <text x="20" y="218" font-size="13" fill="#4A4B65">May leave empty space (letterboxing) if ratios do not match.</text>

    <text x="20" y="248" font-size="14" font-weight="bold" fill="#1A1B2E">Stretch / Tile</text>
    <text x="20" y="270" font-size="13" fill="#4A4B65">Stretch: Image is stretched to match dimensions exactly. Tile: Image repeats to fill area.</text>
  </g>

  <!-- Sprite Swapping -->
  <g transform="translate(60, 1848)">
    <rect width="1080" height="150" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">Sprite Swapping &amp; Node Graph Control</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">During stage runtime, Image Controls can be triggered through Node Graphs</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">to dynamically swap image sources, change colors, toggle visibility, and</text>
    <text x="20" y="92" font-size="14" fill="#4A4B65">adjust opacity. This enables interactive UI elements that respond to game</text>
    <text x="20" y="112" font-size="14" fill="#4A4B65">events and player actions in real-time.</text>
    <text x="20" y="140" font-size="13" fill="#8B8DA0">Use Dynamic Reference source type with custom variables for runtime sprite swapping.</text>
  </g>

  <!-- Tip Box -->
  <g transform="translate(60, 2014)">
    <rect width="1080" height="90" rx="14" fill="#E8EEFB"/>
    <rect x="0" y="0" width="4" height="90" rx="2" fill="#2D6BE4"/>
    <text x="20" y="22" font-size="14" font-weight="bold" fill="#2D6BE4">Monochrome vs Full-Color Assets</text>
    <text x="20" y="44" font-size="13" fill="#4A4B65">Monochrome image assets are designed to be recolored via Fill Color and</text>
    <text x="20" y="64" font-size="13" fill="#4A4B65">produce the best results when tinted. Full-color assets retain their original</text>
    <text x="20" y="84" font-size="13" fill="#4A4B65">colors; color adjustments may not produce the same effect as with monochrome.</text>
  </g>

  <!-- Source Links -->
  <text x="60" y="2148" font-size="12" fill="#8B8DA0">Related Documentation:</text>

  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhg1gur8jqrq" target="_blank">
    <text x="60" y="2174" font-size="12" fill="#2D6BE4" text-decoration="underline">Image Controls → https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhg1gur8jqrq</text>
  </a>

  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhs6ivixi684" target="_blank">
    <text x="60" y="2198" font-size="12" fill="#2D6BE4" text-decoration="underline">UI Controls → https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhs6ivixi684</text>
  </a>

  <!-- Footer -->
  <text x="600" y="2360" font-size="11" fill="#8B8DA0" text-anchor="middle">Generated by AI based on official Miliastra Academy documentation. Version: Luminary</text>

</svg>
