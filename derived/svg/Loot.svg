<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 2540" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="2540" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="72" font-size="34" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Loot</text>
  <text x="168" y="72" font-size="16" fill="#4A4B65" dominant-baseline="middle">Drop behavior, pickup rules, and loot components</text>

  <!-- I. Definition of Loot -->
  <text x="48" y="148" font-size="18" font-weight="700" fill="#2D6BE4">I. Definition of Loot</text>

  <g transform="translate(48, 168)">
    <rect width="1104" height="180" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="24" y="30" font-size="14" fill="#4A4B65">When virtual items (items, equipment, currency, inventory) are dropped in the scene,</text>
    <text x="24" y="50" font-size="14" fill="#4A4B65">they are converted into a prefab entity — the Loot.</text>

    <text x="24" y="80" font-size="14" font-weight="500" fill="#1A1B2E">Key Requirements:</text>
    <text x="24" y="104" font-size="13" fill="#4A4B65"><tspan font-weight="500" fill="#1A1B2E">Template Relation</tspan> — Virtual item templates must be related with a Loot prefab. If no relation</text>
    <text x="24" y="124" font-size="13" fill="#4A4B65">is established, the drop logic will be blocked.</text>
    <text x="24" y="150" font-size="13" fill="#4A4B65"><tspan font-weight="500" fill="#1A1B2E">Special Prefab</tspan> — Loots carry a Loot Content Component and have restricted component availability</text>
    <text x="24" y="170" font-size="13" fill="#4A4B65">compared to standard dynamic unit prefabs.</text>
  </g>

  <!-- II. Loot Content Component -->
  <text x="48" y="388" font-size="18" font-weight="700" fill="#2D6BE4">II. Loot Content Component</text>
  <text x="310" y="388" font-size="13" fill="#8B8DA0">Permanent component on all loot-type prefabs</text>

  <g transform="translate(48, 408)">
    <rect width="1104" height="140" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="24" y="30" font-size="14" fill="#4A4B65">All loot-type prefabs permanently carry a Loot Content component that cannot be removed.</text>
    <text x="24" y="54" font-size="14" fill="#4A4B65">The Loot Content component defines the drop behavior and pickup rules of loots.</text>
    <text x="24" y="78" font-size="14" fill="#4A4B65">Supports configuring multiple pickup ranges simultaneously — their effective ranges stack.</text>

    <rect x="24" y="98" width="1056" height="2" rx="1" fill="#E8E4DA"/>
    <text x="24" y="124" font-size="13" fill="#4A4B65"><tspan font-weight="500" fill="#1A1B2E">Location:</tspan> Prefab library editor &gt; Loot tab &gt; Click "Advanced Editing" to expand the editing tab.</text>
  </g>

  <!-- III. Pickup Rules -->
  <text x="48" y="588" font-size="18" font-weight="700" fill="#2D6BE4">III. Pickup Rules</text>
  <text x="218" y="588" font-size="13" fill="#8B8DA0">How players collect loots during gameplay</text>

  <g transform="translate(48, 608)">
    <rect width="1104" height="380" rx="14" fill="#FFFFFF" filter="url(#card)"/>

    <rect x="24" y="20" width="516" height="72" rx="10" fill="#E8EEFB"/>
    <text x="40" y="42" font-size="14" font-weight="500" fill="#1A1B2E">Interactive Pickup</text>
    <text x="40" y="62" font-size="12" fill="#4A4B65">Interaction button appears within range.</text>
    <text x="40" y="78" font-size="12" fill="#4A4B65">Click to pick up the item directly.</text>

    <rect x="564" y="20" width="516" height="72" rx="10" fill="#E8EEFB"/>
    <text x="580" y="42" font-size="14" font-weight="500" fill="#1A1B2E">Auto Pickup</text>
    <text x="580" y="62" font-size="12" fill="#4A4B65">Automatically triggers when character</text>
    <text x="580" y="78" font-size="12" fill="#4A4B65">enters the pickup range.</text>

    <rect x="24" y="108" width="516" height="88" rx="10" fill="#E8EEFB"/>
    <text x="40" y="130" font-size="14" font-weight="500" fill="#1A1B2E">Open Pickup Interface</text>
    <text x="40" y="150" font-size="12" fill="#4A4B65">Interaction button opens a loot pickup UI.</text>
    <text x="40" y="166" font-size="12" fill="#4A4B65">Player selects items to pick up manually.</text>
    <text x="40" y="182" font-size="12" fill="#4A4B65">Recommended when loot list has multiple items.</text>

    <rect x="564" y="108" width="516" height="88" rx="10" fill="#E8EEFB"/>
    <text x="580" y="130" font-size="14" font-weight="500" fill="#1A1B2E">Auto-Attract Pickup</text>
    <text x="580" y="150" font-size="12" fill="#4A4B65">Dropped loot moves toward the character.</text>
    <text x="580" y="166" font-size="12" fill="#4A4B65">Requires Auto-Attract Range configuration.</text>
    <text x="580" y="182" font-size="12" fill="#4A4B65">Auto pickup triggers when entering pickup range.</text>

    <rect x="24" y="212" width="1056" height="2" rx="1" fill="#E8E4DA"/>

    <text x="24" y="240" font-size="14" font-weight="500" fill="#1A1B2E">Additional Settings:</text>
    <text x="24" y="264" font-size="13" fill="#4A4B65"><tspan font-weight="500" fill="#1A1B2E">Auto-Attract Pickup Range (m)</tspan> — Distance at which auto-attract triggers loot movement.</text>
    <text x="24" y="288" font-size="13" fill="#4A4B65"><tspan font-weight="500" fill="#1A1B2E">Local Filter</tspan> — Boolean or integer filters for conditional pickup logic.</text>
    <text x="24" y="312" font-size="13" fill="#4A4B65"><tspan font-weight="500" fill="#1A1B2E">Filter Node Graph</tspan> — Reference filter nodes to determine if conditions are met.</text>
    <text x="24" y="336" font-size="13" fill="#4A4B65"><tspan font-weight="500" fill="#1A1B2E">Loot Content</tspan> — Dictionary of virtual items in a loot. When placed directly, contains all configured items.</text>
    <text x="24" y="356" font-size="13" fill="#4A4B65">When created as loot drop/trophies, only contains dropped items (overwrites default data).</text>
  </g>

  <!-- IV. Pickup Range -->
  <text x="48" y="1028" font-size="18" font-weight="700" fill="#2D6BE4">IV. Pickup Range</text>

  <g transform="translate(48, 1048)">
    <rect width="1104" height="100" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="24" y="30" font-size="14" fill="#4A4B65">Defines the range within which players can collect loots.</text>
    <text x="24" y="54" font-size="14" font-weight="500" fill="#1A1B2E">Supported Shapes:</text>

    <rect x="200" y="38" width="200" height="40" rx="8" fill="#E8EEFB"/>
    <text x="300" y="58" font-size="13" font-weight="500" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Cuboid</text>

    <rect x="420" y="38" width="200" height="40" rx="8" fill="#E8EEFB"/>
    <text x="520" y="58" font-size="13" font-weight="500" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Sphere</text>

    <rect x="640" y="38" width="200" height="40" rx="8" fill="#E8EEFB"/>
    <text x="740" y="58" font-size="13" font-weight="500" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Capsule</text>
  </g>

  <!-- V. Loot Component (from Loots guide) -->
  <text x="48" y="1188" font-size="18" font-weight="700" fill="#2D6BE4">V. Loot Component</text>
  <text x="250" y="1188" font-size="13" fill="#8B8DA0">Component for drop-on-defeat behavior</text>

  <g transform="translate(48, 1208)">
    <rect width="1104" height="320" rx="14" fill="#FFFFFF" filter="url(#card)"/>

    <text x="24" y="30" font-size="14" fill="#4A4B65">The Loot Component allows configuring a fixed Loot collection template. Loot is created</text>
    <text x="24" y="50" font-size="14" fill="#4A4B65">from this data template when the component holder is defeated. Supports one set of data.</text>

    <text x="24" y="80" font-size="14" font-weight="500" fill="#1A1B2E">Adding the Component:</text>
    <text x="24" y="104" font-size="13" fill="#4A4B65">Entity/Prefab editing &gt; Component Editing Tab &gt; Add Common Components &gt; Loot &gt; Advanced Editing</text>

    <rect x="24" y="120" width="1056" height="2" rx="1" fill="#E8E4DA"/>

    <text x="24" y="148" font-size="14" font-weight="500" fill="#1A1B2E">Basic Settings:</text>

    <text x="24" y="172" font-size="13" fill="#4A4B65"><tspan font-weight="500" fill="#1A1B2E">Destruction Debris</tspan> — How drop config is handled when component owner is defeated.</text>

    <rect x="24" y="188" width="516" height="44" rx="8" fill="#F4F1EA"/>
    <text x="40" y="204" font-size="13" font-weight="500" fill="#1A1B2E">Individual Drops</text>
    <text x="40" y="222" font-size="12" fill="#4A4B65">Each virtual item dropped separately as its own loot.</text>

    <rect x="564" y="188" width="516" height="44" rx="8" fill="#F4F1EA"/>
    <text x="580" y="204" font-size="13" font-weight="500" fill="#1A1B2E">Combined Drops</text>
    <text x="580" y="222" font-size="12" fill="#4A4B65">All items converted into a single loot entity.</text>

    <text x="24" y="256" font-size="13" fill="#4A4B65"><tspan font-weight="500" fill="#1A1B2E">Loot Drop Mechanics:</tspan></text>

    <rect x="24" y="268" width="516" height="40" rx="8" fill="#E5F2E9"/>
    <text x="40" y="288" font-size="12" font-weight="500" fill="#1A1B2E" dominant-baseline="middle">Shared Reward — All players share loot; once picked up, unavailable to others.</text>

    <rect x="564" y="268" width="516" height="40" rx="8" fill="#E5F2E9"/>
    <text x="580" y="288" font-size="12" font-weight="500" fill="#1A1B2E" dominant-baseline="middle">Individualized Reward — Each player gets independent copy; no interference.</text>
  </g>

  <!-- VI. Loot Appearance and Content -->
  <text x="48" y="1568" font-size="18" font-weight="700" fill="#2D6BE4">VI. Loot Appearance and Content</text>

  <g transform="translate(48, 1588)">
    <rect width="1104" height="180" rx="14" fill="#FFFFFF" filter="url(#card)"/>

    <text x="24" y="30" font-size="14" font-weight="500" fill="#1A1B2E">Corresponding Loot Appearance:</text>
    <text x="24" y="54" font-size="13" fill="#4A4B65">Configure a Loot prefab as the physical entity. When a virtual item is created in the scene,</text>
    <text x="24" y="74" font-size="13" fill="#4A4B65">it uses the model of the associated drop prefab.</text>
    <text x="24" y="98" font-size="13" fill="#4A4B65">This setting only takes effect with Combined Drops. With Individual Drops, each drop uses</text>
    <text x="24" y="118" font-size="13" fill="#4A4B65">the associated drop prefab configured in its own item or currency template.</text>

    <rect x="24" y="134" width="1056" height="2" rx="1" fill="#E8E4DA"/>

    <text x="24" y="160" font-size="14" font-weight="500" fill="#1A1B2E">Loot Content:</text>
    <text x="24" y="176" font-size="13" fill="#4A4B65">Click "Add Items" to configure a list of virtual items — select defined items, currency templates, and quantities.</text>
  </g>

  <!-- VII. Node Graph Operations -->
  <text x="48" y="1808" font-size="18" font-weight="700" fill="#2D6BE4">VII. Node Graph Operations for Loot</text>

  <g transform="translate(48, 1828)">
    <rect width="1104" height="580" rx="14" fill="#FFFFFF" filter="url(#card)"/>

    <text x="24" y="30" font-size="16" font-weight="500" fill="#1A1B2E">Loot Content Component — Execution Nodes</text>

    <rect x="24" y="46" width="516" height="56" rx="8" fill="#E8EEFB"/>
    <text x="40" y="66" font-size="13" font-weight="500" fill="#1A1B2E">Increase Loot Component Item Quantity</text>
    <text x="40" y="86" font-size="12" fill="#4A4B65">Adds to the quantity of an item in the loot.</text>

    <rect x="564" y="46" width="516" height="56" rx="8" fill="#E8EEFB"/>
    <text x="580" y="66" font-size="13" font-weight="500" fill="#1A1B2E">Increase Loot Component Currency Quantity</text>
    <text x="580" y="86" font-size="12" fill="#4A4B65">Adds to the currency amount in the loot.</text>

    <text x="24" y="128" font-size="16" font-weight="500" fill="#1A1B2E">Loot Content Component — Query Nodes</text>

    <rect x="24" y="144" width="340" height="56" rx="8" fill="#E5F2E9"/>
    <text x="40" y="164" font-size="13" font-weight="500" fill="#1A1B2E">Get Loot Item Component Quantity</text>
    <text x="40" y="184" font-size="12" fill="#4A4B65">Query item quantity in loot.</text>

    <rect x="380" y="144" width="360" height="56" rx="8" fill="#E5F2E9"/>
    <text x="396" y="164" font-size="13" font-weight="500" fill="#1A1B2E">Get All Equipment from Loot Component</text>
    <text x="396" y="184" font-size="12" fill="#4A4B65">Query all equipment in loot.</text>

    <rect x="756" y="144" width="324" height="56" rx="8" fill="#E5F2E9"/>
    <text x="772" y="164" font-size="13" font-weight="500" fill="#1A1B2E">Get Loot Currency Quantity</text>
    <text x="772" y="184" font-size="12" fill="#4A4B65">Query currency amount in loot.</text>

    <rect x="24" y="218" width="1056" height="2" rx="1" fill="#E8E4DA"/>

    <text x="24" y="246" font-size="16" font-weight="500" fill="#1A1B2E">Loot Component — Execution Nodes (from Loots guide)</text>

    <rect x="24" y="262" width="516" height="56" rx="8" fill="#E8EEFB"/>
    <text x="40" y="282" font-size="13" font-weight="500" fill="#1A1B2E">Trigger Loot Drop</text>
    <text x="40" y="302" font-size="12" fill="#4A4B65">Triggers the loot drop from the component holder.</text>

    <rect x="564" y="262" width="516" height="56" rx="8" fill="#E8EEFB"/>
    <text x="580" y="282" font-size="13" font-weight="500" fill="#1A1B2E">Set Loot Drop Content</text>
    <text x="580" y="302" font-size="12" fill="#4A4B65">Overrides the loot content before dropping.</text>

    <!-- Tip box -->
    <rect x="24" y="340" width="1056" height="220" rx="10" fill="#E8EEFB"/>
    <rect x="24" y="340" width="4" height="220" rx="2" fill="#2D6BE4"/>
    <text x="44" y="366" font-size="14" font-weight="500" fill="#2D6BE4">Loot Content vs Loot Component — Key Differences</text>

    <text x="44" y="394" font-size="13" fill="#4A4B65"><tspan font-weight="500" fill="#1A1B2E">Loot Content Component</tspan> — Permanently attached to loot-type prefabs. Defines pickup rules,</text>
    <text x="44" y="414" font-size="13" fill="#4A4B65">pickup range, and filter logic. Used when items are dropped as physical loot entities.</text>

    <text x="44" y="442" font-size="13" fill="#4A4B65"><tspan font-weight="500" fill="#1A1B2E">Loot Component</tspan> — Can be added to any entity/prefab. Configures a drop template that</text>
    <text x="44" y="462" font-size="13" fill="#4A4B65">spawns loot when the holder is defeated. Supports Individual vs Combined drops and</text>
    <text x="44" y="482" font-size="13" fill="#4A4B65">Shared vs Individualized reward mechanics.</text>

    <text x="44" y="510" font-size="13" fill="#4A4B65"><tspan font-weight="500" fill="#1A1B2E">Design Recommendation:</tspan> Use Loot Component for defeat-based drops (enemies, destructibles).</text>
    <text x="44" y="530" font-size="13" fill="#4A4B65">Use Loot Content Component for standalone loot prefabs placed in the scene.</text>
  </g>

  <!-- Related Documentation -->
  <text x="48" y="2454" font-size="12" fill="#8B8DA0">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhkfj1iilnck" target="_blank">
    <text x="48" y="2476" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Loot</text>
  </a>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh63ox06afy8" target="_blank">
    <text x="48" y="2498" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Loots</text>
  </a>

  <!-- Footer -->
  <text x="600" y="2524" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>