<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 952">
<defs>
  <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2D6BE4"/>
    <stop offset="100%" stop-color="#4A3F6B"/>
  </linearGradient>
  <filter id="card">
    <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
  </filter>
  <filter id="elevated">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
  </filter>
</defs>
<style>
  text { font-family: 'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif; }
</style>

<!-- Page Background -->
<rect width="1200" height="952" fill="#F9F7F2"/>

<!-- Top Color Bar -->
<rect width="1200" height="6" fill="url(#topGrad)"/>

<!-- Title Card -->
<rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
<rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
<text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold">Special Number</text>
<text x="380" y="82" fill="#4A4B65" font-size="16">Display skill-related data in the UI Layout</text>

<!-- I. Special Number Features -->
<text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Special Number Features</text>

<rect x="48" y="162" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="190" fill="#4A4B65" font-size="14">Special Numbers can be configured in the UI Layout to support displaying various types of skill-related data.</text>
<text x="72" y="212" fill="#4A4B65" font-size="14">During stage runtime, Special Number controls can be triggered through Node Graphs.</text>

<!-- II. Editing Special Numbers -->
<text x="48" y="278" fill="#2D6BE4" font-size="18" font-weight="700">II. Editing Special Numbers</text>

<!-- Add Special Numbers Card -->
<rect x="48" y="292" width="1104" height="60" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="322" r="14" fill="#2D6BE4"/>
<text x="76" y="327" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">1</text>
<text x="100" y="327" fill="#1A1B2E" font-size="16" font-weight="500">Add Special Numbers</text>
<text x="330" y="327" fill="#4A4B65" font-size="14">In the UI Control Group Editor window, add the UI Control Template — Special Number.</text>

<!-- Special Number Settings Card -->
<rect x="48" y="364" width="1104" height="280" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="392" r="14" fill="#2D6BE4"/>
<text x="76" y="397" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">2</text>
<text x="100" y="397" fill="#1A1B2E" font-size="16" font-weight="500">Special Number Settings</text>

<rect x="72" y="418" width="120" height="24" rx="12" fill="#E8EEFB"/>
<text x="132" y="434" fill="#2D6BE4" font-size="12" text-anchor="middle">Data Source</text>
<text x="202" y="434" fill="#4A4B65" font-size="14">Default is Skill. Determines what type of data the number displays.</text>

<rect x="72" y="450" width="180" height="24" rx="12" fill="#E8EEFB"/>
<text x="162" y="466" fill="#2D6BE4" font-size="12" text-anchor="middle">Monitor Skill Slot</text>
<text x="262" y="466" fill="#4A4B65" font-size="14">Supports selecting any slot and monitoring skills based on the selected slot.</text>

<rect x="72" y="482" width="120" height="24" rx="12" fill="#E8EEFB"/>
<text x="132" y="498" fill="#2D6BE4" font-size="12" text-anchor="middle">Data Content</text>
<text x="202" y="498" fill="#4A4B65" font-size="14">Can display the following data types:</text>

<!-- Data Content Options -->
<rect x="202" y="510" width="200" height="24" rx="12" fill="#F4F1EA"/>
<text x="302" y="526" fill="#1A1B2E" font-size="12" text-anchor="middle">Skill Remaining CD Time</text>
<rect x="412" y="510" width="140" height="24" rx="12" fill="#F4F1EA"/>
<text x="482" y="526" fill="#1A1B2E" font-size="12" text-anchor="middle">Skill Usage(s)</text>
<rect x="562" y="510" width="140" height="24" rx="12" fill="#F4F1EA"/>
<text x="632" y="526" fill="#1A1B2E" font-size="12" text-anchor="middle">Skill Resources</text>
<rect x="712" y="510" width="160" height="24" rx="12" fill="#F4F1EA"/>
<text x="792" y="526" fill="#1A1B2E" font-size="12" text-anchor="middle">Skill Availability</text>

<rect x="72" y="546" width="100" height="24" rx="12" fill="#E8EEFB"/>
<text x="122" y="562" fill="#2D6BE4" font-size="12" text-anchor="middle">Time Unit</text>
<text x="182" y="562" fill="#4A4B65" font-size="14">Available options are Seconds, Minutes, and Hours.</text>

<rect x="72" y="578" width="90" height="24" rx="12" fill="#E8EEFB"/>
<text x="117" y="594" fill="#2D6BE4" font-size="12" text-anchor="middle">Font Size</text>
<text x="172" y="594" fill="#4A4B65" font-size="14">Sets the font size of the number shown in the UI Layout.</text>

<!-- Data Content Details Card -->
<rect x="48" y="656" width="1104" height="140" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="684" fill="#1A1B2E" font-size="16" font-weight="500">Data Content Details</text>

<rect x="72" y="698" width="16" height="16" rx="8" fill="#2D6BE4"/>
<text x="80" y="710" fill="#fff" font-size="10" text-anchor="middle" font-weight="500">1</text>
<text x="96" y="710" fill="#4A4B65" font-size="14">Skill Remaining CD Time — Shows the cooldown time remaining before the skill can be used again</text>

<rect x="72" y="722" width="16" height="16" rx="8" fill="#2D6BE4"/>
<text x="80" y="734" fill="#fff" font-size="10" text-anchor="middle" font-weight="500">2</text>
<text x="96" y="734" fill="#4A4B65" font-size="14">Skill Usage(s) — Displays the number of times a skill has been used or remaining uses</text>

<rect x="72" y="746" width="16" height="16" rx="8" fill="#2D6BE4"/>
<text x="80" y="758" fill="#fff" font-size="10" text-anchor="middle" font-weight="500">3</text>
<text x="96" y="758" fill="#4A4B65" font-size="14">Skill Resources — Shows resource costs or consumption associated with the skill</text>

<rect x="72" y="770" width="16" height="16" rx="8" fill="#1B4FC0"/>
<text x="80" y="782" fill="#fff" font-size="10" text-anchor="middle" font-weight="500">4</text>
<text x="96" y="782" fill="#4A4B65" font-size="14">Skill Availability — Indicates whether the skill is currently available for use</text>

<!-- Tip Box -->
<rect x="48" y="812" width="1104" height="60" rx="10" fill="#E8EEFB"/>
<rect x="48" y="812" width="4" height="60" rx="2" fill="#2D6BE4"/>
<text x="72" y="838" fill="#4A4B65" font-size="14">Tip: The Monitor Skill Slot parameter allows you to track any skill slot. Configure the Data Content to show the specific</text>
<text x="72" y="860" fill="#4A4B65" font-size="14">metric you need (CD time, usage count, resources, or availability). Time Unit affects how CD time is displayed.</text>

<!-- Related Documentation Label -->
<text x="48" y="896" fill="#8B8DA0" font-size="12">Related Documentation:</text>

<!-- Source Links -->
<a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhkwucr8awfq" target="_blank">
  <text x="48" y="914" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: Special Number Controls</text>
</a>

<!-- Footer -->
<text x="600" y="938" fill="#8B8DA0" font-size="11" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>

</svg>