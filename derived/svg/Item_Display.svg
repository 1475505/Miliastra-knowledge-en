<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1720" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1200" height="1720" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="72" fill="#1A1B2E" font-size="34" font-weight="bold" dominant-baseline="middle">Item Display</text>
  <text x="310" y="72" fill="#4A4B65" font-size="16" dominant-baseline="middle">UI Controls for Showing Equipment, Templates &amp; Inventory Items</text>

  <!-- I. Item Display Functions -->
  <text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Item Display Functions</text>

  <g transform="translate(48, 168)">
    <rect width="1104" height="140" rx="14" fill="#fff" filter="url(#card)"/>
    <text x="24" y="30" font-size="14" font-weight="500" fill="#1A1B2E">Purpose</text>
    <text x="24" y="54" font-size="13" fill="#4A4B65">During stage runtime, clicks or external device inputs can trigger UI control interactions.</text>
    <text x="24" y="74" font-size="13" fill="#4A4B65">Supports player interaction with equipment and item displays.</text>
    <text x="24" y="104" font-size="14" font-weight="500" fill="#1A1B2E">Event Trigger</text>
    <text x="24" y="128" font-size="13" fill="#4A4B65">When selecting "Player's Current Equipment" or "Template Item," a "When UI Control Group Is Triggered" event is sent to the node graph after interaction.</text>
  </g>

  <!-- II. Editing Item Display -->
  <text x="48" y="348" fill="#2D6BE4" font-size="18" font-weight="700">II. Editing Item Display</text>

  <g transform="translate(48, 368)">
    <rect width="1104" height="200" rx="14" fill="#fff" filter="url(#card)"/>
    <rect x="16" y="14" width="120" height="26" rx="13" fill="#E8EEFB"/>
    <text x="76" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">General Settings</text>

    <text x="24" y="62" font-size="14" font-weight="500" fill="#1A1B2E">Interactable?</text>
    <text x="24" y="86" font-size="13" fill="#4A4B65">When enabled, configures the interaction method for this item display control.</text>

    <text x="24" y="116" font-size="14" font-weight="500" fill="#1A1B2E">Key Mapping - Keyboard &amp; Mouse</text>
    <text x="24" y="140" font-size="13" fill="#4A4B65">Provides PC key options as input interaction items. The selected key is displayed below the key in the Edit window.</text>

    <text x="24" y="170" font-size="14" font-weight="500" fill="#1A1B2E">Key Mapping - Gamepad</text>
    <text x="24" y="194" font-size="13" fill="#4A4B65">Provides controller button options as input interaction items. Displayed below the button in the Edit window.</text>
  </g>

  <!-- Type Section -->
  <g transform="translate(48, 584)">
    <rect width="1104" height="120" rx="14" fill="#fff" filter="url(#card)"/>
    <rect x="16" y="14" width="60" height="26" rx="13" fill="#E8EEFB"/>
    <text x="46" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Type</text>

    <text x="24" y="62" font-size="14" font-weight="500" fill="#1A1B2E">Three Display Types</text>

    <rect x="24" y="76" width="220" height="30" rx="8" fill="#E8EEFB"/>
    <text x="134" y="91" font-size="12" font-weight="bold" fill="#1A1B2E" text-anchor="middle" dominant-baseline="middle">Player's Current Equipment</text>

    <rect x="260" y="76" width="180" height="30" rx="8" fill="#E5F2E9"/>
    <text x="350" y="91" font-size="12" font-weight="bold" fill="#1A1B2E" text-anchor="middle" dominant-baseline="middle">Template Item</text>

    <rect x="456" y="76" width="200" height="30" rx="8" fill="#FFF3E0"/>
    <text x="556" y="91" font-size="12" font-weight="bold" fill="#1A1B2E" text-anchor="middle" dominant-baseline="middle">Items in Inventory</text>
  </g>

  <!-- Player's Current Equipment -->
  <text x="48" y="744" fill="#2D6BE4" font-size="18" font-weight="700">II-A. Player's Current Equipment</text>

  <g transform="translate(48, 764)">
    <rect width="1104" height="280" rx="14" fill="#fff" filter="url(#card)"/>
    <text x="24" y="30" font-size="14" font-weight="500" fill="#1A1B2E">Equipment Config ID Variable</text>
    <text x="24" y="54" font-size="13" fill="#4A4B65">Allows selecting variables from the player to determine which equipment to display.</text>

    <text x="24" y="84" font-size="14" font-weight="500" fill="#1A1B2E">Behavior When Unequipped</text>
    <text x="24" y="108" font-size="13" fill="#4A4B65">Defines how this UI control behaves when no equipment is equipped.</text>
    <text x="24" y="128" font-size="13" fill="#4A4B65">Two display modes: Show Empty Slots | Hide Them</text>

    <text x="24" y="158" font-size="14" font-weight="500" fill="#1A1B2E">Slot Cooldown (s)</text>
    <text x="24" y="182" font-size="13" fill="#4A4B65">Allows selecting the player, Players 1-8, or a custom variable from the Stage.</text>

    <text x="24" y="212" font-size="14" font-weight="500" fill="#1A1B2E">Slot Usage Count</text>
    <text x="24" y="236" font-size="13" fill="#4A4B65">When enabled, allows configuring whether to hide the control when count is zero and set the usage count.</text>

    <text x="24" y="266" font-size="14" font-weight="500" fill="#1A1B2E">Hide When No Usages Left / Usage</text>
    <text x="24" y="276" font-size="13" fill="#4A4B65"></text>
  </g>

  <!-- Template Item -->
  <text x="48" y="1084" fill="#2D6BE4" font-size="18" font-weight="700">II-B. Template Item</text>

  <g transform="translate(48, 1104)">
    <rect width="1104" height="200" rx="14" fill="#fff" filter="url(#card)"/>
    <text x="24" y="30" font-size="14" font-weight="500" fill="#1A1B2E">Item Config ID Variable</text>
    <text x="24" y="54" font-size="13" fill="#4A4B65">Allows selecting the player, Players 1-8, or a custom variable from the Stage.</text>

    <text x="24" y="84" font-size="14" font-weight="500" fill="#1A1B2E">Item Quantity Display</text>
    <text x="24" y="108" font-size="13" fill="#4A4B65">When enabled, displays the current item quantity below the icon.</text>

    <text x="24" y="138" font-size="14" font-weight="500" fill="#1A1B2E">Hide When Quantity Is Zero</text>
    <text x="24" y="162" font-size="13" fill="#4A4B65">When enabled, hides the control when the item quantity is zero.</text>

    <text x="560" y="30" font-size="14" font-weight="500" fill="#1A1B2E">Item Quantity Variable</text>
    <text x="560" y="54" font-size="13" fill="#4A4B65">Select player, Players 1-8, or custom variable.</text>

    <text x="560" y="84" font-size="14" font-weight="500" fill="#1A1B2E">Slot Cooldown (s)</text>
    <text x="560" y="108" font-size="13" fill="#4A4B65">Select player, Players 1-8, or custom variable.</text>
  </g>

  <!-- Items in Inventory -->
  <text x="48" y="1344" fill="#2D6BE4" font-size="18" font-weight="700">II-C. Items in Inventory</text>

  <g transform="translate(48, 1364)">
    <rect width="1104" height="120" rx="14" fill="#fff" filter="url(#card)"/>
    <text x="24" y="30" font-size="14" font-weight="500" fill="#1A1B2E">Item Config ID Variable</text>
    <text x="24" y="54" font-size="13" fill="#4A4B65">Allows selecting a custom variable from the player.</text>

    <text x="24" y="84" font-size="14" font-weight="500" fill="#1A1B2E">Behavior When There Are No Items</text>
    <text x="24" y="108" font-size="13" fill="#4A4B65">Defines how this control behaves when no items are present. Two modes: Show Empty Slots | Hide Them</text>
  </g>

  <!-- III. Node Graph -->
  <text x="48" y="1524" fill="#2D6BE4" font-size="18" font-weight="700">III. Managing Item Display Through Node Graph</text>

  <g transform="translate(48, 1544)">
    <rect width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>
    <text x="24" y="30" font-size="14" font-weight="500" fill="#1A1B2E">When UI Control Group Is Triggered</text>
    <text x="24" y="54" font-size="13" fill="#4A4B65">During stage runtime, when a player interacts with a button UI control group, it triggers the</text>
    <text x="24" y="74" font-size="13" fill="#4A4B65">"When UI Control Group Is Triggered" event. This event is sent only to the node graph of the player who performed the interaction.</text>

    <rect x="16" y="86" width="1072" height="2" rx="1" fill="#E8E4DA"/>
  </g>

  <text x="48" y="1672" fill="#8B8DA0" font-size="12">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhjja1ipq9ck" target="_blank">
    <text x="48" y="1694" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Item Display UI Controls</text>
  </a>

  <text x="600" y="1714" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>