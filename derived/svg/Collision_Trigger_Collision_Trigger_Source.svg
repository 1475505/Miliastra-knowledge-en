    <text x="60" y="1342" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#2D6BE4" text-decoration="underline">Collision Trigger - Tutorial Detail</text>
  </a>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhilp6rpz09y" target="_blank">
    <text x="60" y="1364" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#2D6BE4" text-decoration="underline">Collision Trigger Source - Tutorial Detail</text>
  </a>
</svg>
