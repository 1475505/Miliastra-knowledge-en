<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1680">
<defs>
  <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2D6BE4"/>
    <stop offset="100%" stop-color="#4A3F6B"/>
  </linearGradient>
  <filter id="card">
    <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
  </filter>
  <filter id="elevated">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
  </filter>
</defs>

<rect width="1200" height="1680" fill="#F9F7F2"/>
<rect width="1200" height="6" fill="url(#topGrad)"/>

<!-- Title Card -->
<rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
<rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
<text x="72" y="72" fill="#1A1B2E" font-size="30" font-weight="bold" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Collision Trigger</text>
<text x="340" y="72" fill="#4A4B65" font-size="16" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">&amp; Collision Trigger Source</text>

<!-- I. How Collision Detection Works -->
<text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">I. How Collision Detection Works</text>

<rect x="48" y="162" width="1104" height="130" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="188" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">During stage runtime, the "Collision Trigger" continuously monitors other entities carrying</text>
<text x="72" y="208" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">"Collision Trigger Source Components". When a Collision Trigger Source enters or exits the</text>
<text x="72" y="228" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">range of a Collision Trigger, a collision event is sent to the entity configured with the Collision Trigger.</text>
<text x="72" y="256" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Key Points:</text>
<text x="72" y="276" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">This collision does not create physical barriers. Collision detection between different triggers is calculated independently.</text>

<!-- II. Collision Trigger Component -->
<text x="48" y="328" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">II. Collision Trigger Component</text>
<text x="310" y="328" fill="#8B8DA0" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Supports multiple collision triggers active simultaneously</text>

<!-- Adding Component -->
<rect x="48" y="342" width="1104" height="60" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="368" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Adding the Component</text>
<text x="72" y="388" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Entity/Prefab editing > Editing Components tab > Add Common Components > Collision Trigger > Advanced Editing</text>

<!-- Component Parameters -->
<rect x="48" y="414" width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<rect x="48" y="414" width="1104" height="36" rx="14" fill="#2D6BE4"/>
<rect x="48" y="436" width="1104" height="14" fill="#2D6BE4"/>
<text x="72" y="438" fill="#fff" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Parameter</text>
<text x="380" y="438" fill="#fff" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Description</text>

<text x="72" y="472" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Initially Effective Trigger</text>
<text x="380" y="472" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Enumerates triggers effective by default during entity runtime. Editable via dropdown.</text>
<line x1="68" y1="482" x2="1132" y2="482" stroke="#E8E4DA" stroke-width="1"/>
<text x="72" y="502" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Trigger List</text>
<text x="380" y="502" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Enumerates all collision triggers configured for the entities.</text>

<!-- Trigger Parameters -->
<text x="48" y="548" fill="#2D6BE4" font-size="16" font-weight="600" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Individual Trigger Parameters</text>

<rect x="48" y="562" width="1104" height="200" rx="14" fill="#fff" filter="url(#card)"/>
<rect x="48" y="562" width="1104" height="36" rx="14" fill="#2D6BE4"/>
<rect x="48" y="584" width="1104" height="14" fill="#2D6BE4"/>
<text x="72" y="586" fill="#fff" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Parameter</text>
<text x="380" y="586" fill="#fff" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Description</text>

<text x="72" y="620" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Initially Effective</text>
<text x="380" y="620" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">If enabled, the trigger takes effect immediately upon entity creation.</text>
<line x1="68" y1="630" x2="1132" y2="630" stroke="#E8E4DA" stroke-width="1"/>

<text x="72" y="650" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Effective Target</text>
<text x="380" y="650" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Detection only applies to configured entity types: Characters, Objects, Creations.</text>
<line x1="68" y1="660" x2="1132" y2="660" stroke="#E8E4DA" stroke-width="1"/>

<text x="72" y="680" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Trigger Area Shape</text>
<text x="380" y="680" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Supports Cuboid, Sphere, and Capsule. Different size params per shape.</text>
<line x1="68" y1="690" x2="1132" y2="690" stroke="#E8E4DA" stroke-width="1"/>

<text x="72" y="710" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Center</text>
<text x="380" y="710" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Offset relative to the entity/prefab center.</text>
<line x1="68" y1="720" x2="1132" y2="720" stroke="#E8E4DA" stroke-width="1"/>

<text x="72" y="740" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Rotation / Zoom</text>
<text x="380" y="740" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Orientation adjustment along axes; scaling along different axes.</text>

<!-- Tip: Multiple trigger areas -->
<rect x="48" y="774" width="1104" height="36" rx="10" fill="#E8EEFB"/>
<rect x="48" y="774" width="4" height="36" rx="2" fill="#2D6BE4"/>
<text x="68" y="797" fill="#4A4B65" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Click "Add Trigger Area" to add areas. Ranges under the same trigger are merged as a combined range.</text>

<!-- III. Collision Trigger Source Component -->
<text x="48" y="846" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">III. Collision Trigger Source Component</text>
<text x="400" y="846" fill="#8B8DA0" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Only one source enabled at a time</text>

<rect x="48" y="860" width="1104" height="160" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="886" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Definition</text>
<text x="72" y="906" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Provides collision detection trigger sources during stage runtime. Serves as a tool for</text>
<text x="72" y="926" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">determining logical range contact.</text>

<text x="72" y="954" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Parameters (same as Collision Trigger):</text>
<text x="72" y="974" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Initially Effective, Trigger Area Shape (Cuboid/Sphere/Capsule), Center, Rotation, Zoom Multiplier.</text>

<text x="72" y="1002" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Default Sources:</text>
<text x="210" y="1002" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Creations and character entities contain collision trigger sources by default.</text>

<!-- IV. Node Graph Events and Management -->
<text x="48" y="1058" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">IV. Node Graph Events and Management</text>

<rect x="48" y="1072" width="1104" height="230" rx="14" fill="#fff" filter="url(#card)"/>
<rect x="48" y="1072" width="1104" height="36" rx="14" fill="#2D6BE4"/>
<rect x="48" y="1094" width="1104" height="14" fill="#2D6BE4"/>
<text x="72" y="1096" fill="#fff" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Node</text>
<text x="340" y="1096" fill="#fff" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Type</text>
<text x="440" y="1096" fill="#fff" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Description</text>

<text x="72" y="1130" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">When Entering Collision Trigger</text>
<text x="340" y="1130" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Event</text>
<text x="440" y="1130" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Source range enters Trigger range. Event sent to Collision Trigger entity.</text>
<line x1="68" y1="1140" x2="1132" y2="1140" stroke="#E8E4DA" stroke-width="1"/>

<text x="72" y="1162" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">When Exiting Collision Trigger</text>
<text x="340" y="1162" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Event</text>
<text x="440" y="1162" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Source range exits Trigger range. Event sent to Collision Trigger entity.</text>
<line x1="68" y1="1172" x2="1132" y2="1172" stroke="#E8E4DA" stroke-width="1"/>

<text x="72" y="1194" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Activate/Disable Collision Trigger</text>
<text x="340" y="1194" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Execute</text>
<text x="440" y="1194" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Dynamically adjust activation of Collision Trigger via node graph.</text>
<line x1="68" y1="1204" x2="1132" y2="1204" stroke="#E8E4DA" stroke-width="1"/>

<text x="72" y="1226" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Activate/Disable Trigger Source</text>
<text x="340" y="1226" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Execute</text>
<text x="440" y="1226" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Dynamically adjust enabled state of Collision Trigger Source via node graph.</text>

<!-- V. Practical Example -->
<text x="48" y="1338" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">V. Practical Example</text>
<text x="230" y="1338" fill="#8B8DA0" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Pickup and Interaction</text>

<rect x="48" y="1352" width="540" height="120" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="1378" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Item Pickup</text>
<text x="72" y="1400" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">1. Add Collision Trigger to item prefab</text>
<text x="72" y="1420" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">2. Set Effective Target to Characters only</text>
<text x="72" y="1440" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">3. Node graph: When Entering > Destroy Entity</text>
<text x="72" y="1460" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">4. Mount node graph, place prefab, test</text>

<rect x="604" y="1352" width="548" height="120" rx="14" fill="#fff" filter="url(#card)"/>
<text x="628" y="1378" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Box + Spiky Platform</text>
<text x="628" y="1400" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">1. Add Collision Trigger Source to wooden box</text>
<text x="628" y="1420" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">2. Add Collision Trigger to spiky platform</text>
<text x="628" y="1440" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">3. On contact, platform receives entry event</text>
<text x="628" y="1460" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">4. Node graph: apply damage to box on contact</text>

<!-- Tip -->
<rect x="48" y="1484" width="1104" height="56" rx="10" fill="#E8EEFB"/>
<rect x="48" y="1484" width="4" height="56" rx="2" fill="#2D6BE4"/>
<text x="68" y="1504" fill="#4A4B65" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Entities without collision trigger sources cannot generate entry/collision events through contact with</text>
<text x="68" y="1522" fill="#4A4B65" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">collision triggers. Creations and character entities contain collision trigger sources by default.</text>

