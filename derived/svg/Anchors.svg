<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 2180" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="2180" fill="#F9F7F2"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">45-Anchors: Anchor Presets, Custom Anchoring &amp; Waypoint System</text>

  <!-- ==================== SECTION I ==================== -->
  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. Waypoint (Anchor) Definition</text>

  <g transform="translate(60, 164)">
    <rect width="1080" height="140" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">What are Waypoints?</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">Waypoints (also called anchors) define how a UI Control's position is</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">maintained relative to a reference point when the screen resolution changes.</text>
    <text x="20" y="100" font-size="14" fill="#4A4B65">When resolution changes, UI Controls automatically adapt their location</text>
    <text x="20" y="120" font-size="14" fill="#4A4B65">while maintaining their relative offset to the set waypoint.</text>
  </g>

  <!-- ==================== SECTION II ==================== -->
  <circle cx="80" cy="340" r="16" fill="#2D6BE4"/>
  <text x="80" y="341" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="341" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. Anchor Presets (Nine-Grid System)</text>

  <g transform="translate(60, 368)">
    <rect width="1080" height="460" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">Nine-Grid Anchor Presets</text>
    <text x="20" y="50" font-size="13" fill="#4A4B65">The layout editor provides 9 preset anchor points arranged in a 3x3 grid.</text>
    <text x="20" y="70" font-size="13" fill="#4A4B65">Each anchor corresponds to a corner or edge midpoint of the UI canvas.</text>
    <text x="20" y="94" font-size="13" fill="#8B8DA0">Select the waypoint that matches where you want the control to "stick" during resize.</text>

    <!-- 9-grid visual diagram -->
    <g transform="translate(20, 112)">
      <!-- Outer container -->
      <rect x="0" y="0" width="520" height="320" rx="8" fill="#F9F7F2" stroke="#2D6BE4" stroke-width="1.5" stroke-dasharray="4,3"/>

      <!-- Grid lines -->
      <line x1="173" y1="0" x2="173" y2="320" stroke="#2D6BE4" stroke-width="0.8" stroke-dasharray="3,3"/>
      <line x1="346" y1="0" x2="346" y2="320" stroke="#2D6BE4" stroke-width="0.8" stroke-dasharray="3,3"/>
      <line x1="0" y1="106" x2="520" y2="106" stroke="#2D6BE4" stroke-width="0.8" stroke-dasharray="3,3"/>
      <line x1="0" y1="213" x2="520" y2="213" stroke="#2D6BE4" stroke-width="0.8" stroke-dasharray="3,3"/>

      <!-- Anchor dots and labels -->
      <!-- Row 1 -->
      <circle cx="0" cy="0" r="10" fill="#2D6BE4"/>
      <text x="0" y="-20" font-size="10" fill="#4A4B65" text-anchor="middle">Top-Left</text>

      <circle cx="260" cy="0" r="10" fill="#2D6BE4"/>
      <text x="260" y="-20" font-size="10" fill="#4A4B65" text-anchor="middle">Top-Center</text>

      <circle cx="520" cy="0" r="10" fill="#2D6BE4"/>
      <text x="520" y="-20" font-size="10" fill="#4A4B65" text-anchor="middle">Top-Right</text>

      <!-- Row 2 -->
      <circle cx="0" cy="160" r="10" fill="#2D6BE4"/>
      <text x="0" y="140" font-size="10" fill="#4A4B65" text-anchor="middle" dominant-baseline="middle">Mid-Left</text>

      <circle cx="260" cy="160" r="10" fill="#2D6BE4"/>
      <text x="260" y="140" font-size="10" fill="#4A4B65" text-anchor="middle" dominant-baseline="middle">Center</text>

      <circle cx="520" cy="160" r="10" fill="#2D6BE4"/>
      <text x="520" y="140" font-size="10" fill="#4A4B65" text-anchor="end" dominant-baseline="middle">Mid-Right</text>

      <!-- Row 3 -->
      <circle cx="0" cy="320" r="10" fill="#2D6BE4"/>
      <text x="0" y="342" font-size="10" fill="#4A4B65" text-anchor="middle">Bottom-Left</text>

      <circle cx="260" cy="320" r="10" fill="#2D6BE4"/>
      <text x="260" y="342" font-size="10" fill="#4A4B65" text-anchor="middle">Bottom-Center</text>

      <circle cx="520" cy="320" r="10" fill="#2D6BE4"/>
      <text x="520" y="342" font-size="10" fill="#4A4B65" text-anchor="middle">Bottom-Right</text>
    </g>
  </g>

  <!-- ==================== SECTION III ==================== -->
  <circle cx="80" cy="864" r="16" fill="#2D6BE4"/>
  <text x="80" y="865" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="865" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. Anchor Behavior on Resize</text>

  <g transform="translate(60, 892)">
    <rect width="1080" height="260" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">How Anchors Work When Resolution Changes</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">When the screen resolution changes, each UI Control maintains its position</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">relative to the selected waypoint anchor point. This means:</text>

    <text x="20" y="100" font-size="13" fill="#4A4B65">• A control anchored to Top-Left will maintain its distance from the top-left</text>
    <text x="20" y="120" font-size="13" fill="#4A4B65">  corner of the screen as resolution changes.</text>
    <text x="20" y="144" font-size="13" fill="#4A4B65">• A control anchored to Center will remain centered regardless of resolution.</text>
    <text x="20" y="168" font-size="13" fill="#4A4B65">• A control anchored to Bottom-Right will stay pinned to the bottom-right.</text>

    <text x="20" y="198" font-size="13" fill="#8B8DA0">Example: Quest text anchored to Top-Left stays near the top-left even when</text>
    <text x="20" y="218" font-size="13" fill="#8B8DA0">switching from 16:9 to 21:9 aspect ratio. The offset distance is preserved.</text>
    <text x="20" y="246" font-size="13" fill="#4A4B65">Each device can have its own waypoint setting for the same UI Control.</text>
  </g>

  <!-- ==================== SECTION IV ==================== -->
  <circle cx="80" cy="1188" r="16" fill="#2D6BE4"/>
  <text x="80" y="1189" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IV</text>
  <text x="108" y="1189" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">IV. Waypoint Selection Guidelines</text>

  <g transform="translate(60, 1216)">
    <rect width="1080" height="240" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">Guideline 1: Based on UI Control Location</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">Select the waypoint corresponding to the section of the nine-grid where</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">the element is placed. If a control is in the top-left area, use Top-Left</text>
    <text x="20" y="92" font-size="14" fill="#4A4B65">anchor so it stays in that relative position.</text>

    <text x="20" y="126" font-size="14" font-weight="bold" fill="#1A1B2E">Guideline 2: Based on Functional Areas</text>
    <text x="20" y="152" font-size="14" fill="#4A4B65">Waypoint selections for related UI controls should remain consistent.</text>
    <text x="20" y="172" font-size="14" fill="#4A4B65">For example, quest descriptions and multiple text boxes in the same</text>
    <text x="20" y="192" font-size="14" fill="#4A4B65">functional area should share the same waypoint.</text>
    <text x="20" y="220" font-size="13" fill="#8B8DA0">Consistent waypoints across related controls ensure layout stability in all resolutions.</text>
  </g>

  <!-- ==================== SECTION V ==================== -->
  <circle cx="80" cy="1492" r="16" fill="#2D6BE4"/>
  <text x="80" y="1493" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">V</text>
  <text x="108" y="1493" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">V. Transform: Waypoint Settings &amp; Center</text>

  <g transform="translate(60, 1520)">
    <rect width="1080" height="260" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">Waypoint Settings in UI Control Transform</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">In the UI Control Details panel, the Transform section provides:</text>

    <text x="20" y="82" font-size="13" fill="#4A4B65">• Device selector: Switch between PC, Mobile, Console, Mobile Controller</text>
    <text x="20" y="106" font-size="13" fill="#4A4B65">• Location: Manual entry or drag to position the UI Control on canvas</text>
    <text x="20" y="130" font-size="13" fill="#4A4B65">• Size: Configure dimensions; chain icon locks aspect ratio</text>
    <text x="20" y="154" font-size="13" fill="#4A4B65">• Zoom Factor: Scale ratio on X and Y axes independently</text>
    <text x="20" y="178" font-size="13" fill="#4A4B65">• Rotate: Mirror, flip, and rotation on the Z axis</text>
    <text x="20" y="202" font-size="13" fill="#4A4B65">• Waypoint Settings: Click to expand and select the desired waypoint location</text>
    <text x="20" y="226" font-size="13" fill="#4A4B65">• Center: Configure the rotation center point for the UI Control</text>
    <text x="20" y="250" font-size="13" fill="#4A4B65">• Layer: Higher values render on top; used with Layered Rendering mode</text>
  </g>

  <!-- Tip Box -->
  <g transform="translate(60, 1796)">
    <rect width="1080" height="90" rx="14" fill="#E8EEFB"/>
    <rect x="0" y="0" width="4" height="90" rx="2" fill="#2D6BE4"/>
    <text x="20" y="22" font-size="14" font-weight="bold" fill="#2D6BE4">Anchor Selection Tip</text>
    <text x="20" y="44" font-size="13" fill="#4A4B65">When designing for multiple devices (PC, Mobile, Console), verify each device's</text>
    <text x="20" y="64" font-size="13" fill="#4A4B65">waypoint placement in the editor. Different devices may need different anchors</text>
    <text x="20" y="84" font-size="13" fill="#4A4B65">for the same UI Control to ensure optimal layout across all screen sizes.</text>
  </g>

  <!-- Tip Box 2 -->
  <g transform="translate(60, 1898)">
    <rect width="1080" height="70" rx="14" fill="#E8EEFB"/>
    <rect x="0" y="0" width="4" height="70" rx="2" fill="#2D6BE4"/>
    <text x="20" y="22" font-size="14" font-weight="bold" fill="#2D6BE4">Dead Zone Consideration</text>
    <text x="20" y="44" font-size="13" fill="#4A4B65">Mobile has the smallest visible area. Use the 16:9 mobile adaptation as baseline</text>
    <text x="20" y="64" font-size="13" fill="#4A4B65">and ensure anchored controls remain within the safe red zone.</text>
  </g>

  <!-- Source Links -->
  <text x="60" y="2010" font-size="12" fill="#8B8DA0">Related Documentation:</text>

  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhb6mc085sjc" target="_blank">
    <text x="60" y="2036" font-size="12" fill="#2D6BE4" text-decoration="underline">Interface Layout → https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhb6mc085sjc</text>
  </a>

  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhs6ivixi684" target="_blank">
    <text x="60" y="2060" font-size="12" fill="#2D6BE4" text-decoration="underline">UI Controls → https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhs6ivixi684</text>
  </a>

  <!-- Footer -->
  <text x="600" y="2160" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>

</svg>
