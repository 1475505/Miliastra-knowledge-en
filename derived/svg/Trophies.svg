<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1546">
<defs>
<linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#2D6BE4"/>
<stop offset="100%" stop-color="#4A3F6B"/>
</linearGradient>
<filter id="card">
<feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
</filter>
<filter id="elevated">
<feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
</filter>
</defs>
<rect width="1200" height="1546" fill="#F9F7F2"/>
<rect width="1200" height="6" fill="url(#topGrad)"/>

<!-- Title Card -->
<rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
<rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
<text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Trophies</text>

<!-- I. Achievement Functions -->
<text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">I. Achievement Functions</text>

<rect x="48" y="162" width="1104" height="120" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="190" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">
<tspan x="72" dy="0">Achievements record specific goals or milestones that players accomplish in the game.</tspan>
<tspan x="72" dy="28" font-weight="500" fill="#1A1B2E">Key properties:</tspan>
<tspan x="72" dy="22">- Progress carries over across multiple playthroughs (persistent accumulation)</tspan>
<tspan x="72" dy="22">- Number of achievements and completion conditions are fully customizable by creators</tspan>
</text>

<!-- II. Accessing Achievement Settings -->
<text x="48" y="324" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">II. Accessing Achievement Settings</text>

<rect x="48" y="338" width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="84" cy="370" r="16" fill="#2D6BE4"/>
<text x="84" y="375" fill="#fff" font-size="13" text-anchor="middle" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">1</text>
<text x="112" y="375" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Click "Manage Peripheral System" in the System menu</text>

<circle cx="84" cy="410" r="16" fill="#1B4FC0"/>
<text x="84" y="415" fill="#fff" font-size="13" text-anchor="middle" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">2</text>
<text x="112" y="415" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Configure achievement settings in the Peripheral System Settings interface</text>

<!-- III. Achievement System Settings -->
<text x="48" y="480" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">III. Achievement System Settings</text>

<rect x="48" y="494" width="1104" height="120" rx="14" fill="#fff" filter="url(#card)"/>
<rect x="72" y="514" width="1056" height="36" rx="10" fill="#2D6BE4"/>
<text x="200" y="537" fill="#fff" font-size="14" font-weight="500" text-anchor="middle" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Setting</text>
<text x="700" y="537" fill="#fff" font-size="14" font-weight="500" text-anchor="middle" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Description</text>

<rect x="72" y="550" width="1056" height="32" fill="#fff"/>
<text x="100" y="571" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Enable Achievements?</text>
<text x="380" y="571" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Enable or disable the achievement system</text>
<line x1="72" y1="582" x2="1128" y2="582" stroke="#E8E4DA"/>

<rect x="72" y="582" width="1056" height="32" fill="#F4F1EA"/>
<text x="100" y="603" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Enable In-Room Settlement</text>
<text x="380" y="603" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Allow achievement progress in room teams (not just matchmaking)</text>

<!-- IV. Ultimate Achievement -->
<text x="48" y="656" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">IV. Ultimate Achievement</text>
<text x="280" y="656" fill="#8B8DA0" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">One per stage, auto-unlocks when all regular achievements complete</text>

<rect x="48" y="670" width="1104" height="160" rx="14" fill="#fff" filter="url(#card)"/>
<rect x="72" y="690" width="1056" height="36" rx="10" fill="#2D6BE4"/>
<text x="200" y="713" fill="#fff" font-size="14" font-weight="500" text-anchor="middle" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Parameter</text>
<text x="700" y="713" fill="#fff" font-size="14" font-weight="500" text-anchor="middle" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Description</text>

<rect x="72" y="726" width="1056" height="32" fill="#fff"/>
<text x="100" y="747" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Achievement Name</text>
<text x="380" y="747" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Display name for the achievement</text>
<line x1="72" y1="758" x2="1128" y2="758" stroke="#E8E4DA"/>

<rect x="72" y="758" width="1056" height="32" fill="#F4F1EA"/>
<text x="100" y="779" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">ID</text>
<text x="380" y="779" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Identifier for distinguishing this achievement in node graph operations</text>
<line x1="72" y1="790" x2="1128" y2="790" stroke="#E8E4DA"/>

<rect x="72" y="790" width="1056" height="32" fill="#fff"/>
<text x="100" y="811" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Achievement Icon</text>
<text x="380" y="811" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Upload a local image to serve as the achievement's icon</text>

<!-- V. Regular Achievements -->
<text x="48" y="872" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">V. Regular Achievements</text>
<text x="280" y="872" fill="#8B8DA0" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Multiple per stage, added via "New Achievement" button</text>

<rect x="48" y="886" width="1104" height="260" rx="14" fill="#fff" filter="url(#card)"/>
<rect x="72" y="906" width="1056" height="36" rx="10" fill="#2D6BE4"/>
<text x="200" y="929" fill="#fff" font-size="14" font-weight="500" text-anchor="middle" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Parameter</text>
<text x="700" y="929" fill="#fff" font-size="14" font-weight="500" text-anchor="middle" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Description</text>

<rect x="72" y="942" width="1056" height="32" fill="#fff"/>
<text x="100" y="963" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Achievement Name</text>
<text x="380" y="963" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Display name for the achievement</text>
<line x1="72" y1="974" x2="1128" y2="974" stroke="#E8E4DA"/>

<rect x="72" y="974" width="1056" height="32" fill="#F4F1EA"/>
<text x="100" y="995" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">ID</text>
<text x="380" y="995" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Identifier for distinguishing in node graph data modification</text>
<line x1="72" y1="1006" x2="1128" y2="1006" stroke="#E8E4DA"/>

<rect x="72" y="1006" width="1056" height="48" fill="#fff"/>
<text x="100" y="1027" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Rarity</text>
<text x="380" y="1027" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Customizable rarity levels:</text>
<text x="400" y="1047" fill="#4A4B65" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Glorious Gold  |  Starsilver  |  Bright Bronze</text>
<line x1="72" y1="1054" x2="1128" y2="1054" stroke="#E8E4DA"/>

<rect x="72" y="1054" width="1056" height="48" fill="#F4F1EA"/>
<text x="100" y="1075" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Achievement Counter</text>
<text x="380" y="1075" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Target value (starts at 0 per player, increases via Node Graph triggers)</text>
<text x="380" y="1095" fill="#4A4B65" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Achievement completes when counter reaches this configured value</text>
<line x1="72" y1="1102" x2="1128" y2="1102" stroke="#E8E4DA"/>

<rect x="72" y="1102" width="1056" height="32" fill="#fff"/>
<text x="100" y="1123" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Achievement Description</text>
<text x="380" y="1123" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Description text displayed for this achievement</text>

<!-- VI. Node Graph Achievement Management -->
<text x="48" y="1188" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">VI. Node Graph Achievement Management</text>

<rect x="48" y="1202" width="1104" height="140" rx="14" fill="#fff" filter="url(#card)"/>
<rect x="72" y="1222" width="492" height="100" rx="10" fill="#F4F1EA"/>
<text x="96" y="1246" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Execution Nodes</text>
<text x="96" y="1270" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">- Set Achievement Progress Tally</text>
<text x="96" y="1292" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">- Change Achievement Progress Tally</text>

<rect x="588" y="1222" width="540" height="100" rx="10" fill="#E8EEFB"/>
<text x="612" y="1246" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Query Nodes</text>
<text x="612" y="1270" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">- Query If Achievement Is Completed</text>

<!-- Tip Box -->
<rect x="48" y="1358" width="1104" height="96" rx="10" fill="#E8EEFB"/>
<rect x="48" y="1358" width="4" height="96" rx="2" fill="#2D6BE4"/>
<text x="72" y="1382" fill="#2D6BE4" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Ultimate Achievement Requirements</text>
<text x="72" y="1404" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">- A stage supports multiple regular achievements and one ultimate achievement.</text>
<text x="72" y="1426" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">- Ultimate achievement auto-unlocks after ALL normal achievements are completed.</text>
<text x="72" y="1448" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">- Only enabled when at least 5 normal achievements are set with names and images configured.</text>

