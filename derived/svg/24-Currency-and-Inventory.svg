<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 2800" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="2800" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">24-Currency &amp; Inventory: Economy &amp; Item Management</text>

  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. Currency</text>

  <rect x="60" y="164" width="1080" height="80" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="80" y="192" font-size="14" fill="#4A4B65">Currency is a general item used in gameplay to determine the value of virtual items and evaluate</text>
  <text x="80" y="214" font-size="14" fill="#4A4B65">whether trades can be completed. Currency can be held by units and will increase or decrease through</text>
  <text x="80" y="236" font-size="14" fill="#4A4B65">trading or Node Graph logic.</text>

  <rect x="60" y="258" width="1080" height="364" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <rect x="60" y="258" width="4" height="364" rx="2" fill="#2D6BE4"/>
  <text x="84" y="286" font-size="14" font-weight="bold" fill="#1A1B2E">Currency Configuration</text>

  <g transform="translate(84, 310)">
    <text x="0" y="0" font-size="13" font-weight="bold" fill="#1A1B2E">Currency Name</text>
    <text x="220" y="0" font-size="13" fill="#4A4B65">Name defined by the creator for the currency</text>
    <text x="0" y="22" font-size="13" font-weight="bold" fill="#1A1B2E">Configuration ID</text>
    <text x="220" y="22" font-size="13" fill="#4A4B65">Unique identifier for currency data</text>
    <text x="0" y="44" font-size="13" font-weight="bold" fill="#1A1B2E">Icon</text>
    <text x="220" y="44" font-size="13" fill="#4A4B65">Display style; select from prefabricated icons</text>
    <text x="0" y="66" font-size="13" font-weight="bold" fill="#1A1B2E">Destruction Debris</text>
    <text x="220" y="66" font-size="13" fill="#4A4B65">Logic when currency owner is defeated</text>
    <text x="16" y="88" font-size="13" fill="#4A4B65">- Loot: Converted into loots and created in the scene</text>
    <text x="16" y="108" font-size="13" fill="#4A4B65">- Destroy: Currency is destroyed</text>
    <text x="16" y="128" font-size="13" fill="#4A4B65">- Save: Retained after revival (characters only)</text>
    <text x="0" y="152" font-size="13" font-weight="bold" fill="#1A1B2E">Loot Drop Mechanics</text>
    <text x="220" y="152" font-size="13" fill="#4A4B65">How currency drops behave in the scene</text>
    <text x="16" y="174" font-size="13" fill="#4A4B65">- Shared Reward: One loot entity shared by all players</text>
    <text x="16" y="194" font-size="13" fill="#4A4B65">- Individualized Reward: Each player has independent loot</text>
    <text x="0" y="218" font-size="13" font-weight="bold" fill="#1A1B2E">Corresponding Loot Appearance</text>
    <text x="220" y="218" font-size="13" fill="#4A4B65">Loot prefab with physical properties for scene display</text>
    <text x="0" y="240" font-size="13" font-weight="bold" fill="#1A1B2E">Display Priority</text>
    <text x="220" y="240" font-size="13" fill="#4A4B65">Higher numbers displayed first in the inventory</text>
  </g>

  <circle cx="80" cy="660" r="16" fill="#2D6BE4"/>
  <text x="80" y="661" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="661" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. Inventory</text>

  <rect x="60" y="688" width="1080" height="80" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="80" y="716" font-size="14" fill="#4A4B65">The inventory is a container for the entire resource system, managing all virtual items, equipment,</text>
  <text x="80" y="738" font-size="14" fill="#4A4B65">and currency owned by the inventory owner. Items are displayed in slots. Players can split, destroy,</text>
  <text x="80" y="760" font-size="14" fill="#4A4B65">or discard items during gameplay.</text>

  <rect x="60" y="782" width="1080" height="326" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <rect x="60" y="782" width="4" height="326" rx="2" fill="#2D6BE4"/>
  <text x="84" y="810" font-size="14" font-weight="bold" fill="#1A1B2E">Inventory Template Configuration</text>

  <g transform="translate(84, 838)">
    <text x="0" y="0" font-size="13" font-weight="bold" fill="#1A1B2E">Inventory Template Name</text>
    <text x="240" y="0" font-size="13" fill="#4A4B65">Name defined by the creator for the template</text>
    <text x="0" y="22" font-size="13" font-weight="bold" fill="#1A1B2E">Inventory Slots</text>
    <text x="240" y="22" font-size="13" fill="#4A4B65">Initial number of slots; each slot holds one item type</text>
    <text x="0" y="48" font-size="13" font-weight="bold" fill="#1A1B2E">Destruction Debris</text>
    <text x="240" y="48" font-size="13" fill="#4A4B65">Batch processing when the inventory owner is defeated</text>
    <text x="16" y="70" font-size="13" fill="#4A4B65">- Loot: All items converted into loot entities in the scene</text>
    <text x="16" y="90" font-size="13" fill="#4A4B65">- Destroy: All items destroyed</text>
    <text x="16" y="110" font-size="13" fill="#4A4B65">- Save: Items saved in inventory (characters only)</text>
    <text x="16" y="130" font-size="13" fill="#4A4B65">- Apply Item Drop Rules: Follow per-item configuration</text>
    <text x="0" y="156" font-size="13" font-weight="bold" fill="#1A1B2E">Loot Drop Mechanics</text>
    <text x="240" y="156" font-size="13" fill="#4A4B65">All items converted into a single drop entity</text>
    <text x="16" y="178" font-size="13" fill="#4A4B65">- Shared Reward: One loot entity shared by all players</text>
    <text x="16" y="198" font-size="13" fill="#4A4B65">- Individualized Reward: Independent loot per player</text>
    <text x="0" y="224" font-size="13" font-weight="bold" fill="#1A1B2E">Corresponding Loot Appearance</text>
    <text x="240" y="224" font-size="13" fill="#4A4B65">Loot prefab with physical properties for scene display</text>
  </g>

  <circle cx="80" cy="1146" r="16" fill="#2D6BE4"/>
  <text x="80" y="1147" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="1147" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. Inventory Component</text>

  <rect x="60" y="1174" width="1080" height="172" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="80" y="1202" font-size="14" fill="#4A4B65">The Inventory component references an Inventory template and generates corresponding inventory</text>
  <text x="80" y="1224" font-size="14" fill="#4A4B65">instances at runtime. It supports selecting only one inventory template at a time and can be mounted</text>
  <text x="80" y="1246" font-size="14" fill="#4A4B65">on characters, creations, and dynamic objects.</text>

  <g transform="translate(80, 1274)">
    <rect x="0" y="0" width="490" height="50" rx="8" fill="#F0F2F5"/>
    <text x="16" y="18" font-size="13" font-weight="bold" fill="#1A1B2E">Inventory Template</text>
    <text x="16" y="38" font-size="12" fill="#4A4B65">Reference to an inventory template</text>
    <rect x="520" y="0" width="490" height="50" rx="8" fill="#F0F2F5"/>
    <text x="16" y="18" font-size="13" font-weight="bold" fill="#1A1B2E">Starting Items</text>
    <text x="16" y="38" font-size="12" fill="#4A4B65">Default items carried when gameplay starts</text>
  </g>

  <circle cx="80" cy="1384" r="16" fill="#1B4FC0"/>
  <text x="80" y="1385" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IV</text>
  <text x="108" y="1385" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">IV. Node Graph Operations</text>

  <rect x="60" y="1412" width="1080" height="224" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="80" y="1440" font-size="14" font-weight="bold" fill="#1A1B2E">Execution Nodes</text>

  <g transform="translate(80, 1468)">
    <rect x="0" y="0" width="490" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="23" font-size="13" fill="#4A4B65">Set Inventory Drop Items/Currency Amount</text>
    <rect x="520" y="0" width="490" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="23" font-size="13" fill="#4A4B65">Set Inventory Item Drop Contents</text>
    <rect x="0" y="44" width="490" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="67" font-size="13" fill="#4A4B65">Increase Inventory Item Quantity</text>
    <rect x="520" y="44" width="490" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="67" font-size="13" fill="#4A4B65">Increase Inventory Currency Quantity</text>
    <rect x="0" y="88" width="490" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="111" font-size="13" fill="#4A4B65">Increase Maximum Inventory Capacity</text>
  </g>

  <rect x="60" y="1650" width="1080" height="180" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="80" y="1678" font-size="14" font-weight="bold" fill="#1A1B2E">Event Nodes</text>

  <g transform="translate(80, 1706)">
    <rect x="0" y="0" width="320" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="23" font-size="12" fill="#4A4B65">When Item Is Lost From Inventory</text>
    <rect x="340" y="0" width="320" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="23" font-size="12" fill="#4A4B65">When Quantity of Inventory Item Changes</text>
    <rect x="680" y="0" width="320" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="23" font-size="12" fill="#4A4B65">When Item Is Added to Inventory</text>
    <rect x="0" y="44" width="320" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="67" font-size="12" fill="#4A4B65">When Quantity of Inventory Currency Changes</text>
    <rect x="340" y="44" width="320" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="67" font-size="12" fill="#4A4B65">When Items in Inventory Are Used</text>
  </g>

  <rect x="60" y="1844" width="1080" height="172" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="80" y="1872" font-size="14" font-weight="bold" fill="#1A1B2E">Query Nodes</text>

  <g transform="translate(80, 1900)">
    <rect x="0" y="0" width="320" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="23" font-size="12" fill="#4A4B65">Get Inventory Item Quantity</text>
    <rect x="340" y="0" width="320" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="23" font-size="12" fill="#4A4B65">Get Inventory Capacity</text>
    <rect x="680" y="0" width="320" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="23" font-size="12" fill="#4A4B65">Get All Inventory Basic Items</text>
    <rect x="0" y="44" width="320" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="67" font-size="12" fill="#4A4B65">Get All Inventory Equipment</text>
    <rect x="340" y="44" width="320" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="67" font-size="12" fill="#4A4B65">Get All Inventory Currency</text>
    <rect x="680" y="44" width="320" height="36" rx="6" fill="#F0F2F5"/>
    <text x="12" y="67" font-size="12" fill="#4A4B65">Get Inventory Currency Quantity</text>
  </g>

  <rect x="60" y="2030" width="1080" height="82" rx="14" fill="#E8EEFB"/>
  <rect x="60" y="2030" width="4" height="82" rx="2" fill="#2D6BE4"/>
  <text x="80" y="2054" font-size="14" font-weight="bold" fill="#2D6BE4">Currency Node Graph Operations</text>
  <text x="80" y="2078" font-size="13" fill="#4A4B65">Currency can be added, removed, and checked via Node Graph nodes. The Inventory component must</text>
  <text x="80" y="2098" font-size="13" fill="#4A4B65">be mounted on the target entity for currency operations to function.</text>

  <text x="60" y="2650" font-size="12" fill="#8B8DA0">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhjzofrtnejy" target="_blank">
    <text x="60" y="2676" font-size="13" fill="#2D6BE4" text-decoration="underline">Currency</text>
  </a>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhb12f03r2y8" target="_blank">
    <text x="60" y="2700" font-size="13" fill="#2D6BE4" text-decoration="underline">Inventory</text>
  </a>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhir93rudpv2" target="_blank">
    <text x="60" y="2724" font-size="13" fill="#2D6BE4" text-decoration="underline">Inventory Component</text>
  </a>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhkl2yin0cxo" target="_blank">
    <text x="60" y="2748" font-size="13" fill="#2D6BE4" text-decoration="underline">Equipment</text>
  </a>
  <text x="600" y="2780" font-size="11" fill="#8B8DA0" text-anchor="middle">Generated by AI based on official Miliastra Academy documentation. Version: Luminary</text>
</svg>