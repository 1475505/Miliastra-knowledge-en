<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1060" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card"><feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/></filter>
    <filter id="elevated"><feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1200" height="1060" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="72" fill="#1A1B2E" font-size="34" font-weight="bold" dominant-baseline="middle">Progress Bar</text>
  <text x="340" y="72" fill="#4A4B65" font-size="16" dominant-baseline="middle">Real-Time Variable Fill Percentage Display</text>

  <text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Progress Bar Functions</text>
  <g transform="translate(48,168)">
    <rect width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
    <text x="24" y="30" font-size="14" font-weight="500" fill="#1A1B2E">Purpose</text>
    <text x="24" y="54" font-size="13" fill="#4A4B65">During stage runtime, displays a real-time fill percentage of the tracked variable within its default configured range.</text>
  </g>

  <text x="48" y="288" fill="#2D6BE4" font-size="18" font-weight="700">II. Editing the Progress Bar</text>

  <g transform="translate(48,308)">
    <rect width="1104" height="240" rx="14" fill="#fff" filter="url(#card)"/>
    <rect x="16" y="14" width="70" height="26" rx="13" fill="#E8EEFB"/>
    <text x="51" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Shape</text>

    <text x="24" y="62" font-size="14" font-weight="500" fill="#1A1B2E">Three Shape Options</text>

    <rect x="24" y="78" width="200" height="50" rx="8" fill="#E8EEFB"/>
    <text x="124" y="98" font-size="13" font-weight="bold" fill="#1A1B2E" text-anchor="middle">Horizontal</text>
    <text x="124" y="118" font-size="11" fill="#4A4B65" text-anchor="middle">Standard left-to-right bar</text>

    <rect x="240" y="78" width="200" height="50" rx="8" fill="#E8EEFB"/>
    <text x="340" y="98" font-size="13" font-weight="bold" fill="#1A1B2E" text-anchor="middle">Vertical</text>
    <text x="340" y="118" font-size="11" fill="#4A4B65" text-anchor="middle">Bottom-to-top bar</text>

    <rect x="456" y="78" width="200" height="50" rx="8" fill="#E8EEFB"/>
    <text x="556" y="98" font-size="13" font-weight="bold" fill="#1A1B2E" text-anchor="middle">Ring</text>
    <text x="556" y="118" font-size="11" fill="#4A4B65" text-anchor="middle">Circular progress indicator</text>

    <text x="24" y="160" font-size="14" font-weight="500" fill="#1A1B2E">Color</text>
    <text x="24" y="184" font-size="13" fill="#4A4B65">The background color of the filled portion in the progress bar.</text>

    <rect x="16" y="200" width="1072" height="28" rx="8" fill="#E8EEFB"/>
    <rect x="16" y="200" width="4" height="28" rx="2" fill="#2D6BE4"/>
    <text x="32" y="218" font-size="12" fill="#4A4B65">Shape determines the visual layout; color determines the fill appearance of the tracked progress.</text>
  </g>

  <g transform="translate(48,564)">
    <rect width="1104" height="260" rx="14" fill="#fff" filter="url(#card)"/>
    <rect x="16" y="14" width="160" height="26" rx="13" fill="#E8EEFB"/>
    <text x="96" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Progress Bar Style</text>

    <text x="24" y="62" font-size="14" font-weight="500" fill="#1A1B2E">Four Display Modes</text>

    <rect x="24" y="78" width="1056" height="28" rx="6" fill="#2D6BE4"/>
    <text x="140" y="92" font-size="12" font-weight="500" fill="#fff" text-anchor="middle" dominant-baseline="middle">Style</text>
    <text x="550" y="92" font-size="12" font-weight="500" fill="#fff" text-anchor="middle" dominant-baseline="middle">Description</text>

    <text x="36" y="126" font-size="13" font-weight="500" fill="#1A1B2E">Do Not Show</text>
    <text x="200" y="126" font-size="13" fill="#4A4B65">Hide progress hint text entirely</text>
    <line x1="24" y1="138" x2="1080" y2="138" stroke="#E8E4DA"/>

    <text x="36" y="156" font-size="13" font-weight="500" fill="#1A1B2E">Percentage</text>
    <text x="200" y="156" font-size="13" fill="#4A4B65">Displays progress as a true proportional percentage, rounded to the nearest integer</text>
    <line x1="24" y1="168" x2="1080" y2="168" stroke="#E8E4DA"/>

    <text x="36" y="186" font-size="13" font-weight="500" fill="#1A1B2E">1:1 Scale</text>
    <text x="200" y="186" font-size="13" fill="#4A4B65">Display actual ratio in real-time (e.g., 50/100)</text>
    <line x1="24" y1="198" x2="1080" y2="198" stroke="#E8E4DA"/>

    <text x="36" y="216" font-size="13" font-weight="500" fill="#1A1B2E">Current Value</text>
    <text x="200" y="216" font-size="13" fill="#4A4B65">Display current value in real-time (raw number)</text>
  </g>

  <g transform="translate(48,840)">
    <rect width="1104" height="140" rx="14" fill="#fff" filter="url(#card)"/>
    <rect x="16" y="14" width="80" height="26" rx="13" fill="#E8EEFB"/>
    <text x="56" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Values</text>

    <text x="24" y="62" font-size="14" font-weight="500" fill="#1A1B2E">Current Progress Value</text>
    <text x="24" y="86" font-size="13" fill="#4A4B65">Supports custom variables for players and stages.</text>

    <text x="400" y="62" font-size="14" font-weight="500" fill="#1A1B2E">Minimum Value</text>
    <text x="400" y="86" font-size="13" fill="#4A4B65">Supports custom variables for players and stages.</text>

    <text x="780" y="62" font-size="14" font-weight="500" fill="#1A1B2E">Maximum Value</text>
    <text x="780" y="86" font-size="13" fill="#4A4B65">Supports custom variables for players and stages.</text>

    <rect x="16" y="104" width="1072" height="28" rx="8" fill="#E8EEFB"/>
    <rect x="16" y="104" width="4" height="28" rx="2" fill="#2D6BE4"/>
    <text x="32" y="122" font-size="12" fill="#4A4B65">All three values (current, min, max) can be dynamically linked to player or stage custom variables for real-time updates.</text>
  </g>

  <text x="48" y="1018" fill="#8B8DA0" font-size="12">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhwpzpixrad0" target="_blank">
    <text x="48" y="1040" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Progress Bar UI Controls</text>
  </a>

  <text x="600" y="1056" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>