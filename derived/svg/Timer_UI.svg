<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 2100" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1200" height="2100" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>
  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">59-Timer UI: Timer UI Controls</text>

  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. Timer Functions</text>

  <g transform="translate(60, 164)">
    <rect width="1080" height="100" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="32" font-size="14" font-weight="bold" fill="#1A1B2E">Purpose</text>
    <text x="20" y="56" font-size="13" fill="#4A4B65">An interface for displaying time progress, including two modes: countdown and stopwatch.</text>
    <text x="20" y="76" font-size="13" fill="#4A4B65">Provides precise time tracking for stage gameplay, challenges, and timed events.</text>
  </g>

  <g transform="translate(60, 292)">
    <rect width="1080" height="120" rx="14" fill="#E8EEFB"/>
    <rect x="0" y="0" width="4" height="120" rx="2" fill="#2D6BE4"/>
    <text x="24" y="28" font-size="13" font-weight="bold" fill="#1A1B2E">Timer Modes</text>
    <text x="24" y="52" font-size="13" fill="#4A4B65">Countdown: Counts down from a preset duration to zero. Fires completion event when time runs out.</text>
    <text x="24" y="74" font-size="13" fill="#4A4B65">Count-up (Stopwatch): Counts up from zero. Tracks elapsed time for speed runs or</text>
    <text x="24" y="96" font-size="13" fill="#4A4B65">unlimited-duration activities. Can be paused and resumed.</text>
  </g>

  <circle cx="80" cy="448" r="16" fill="#2D6BE4"/>
  <text x="80" y="449" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="449" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. Timer Settings</text>

  <g transform="translate(60, 476)">
    <rect width="1080" height="420" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="30" font-size="14" font-weight="bold" fill="#1A1B2E">Configuration Parameters</text>

    <rect x="20" y="46" width="520" height="26" rx="6" fill="#F0F0F5"/>
    <text x="30" y="59" font-size="12" fill="#1A1B2E" font-weight="bold">Parameter</text>
    <text x="200" y="59" font-size="12" fill="#1A1B2E" font-weight="bold">Description</text>

    <text x="30" y="91" font-size="12" fill="#1A1B2E" font-weight="bold">Type</text>
    <text x="200" y="91" font-size="12" fill="#4A4B65">Stopwatch, Countdown</text>

    <text x="30" y="123" font-size="12" fill="#1A1B2E" font-weight="bold">Specified Timer</text>
    <text x="200" y="123" font-size="12" fill="#4A4B65">Enumerates all predefined global timers matching the Type</text>

    <text x="30" y="155" font-size="12" fill="#1A1B2E" font-weight="bold">Source Entity</text>
    <text x="200" y="155" font-size="12" fill="#4A4B65">Default stage entity; can switch between stage entity or player entity</text>

    <text x="20" y="196" font-size="14" font-weight="bold" fill="#1A1B2E">Display Format</text>
    <text x="20" y="220" font-size="13" fill="#4A4B65">Timers support multiple display formats:</text>
    <text x="30" y="244" font-size="13" fill="#4A4B65">- MM:SS (Minutes:Seconds)</text>
    <text x="30" y="268" font-size="13" fill="#4A4B65">- HH:MM:SS (Hours:Minutes:Seconds)</text>
    <text x="30" y="292" font-size="13" fill="#4A4B65">- SS.ms (Seconds with milliseconds)</text>
    <text x="30" y="316" font-size="13" fill="#4A4B65">- Custom format via template string</text>

    <text x="20" y="352" font-size="14" font-weight="bold" fill="#1A1B2E">Timer Styling</text>
    <text x="20" y="376" font-size="13" fill="#4A4B65">Customize font size, color, background, and positioning of the timer display.</text>
    <text x="20" y="396" font-size="13" fill="#4A4B65">Supports all UI styling options including shadows and animation effects.</text>
  </g>

  <circle cx="80" cy="932" r="16" fill="#2D6BE4"/>
  <text x="80" y="933" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="933" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. Timer Controls &amp; Events</text>

  <g transform="translate(60, 960)">
    <rect width="1080" height="260" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="30" font-size="14" font-weight="bold" fill="#1A1B2E">Control Actions</text>
    <text x="20" y="56" font-size="13" font-weight="bold" fill="#1A1B2E">Start</text>
    <text x="90" y="56" font-size="13" fill="#4A4B65">Begins the timer countdown or count-up</text>
    <text x="20" y="80" font-size="13" font-weight="bold" fill="#1A1B2E">Stop</text>
    <text x="90" y="80" font-size="13" fill="#4A4B65">Halts the timer, preserving current value</text>
    <text x="20" y="104" font-size="13" font-weight="bold" fill="#1A1B2E">Pause</text>
    <text x="90" y="104" font-size="13" fill="#4A4B65">Temporarily suspends the timer</text>
    <text x="20" y="128" font-size="13" font-weight="bold" fill="#1A1B2E">Resume</text>
    <text x="90" y="128" font-size="13" fill="#4A4B65">Continues from paused state</text>
    <text x="20" y="152" font-size="13" font-weight="bold" fill="#1A1B2E">Reset</text>
    <text x="90" y="152" font-size="13" fill="#4A4B65">Returns timer to initial value</text>

    <text x="20" y="188" font-size="14" font-weight="bold" fill="#1A1B2E">Completion Events</text>
    <text x="20" y="214" font-size="13" fill="#4A4B65">When the countdown reaches zero, a completion event is fired. This event</text>
    <text x="20" y="236" font-size="13" fill="#4A4B65">can be connected in the node graph to trigger stage logic (e.g. end challenge, award points).</text>
  </g>

  <g transform="translate(60, 1248)">
    <rect width="1080" height="130" rx="14" fill="#E8EEFB"/>
    <rect x="0" y="0" width="4" height="130" rx="2" fill="#2D6BE4"/>
    <text x="24" y="28" font-size="13" font-weight="bold" fill="#1A1B2E">Node Graph Control</text>
    <text x="24" y="52" font-size="13" fill="#4A4B65">Timers are controlled via the node graph using dedicated server nodes for</text>
    <text x="24" y="74" font-size="13" fill="#4A4B65">start, stop, pause, resume, and reset operations. The timer value can be</text>
    <text x="24" y="96" font-size="13" fill="#4A4B65">read or modified during gameplay. Multiple timers can run simultaneously.</text>
  </g>

  <g transform="translate(60, 1406)">
    <rect width="1080" height="50" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="12" font-weight="bold" fill="#1A1B2E">Related Documentation:</text>
  </g>
  <a href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhjdgrrc0k7i">
    <text x="80" y="1486" font-size="12" fill="#2D6BE4" text-decoration="underline">Timer UI Controls</text>
  </a>

  <text x="600" y="1540" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>
