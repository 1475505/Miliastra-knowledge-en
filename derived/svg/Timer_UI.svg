<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 760" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card"><feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/></filter>
    <filter id="elevated"><feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1200" height="760" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="72" fill="#1A1B2E" font-size="34" font-weight="bold" dominant-baseline="middle">Timer UI</text>
  <text x="260" y="72" fill="#4A4B65" font-size="16" dominant-baseline="middle">Countdown and Stopwatch Time Display Controls</text>

  <text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Timer Functions</text>
  <g transform="translate(48,168)">
    <rect width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
    <text x="24" y="30" font-size="14" font-weight="500" fill="#1A1B2E">Purpose</text>
    <text x="24" y="54" font-size="13" fill="#4A4B65">An interface for displaying time progress, including two modes: Countdown and Stopwatch.</text>
  </g>

  <text x="48" y="288" fill="#2D6BE4" font-size="18" font-weight="700">II. Timer Settings</text>

  <g transform="translate(48,308)">
    <rect width="1104" height="280" rx="14" fill="#fff" filter="url(#card)"/>

    <rect x="24" y="14" width="1056" height="28" rx="6" fill="#2D6BE4"/>
    <text x="180" y="28" font-size="12" font-weight="500" fill="#fff" text-anchor="middle" dominant-baseline="middle">Parameter</text>
    <text x="600" y="28" font-size="12" font-weight="500" fill="#fff" text-anchor="middle" dominant-baseline="middle">Description</text>

    <text x="36" y="66" font-size="14" font-weight="500" fill="#1A1B2E">Type</text>
    <text x="200" y="66" font-size="13" fill="#4A4B65">Stopwatch or Countdown</text>
    <line x1="24" y1="80" x2="1080" y2="80" stroke="#E8E4DA"/>

    <text x="36" y="100" font-size="14" font-weight="500" fill="#1A1B2E">Specified Timer</text>
    <text x="200" y="100" font-size="13" fill="#4A4B65">Will enumerate all predefined global timers that match the selected Type.</text>
    <line x1="24" y1="114" x2="1080" y2="114" stroke="#E8E4DA"/>

    <text x="36" y="134" font-size="14" font-weight="500" fill="#1A1B2E">Source Entity</text>
    <text x="200" y="134" font-size="13" fill="#4A4B65">Default configuration is stage entity. Can choose between stage entity or player entity.</text>

    <text x="24" y="174" font-size="14" font-weight="500" fill="#1A1B2E">Timer Modes Explained</text>

    <rect x="24" y="190" width="340" height="60" rx="8" fill="#E8EEFB"/>
    <text x="194" y="210" font-size="13" font-weight="bold" fill="#1A1B2E" text-anchor="middle">Stopwatch</text>
    <text x="194" y="232" font-size="12" fill="#4A4B65" text-anchor="middle">Counts time upward from zero</text>

    <rect x="380" y="190" width="340" height="60" rx="8" fill="#FFF3E0"/>
    <text x="550" y="210" font-size="13" font-weight="bold" fill="#1A1B2E" text-anchor="middle">Countdown</text>
    <text x="550" y="232" font-size="12" fill="#4A4B65" text-anchor="middle">Counts time downward to zero</text>

    <rect x="16" y="260" width="1072" height="12" rx="4" fill="#E8EEFB"/>
  </g>

  <g transform="translate(48,608)">
    <rect width="1104" height="60" rx="14" fill="#fff" filter="url(#card)"/>
    <rect x="16" y="10" width="1072" height="40" rx="8" fill="#E8EEFB"/>
    <rect x="16" y="10" width="4" height="40" rx="2" fill="#2D6BE4"/>
    <text x="32" y="34" font-size="12" fill="#4A4B65">The Timer UI control links to predefined global timers. The Source Entity determines whether the timer is tied to the stage or a specific player.</text>
  </g>

  <text x="48" y="706" fill="#8B8DA0" font-size="12">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhnrdor7uyra" target="_blank">
    <text x="48" y="728" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Timer UI Controls</text>
  </a>

  <text x="600" y="754" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>