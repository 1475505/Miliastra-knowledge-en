<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1660" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="1660" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="72" font-size="34" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Unit Tag</text>
  <text x="240" y="72" font-size="16" fill="#4A4B65" dominant-baseline="middle">Special markers for quick entity identification and filtering</text>

  <!-- I. Unit Tag Functions -->
  <text x="48" y="148" font-size="18" font-weight="700" fill="#2D6BE4">I. Unit Tag Functions</text>

  <g transform="translate(48, 168)">
    <rect width="1104" height="160" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="24" y="30" font-size="14" fill="#4A4B65">Unit Tags provide special markers for units. When writing stage logic, creators can</text>
    <text x="24" y="50" font-size="14" fill="#4A4B65">use unit tags to quickly locate all units with that tag.</text>

    <text x="24" y="80" font-size="14" font-weight="500" fill="#1A1B2E">Supported Entity Types:</text>

    <rect x="24" y="96" width="240" height="44" rx="8" fill="#E8EEFB"/>
    <text x="144" y="118" font-size="13" font-weight="500" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Creations</text>

    <rect x="280" y="96" width="240" height="44" rx="8" fill="#E8EEFB"/>
    <text x="400" y="118" font-size="13" font-weight="500" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Characters</text>

    <rect x="536" y="96" width="240" height="44" rx="8" fill="#E8EEFB"/>
    <text x="656" y="118" font-size="13" font-weight="500" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Objects</text>

    <text x="24" y="154" font-size="13" fill="#4A4B65">All unit types with physical entities in the scene can be configured with unit tags. The same entity can carry multiple tags.</text>
  </g>

  <!-- II. Global Definition of Unit Tags -->
  <text x="48" y="368" font-size="18" font-weight="700" fill="#2D6BE4">II. Global Definition of Unit Tags</text>
  <text x="340" y="368" font-size="13" fill="#8B8DA0">Must be globally defined before use</text>

  <g transform="translate(48, 388)">
    <rect width="1104" height="400" rx="14" fill="#FFFFFF" filter="url(#card)"/>

    <text x="24" y="30" font-size="16" font-weight="500" fill="#1A1B2E">1. Manage Unit Label Tool — Entry Points</text>

    <rect x="24" y="46" width="516" height="72" rx="10" fill="#F4F1EA"/>
    <text x="40" y="68" font-size="14" font-weight="500" fill="#1A1B2E">Entry 1: Left System Menu</text>
    <text x="40" y="92" font-size="13" fill="#4A4B65">Click [Manage Unit Label] in the system menu to open the tool.</text>

    <rect x="564" y="46" width="516" height="72" rx="10" fill="#F4F1EA"/>
    <text x="580" y="68" font-size="14" font-weight="500" fill="#1A1B2E">Entry 2: Basic Information Panel</text>
    <text x="580" y="92" font-size="13" fill="#4A4B65">Quick open via "Open Unit Label Manager" button.</text>

    <rect x="24" y="134" width="1056" height="2" rx="1" fill="#E8E4DA"/>

    <text x="24" y="162" font-size="16" font-weight="500" fill="#1A1B2E">2. Defining Unit Tags</text>
    <text x="24" y="186" font-size="14" fill="#4A4B65">In the Manage Unit Label interface, click "Create New Unit Tag" to add a new tag.</text>

    <text x="24" y="218" font-size="14" font-weight="500" fill="#1A1B2E">Tag Properties:</text>

    <rect x="24" y="234" width="1056" height="148" rx="10" fill="#F4F1EA"/>

    <text x="44" y="260" font-size="13" fill="#4A4B65"><tspan font-weight="500" fill="#1A1B2E">Unit Tag Name</tspan> — Display name for reference purposes only; not used as a logical index.</text>
    <text x="44" y="286" font-size="13" fill="#4A4B65"><tspan font-weight="500" fill="#1A1B2E">Index</tspan> — Unique identifier of this Unit Tag, used when modifying tag data in the node graph.</text>
    <text x="44" y="312" font-size="13" fill="#4A4B65"><tspan font-weight="500" fill="#1A1B2E">Find References</tspan> — Click to display all entities that reference this Unit Tag.</text>

    <rect x="44" y="332" width="1016" height="36" rx="8" fill="#E8EEFB"/>
    <rect x="44" y="332" width="4" height="36" rx="2" fill="#2D6BE4"/>
    <text x="64" y="350" font-size="12" fill="#4A4B65" dominant-baseline="middle">Tag names are for human readability — the Index is the actual identifier used in logic and node graphs.</text>
  </g>

  <!-- III. Configuring Unit Tags -->
  <text x="48" y="828" font-size="18" font-weight="700" fill="#2D6BE4">III. Configuring Unit Tags</text>

  <g transform="translate(48, 848)">
    <rect width="1104" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="24" y="30" font-size="14" fill="#4A4B65">On the basic information page of prefabs or entities, find the Unit Tags section.</text>
    <text x="24" y="54" font-size="14" fill="#4A4B65">Click "Add Unit Tags" to choose from globally defined tags — these take effect as initial data.</text>
    <text x="24" y="78" font-size="14" fill="#4A4B65">A prefab or entity can carry multiple tags simultaneously.</text>

    <rect x="24" y="94" width="1056" height="2" rx="1" fill="#E8E4DA"/>
    <text x="24" y="114" font-size="12" fill="#8B8DA0">Tags assigned at the prefab level become the initial tags for all instances of that prefab.</text>
  </g>

  <!-- IV. Modifying Unit Tags Through Node Graphs -->
  <text x="48" y="1008" font-size="18" font-weight="700" fill="#2D6BE4">IV. Modifying Unit Tags Through Node Graphs</text>

  <g transform="translate(48, 1028)">
    <rect width="1104" height="520" rx="14" fill="#FFFFFF" filter="url(#card)"/>

    <text x="24" y="30" font-size="16" font-weight="500" fill="#1A1B2E">Server Nodes</text>

    <rect x="24" y="46" width="516" height="56" rx="8" fill="#E8EEFB"/>
    <text x="40" y="66" font-size="13" font-weight="500" fill="#1A1B2E">Clear Unit Tags From Entity</text>
    <text x="40" y="86" font-size="12" fill="#4A4B65">Removes all unit tags from the target entity.</text>

    <rect x="564" y="46" width="516" height="56" rx="8" fill="#E8EEFB"/>
    <text x="580" y="66" font-size="13" font-weight="500" fill="#1A1B2E">Add Unit Tag to Entity</text>
    <text x="580" y="86" font-size="12" fill="#4A4B65">Assigns a specified unit tag to the target entity.</text>

    <rect x="24" y="114" width="516" height="56" rx="8" fill="#E8EEFB"/>
    <text x="40" y="134" font-size="13" font-weight="500" fill="#1A1B2E">Remove Unit Tag From Entity</text>
    <text x="40" y="154" font-size="12" fill="#4A4B65">Removes a specific unit tag from the target entity.</text>

    <rect x="564" y="114" width="516" height="56" rx="8" fill="#E8EEFB"/>
    <text x="580" y="134" font-size="13" font-weight="500" fill="#1A1B2E">Get Entity List by Unit Tag</text>
    <text x="580" y="154" font-size="12" fill="#4A4B65">Returns all entities carrying the specified tag.</text>

    <rect x="24" y="182" width="516" height="56" rx="8" fill="#E8EEFB"/>
    <text x="40" y="202" font-size="13" font-weight="500" fill="#1A1B2E">Get Entity Unit Tag List</text>
    <text x="40" y="222" font-size="12" fill="#4A4B65">Returns all unit tags currently on the target entity.</text>

    <rect x="24" y="254" width="1056" height="2" rx="1" fill="#E8E4DA"/>

    <text x="24" y="282" font-size="16" font-weight="500" fill="#1A1B2E">Client Nodes</text>

    <rect x="24" y="298" width="516" height="56" rx="8" fill="#E5F2E9"/>
    <text x="40" y="318" font-size="13" font-weight="500" fill="#1A1B2E">Get Entity List by Unit Tag</text>
    <text x="40" y="338" font-size="12" fill="#4A4B65">Client-side query for entities with a specific tag.</text>

    <rect x="564" y="298" width="516" height="56" rx="8" fill="#E5F2E9"/>
    <text x="580" y="318" font-size="13" font-weight="500" fill="#1A1B2E">Get Entity's Unit Tag List</text>
    <text x="580" y="338" font-size="12" fill="#4A4B65">Client-side query for tags on a specific entity.</text>

    <!-- Tip box -->
    <rect x="24" y="380" width="1056" height="120" rx="10" fill="#E8EEFB"/>
    <rect x="24" y="380" width="4" height="120" rx="2" fill="#2D6BE4"/>
    <text x="44" y="406" font-size="14" font-weight="500" fill="#2D6BE4">Server vs Client Nodes</text>
    <text x="44" y="430" font-size="13" fill="#4A4B65">Server nodes handle tag modification (add, remove, clear) and authoritative queries.</text>
    <text x="44" y="454" font-size="13" fill="#4A4B65">Client nodes provide read-only queries for display/UI purposes on the client side.</text>
    <text x="44" y="478" font-size="13" fill="#4A4B65">Always use server nodes for gameplay logic that affects outcomes.</text>
  </g>

  <!-- Related Documentation -->
  <text x="48" y="1594" font-size="12" fill="#8B8DA0">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhzldmiwdgu4" target="_blank">
    <text x="48" y="1616" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Unit Tag</text>
  </a>

  <!-- Footer -->
  <text x="600" y="1644" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>