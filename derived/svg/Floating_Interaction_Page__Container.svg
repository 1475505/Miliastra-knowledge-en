<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1720" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="1720" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">66-Floating Interaction Page Container</text>

  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. Container Overview</text>

  <g transform="translate(60, 164)">
    <rect width="1080" height="180" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="100" height="26" rx="13" fill="#E8EEFB"/>
    <text x="66" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Container</text>
    <text x="16" y="64" font-size="14" fill="#4A4B65">A container is used to organize the information structure of UI controls within a Floating Interaction Page.</text>
    <text x="16" y="88" font-size="14" fill="#4A4B65">Containers can be divided based on the interface's information structure, and each container can be</text>
    <text x="16" y="112" font-size="14" fill="#4A4B65">treated as a separate page. The Floating Interaction Page functions as a new UI Layout where you</text>
    <text x="16" y="136" font-size="14" fill="#4A4B65">can add UI controls and modify their settings accordingly. Some UI controls are exclusive to the</text>
    <text x="16" y="160" font-size="14" fill="#4A4B65">Floating Interaction Page and cannot be used in regular UI layouts.</text>
  </g>

  <circle cx="80" cy="380" r="16" fill="#2D6BE4"/>
  <text x="80" y="381" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="381" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. Container Properties</text>

  <g transform="translate(60, 408)">
    <rect width="1080" height="420" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="0" y="16" width="1080" height="38" fill="#2D6BE4" rx="0"/>
    <text x="16" y="35" font-size="14" font-weight="bold" fill="#FFFFFF" dominant-baseline="middle">Property</text>
    <text x="727" y="35" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Description</text>

    <rect x="0" y="54" width="1080" height="52" fill="#F9F7F2"/>
    <text x="16" y="72" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Page Container</text>
    <text x="380" y="72" font-size="13" fill="#4A4B65" dominant-baseline="middle">Organizes UI controls; each container acts as a separate page</text>

    <rect x="0" y="106" width="1080" height="52" fill="#FFFFFF"/>
    <text x="16" y="124" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Initially Effective</text>
    <text x="380" y="124" font-size="13" fill="#4A4B65" dominant-baseline="middle">Determines which containers are initially effective when the page opens</text>

    <rect x="0" y="158" width="1080" height="52" fill="#F9F7F2"/>
    <text x="16" y="176" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Window Container List</text>
    <text x="380" y="176" font-size="13" fill="#4A4B65" dominant-baseline="middle">Displays all current containers configured for the page</text>

    <rect x="0" y="210" width="1080" height="52" fill="#FFFFFF"/>
    <text x="16" y="228" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Inherent Container</text>
    <text x="380" y="228" font-size="13" fill="#4A4B65" dominant-baseline="middle">Contains the Close Button by default; cannot be removed</text>

    <rect x="0" y="262" width="1080" height="52" fill="#F9F7F2"/>
    <text x="16" y="280" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Use Preset Background</text>
    <text x="380" y="280" font-size="13" fill="#4A4B65" dominant-baseline="middle">Choose a preset background or use the default when disabled</text>

    <rect x="0" y="314" width="1080" height="52" fill="#FFFFFF"/>
    <text x="16" y="332" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Select Preset Style</text>
    <text x="380" y="332" font-size="13" fill="#4A4B65" dominant-baseline="middle">Select one of the available preset styles for the page</text>

    <rect x="0" y="366" width="1080" height="52" fill="#F9F7F2"/>
    <text x="16" y="384" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Container Status</text>
    <text x="380" y="384" font-size="13" fill="#4A4B65" dominant-baseline="middle">Each container can be shown or hidden independently</text>
  </g>

  <circle cx="80" cy="864" r="16" fill="#2D6BE4"/>
  <text x="80" y="865" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="865" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. Container Management</text>

  <g transform="translate(60, 892)">
    <rect width="520" height="230" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="130" height="26" rx="13" fill="#E8EEFB"/>
    <text x="81" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Details Editing</text>
    <text x="16" y="60" font-size="14" fill="#4A4B65">Click [Details Editing] to enter the</text>
    <text x="16" y="80" font-size="14" fill="#4A4B65">Floating Interaction Page editing interface,</text>
    <text x="16" y="100" font-size="14" fill="#4A4B65">where you can add UI controls to the</text>
    <text x="16" y="120" font-size="14" fill="#4A4B65">container and modify their settings.</text>

    <rect x="16" y="144" width="488" height="62" rx="10" fill="#E8EEFB"/>
    <rect x="16" y="144" width="4" height="62" rx="2" fill="#2D6BE4"/>
    <text x="30" y="166" font-size="13" font-weight="bold" fill="#2D6BE4">Editing</text>
    <text x="30" y="188" font-size="11" fill="#4A4B65">Use the editing interface to add, remove, and configure</text>
    <text x="30" y="202" font-size="11" fill="#4A4B65">containers and their child UI controls</text>
  </g>

  <g transform="translate(620, 892)">
    <rect width="520" height="230" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="110" height="26" rx="13" fill="#E8EEFB"/>
    <text x="71" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Close Button</text>
    <text x="16" y="60" font-size="14" fill="#4A4B65">The Interaction Page Close Button is</text>
    <text x="16" y="80" font-size="14" fill="#4A4B65">included by default and cannot be removed</text>
    <text x="16" y="100" font-size="14" fill="#4A4B65">from the Inherent Container.</text>
    <text x="16" y="124" font-size="14" fill="#4A4B65">If Inherent Container is not enabled, use</text>
    <text x="16" y="144" font-size="14" fill="#4A4B65">Esc / controller exit / Node Graphs to close.</text>

    <rect x="16" y="166" width="488" height="42" rx="10" fill="#E8EEFB"/>
    <rect x="16" y="166" width="4" height="42" rx="2" fill="#2D6BE4"/>
    <text x="30" y="185" font-size="11" fill="#4A4B65">On mobile, the page must be closed through Node Graphs</text>
    <text x="30" y="199" font-size="11" fill="#4A4B65">when the Inherent Container (Close Button) is not enabled</text>
  </g>

  <circle cx="80" cy="1158" r="16" fill="#2D6BE4"/>
  <text x="80" y="1159" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IV</text>
  <text x="108" y="1159" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">IV. Node Graph Integration</text>

  <g transform="translate(60, 1186)">
    <rect width="1080" height="260" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="0" y="16" width="1080" height="38" fill="#2D6BE4" rx="0"/>
    <text x="16" y="35" font-size="14" font-weight="bold" fill="#FFFFFF" dominant-baseline="middle">Node</text>
    <text x="727" y="35" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Description</text>

    <rect x="0" y="54" width="1080" height="46" fill="#F9F7F2"/>
    <text x="16" y="77" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Show Floating Interaction Page</text>
    <text x="380" y="77" font-size="13" fill="#4A4B65" dominant-baseline="middle">Opens the Floating Interaction Page with configured containers</text>

    <rect x="0" y="100" width="1080" height="46" fill="#FFFFFF"/>
    <text x="16" y="123" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Close Floating Interaction Page</text>
    <text x="380" y="123" font-size="13" fill="#4A4B65" dominant-baseline="middle">Closes the entire Floating Interaction Page and all containers</text>

    <rect x="0" y="146" width="1080" height="46" fill="#F9F7F2"/>
    <text x="16" y="169" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Update Floating Interaction Page List Data</text>
    <text x="380" y="169" font-size="13" fill="#4A4B65" dominant-baseline="middle">Updates list data for tabs and single-choice windows within containers</text>

    <rect x="0" y="192" width="1080" height="46" fill="#FFFFFF"/>
    <text x="16" y="215" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">When Floating Interaction Page is Triggered</text>
    <text x="380" y="215" font-size="13" fill="#4A4B65" dominant-baseline="middle">Server Node Graph Event triggered on tab selection or window open/close</text>
  </g>

  <text x="60" y="1498" font-size="12" fill="#8B8DA0">Related Documentation:</text>

  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhp5msi2uryk" target="_blank">
    <text x="60" y="1524" font-size="13" fill="#2D6BE4" text-decoration="underline">Floating Interaction Page Controls</text>
  </a>

  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhs6ivixi684" target="_blank">
    <text x="60" y="1550" font-size="13" fill="#2D6BE4" text-decoration="underline">UI Controls</text>
  </a>

  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhso1b9wjica" target="_blank">
    <text x="60" y="1576" font-size="13" fill="#2D6BE4" text-decoration="underline">Custom Variables</text>
  </a>

  <text x="600" y="1640" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>

</svg>