<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 920" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="920" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="48" y="32" width="1104" height="96" rx="14" fill="#fff" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="96" rx="2" fill="#2D6BE4"/>
  <text x="72" y="76" fill="#1A1B2E" font-size="30" font-weight="bold">Floating Interaction Page</text>
  <text x="72" y="106" fill="#4A4B65" font-size="16">Container</text>
  <rect x="200" y="92" width="90" height="22" rx="11" fill="#FFF3E0"/>
  <text x="210" y="107" fill="#E65100" font-size="11" font-weight="500">Sub-section</text>

  <!-- I. Container Overview -->
  <text x="48" y="166" fill="#2D6BE4" font-size="18" font-weight="700">I. Container Overview</text>

  <rect x="48" y="182" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="210" fill="#4A4B65" font-size="14">A container is used to organize the information structure of UI controls within a Floating Interaction Page.</text>
  <text x="72" y="232" fill="#4A4B65" font-size="14">Containers can be divided based on the interface's information structure, and each container can be treated as a separate page.</text>
  <text x="72" y="254" fill="#1A1B2E" font-size="14" font-weight="500">The Floating Interaction Page functions as a new "UI Layout" where you can add UI controls and modify their settings.</text>

  <!-- II. Container Configuration -->
  <text x="48" y="298" fill="#2D6BE4" font-size="18" font-weight="700">II. Container Configuration</text>

  <!-- Page Container -->
  <rect x="48" y="314" width="1104" height="120" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="344" r="14" fill="#2D6BE4"/>
  <text x="80" y="349" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">1</text>
  <text x="106" y="348" fill="#1A1B2E" font-size="14" font-weight="500">Page Container</text>

  <rect x="106" y="360" width="180" height="26" rx="6" fill="#E8EEFB"/>
  <text x="116" y="378" fill="#2D6BE4" font-size="12" font-weight="500">Initially Effective</text>
  <text x="300" y="378" fill="#4A4B65" font-size="13">Determines which containers are initially effective when the page opens.</text>

  <rect x="106" y="394" width="200" height="26" rx="6" fill="#E8EEFB"/>
  <text x="116" y="412" fill="#2D6BE4" font-size="12" font-weight="500">Window Container List</text>
  <text x="320" y="412" fill="#4A4B65" font-size="13">Displays all current containers in the Floating Interaction Page.</text>

  <!-- Preset Background -->
  <rect x="48" y="446" width="540" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="476" r="14" fill="#2D6BE4"/>
  <text x="80" y="481" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">2</text>
  <text x="106" y="480" fill="#1A1B2E" font-size="14" font-weight="500">Preset Background</text>
  <text x="72" y="504" fill="#4A4B65" font-size="13">Use Preset Background: When enabled,</text>
  <text x="72" y="520" fill="#4A4B65" font-size="13">choose a preset. Disabled = default background.</text>

  <!-- Preset Style -->
  <rect x="612" y="446" width="540" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="644" cy="476" r="14" fill="#2D6BE4"/>
  <text x="644" y="481" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">3</text>
  <text x="672" y="480" fill="#1A1B2E" font-size="14" font-weight="500">Preset Style</text>
  <text x="636" y="504" fill="#4A4B65" font-size="13">Select Preset Style: Select one of the</text>
  <text x="636" y="520" fill="#4A4B65" font-size="13">preset styles for the Floating Interaction Page.</text>

  <!-- Details Editing -->
  <rect x="48" y="538" width="1104" height="52" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="564" r="14" fill="#1B4FC0"/>
  <text x="80" y="569" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">4</text>
  <text x="106" y="560" fill="#1A1B2E" font-size="14" font-weight="500">Details Editing</text>
  <text x="106" y="578" fill="#4A4B65" font-size="13">Click [Details Editing] to enter the Floating Interaction Page editing interface.</text>

  <!-- III. Container within Editing Interface -->
  <text x="48" y="626" fill="#2D6BE4" font-size="18" font-weight="700">III. Container within the Editing Interface</text>

  <rect x="48" y="642" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="670" fill="#4A4B65" font-size="14">A Floating Interaction Page functions as a new "UI Layout." You can add UI controls to this page and modify their settings.</text>
  <text x="72" y="694" fill="#1A1B2E" font-size="14" font-weight="500">Some UI controls are exclusive to the Floating Interaction Page (e.g., Tabs, Single-Choice Windows, Close Button).</text>

  <!-- Tip -->
  <rect x="48" y="734" width="1104" height="60" rx="6" fill="#E8EEFB"/>
  <rect x="48" y="734" width="4" height="60" rx="2" fill="#2D6BE4"/>
  <text x="68" y="758" fill="#4A4B65" font-size="13">The Interaction Page Close Button is included by default in the Inherent Container. It cannot be removed from the Inherent Container.</text>
  <text x="68" y="778" fill="#4A4B65" font-size="13">If the Inherent Container is not enabled, the page can still be closed with Esc (PC) or exit button (controller). On mobile, close via Node Graphs.</text>

  <!-- IV. Node Graph Management -->
  <text x="48" y="830" fill="#2D6BE4" font-size="18" font-weight="700">IV. Node Graph Management</text>

  <rect x="48" y="846" width="264" height="40" rx="10" fill="#E8EEFB"/>
  <text x="68" y="871" fill="#2D6BE4" font-size="13" font-weight="500">Show Floating Interaction Page</text>

  <rect x="328" y="846" width="264" height="40" rx="10" fill="#FDE8E6"/>
  <text x="348" y="871" fill="#D93025" font-size="13" font-weight="500">Close Floating Interaction Page</text>

  <rect x="608" y="846" width="300" height="40" rx="10" fill="#FFF3E0"/>
  <text x="628" y="871" fill="#E65100" font-size="13" font-weight="500">Update Floating Interaction Page List</text>

  <rect x="924" y="846" width="228" height="40" rx="10" fill="#E5F2E9"/>
  <text x="944" y="871" fill="#34A853" font-size="13" font-weight="500">When Page Is Triggered</text>

  <!-- Related Documentation -->
  <text x="48" y="910" fill="#8B8DA0" font-size="12">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh2u2e9o3jn6" target="_blank">
    <text x="48" y="926" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: Floating Interaction Page Controls</text>
  </a>

  <text x="600" y="946" fill="#8B8DA0" font-size="11" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>