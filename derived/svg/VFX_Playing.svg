<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 900">
<defs>
  <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2D6BE4"/>
    <stop offset="100%" stop-color="#4A3F6B"/>
  </linearGradient>
  <filter id="card">
    <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
  </filter>
  <filter id="elevated">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
  </filter>
</defs>

<rect width="1200" height="900" fill="#F9F7F2"/>
<rect width="1200" height="6" fill="url(#topGrad)"/>

<!-- Title Card -->
<rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
<rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
<text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">VFX Playing</text>

<!-- I. Functions of VFX Playing Components -->
<text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">I. Functions of VFX Playing Components</text>

<rect x="48" y="162" width="1104" height="120" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="72" cy="188" r="12" fill="#2D6BE4"/>
<text x="72" y="193" fill="#fff" font-size="12" text-anchor="middle" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">1</text>
<text x="92" y="192" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Node Graph VFX Dependency</text>
<text x="92" y="212" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Effects played through the node graph must rely on the VFX Playing component.</text>
<text x="92" y="232" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Without this component, effects cannot be played through the node graph.</text>

<circle cx="72" cy="258" r="12" fill="#1B4FC0"/>
<text x="72" y="263" fill="#fff" font-size="12" text-anchor="middle" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">2</text>
<text x="92" y="262" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Default Looping Effects</text>
<text x="260" y="262" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Default looping effects can be mounted through components. These effects are</text>
<text x="92" y="278" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">created along with the entity. Multiple effects can be active simultaneously.</text>

<!-- II. Editing VFX Playing Components -->
<text x="48" y="318" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">II. Editing VFX Playing Components</text>

<rect x="48" y="332" width="1104" height="60" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="358" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Adding the Component</text>
<text x="72" y="378" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">VFX Playing is a default-mounted component for all units. If missing, add via "Add Common Components" button.</text>

<!-- III. VFX Configuration Parameters -->
<text x="48" y="428" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">III. VFX Configuration Parameters</text>
<text x="340" y="428" fill="#8B8DA0" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Add VFX Play on the Details tab, then configure each effect</text>

<rect x="48" y="442" width="1104" height="370" rx="14" fill="#fff" filter="url(#card)"/>

<!-- Table header -->
<rect x="48" y="442" width="1104" height="40" rx="14" fill="#2D6BE4"/>
<rect x="48" y="468" width="1104" height="14" fill="#2D6BE4"/>
<text x="72" y="468" fill="#fff" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Parameter</text>
<text x="320" y="468" fill="#fff" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Description</text>

<!-- Row 1 -->
<text x="72" y="504" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">VFX Player ID</text>
<text x="320" y="504" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">The sequence number of the VFX Player.</text>
<line x1="68" y1="514" x2="1132" y2="514" stroke="#E8E4DA" stroke-width="1"/>

<!-- Row 2 -->
<text x="72" y="534" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">VFX Player Name</text>
<text x="320" y="534" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">The name of the VFX Player, which cannot be duplicated on the same entity.</text>
<line x1="68" y1="544" x2="1132" y2="544" stroke="#E8E4DA" stroke-width="1"/>

<!-- Row 3 -->
<text x="72" y="564" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">VFX Asset Type</text>
<text x="320" y="564" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Choose between Looping Effects and Timed Effects. Determines which effect asset</text>
<text x="320" y="582" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">library to use.</text>
<line x1="68" y1="592" x2="1132" y2="592" stroke="#E8E4DA" stroke-width="1"/>

<!-- Row 4 -->
<text x="72" y="612" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Special Effects Asset</text>
<text x="320" y="612" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Select a Special Effects asset. After selecting, you can preview it in the scene.</text>
<line x1="68" y1="622" x2="1132" y2="622" stroke="#E8E4DA" stroke-width="1"/>

<!-- Row 5 -->
<text x="72" y="642" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Follow Location</text>
<text x="320" y="642" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Whether to move along with the component owner.</text>
<line x1="68" y1="652" x2="1132" y2="652" stroke="#E8E4DA" stroke-width="1"/>

<!-- Row 6 -->
<text x="72" y="672" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Follow Rotation</text>
<text x="320" y="672" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Whether to rotate with the component owner. Only takes effect when Follow Location is Yes.</text>
<line x1="68" y1="682" x2="1132" y2="682" stroke="#E8E4DA" stroke-width="1"/>

<!-- Row 7 -->
<text x="72" y="702" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Attachment Point</text>
<text x="320" y="702" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">The attachment point where the effect plays. Select built-in or additional attachment points.</text>
<line x1="68" y1="712" x2="1132" y2="712" stroke="#E8E4DA" stroke-width="1"/>

<!-- Row 8 -->
<text x="72" y="732" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Zoom Factor</text>
<text x="320" y="732" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Zoom multiplier of the effect.</text>
<line x1="68" y1="742" x2="1132" y2="742" stroke="#E8E4DA" stroke-width="1"/>

<!-- Row 9 -->
<text x="72" y="762" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Offset / Rotation</text>
<text x="320" y="762" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Offset and rotation of the VFX playing position relative to the attachment point.</text>
<line x1="68" y1="772" x2="1132" y2="772" stroke="#E8E4DA" stroke-width="1"/>

<!-- Row 10 -->
<text x="72" y="792" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Local Filter</text>
<text x="320" y="792" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Local filter node graph determines whether a specified effect should play. Continuously</text>
<text x="320" y="808" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">performs checks while the entity with the effect is present in the scene.</text>

<!-- Related Documentation -->
<text x="48" y="840" fill="#8B8DA0" font-size="12" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Related Documentation:</text>
<a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh4ppo02m1o8" target="_blank">
  <text x="48" y="858" fill="#2D6BE4" font-size="12" text-decoration="underline" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Miliastra Academy Documentation: VFX Playing</text>
</a>

<!-- Footer -->
<text x="600" y="878" fill="#8B8DA0" font-size="11" text-anchor="middle" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>

</svg>
