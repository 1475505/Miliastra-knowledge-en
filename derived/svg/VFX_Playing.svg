<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1400" width="1200" height="1400">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1400" fill="#F9F7F2"/>

  <!-- Top Bar -->
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="60" y="20" width="1080" height="100" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="20" width="4" height="100" fill="#2D6BE4" rx="2"/>
  <text x="90" y="60" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="26" font-weight="bold" fill="#1A1B2E">VFX Playing</text>
  <text x="90" y="92" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Component for attaching and playing visual effects on entities. Supports node-graph-driven effects and default looping effects mounted at entity creation.</text>

  <!-- Section I -->
  <text x="60" y="145" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">I. Overview</text>

  <rect x="60" y="165" width="1080" height="140" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="85" y="192" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">VFX Playing Component Functions</text>
  <text x="85" y="218" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="85" dy="0">The VFX Playing component provides two core functions:</tspan>
    <tspan x="85" dy="24">1. Effects played through the <tspan fill="#1A1B2E" font-weight="bold">node graph</tspan> require this component - without it, node graph VFX cannot play.</tspan>
    <tspan x="85" dy="22">2. Default <tspan fill="#1A1B2E" font-weight="bold">looping effects</tspan> can be mounted via the component and are created along with the entity.</tspan>
    <tspan x="85" dy="22">Multiple effects can be active simultaneously on the VFX Playing Component.</tspan>
  </text>

  <!-- Section II -->
  <text x="60" y="335" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">II. Adding &amp; Configuring VFX</text>

  <rect x="60" y="355" width="1080" height="100" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="85" y="382" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Adding the Component</text>
  <text x="85" y="408" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="85" dy="0">The VFX Playing component is a default mounted component for all units. It can be found in the Components tab of any entity or prefab.</tspan>
    <tspan x="85" dy="20">If missing, add it via Add Common Components. In the Details tab, press [Add Special Effects] to create a new effect configuration.</tspan>
  </text>

  <!-- Section III -->
  <text x="60" y="485" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">III. VFX Parameters</text>

  <rect x="60" y="505" width="1080" height="350" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="85" y="532" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Parameter Reference</text>

  <!-- Parameter rows -->
  <text x="85" y="560" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#1A1B2E">VFX Player ID</text>
  <text x="350" y="560" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">Sequence number of the VFX Player on this entity.</text>
  <line x1="85" y1="570" x2="1115" y2="570" stroke="#E8EEFB" stroke-width="1"/>

  <text x="85" y="590" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#1A1B2E">VFX Player Name</text>
  <text x="350" y="590" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">Name of the VFX Player. Must be unique on the same entity.</text>
  <line x1="85" y1="600" x2="1115" y2="600" stroke="#E8EEFB" stroke-width="1"/>

  <text x="85" y="620" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#1A1B2E">VFX Asset Type</text>
  <text x="350" y="620" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">Choose between Looping Effects or Timed Effects. Determines asset library.</text>
  <line x1="85" y1="630" x2="1115" y2="630" stroke="#E8EEFB" stroke-width="1"/>

  <text x="85" y="650" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#1A1B2E">Special Effects Asset</text>
  <text x="350" y="650" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">Select the visual effect asset. Preview available in the scene editor.</text>
  <line x1="85" y1="660" x2="1115" y2="660" stroke="#E8EEFB" stroke-width="1"/>

  <text x="85" y="680" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#1A1B2E">Follow Location</text>
  <text x="350" y="680" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">Whether the effect moves along with the component owner.</text>
  <line x1="85" y1="690" x2="1115" y2="690" stroke="#E8EEFB" stroke-width="1"/>

  <text x="85" y="710" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#1A1B2E">Follow Rotation</text>
  <text x="350" y="710" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">Whether the effect rotates with the owner. Only valid when Follow Location is Yes.</text>
  <line x1="85" y1="720" x2="1115" y2="720" stroke="#E8EEFB" stroke-width="1"/>

  <text x="85" y="740" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#1A1B2E">Attachment Point</text>
  <text x="350" y="740" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">The point where the effect plays. Built-in or custom attachment points.</text>
  <line x1="85" y1="750" x2="1115" y2="750" stroke="#E8EEFB" stroke-width="1"/>

  <text x="85" y="770" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#1A1B2E">Zoom Factor</text>
  <text x="350" y="770" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">Scale multiplier for the effect.</text>
  <line x1="85" y1="780" x2="1115" y2="780" stroke="#E8EEFB" stroke-width="1"/>

  <text x="85" y="800" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#1A1B2E">Offset</text>
  <text x="350" y="800" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">Position offset of the VFX relative to the attachment point.</text>
  <line x1="85" y1="810" x2="1115" y2="810" stroke="#E8EEFB" stroke-width="1"/>

  <text x="85" y="830" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#1A1B2E">Rotation</text>
  <text x="350" y="830" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">Rotation offset of the VFX relative to the attachment point.</text>
  <line x1="85" y1="840" x2="1115" y2="840" stroke="#E8EEFB" stroke-width="1"/>

  <text x="85" y="860" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#1A1B2E">Local Filter</text>
  <text x="350" y="860" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">Node graph filter that determines whether an effect plays. Continuously checked while the entity exists.</text>

  <!-- Section IV -->
  <text x="60" y="885" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">IV. Node Graph Integration</text>

  <rect x="60" y="905" width="1080" height="170" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="85" y="932" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Relevant Nodes</text>
  <text x="85" y="958" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="85" dy="0"><tspan fill="#1A1B2E" font-weight="bold">Play VFX:</tspan> Triggers a VFX effect by ID on the entity with the VFX Playing component.</tspan>
    <tspan x="85" dy="22"><tspan fill="#1A1B2E" font-weight="bold">Stop VFX:</tspan> Stops a currently playing VFX effect by ID.</tspan>
    <tspan x="85" dy="22"><tspan fill="#1A1B2E" font-weight="bold">Play VFX at Location:</tspan> Plays a VFX at a specific world position without requiring the component.</tspan>
  </text>

  <!-- Tip Box -->
  <rect x="60" y="1095" width="1080" height="80" rx="8" fill="#E8EEFB"/>
  <rect x="60" y="1095" width="4" height="80" fill="#2D6BE4" rx="2"/>
  <text x="85" y="1118" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" font-weight="bold" fill="#1A1B2E">Local Filter Nodes</text>
  <text x="85" y="1140" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="85" dy="0"><tspan fill="#1A1B2E" font-weight="bold">Get Self Entity:</tspan> Entity with the effect group component.  <tspan fill="#1A1B2E" font-weight="bold">Get Target Entity:</tspan> No output parameter.  <tspan fill="#1A1B2E" font-weight="bold">Get Current Character:</tspan> The local character.</tspan>
  </text>

  <!-- Footer -->
  <text x="600" y="1220" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>

  <!-- Source Links -->
  <text x="60" y="1260" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#1A1B2E">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh0ix895rnhe" target="_blank">
    <text x="60" y="1282" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#2D6BE4" text-decoration="underline">VFX Playing - Tutorial Detail</text>
  </a>
</svg>
