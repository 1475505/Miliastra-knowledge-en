<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1850" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="1850" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">68-Floating Interaction Page Single-Choice Window</text>

  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. Single-Choice Window Overview</text>

  <g transform="translate(60, 164)">
    <rect width="1080" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="16" y="40" font-size="14" fill="#4A4B65">The Single-Choice Window allows players to select one option from a list within a Floating</text>
    <text x="16" y="64" font-size="14" fill="#4A4B65">Interaction Page. It supports preconfigured list items and can be dynamically updated</text>
    <text x="16" y="88" font-size="14" fill="#4A4B65">through Node Graphs during stage runtime for flexible content display.</text>
  </g>

  <circle cx="80" cy="320" r="16" fill="#2D6BE4"/>
  <text x="80" y="321" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="321" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. Styles</text>

  <g transform="translate(60, 348)">
    <rect width="1080" height="150" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="16" y="36" font-size="14" font-weight="bold" fill="#1A1B2E">Single-choice windows support only Custom Style</text>
    <text x="16" y="64" font-size="14" fill="#4A4B65">Styles can be added to preconfigure multiple list item styles. Each style supports freely</text>
    <text x="16" y="88" font-size="14" fill="#4A4B65">configuring the assets for the Default, Hover, Pressed, and Selected states, allowing</text>
    <text x="16" y="112" font-size="14" fill="#4A4B65">full visual customization of each list item appearance.</text>

    <rect x="16" y="130" width="1048" height="12" rx="4" fill="#E8EEFB"/>
  </g>

  <circle cx="80" cy="534" r="16" fill="#2D6BE4"/>
  <text x="80" y="535" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="535" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. List Settings</text>

  <g transform="translate(60, 562)">
    <rect width="1080" height="200" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="0" y="16" width="1080" height="38" fill="#2D6BE4" rx="0"/>
    <text x="16" y="35" font-size="14" font-weight="bold" fill="#FFFFFF" dominant-baseline="middle">Parameter</text>
    <text x="727" y="35" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Description</text>

    <rect x="0" y="54" width="1080" height="24" fill="#F9F7F2"/>
    <text x="16" y="71" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Scroll Direction</text>
    <text x="380" y="71" font-size="13" fill="#4A4B65" dominant-baseline="middle">Horizontal or Vertical</text>

    <rect x="0" y="78" width="1080" height="24" fill="#FFFFFF"/>
    <text x="16" y="95" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">List Item Size</text>
    <text x="380" y="95" font-size="13" fill="#4A4B65" dominant-baseline="middle">General size settings for each list item</text>

    <rect x="0" y="102" width="1080" height="24" fill="#F9F7F2"/>
    <text x="16" y="119" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">List Item Spacing</text>
    <text x="380" y="119" font-size="13" fill="#4A4B65" dominant-baseline="middle">Spacing between list items</text>

    <rect x="0" y="126" width="1080" height="24" fill="#FFFFFF"/>
    <text x="16" y="143" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Padding</text>
    <text x="380" y="143" font-size="13" fill="#4A4B65" dominant-baseline="middle">Margin settings for top, bottom, left, right</text>

    <rect x="0" y="150" width="1080" height="24" fill="#F9F7F2"/>
    <text x="16" y="167" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Center Align</text>
    <text x="380" y="167" font-size="13" fill="#4A4B65" dominant-baseline="middle">Auto-centers list items when content is sparse</text>

    <rect x="0" y="174" width="1080" height="24" fill="#FFFFFF"/>
    <text x="16" y="191" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Layout Constraint</text>
    <text x="380" y="191" font-size="13" fill="#4A4B65" dominant-baseline="middle">Auto Wrap or Fixed Rows</text>
  </g>

  <circle cx="80" cy="798" r="16" fill="#2D6BE4"/>
  <text x="80" y="799" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IV</text>
  <text x="108" y="799" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">IV. List Item Configuration</text>

  <g transform="translate(60, 826)">
    <rect width="520" height="330" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="110" height="26" rx="13" fill="#E8EEFB"/>
    <text x="71" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Adding Items</text>
    <text x="16" y="60" font-size="14" fill="#4A4B65">In the Edit Details interface, click the</text>
    <text x="16" y="80" font-size="14" fill="#4A4B65">plus sign (+) to add a new List Item.</text>
    <text x="16" y="104" font-size="14" fill="#4A4B65">Supports preconfiguring list items, statically</text>
    <text x="16" y="124" font-size="14" fill="#4A4B65">linking associated list items, and adjusting</text>
    <text x="16" y="144" font-size="14" fill="#4A4B65">displayed content through Node Graphs</text>
    <text x="16" y="164" font-size="14" fill="#4A4B65">during stage runtime.</text>

    <rect x="16" y="184" width="488" height="60" rx="10" fill="#E8EEFB"/>
    <rect x="16" y="184" width="4" height="60" rx="2" fill="#2D6BE4"/>
    <text x="30" y="204" font-size="13" font-weight="bold" fill="#2D6BE4">Configuration Params</text>
    <text x="30" y="226" font-size="11" fill="#4A4B65">List Item Name: Name of the list item</text>
    <text x="30" y="242" font-size="11" fill="#4A4B65">ID: Unique identifier for the list item</text>

    <rect x="16" y="260" width="488" height="50" rx="10" fill="#E8EEFB"/>
    <rect x="16" y="260" width="4" height="50" rx="2" fill="#2D6BE4"/>
    <text x="30" y="280" font-size="13" font-weight="bold" fill="#2D6BE4">Click Feedback</text>
    <text x="30" y="300" font-size="11" fill="#4A4B65">List items support opening tabs and toggling control visibility</text>
  </g>

  <g transform="translate(620, 826)">
    <rect width="520" height="330" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="120" height="26" rx="13" fill="#E8EEFB"/>
    <text x="76" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Basic Settings</text>

    <rect x="0" y="52" width="520" height="26" fill="#F9F7F2"/>
    <text x="16" y="69" font-size="12" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">List Item Name</text>
    <text x="170" y="69" font-size="12" fill="#4A4B65" dominant-baseline="middle">Name displayed for the list item</text>

    <rect x="0" y="78" width="520" height="26" fill="#FFFFFF"/>
    <text x="16" y="95" font-size="12" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">List Item Style</text>
    <text x="170" y="95" font-size="12" fill="#4A4B65" dominant-baseline="middle">Select a style from List Style settings</text>

    <rect x="0" y="104" width="520" height="26" fill="#F9F7F2"/>
    <text x="16" y="121" font-size="12" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Preview Selection State</text>
    <text x="200" y="121" font-size="12" fill="#4A4B65" dominant-baseline="middle">Show default display in editor</text>

    <rect x="0" y="130" width="520" height="38" fill="#FFFFFF"/>
    <text x="16" y="147" font-size="12" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Return to Server Event</text>
    <text x="200" y="147" font-size="12" fill="#4A4B65" dominant-baseline="middle">Triggers [When Floating Interaction</text>
    <text x="200" y="163" font-size="12" fill="#4A4B65">Page is Triggered] event on click</text>

    <text x="16" y="198" font-size="14" font-weight="bold" fill="#1A1B2E">Formal Variable Configuration</text>
    <text x="16" y="222" font-size="14" fill="#4A4B65">Link formal variables to specified data</text>
    <text x="16" y="242" font-size="14" fill="#4A4B65">or Player Custom Variables. Assets</text>
    <text x="16" y="262" font-size="14" fill="#4A4B65">reference real-time variable data.</text>

    <text x="16" y="296" font-size="14" font-weight="bold" fill="#1A1B2E">Container &amp; Control Status</text>
    <text x="16" y="320" font-size="14" fill="#4A4B65">Show or hide containers and controls</text>
    <text x="16" y="340" font-size="14" fill="#4A4B65">when this list item is selected.</text>
  </g>

  <circle cx="80" cy="1192" r="16" fill="#2D6BE4"/>
  <text x="80" y="1193" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">V</text>
  <text x="108" y="1193" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">V. Interaction &amp; Controller Navigation</text>

  <g transform="translate(60, 1220)">
    <rect width="520" height="240" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="100" height="26" rx="13" fill="#E8EEFB"/>
    <text x="66" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Interaction</text>
    <text x="16" y="60" font-size="14" font-weight="bold" fill="#1A1B2E">Sound Effect</text>
    <text x="16" y="84" font-size="14" fill="#4A4B65">Interacting with the single-choice</text>
    <text x="16" y="104" font-size="14" fill="#4A4B65">window triggers the configured</text>
    <text x="16" y="124" font-size="14" fill="#4A4B65">sound effect.</text>
    <text x="16" y="152" font-size="14" fill="#4A4B65">List items support click feedback</text>
    <text x="16" y="172" font-size="14" fill="#4A4B65">configuration, including opening tabs</text>
    <text x="16" y="192" font-size="14" fill="#4A4B65">and toggling control visibility.</text>

    <rect x="16" y="210" width="488" height="18" rx="6" fill="#E8EEFB"/>
    <rect x="16" y="210" width="4" height="18" rx="2" fill="#2D6BE4"/>
    <text x="28" y="224" font-size="11" fill="#4A4B65">Single-choice windows and tabs are collectively referred to as [List]</text>
  </g>

  <g transform="translate(620, 1220)">
    <rect width="520" height="240" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="130" height="26" rx="13" fill="#E8EEFB"/>
    <text x="81" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Controller Nav</text>

    <rect x="0" y="52" width="520" height="24" fill="#F9F7F2"/>
    <text x="16" y="69" font-size="12" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Selectable via Controller Joystick Nav</text>
    <text x="310" y="69" font-size="12" fill="#4A4B65" dominant-baseline="middle">Enable navigation hint display</text>

    <rect x="0" y="76" width="520" height="38" fill="#FFFFFF"/>
    <text x="16" y="93" font-size="12" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Controller Selection Behavior</text>
    <text x="310" y="93" font-size="12" fill="#4A4B65" dominant-baseline="middle">On focus change</text>
    <text x="310" y="109" font-size="12" fill="#4A4B65" dominant-baseline="middle">After pressing Confirm</text>

    <rect x="0" y="114" width="520" height="24" fill="#F9F7F2"/>
    <text x="16" y="131" font-size="12" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Navigation Hint Style</text>
    <text x="310" y="131" font-size="12" fill="#4A4B65" dominant-baseline="middle">Preset hint styles</text>

    <rect x="0" y="138" width="520" height="24" fill="#FFFFFF"/>
    <text x="16" y="155" font-size="12" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Navigation Hint Target</text>
    <text x="310" y="155" font-size="12" fill="#4A4B65" dominant-baseline="middle">Up, Down, Left, Right</text>

    <rect x="0" y="162" width="520" height="24" fill="#F9F7F2"/>
    <text x="16" y="179" font-size="12" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Navigation Hint Offset</text>
    <text x="310" y="179" font-size="12" fill="#4A4B65" dominant-baseline="middle">X/Y offset values</text>

    <rect x="0" y="186" width="520" height="46" fill="#FFFFFF"/>
    <text x="16" y="204" font-size="12" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Directional Snapping</text>
    <text x="310" y="204" font-size="12" fill="#4A4B65" dominant-baseline="middle">Prioritize snapping to configured</text>
    <text x="310" y="224" font-size="12" fill="#4A4B65" dominant-baseline="middle">target; defaults to nearest control</text>
  </g>

