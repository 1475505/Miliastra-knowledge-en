<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 2260">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <style>
    text { font-family: 'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif; }
  </style>

  <rect width="1200" height="2260" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold">Environment Configuration</text>

  <!-- I. Definition -->
  <text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Definition</text>

  <rect x="48" y="164" width="1104" height="60" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="192" fill="#4A4B65" font-size="14">Environment Configuration includes environment-related parameters that enrich how Scene elements are presented.</text>
  <text x="72" y="214" fill="#4A4B65" font-size="14">Configurations must be predefined and applied to each player's client.</text>

  <rect x="48" y="236" width="1104" height="40" rx="10" fill="#E8EEFB"/>
  <rect x="48" y="236" width="4" height="40" rx="2" fill="#2D6BE4"/>
  <text x="72" y="261" fill="#4A4B65" font-size="13">Entry: Terrain Editing tab &gt; Environment Configuration on the left &gt; New Environment &gt; Confirm Create.</text>

  <!-- II. Environment Configuration Parameters -->
  <text x="48" y="312" fill="#2D6BE4" font-size="18" font-weight="700">II. Environment Configuration Parameters</text>

  <!-- Effective Target -->
  <rect x="48" y="328" width="540" height="60" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="356" fill="#1A1B2E" font-size="16" font-weight="500">Effective Target</text>
  <text x="72" y="378" fill="#4A4B65" font-size="14">Select which players this configuration applies to.</text>

  <!-- Background Preset -->
  <rect x="612" y="328" width="540" height="60" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="636" y="356" fill="#1A1B2E" font-size="16" font-weight="500">Background Preset</text>
  <text x="636" y="378" fill="#4A4B65" font-size="14">Select preset for general visual style of the scene.</text>

  <!-- Time Controls -->
  <rect x="48" y="400" width="1104" height="140" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="428" fill="#1A1B2E" font-size="16" font-weight="500">Time Controls</text>
  <text x="72" y="454" fill="#1A1B2E" font-size="14" font-weight="500">Auto switch with time:</text>
  <text x="72" y="476" fill="#4A4B65" font-size="14">On = background elements transition dynamically. Off = elements remain static at fixed values.</text>
  <text x="72" y="502" fill="#1A1B2E" font-size="14" font-weight="500">Set Time Point:</text>
  <text x="72" y="524" fill="#4A4B65" font-size="14">Defines specific timepoint for current background settings. Different settings at different timepoints enable dynamic transitions.</text>

  <!-- Preview Controls -->
  <rect x="48" y="552" width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="580" fill="#1A1B2E" font-size="16" font-weight="500">Preview Controls</text>
  <text x="72" y="606" fill="#1A1B2E" font-size="14" font-weight="500">Dynamic Preview:</text>
  <text x="72" y="628" fill="#4A4B65" font-size="14">Toggle to observe environment transitions when "Auto switch" is enabled.</text>
  <text x="72" y="644" fill="#1A1B2E" font-size="14" font-weight="500">Time Elapsed Per Second (min):</text>
  <text x="72" y="644" fill="#4A4B65" font-size="14" dx="260">In-game time per real second. 24 = Teyvat time. Range [0, 60].</text>

  <!-- III. Background Settings -->
  <text x="48" y="692" fill="#2D6BE4" font-size="18" font-weight="700">III. Background Settings</text>

  <rect x="48" y="708" width="1104" height="260" rx="14" fill="#fff" filter="url(#card)"/>

  <text x="72" y="736" fill="#1A1B2E" font-size="14" font-weight="500">Background Rotation</text>
  <text x="350" y="736" fill="#4A4B65" font-size="14">Adjusts the rotation of the background</text>

  <text x="72" y="762" fill="#1A1B2E" font-size="14" font-weight="500">Direct Angle</text>
  <text x="350" y="762" fill="#4A4B65" font-size="14">Incident angle of the primary ambient light source</text>

  <text x="72" y="788" fill="#1A1B2E" font-size="14" font-weight="500">Intensity</text>
  <text x="350" y="788" fill="#4A4B65" font-size="14">Brightness of primary ambient light. Higher = brighter</text>

  <text x="72" y="814" fill="#1A1B2E" font-size="14" font-weight="500">Blur</text>
  <text x="350" y="814" fill="#4A4B65" font-size="14">Diffusion of primary ambient light. Higher = more blurred</text>

  <text x="72" y="840" fill="#1A1B2E" font-size="14" font-weight="500">Light Color</text>
  <text x="350" y="840" fill="#4A4B65" font-size="14">Color of the light received by the environment</text>

  <text x="72" y="866" fill="#1A1B2E" font-size="14" font-weight="500">Filter Style</text>
  <text x="350" y="866" fill="#4A4B65" font-size="14">Adds a filter effect at the camera layer</text>

  <text x="72" y="892" fill="#1A1B2E" font-size="14" font-weight="500">Halo Color / Intensity</text>
  <text x="350" y="892" fill="#4A4B65" font-size="14">Sets halo color and intensity. Higher intensity = more visible halo</text>

  <text x="72" y="918" fill="#1A1B2E" font-size="14" font-weight="500">Horizon Intensity</text>
  <text x="350" y="918" fill="#4A4B65" font-size="14">Adjusts horizon visibility. Higher = more defined silhouette</text>

  <text x="72" y="944" fill="#1A1B2E" font-size="14" font-weight="500">Sky Background Color</text>
  <text x="350" y="944" fill="#4A4B65" font-size="14">Adjusts upper / lower sunny side sky colors</text>

  <text x="72" y="960" fill="#1A1B2E" font-size="14" font-weight="500">Environment Color</text>
  <text x="350" y="960" fill="#4A4B65" font-size="14">Adjusts top / side / ground surface colors. Color selector with transparency.</text>

  <!-- IV. Environmental Elements -->
  <text x="48" y="1008" fill="#2D6BE4" font-size="18" font-weight="700">IV. Environmental Elements</text>

  <rect x="48" y="1024" width="1104" height="200" rx="14" fill="#fff" filter="url(#card)"/>

  <text x="72" y="1052" fill="#1A1B2E" font-size="14" font-weight="500">Sun</text>
  <text x="200" y="1052" fill="#4A4B65" font-size="14">Enabled by default. Parameters: color, brightness, angle, orbit tile angle, size</text>

  <text x="72" y="1078" fill="#1A1B2E" font-size="14" font-weight="500">Moon</text>
  <text x="200" y="1078" fill="#4A4B65" font-size="14">Enabled by default. Parameters: color, brightness, angle, orbit tile angle, size, fullness</text>

  <text x="72" y="1104" fill="#1A1B2E" font-size="14" font-weight="500">Stars</text>
  <text x="200" y="1104" fill="#4A4B65" font-size="14">When enabled: adjust density and intensity</text>

  <text x="72" y="1130" fill="#1A1B2E" font-size="14" font-weight="500">Galaxy</text>
  <text x="200" y="1130" fill="#4A4B65" font-size="14">When enabled: adjust intensity and light color</text>

  <text x="72" y="1156" fill="#1A1B2E" font-size="14" font-weight="500">Clouds</text>
  <text x="200" y="1156" fill="#4A4B65" font-size="14">When enabled: set type (high / mid / low / faint clouds), intensity, and light color</text>

  <text x="72" y="1186" fill="#1A1B2E" font-size="14" font-weight="500">Weather Configuration:</text>
  <text x="72" y="1210" fill="#4A4B65" font-size="14">Select a pre-configured weather configuration to associate with the current timepoint.</text>

  <!-- V. Light Source List -->
  <text x="48" y="1260" fill="#2D6BE4" font-size="18" font-weight="700">V. Light Source Configuration</text>

  <rect x="48" y="1276" width="1104" height="260" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1304" fill="#4A4B65" font-size="14">Light sources bound to this Environment Configuration are activated together with the Configuration.</text>

  <text x="72" y="1334" fill="#1A1B2E" font-size="14" font-weight="500">Entry Points:</text>
  <text x="72" y="1356" fill="#4A4B65" font-size="14">- "Add Light Source" &gt; "Open Light Source Manager"</text>
  <text x="72" y="1378" fill="#4A4B65" font-size="14">- System menu (top left) &gt; Manage Light Source</text>

  <text x="72" y="1408" fill="#1A1B2E" font-size="14" font-weight="500">Light Source Parameters:</text>

  <text x="72" y="1434" fill="#1A1B2E" font-size="14" font-weight="500">Source File</text>
  <text x="280" y="1434" fill="#4A4B65" font-size="14">Which Environment Configurations reference this light source</text>

  <text x="72" y="1458" fill="#1A1B2E" font-size="14" font-weight="500">Location, Rotation</text>
  <text x="280" y="1458" fill="#4A4B65" font-size="14">Position and rotation in the Scene</text>

  <text x="72" y="1482" fill="#1A1B2E" font-size="14" font-weight="500">Light Source Type</text>
  <text x="280" y="1482" fill="#4A4B65" font-size="14">Point Light or Spotlight</text>

  <text x="72" y="1506" fill="#1A1B2E" font-size="14" font-weight="500">Color</text>
  <text x="280" y="1506" fill="#4A4B65" font-size="14">Color shown on illuminated models</text>

  <text x="72" y="1530" fill="#1A1B2E" font-size="14" font-weight="500">Radius / Intensity</text>
  <text x="280" y="1530" fill="#4A4B65" font-size="14">Illumination radius and brightness change on illuminated model</text>

  <!-- VI. Weather -->
  <text x="48" y="1576" fill="#2D6BE4" font-size="18" font-weight="700">VI. Weather Configuration</text>

  <rect x="48" y="1592" width="1104" height="180" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1620" fill="#4A4B65" font-size="14">Multiple Weather configurations can be set within a single Environment Configuration.</text>

  <text x="72" y="1650" fill="#1A1B2E" font-size="14" font-weight="500">Initially Effective:</text>
  <text x="280" y="1650" fill="#4A4B65" font-size="14">Whether this configuration is active upon startup</text>

  <text x="72" y="1676" fill="#1A1B2E" font-size="14" font-weight="500">Weather Type:</text>
  <text x="280" y="1676" fill="#4A4B65" font-size="14">Currently only supports fog</text>

  <text x="72" y="1702" fill="#1A1B2E" font-size="14" font-weight="500">Auto Switch with Time:</text>
  <text x="280" y="1702" fill="#4A4B65" font-size="14">On = weather changes over time. Off = locked to fixed values</text>

  <text x="72" y="1728" fill="#1A1B2E" font-size="14" font-weight="500">Distance Fog Settings:</text>
  <text x="280" y="1728" fill="#4A4B65" font-size="14">Based on Camera Location, fog occludes distant models and skybox</text>

  <text x="72" y="1754" fill="#1A1B2E" font-size="14" font-weight="500">High Fog Settings:</text>
  <text x="280" y="1754" fill="#4A4B65" font-size="14">Based on Scene height, fog occludes distant models and skybox</text>

  <!-- VII. Environment Time -->
  <text x="48" y="1812" fill="#2D6BE4" font-size="18" font-weight="700">VII. Environment Time</text>

  <rect x="48" y="1828" width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1856" fill="#4A4B65" font-size="14">Stage settings define initial timepoint and time passage speed, both adjustable via nodes.</text>
  <text x="72" y="1880" fill="#4A4B65" font-size="14">Environment time is globally unique; server continuously advances clock regardless of player configs.</text>
  <text x="72" y="1904" fill="#4A4B65" font-size="14">Visual transitions only visible when "Auto Switch with Time" is enabled.</text>

  <rect x="48" y="1940" width="1104" height="44" rx="10" fill="#FFF3E0"/>
  <rect x="48" y="1940" width="4" height="44" rx="2" fill="#D93025"/>
  <text x="72" y="1966" fill="#4A4B65" font-size="13">Time passage in stage settings = actual gameplay speed. Time passage in environment config = editor preview only.</text>

  <!-- VIII. Node Graph Control -->
  <text x="48" y="2020" fill="#2D6BE4" font-size="18" font-weight="700">VIII. Manage via Node Graphs</text>

  <rect x="48" y="2036" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="2064" fill="#4A4B65" font-size="14">Use "Modify Environment Configuration" node to switch environments dynamically during runtime.</text>
  <text x="72" y="2088" fill="#4A4B65" font-size="14">Use "Get List of Player Entities on the Field" to obtain all present players as targets.</text>
  <text x="72" y="2108" fill="#4A4B65" font-size="14">Environment configuration indices found in the Environment Configuration details page.</text>

  <!-- Source Links -->
  <text x="48" y="2152" fill="#8B8DA0" font-size="12">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhdznsie9up8" target="_blank">
    <text x="48" y="2170" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: Environment Configuration (Guide)</text>
  </a>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/course/detail/mhw64cr51fue" target="_blank">
    <text x="48" y="2188" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: 2.10 Environment Configuration: Sky Backgrounds, Filters, and Light Sources (Tutorial)</text>
  </a>

  <!-- Footer -->
  <text x="600" y="2240" fill="#8B8DA0" font-size="11" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>