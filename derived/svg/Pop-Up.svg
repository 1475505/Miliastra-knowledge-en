<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 820" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1200" height="820" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="72" fill="#1A1B2E" font-size="34" font-weight="bold" dominant-baseline="middle">Pop-Up</text>
  <text x="230" y="72" fill="#4A4B65" font-size="16" dominant-baseline="middle">Runtime Information, Hints, Options &amp; Interaction Interface</text>

  <!-- I. Functions -->
  <text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Pop-Up Functions</text>

  <g transform="translate(48, 168)">
    <rect width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>
    <text x="24" y="30" font-size="14" font-weight="500" fill="#1A1B2E">Purpose</text>
    <text x="24" y="54" font-size="13" fill="#4A4B65">An interface that appears while running a stage due to logic triggers.</text>
    <text x="24" y="74" font-size="13" fill="#4A4B65">Used to provide information, hints, options, or interactions for players.</text>
  </g>

  <!-- II. Editing -->
  <text x="48" y="308" fill="#2D6BE4" font-size="18" font-weight="700">II. Editing Pop-Up Window</text>

  <g transform="translate(48, 328)">
    <rect width="1104" height="260" rx="14" fill="#fff" filter="url(#card)"/>

    <text x="24" y="30" font-size="14" font-weight="500" fill="#1A1B2E">Title</text>
    <text x="24" y="54" font-size="13" fill="#4A4B65">Text shown in the title area of the pop-up window.</text>

    <line x1="24" y1="70" x2="1080" y2="70" stroke="#E8E4DA"/>

    <text x="24" y="94" font-size="14" font-weight="500" fill="#1A1B2E">Text Content</text>
    <text x="24" y="118" font-size="13" fill="#4A4B65">Text in the content area is the same as the content in the text box.</text>
    <text x="24" y="138" font-size="13" fill="#4A4B65">Supports the insertion of custom variables for players and stages.</text>

    <line x1="24" y1="158" x2="1080" y2="158" stroke="#E8E4DA"/>

    <text x="24" y="182" font-size="14" font-weight="500" fill="#1A1B2E">Real-Time Variable Updates</text>
    <text x="24" y="206" font-size="13" fill="#4A4B65">During stage runtime, the displayed text updates in real time as custom variables change.</text>

    <rect x="16" y="224" width="1072" height="24" rx="8" fill="#E8EEFB"/>
    <rect x="16" y="224" width="4" height="24" rx="2" fill="#2D6BE4"/>
    <text x="32" y="240" font-size="12" fill="#4A4B65">Pop-ups are triggered by Node Graph logic and can be combined with Text Box and Progress Bar controls.</text>
  </g>

  <!-- Tip -->
  <g transform="translate(48, 608)">
    <rect width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
    <rect x="16" y="10" width="1072" height="60" rx="8" fill="#E8EEFB"/>
    <rect x="16" y="10" width="4" height="60" rx="2" fill="#2D6BE4"/>
    <text x="32" y="34" font-size="13" font-weight="500" fill="#1A1B2E">Related Controls</text>
    <text x="32" y="56" font-size="12" fill="#4A4B65">Pop-ups can incorporate Text Box UI Controls for rich text display and Progress Bar UI Controls for visual progress tracking.</text>
  </g>

  <text x="48" y="728" fill="#8B8DA0" font-size="12">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhen7r0djxkg" target="_blank">
    <text x="48" y="750" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Pop-Up UI Controls</text>
  </a>

  <text x="600" y="810" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>