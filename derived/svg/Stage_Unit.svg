<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1450" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="1450" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="72" font-size="34" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Stage Unit</text>
  <text x="280" y="72" font-size="16" fill="#4A4B65" dominant-baseline="middle">Special entity for stage-level logic</text>

  <!-- I. Creating a Stage Entity -->
  <text x="48" y="148" font-size="18" font-weight="700" fill="#2D6BE4">I. Creating a Stage Entity</text>

  <g transform="translate(48, 168)">
    <rect width="1104" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="24" y="30" font-size="14" fill="#4A4B65">Stages are special entities recommended for handling stage-specific logic.</text>
    <text x="24" y="54" font-size="14" fill="#4A4B65">When a new stage is created, a stage entity is automatically generated in the scene</text>
    <text x="24" y="74" font-size="14" fill="#4A4B65">and represented by a unique icon.</text>
    <rect x="24" y="90" width="1056" height="2" rx="1" fill="#E8E4DA"/>
    <text x="24" y="112" font-size="12" fill="#8B8DA0">Stage entities are purely logical — they have no physical presence in the scene.</text>
  </g>

  <!-- II. Editing Stage Entities -->
  <text x="48" y="324" font-size="18" font-weight="700" fill="#2D6BE4">II. Editing Stage Entities</text>
  <text x="260" y="324" font-size="13" fill="#8B8DA0">Similar to other entity types, with different available options</text>

  <g transform="translate(48, 344)">
    <rect width="1104" height="380" rx="14" fill="#FFFFFF" filter="url(#card)"/>

    <text x="24" y="30" font-size="16" font-weight="500" fill="#1A1B2E">1. Basic Information</text>
    <text x="24" y="54" font-size="14" fill="#4A4B65">Basic Information tab — configure all available attributes for the stage entity.</text>
    <text x="24" y="74" font-size="14" fill="#4A4B65">Editing stage entities is similar to other types of entities, but the configurable basic</text>
    <text x="24" y="94" font-size="14" fill="#4A4B65">information and components will be different.</text>

    <rect x="24" y="112" width="1056" height="2" rx="1" fill="#E8E4DA"/>

    <text x="24" y="140" font-size="16" font-weight="500" fill="#1A1B2E">2. Common Components</text>
    <text x="24" y="164" font-size="14" fill="#4A4B65">Common Components tab — add common component settings to stage entities.</text>

    <text x="24" y="196" font-size="14" font-weight="500" fill="#1A1B2E">Available Components for Stage Entities:</text>

    <rect x="24" y="212" width="340" height="44" rx="8" fill="#E8EEFB"/>
    <text x="194" y="234" font-size="13" font-weight="500" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Custom Variables</text>

    <rect x="380" y="212" width="340" height="44" rx="8" fill="#E8EEFB"/>
    <text x="550" y="234" font-size="13" font-weight="500" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Global Timer</text>

    <rect x="24" y="272" width="1056" height="2" rx="1" fill="#E8E4DA"/>

    <text x="24" y="300" font-size="16" font-weight="500" fill="#1A1B2E">3. Node Graph</text>
    <text x="24" y="324" font-size="14" fill="#4A4B65">Node Graph Settings Tab — add node graphs to stage entities or view existing node graphs.</text>
    <text x="24" y="348" font-size="14" fill="#4A4B65">Stage entities can receive and process events through their attached node graphs.</text>
  </g>

  <!-- III. Stage Characteristics -->
  <text x="48" y="764" font-size="18" font-weight="700" fill="#2D6BE4">III. Stage Characteristics</text>
  <text x="280" y="764" font-size="13" fill="#8B8DA0">Unique traits that distinguish stage entities from other entity types</text>

  <g transform="translate(48, 784)">
    <rect width="1104" height="560" rx="14" fill="#FFFFFF" filter="url(#card)"/>

    <!-- Characteristic 1 -->
    <circle cx="44" cy="32" r="14" fill="#2D6BE4"/>
    <text x="44" y="33" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">1</text>
    <text x="68" y="33" font-size="16" font-weight="500" fill="#1A1B2E" dominant-baseline="middle">Can Receive Special Events</text>

    <text x="68" y="58" font-size="14" fill="#4A4B65">Some special events can only be received by stage entities.</text>
    <text x="68" y="82" font-size="14" fill="#4A4B65">When object or creation-type entities are removed/destroyed, those entities cannot</text>
    <text x="68" y="102" font-size="14" fill="#4A4B65">receive the corresponding events — they are forwarded to the stage entity instead.</text>
    <text x="68" y="126" font-size="14" fill="#4A4B65">The subsequent logic will be processed by the stage entity as well.</text>

    <rect x="68" y="142" width="1012" height="2" rx="1" fill="#E8E4DA"/>

    <!-- Characteristic 2 -->
    <circle cx="44" cy="170" r="14" fill="#2D6BE4"/>
    <text x="44" y="171" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">2</text>
    <text x="68" y="171" font-size="16" font-weight="500" fill="#1A1B2E" dominant-baseline="middle">Non-Physical Entity</text>

    <text x="68" y="196" font-size="14" fill="#4A4B65">The stage entity is a purely logical entity. It has no physical model, collision,</text>
    <text x="68" y="216" font-size="14" fill="#4A4B65">or visual representation in the game world.</text>

    <rect x="68" y="236" width="1012" height="2" rx="1" fill="#E8E4DA"/>

    <!-- Characteristic 3 -->
    <circle cx="44" cy="264" r="14" fill="#2D6BE4"/>
    <text x="44" y="265" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">3</text>
    <text x="68" y="265" font-size="16" font-weight="500" fill="#1A1B2E" dominant-baseline="middle">Incomplete Placement Information</text>

    <text x="68" y="290" font-size="14" fill="#4A4B65">Stage entities only have position information.</text>
    <text x="68" y="314" font-size="14" fill="#4A4B65">They lack rotation and scale information.</text>

    <rect x="68" y="334" width="1012" height="2" rx="1" fill="#E8E4DA"/>

    <!-- Characteristic 4 -->
    <circle cx="44" cy="362" r="14" fill="#1B4FC0"/>
    <text x="44" y="363" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">4</text>
    <text x="68" y="363" font-size="16" font-weight="500" fill="#1A1B2E" dominant-baseline="middle">Life Cycle</text>

    <text x="68" y="388" font-size="14" fill="#4A4B65">Stage entities are created when the stage initializes.</text>
    <text x="68" y="412" font-size="14" fill="#4A4B65">Stage entities are destroyed when the stage is removed.</text>

    <!-- Tip box -->
    <rect x="24" y="444" width="1056" height="96" rx="10" fill="#E8EEFB"/>
    <rect x="24" y="444" width="4" height="96" rx="2" fill="#2D6BE4"/>
    <text x="44" y="470" font-size="14" font-weight="500" fill="#2D6BE4">Key Takeaway</text>
    <text x="44" y="494" font-size="13" fill="#4A4B65">Stage entities serve as the central logic hub for stage-level events. When other entities</text>
    <text x="44" y="514" font-size="13" fill="#4A4B65">(objects, creations) are destroyed, their removal events are forwarded to the stage entity</text>
    <text x="44" y="534" font-size="13" fill="#4A4B65">for processing, ensuring no event is lost.</text>
  </g>

  <!-- Related Documentation -->
  <text x="48" y="1390" font-size="12" fill="#8B8DA0">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh3pgiraqkiu" target="_blank">
    <text x="48" y="1412" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Stage</text>
  </a>

  <!-- Footer -->
  <text x="600" y="1434" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>