<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1680" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="1680" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold">UI Control Group Library</text>

  <!-- I. Definition -->
  <text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Definition of UI Control Groups</text>

  <rect x="48" y="164" width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="192" fill="#4A4B65" font-size="14">UI Control Groups are custom data for UI controls created by Craftspeople.</text>
  <text x="72" y="216" fill="#4A4B65" font-size="14">A UI Control Group is data saved after combining and editing parameters for single or multiple prefab UI Controls.</text>
  <text x="72" y="240" fill="#1A1B2E" font-size="14" font-weight="500">UI Control Groups include two types: individual UI Controls and combined UI Controls.</text>

  <!-- II. Editing -->
  <text x="48" y="300" fill="#2D6BE4" font-size="18" font-weight="700">II. Editing UI Control Groups</text>
  <text x="310" y="300" fill="#8B8DA0" font-size="13">Templates referenced in Interface Layout or managed through Node Graphs</text>

  <!-- Naming and ID -->
  <rect x="48" y="316" width="1104" height="64" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="348" r="14" fill="#2D6BE4"/>
  <text x="80" y="353" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">1</text>
  <text x="106" y="344" fill="#1A1B2E" font-size="14" font-weight="500">Naming and ID</text>
  <text x="106" y="364" fill="#4A4B65" font-size="13">Each UI Control Group has its own ID in the UI Control Library Management Tool, serving as an input parameter for the Node Graph.</text>

  <!-- Statuses -->
  <rect x="48" y="392" width="1104" height="268" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="422" r="14" fill="#2D6BE4"/>
  <text x="80" y="427" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">2</text>
  <text x="106" y="426" fill="#1A1B2E" font-size="14" font-weight="500">UI Control Group Statuses</text>

  <!-- Status table header -->
  <rect x="72" y="440" width="1056" height="32" rx="10" fill="#2D6BE4"/>
  <text x="120" y="461" fill="#fff" font-size="13" font-weight="500">Status</text>
  <text x="300" y="461" fill="#fff" font-size="13" font-weight="500">Description</text>
  <text x="700" y="461" fill="#fff" font-size="13" font-weight="500">Behavior on Reopen</text>

  <!-- Active -->
  <rect x="72" y="472" width="1056" height="36" fill="#fff"/>
  <rect x="82" y="480" width="60" height="22" rx="11" fill="#E5F2E9"/>
  <text x="92" y="495" fill="#34A853" font-size="11" font-weight="500">Active</text>
  <text x="300" y="495" fill="#4A4B65" font-size="13">Exists in the Interface Layout, display state managed via node graph</text>
  <text x="700" y="495" fill="#4A4B65" font-size="13">-</text>
  <line x1="72" y1="508" x2="1128" y2="508" stroke="#E8E4DA" stroke-width="1"/>

  <!-- Inactive -->
  <rect x="72" y="508" width="1056" height="36" fill="#F4F1EA"/>
  <rect x="82" y="516" width="70" height="22" rx="11" fill="#FDE8E6"/>
  <text x="92" y="531" fill="#D93025" font-size="11" font-weight="500">Inactive</text>
  <text x="300" y="531" fill="#4A4B65" font-size="13">Does not exist in the Interface Layout, display state cannot be manipulated</text>
  <text x="700" y="531" fill="#4A4B65" font-size="13">-</text>

  <!-- Display states sub-header -->
  <text x="72" y="568" fill="#1A1B2E" font-size="14" font-weight="500">Display States of Activated UI Control Groups:</text>

  <!-- Enabled -->
  <rect x="72" y="578" width="1056" height="28" fill="#fff"/>
  <rect x="82" y="582" width="70" height="22" rx="11" fill="#E5F2E9"/>
  <text x="92" y="597" fill="#34A853" font-size="11" font-weight="500">Enabled</text>
  <text x="300" y="597" fill="#4A4B65" font-size="13">Visibility ON. From Hidden: visibility ON. From Disabled: reinitialized + visibility enabled.</text>
  <line x1="72" y1="606" x2="1128" y2="606" stroke="#E8E4DA" stroke-width="1"/>

  <!-- Disabled -->
  <rect x="72" y="606" width="1056" height="28" fill="#F4F1EA"/>
  <rect x="82" y="610" width="72" height="22" rx="11" fill="#FDE8E6"/>
  <text x="92" y="625" fill="#D93025" font-size="11" font-weight="500">Disabled</text>
  <text x="300" y="625" fill="#4A4B65" font-size="13">Visibility OFF, dynamic info not saved. On reopen: display and data are reinitialized.</text>
  <line x1="72" y1="634" x2="1128" y2="634" stroke="#E8E4DA" stroke-width="1"/>

  <!-- Hidden -->
  <rect x="72" y="634" width="1056" height="24" fill="#fff"/>
  <rect x="82" y="636" width="62" height="22" rx="11" fill="#FFF3E0"/>
  <text x="92" y="651" fill="#E65100" font-size="11" font-weight="500">Hidden</text>
  <text x="300" y="651" fill="#4A4B65" font-size="13">Visibility OFF, dynamic info preserved. On reopen: display and data remain as before hiding.</text>

  <!-- III. Management -->
  <text x="48" y="700" fill="#2D6BE4" font-size="18" font-weight="700">III. UI Control Group Management</text>

  <!-- Reference by Interface Layout -->
  <rect x="48" y="716" width="540" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="746" r="14" fill="#2D6BE4"/>
  <text x="80" y="751" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">1</text>
  <text x="106" y="746" fill="#1A1B2E" font-size="14" font-weight="500">Reference by Interface Layout</text>
  <text x="72" y="770" fill="#4A4B65" font-size="13">Templates referenced in the Interface Layout are</text>
  <text x="72" y="788" fill="#4A4B65" font-size="13">activated by default. Only display state adjustable.</text>

  <!-- Manage with Node Graphs -->
  <rect x="612" y="716" width="540" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="644" cy="746" r="14" fill="#2D6BE4"/>
  <text x="644" y="751" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">2</text>
  <text x="672" y="746" fill="#1A1B2E" font-size="14" font-weight="500">Manage with Node Graphs</text>
  <text x="636" y="770" fill="#4A4B65" font-size="13">Activate, remove, and modify UI Control Groups</text>
  <text x="636" y="788" fill="#4A4B65" font-size="13">during runtime via server nodes.</text>

  <!-- Node Graph operations -->
  <rect x="48" y="808" width="1104" height="160" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="836" fill="#1A1B2E" font-size="16" font-weight="500">Node Graph Operations</text>

  <rect x="72" y="848" width="500" height="48" rx="10" fill="#F4F1EA"/>
  <rect x="82" y="856" width="300" height="22" rx="11" fill="#E8EEFB"/>
  <text x="92" y="871" fill="#2D6BE4" font-size="12" font-weight="500">Activate UI Control Group in Control Group Library</text>
  <text x="82" y="892" fill="#4A4B65" font-size="12">Creates UI Control Groups in the Player's current Interface Layout at runtime.</text>

  <rect x="596" y="848" width="532" height="48" rx="10" fill="#F4F1EA"/>
  <rect x="606" y="856" width="340" height="22" rx="11" fill="#FDE8E6"/>
  <text x="616" y="871" fill="#D93025" font-size="12" font-weight="500">Remove UI Control Group From Control Group Library</text>
  <text x="606" y="892" fill="#4A4B65" font-size="12">Removes the UI Control Group created by the Activate node from the Player's layout.</text>

  <rect x="72" y="904" width="500" height="48" rx="10" fill="#F4F1EA"/>
  <rect x="82" y="912" width="320" height="22" rx="11" fill="#FFF3E0"/>
  <text x="92" y="927" fill="#E65100" font-size="12" font-weight="500">Modify UI Control Status Within the Interface Layout</text>
  <text x="82" y="948" fill="#4A4B65" font-size="12">For an activated UI Control Group, adjusts its display state (Enabled/Disabled/Hidden).</text>

  <rect x="596" y="904" width="532" height="48" rx="10" fill="#F4F1EA"/>
  <rect x="606" y="912" width="280" height="22" rx="11" fill="#E5F2E9"/>
  <text x="616" y="927" fill="#34A853" font-size="12" font-weight="500">When UI Control Group Is Triggered</text>
  <text x="606" y="948" fill="#4A4B65" font-size="12">Event sent when Interactive Button / Item Display is triggered. Only received by the triggering Player.</text>

  <!-- IV. UI Layout Management Tool -->
  <text x="48" y="1004" fill="#2D6BE4" font-size="18" font-weight="700">IV. UI Layout Management Tool</text>

  <rect x="48" y="1020" width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1048" fill="#1A1B2E" font-size="16" font-weight="500">Interface Layout</text>
  <text x="72" y="1070" fill="#4A4B65" font-size="14">By default, includes the "Default Layout" interface containing essential UI Control Groups for Stage execution.</text>
  <text x="72" y="1092" fill="#4A4B65" font-size="14">The Interface Layout Library cannot be empty; it must contain at least one Interface Layout. Right-click to copy, paste, or rename.</text>

  <!-- Interface Layout Details -->
  <rect x="48" y="1132" width="540" height="140" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1160" fill="#1A1B2E" font-size="14" font-weight="500">Inherent Content</text>
  <text x="72" y="1182" fill="#4A4B65" font-size="13">UI Control Groups essential for processes and functions.</text>
  <text x="72" y="1200" fill="#4A4B65" font-size="13">Node Graph: only display state modifiable; removal not supported.</text>
  <text x="72" y="1218" fill="#4A4B65" font-size="13">Position and size cannot be adjusted.</text>
  <rect x="72" y="1228" width="60" height="22" rx="6" fill="#E8EEFB"/>
  <text x="82" y="1243" fill="#2D6BE4" font-size="11" font-weight="500">Index</text>
  <text x="142" y="1243" fill="#4A4B65" font-size="12">Unique identifier</text>
  <rect x="260" y="1228" width="120" height="22" rx="6" fill="#E8EEFB"/>
  <text x="270" y="1243" fill="#2D6BE4" font-size="11" font-weight="500">Initially Visible</text>
  <text x="390" y="1243" fill="#4A4B65" font-size="12">Visibility when Stage runs</text>

  <rect x="612" y="1132" width="540" height="140" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="636" y="1160" fill="#1A1B2E" font-size="14" font-weight="500">Custom</text>
  <text x="636" y="1182" fill="#4A4B65" font-size="13">Custom or prefabricated UI Controls added through [Add UI Control].</text>
  <text x="636" y="1200" fill="#4A4B65" font-size="13">Node Graph: only display states modifiable; removal not supported.</text>
  <text x="636" y="1218" fill="#4A4B65" font-size="13">Position and size can be adjusted.</text>
  <rect x="636" y="1228" width="60" height="22" rx="6" fill="#E8EEFB"/>
  <text x="646" y="1243" fill="#2D6BE4" font-size="11" font-weight="500">Index</text>
  <rect x="706" y="1228" width="120" height="22" rx="6" fill="#E8EEFB"/>
  <text x="716" y="1243" fill="#2D6BE4" font-size="11" font-weight="500">Initially Visible</text>
  <rect x="836" y="1228" width="130" height="22" rx="6" fill="#E8EEFB"/>
  <text x="846" y="1243" fill="#2D6BE4" font-size="11" font-weight="500">Text Box Settings</text>

  <!-- V. UI Control Groups Management Tool -->
  <text x="48" y="1308" fill="#2D6BE4" font-size="18" font-weight="700">V. UI Control Groups Management Tool</text>

  <rect x="48" y="1324" width="540" height="164" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1352" fill="#1A1B2E" font-size="14" font-weight="500">Custom Templates</text>
  <text x="72" y="1374" fill="#4A4B65" font-size="13">UI Control Groups saved as Custom Templates are enumerated in the library.</text>
  <text x="72" y="1396" fill="#4A4B65" font-size="13">Right-click operations: Rename, Delete Template.</text>
  <text x="72" y="1418" fill="#4A4B65" font-size="13">Deleting a template also removes all references (Interface Layouts and Details).</text>
  <text x="72" y="1440" fill="#4A4B65" font-size="13">No reference: clicking creates a reference for editing.</text>
  <text x="72" y="1460" fill="#4A4B65" font-size="13">Existing reference: clicking selects for overwriting.</text>
  <text x="72" y="1480" fill="#4A4B65" font-size="13">After editing: overwrite template or save as new template.</text>

  <rect x="612" y="1324" width="540" height="164" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="636" y="1352" fill="#1A1B2E" font-size="14" font-weight="500">UI Control Group Details</text>
  <text x="636" y="1374" fill="#4A4B65" font-size="13">Display enumeration of UI Control Groups being edited.</text>
  <text x="636" y="1396" fill="#4A4B65" font-size="13">Only groups within this window can be edited.</text>
  <text x="636" y="1418" fill="#4A4B65" font-size="13">Template references support modifying and saving by overwriting.</text>
  <text x="636" y="1440" fill="#4A4B65" font-size="13">[Add UI Control Template] creates groups from prefab assets.</text>
  <text x="636" y="1460" fill="#4A4B65" font-size="13">Select multiple controls with mouse or Shift. Right-click [Create Combination].</text>
  <text x="636" y="1480" fill="#4A4B65" font-size="13">Individual UI Control can be directly [Saved] to generate a group and index.</text>

  <!-- Editing Button Area & Parameter Config -->
  <rect x="48" y="1500" width="540" height="100" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1528" fill="#1A1B2E" font-size="14" font-weight="500">Editing Button Area</text>
  <text x="72" y="1550" fill="#4A4B65" font-size="13">Multiple: Create Combination, Delete, Disband Combination,</text>
  <text x="72" y="1568" fill="#4A4B65" font-size="13">Save Changes, Save as Template.</text>
  <text x="72" y="1590" fill="#4A4B65" font-size="13">Single: Delete, Save Changes, Save as Template.</text>

  <rect x="612" y="1500" width="540" height="100" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="636" y="1528" fill="#1A1B2E" font-size="14" font-weight="500">Parameter Configuration Window</text>
  <rect x="636" y="1540" width="120" height="22" rx="6" fill="#E8EEFB"/>
  <text x="646" y="1555" fill="#2D6BE4" font-size="11" font-weight="500">Initially Visible</text>
  <text x="766" y="1555" fill="#4A4B65" font-size="12">Default display state on activation</text>
  <rect x="636" y="1566" width="80" height="22" rx="6" fill="#E8EEFB"/>
  <text x="646" y="1581" fill="#2D6BE4" font-size="11" font-weight="500">Location</text>
  <text x="726" y="1581" fill="#4A4B65" font-size="12">Position on the Interface Layout</text>
  <rect x="900" y="1540" width="50" height="22" rx="6" fill="#E8EEFB"/>
  <text x="910" y="1555" fill="#2D6BE4" font-size="11" font-weight="500">Size</text>
  <text x="960" y="1555" fill="#4A4B65" font-size="12">Max bounds (not editable)</text>
  <rect x="900" y="1566" width="56" height="22" rx="6" fill="#E8EEFB"/>
  <text x="910" y="1581" fill="#2D6BE4" font-size="11" font-weight="500">Layer</text>
  <text x="966" y="1581" fill="#4A4B65" font-size="12">Display layer</text>

  <!-- Related Documentation -->
  <text x="48" y="1628" fill="#8B8DA0" font-size="12">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhg1700h8bug" target="_blank">
    <text x="48" y="1644" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: UI Control Group</text>
  </a>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhewyi0fjfvs" target="_blank">
    <text x="48" y="1660" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: UI Control Groups Management</text>
  </a>

  <text x="600" y="1676" fill="#8B8DA0" font-size="11" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>