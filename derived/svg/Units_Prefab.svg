<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 2330">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <style>
    text { font-family: 'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif; }
  </style>

  <rect width="1200" height="2330" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold">Units &amp; Prefab</text>

  <!-- I. Basic Concepts -->
  <text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Basic Concepts</text>

  <rect x="48" y="164" width="540" height="180" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="192" fill="#1A1B2E" font-size="16" font-weight="500">Unit and Entity</text>
  <text x="72" y="216" fill="#4A4B65" font-size="14">Units are individual entities integrating data</text>
  <text x="72" y="238" fill="#4A4B65" font-size="14">during editing and stage runtime.</text>
  <text x="72" y="264" fill="#4A4B65" font-size="14">In-game representation = Entity.</text>
  <text x="72" y="290" fill="#1A1B2E" font-size="14" font-weight="500">Dynamic Entities:</text>
  <text x="72" y="312" fill="#4A4B65" font-size="14">Run complex logic, have Attributes, Components, Node Graphs.</text>
  <text x="72" y="336" fill="#1A1B2E" font-size="14" font-weight="500">Static Entities:</text>
  <text x="72" y="336" fill="#4A4B65" font-size="14" dx="130">Model placement and visibility only.</text>

  <rect x="612" y="164" width="540" height="180" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="636" y="192" fill="#1A1B2E" font-size="16" font-weight="500">Prefab and Prefab ID</text>
  <text x="636" y="216" fill="#4A4B65" font-size="14">Prefabs = preset entity data.</text>
  <text x="636" y="240" fill="#4A4B65" font-size="14">All editable entities created from prefabs.</text>
  <text x="636" y="266" fill="#4A4B65" font-size="14">All prefabs have globally unique Prefab ID.</text>
  <text x="636" y="292" fill="#4A4B65" font-size="14">Only dynamic and enemy prefabs generate runtime</text>
  <text x="636" y="314" fill="#4A4B65" font-size="14">entities via node graph nodes.</text>
  <text x="636" y="336" fill="#1A1B2E" font-size="14" font-weight="500">Entity GUID:</text>
  <text x="636" y="336" fill="#4A4B65" font-size="14" dx="110">Unique per editable entity.</text>

  <!-- II. Unit Types -->
  <text x="48" y="384" fill="#2D6BE4" font-size="18" font-weight="700">II. Unit Types (Six Types)</text>

  <rect x="48" y="400" width="1104" height="60" rx="14" fill="#fff" filter="url(#card)"/>
  <rect x="72" y="416" width="100" height="28" rx="14" fill="#E8EEFB"/>
  <text x="122" y="435" fill="#2D6BE4" font-size="13" font-weight="500" text-anchor="middle">Players</text>
  <rect x="192" y="416" width="110" height="28" rx="14" fill="#E8EEFB"/>
  <text x="247" y="435" fill="#2D6BE4" font-size="13" font-weight="500" text-anchor="middle">Characters</text>
  <rect x="322" y="416" width="110" height="28" rx="14" fill="#E8EEFB"/>
  <text x="377" y="435" fill="#2D6BE4" font-size="13" font-weight="500" text-anchor="middle">Creations</text>
  <rect x="452" y="416" width="100" height="28" rx="14" fill="#E8EEFB"/>
  <text x="502" y="435" fill="#2D6BE4" font-size="13" font-weight="500" text-anchor="middle">Objects</text>
  <rect x="572" y="416" width="160" height="28" rx="14" fill="#E8EEFB"/>
  <text x="652" y="435" fill="#2D6BE4" font-size="13" font-weight="500" text-anchor="middle">Local Projectiles</text>
  <rect x="752" y="416" width="100" height="28" rx="14" fill="#E8EEFB"/>
  <text x="802" y="435" fill="#2D6BE4" font-size="13" font-weight="500" text-anchor="middle">Stages</text>

  <!-- III. Entity Editing and Placement -->
  <text x="48" y="500" fill="#2D6BE4" font-size="18" font-weight="700">III. Entity Editing and Placement</text>

  <rect x="48" y="516" width="1104" height="200" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="544" fill="#1A1B2E" font-size="16" font-weight="500">Entity Placement Tab</text>
  <text x="72" y="568" fill="#4A4B65" font-size="14">Sidebar displays all Custom Prefabs and Prefabricated Components.</text>
  <text x="72" y="594" fill="#4A4B65" font-size="14">Drag prefabricated components directly to create entities.</text>
  <text x="72" y="618" fill="#4A4B65" font-size="14">Or create custom prefabs in prefab library first, then drag out to create entities.</text>
  <text x="72" y="644" fill="#4A4B65" font-size="14">Drag from Dynamic, Static, and Enemy tabs into scene for editing.</text>
  <text x="72" y="670" fill="#4A4B65" font-size="14">Cannot switch between static and dynamic types through entity panel.</text>
  <text x="72" y="696" fill="#4A4B65" font-size="14">Static entities: only basic information panel editable. Other panels show "cannot edit" message.</text>

  <!-- Entity Panels -->
  <rect x="48" y="728" width="356" height="160" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="756" fill="#1A1B2E" font-size="16" font-weight="500">Basic Information Panel</text>
  <text x="72" y="780" fill="#4A4B65" font-size="14">Non-removable base attributes for entity type.</text>
  <text x="72" y="804" fill="#4A4B65" font-size="14">Attributes vary across entity types.</text>
  <text x="72" y="828" fill="#4A4B65" font-size="14">Only modify attributes this entity type possesses.</text>
  <text x="72" y="856" fill="#4A4B65" font-size="14">Transform, naming, indexing.</text>

  <rect x="422" y="728" width="356" height="160" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="446" y="756" fill="#1A1B2E" font-size="16" font-weight="500">Specialized Setting Panel</text>
  <text x="446" y="780" fill="#4A4B65" font-size="14">Basic combat attributes</text>
  <text x="446" y="804" fill="#4A4B65" font-size="14">Aggro configuration</text>
  <text x="446" y="828" fill="#4A4B65" font-size="14">Hurtbox settings</text>
  <text x="446" y="852" fill="#4A4B65" font-size="14">Combat settings, ability units</text>

  <rect x="796" y="728" width="356" height="160" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="820" y="756" fill="#1A1B2E" font-size="16" font-weight="500">Component &amp; Node Graph</text>
  <text x="820" y="780" fill="#4A4B65" font-size="14">Common Components: add/remove/edit</text>
  <text x="820" y="804" fill="#4A4B65" font-size="14">to give entities more functions.</text>
  <text x="820" y="830" fill="#4A4B65" font-size="14">Node Graphs: custom logic scripts.</text>
  <text x="820" y="854" fill="#4A4B65" font-size="14">Add/delete/edit to enable additional functions.</text>

  <!-- IV. Prefab Library -->
  <text x="48" y="928" fill="#2D6BE4" font-size="18" font-weight="700">IV. Prefab Library</text>
  <text x="260" y="928" fill="#8B8DA0" font-size="13">Third icon in top Tab bar</text>

  <rect x="48" y="944" width="540" height="200" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="972" fill="#1A1B2E" font-size="16" font-weight="500">Assets Bar (Left Side)</text>

  <text x="72" y="1000" fill="#1A1B2E" font-size="14" font-weight="500">Custom Prefabs:</text>
  <text x="72" y="1022" fill="#4A4B65" font-size="14">Includes Uncategorized tab. Click Add Tab for custom tabs.</text>

  <text x="72" y="1050" fill="#1A1B2E" font-size="14" font-weight="500">Prefabricated Components:</text>
  <text x="72" y="1072" fill="#4A4B65" font-size="14">Dynamic: process objects, gameplay mechanisms</text>
  <text x="72" y="1094" fill="#4A4B65" font-size="14">Static: trees, vegetation, terrain features</text>

  <text x="72" y="1122" fill="#1A1B2E" font-size="14" font-weight="500">Asset Library:</text>
  <text x="72" y="1136" fill="#4A4B65" font-size="14">Importable prefabs based on local assets.</text>

  <rect x="612" y="944" width="540" height="200" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="636" y="972" fill="#1A1B2E" font-size="16" font-weight="500">Creating Prefabs</text>

  <text x="636" y="1000" fill="#1A1B2E" font-size="14" font-weight="500">From Basic Module tab:</text>
  <text x="636" y="1022" fill="#4A4B65" font-size="14">Click asset icon = create at camera center.</text>
  <text x="636" y="1044" fill="#4A4B65" font-size="14">Drag asset icon = create at cursor position.</text>

  <text x="636" y="1072" fill="#1A1B2E" font-size="14" font-weight="500">Copy-Paste via right-click:</text>
  <text x="636" y="1094" fill="#4A4B65" font-size="14">Copy existing Custom Prefab, paste in blank area.</text>

  <text x="636" y="1122" fill="#4A4B65" font-size="14">Green plus icon = new unsaved prefab.</text>
  <text x="636" y="1136" fill="#4A4B65" font-size="14">Yellow exclamation = modified unsaved custom prefab.</text>

  <!-- V. Prefab Editing -->
  <text x="48" y="1184" fill="#2D6BE4" font-size="18" font-weight="700">V. Prefab Editing</text>

  <rect x="48" y="1200" width="1104" height="200" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1228" fill="#4A4B65" font-size="14">Click prefab to open Details page. Edit Attributes, Components, Node Graphs, Combat Content.</text>

  <text x="72" y="1258" fill="#1A1B2E" font-size="14" font-weight="500">Naming and Indexing:</text>
  <text x="72" y="1280" fill="#4A4B65" font-size="14">Globally unique name required on save. Generates globally unique Prefab ID after saving.</text>
  <text x="72" y="1304" fill="#4A4B65" font-size="14">Switch between Dynamic/Static via dropdown menu.</text>

  <text x="72" y="1334" fill="#1A1B2E" font-size="14" font-weight="500">Four Tabs for Adding Functions:</text>
  <text x="72" y="1356" fill="#4A4B65" font-size="14">Basic Information, Specialized Settings, Common Components, Node Graph.</text>

  <text x="72" y="1386" fill="#4A4B65" font-size="14">Yellow highlighted text on module title = unsaved changes. Highlight disappears after saving.</text>

  <!-- VI. Saving Prefabs -->
  <text x="48" y="1440" fill="#2D6BE4" font-size="18" font-weight="700">VI. Saving Prefabs</text>

  <rect x="48" y="1456" width="540" height="160" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1484" fill="#1A1B2E" font-size="16" font-weight="500">New Unsaved Prefab</text>
  <text x="72" y="1510" fill="#4A4B65" font-size="14">Click [Save] or [Save As Prefab] in bottom menu or right-click menu.</text>
  <text x="72" y="1536" fill="#4A4B65" font-size="14">Rename prefab and choose tab when saving.</text>
  <text x="72" y="1562" fill="#4A4B65" font-size="14">Save creates custom prefab under specified tab.</text>
  <rect x="72" y="1580" width="120" height="26" rx="13" fill="#E5F2E9"/>
  <text x="132" y="1598" fill="#34A853" font-size="12" font-weight="500" text-anchor="middle">Save / Save As</text>

  <rect x="612" y="1456" width="540" height="160" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="636" y="1484" fill="#1A1B2E" font-size="16" font-weight="500">Modified Custom Prefab</text>
  <text x="636" y="1510" fill="#4A4B65" font-size="14">[Save As Prefab] = create new prefab.</text>
  <text x="636" y="1536" fill="#4A4B65" font-size="14">[Overwrite and Save Prefab] = save over original.</text>
  <rect x="636" y="1556" width="160" height="26" rx="13" fill="#FFF3E0"/>
  <text x="716" y="1574" fill="#4A4B65" font-size="12" font-weight="500" text-anchor="middle">Overwrite Warning</text>
  <text x="636" y="1600" fill="#4A4B65" font-size="14">Overwrite: all objects referencing this prefab in Entity Placement tab will be overwritten.</text>
  <text x="636" y="1612" fill="#4A4B65" font-size="14">Additional modifications to those objects will NOT be overwritten.</text>

  <!-- VII. Using Prefabs -->
  <text x="48" y="1656" fill="#2D6BE4" font-size="18" font-weight="700">VII. Using and Creating Entities from Prefabs</text>

  <rect x="48" y="1672" width="540" height="140" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1700" fill="#1A1B2E" font-size="16" font-weight="500">In-Game Use</text>
  <text x="72" y="1726" fill="#4A4B65" font-size="14">Click or drag from Assets Bar to create objects.</text>
  <text x="72" y="1752" fill="#4A4B65" font-size="14">After dragging, entity modifications are independent of prefab.</text>
  <text x="72" y="1778" fill="#4A4B65" font-size="14">Copy Prefab ID from top of Details page for node use.</text>
  <rect x="72" y="1790" width="140" height="26" rx="13" fill="#E8EEFB"/>
  <text x="142" y="1808" fill="#2D6BE4" font-size="12" font-weight="500" text-anchor="middle">Prefab ID Copy</text>

  <rect x="612" y="1672" width="540" height="140" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="636" y="1700" fill="#1A1B2E" font-size="16" font-weight="500">Runtime Entity Creation</text>
  <text x="636" y="1726" fill="#4A4B65" font-size="14">[Create Prefab] node: create dynamic/monster entities during runtime.</text>
  <text x="636" y="1752" fill="#4A4B65" font-size="14">Dynamic and creation prefabs: direct runtime creation via node graph.</text>
  <text x="636" y="1778" fill="#4A4B65" font-size="14">Static prefabs: drag into scene only. Cannot use [Create Prefab] node.</text>
  <rect x="636" y="1790" width="140" height="26" rx="13" fill="#E8EEFB"/>
  <text x="706" y="1808" fill="#2D6BE4" font-size="12" font-weight="500" text-anchor="middle">Node Graph</text>

  <!-- VIII. Temporary Entities -->
  <text x="48" y="1852" fill="#2D6BE4" font-size="18" font-weight="700">VIII. Temporary Entities and Static Entities</text>

  <rect x="48" y="1868" width="540" height="100" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1896" fill="#1A1B2E" font-size="16" font-weight="500">Temporary Entities</text>
  <text x="72" y="1922" fill="#4A4B65" font-size="14">Created via [Create Prefab] node during gameplay.</text>
  <text x="72" y="1946" fill="#4A4B65" font-size="14">No editor-based GUID, otherwise function the same.</text>

  <rect x="612" y="1868" width="540" height="100" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="636" y="1896" fill="#1A1B2E" font-size="16" font-weight="500">Static Entities</text>
  <text x="636" y="1922" fill="#4A4B65" font-size="14">Cannot edit attributes, components, or node graphs.</text>
  <text x="636" y="1946" fill="#4A4B65" font-size="14">Decoration and scene layout only. No runtime access.</text>

  <!-- IX. Fullscreen UI Animation -->
  <text x="48" y="2008" fill="#2D6BE4" font-size="18" font-weight="700">IX. Fullscreen UI Animation (Prefab-Related)</text>

  <rect x="48" y="2024" width="1104" height="120" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="2052" fill="#4A4B65" font-size="14">Fullscreen UI Animations display special effect assets in UI Layout. Used to beautify interface.</text>
  <text x="72" y="2078" fill="#4A4B65" font-size="14">Add in UI Control Group Editor window &gt; UI Control Template &gt; Fullscreen UI Animation.</text>
  <text x="72" y="2104" fill="#4A4B65" font-size="14">Settings: Select UI Animation asset, Play Sound Effect (Yes/No).</text>
  <text x="72" y="2130" fill="#4A4B65" font-size="14">Always on top of all layers. Covers entire screen. Triggered through Node Graphs during runtime.</text>

  <!-- Tip -->
  <rect x="48" y="2156" width="1104" height="44" rx="10" fill="#E8EEFB"/>
  <rect x="48" y="2156" width="4" height="44" rx="2" fill="#2D6BE4"/>
  <text x="72" y="2182" fill="#4A4B65" font-size="13">Prefab switching: In prefab editing, switch between Dynamic and Static. A pop-up notification appears when switching.</text>

  <!-- Source Links -->
  <text x="48" y="2236" fill="#8B8DA0" font-size="12">Related Documentation:</text>
