    <text x="48" y="2272" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: Prefab Library (Guide)</text>
  </a>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhbn4i09l5ns" target="_blank">
    <text x="48" y="2290" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: Fullscreen UI Animation Controls (Guide)</text>
  </a>

  <!-- Footer -->
  <text x="600" y="2310" fill="#8B8DA0" font-size="11" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>