      <line x1="190" y1="22" x2="220" y2="22" stroke="#2D6BE4" stroke-width="1.5" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(230, 56)">
      <rect x="0" y="0" width="180" height="44" rx="8" fill="#E8EEFB"/>
      <text x="90" y="22" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Initial Bubble Active</text>
      <line x1="190" y1="22" x2="220" y2="22" stroke="#2D6BE4" stroke-width="1.5"/>
    </g>
    <g transform="translate(460, 56)">
      <rect x="0" y="0" width="180" height="44" rx="8" fill="#E8EEFB"/>
      <text x="90" y="22" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Distance Check</text>
      <line x1="190" y1="22" x2="220" y2="22" stroke="#2D6BE4" stroke-width="1.5"/>
    </g>
    <g transform="translate(690, 56)">
      <rect x="0" y="0" width="180" height="44" rx="8" fill="#E8EEFB"/>
      <text x="90" y="22" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Local Filter Eval</text>
      <line x1="190" y1="22" x2="220" y2="22" stroke="#2D6BE4" stroke-width="1.5"/>
    </g>
    <g transform="translate(920, 56)">
      <rect x="0" y="0" width="140" height="44" rx="8" fill="#E8EEFB"/>
      <text x="70" y="22" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Display Bubble</text>
    </g>

    <g transform="translate(20, 120)">
      <rect x="0" y="0" width="180" height="44" rx="8" fill="#E8EEFB"/>
      <text x="90" y="22" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Play Dialogue Lines</text>
      <line x1="190" y1="22" x2="220" y2="22" stroke="#2D6BE4" stroke-width="1.5"/>
    </g>
    <g transform="translate(230, 120)">
      <rect x="0" y="0" width="180" height="44" rx="8" fill="#E8EEFB"/>
      <text x="90" y="22" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Loop/End Check</text>
      <line x1="190" y1="22" x2="220" y2="22" stroke="#2D6BE4" stroke-width="1.5"/>
    </g>
    <g transform="translate(460, 120)">
      <rect x="0" y="0" width="180" height="44" rx="8" fill="#E8EEFB"/>
      <text x="90" y="22" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Send End Event</text>
      <line x1="190" y1="22" x2="220" y2="22" stroke="#2D6BE4" stroke-width="1.5"/>
    </g>
    <g transform="translate(690, 120)">
      <rect x="0" y="0" width="180" height="44" rx="8" fill="#E8EEFB"/>
      <text x="90" y="22" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Node Graph Event</text>
    </g>
  </g>

