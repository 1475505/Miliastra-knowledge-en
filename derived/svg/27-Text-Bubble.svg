<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 2400" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1A1B2E" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1A1B2E" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="2400" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">27-Text Bubble: Component Overview &amp; Configuration</text>

  <!-- I. Functions -->
  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. Functions of Text Bubble Component</text>

  <g transform="translate(60, 164)">
    <rect width="1080" height="160" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" fill="#4A4B65">The Text Bubble Component provides text bubble functionality mounted on entities. It can reference custom variable data to display configured content during stage runtime.</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">The component must be mounted on entities. Supports usage on <tspan font-weight="bold" fill="#1A1B2E">objects</tspan> and <tspan font-weight="bold" fill="#1A1B2E">creations</tspan>.</text>
    <text x="20" y="76" font-size="14" fill="#4A4B65">Multiple text bubbles can be configured, but only one can be active at a time.</text>
    <text x="20" y="100" font-size="14" fill="#4A4B65">Text bubbles can be enabled or disabled through default configuration, and also controlled through</text>
    <text x="20" y="120" font-size="14" fill="#4A4B65">node graphs to switch specific active text bubbles. Visibility can be adjusted through local filters.</text>
    <text x="20" y="148" font-size="14" font-weight="bold" fill="#1A1B2E">Key Features:</text>
    <text x="20" y="172" font-size="13" fill="#4A4B65">• Mount on entities (objects/creations)</text>
    <text x="370" y="172" font-size="13" fill="#4A4B65">• Multiple bubbles per entity, one active</text>
    <text x="20" y="192" font-size="13" fill="#4A4B65">• Custom variable data reference</text>
    <text x="370" y="192" font-size="13" fill="#4A4B65">• Local filter visibility control</text>
    <text x="720" y="172" font-size="13" fill="#4A4B65">• Node graph switching support</text>
    <text x="720" y="192" font-size="13" fill="#4A4B65">• Loop playback &amp; end events</text>
  </g>

  <!-- II. Editing Text Bubble Components -->
  <circle cx="80" cy="360" r="16" fill="#2D6BE4"/>
  <text x="80" y="361" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="361" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. Editing Text Bubble Components</text>

  <g transform="translate(60, 388)">
    <rect width="1080" height="232" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" font-weight="bold" fill="#1A1B2E">1. Add Components</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">In the entity/prefab editing interface, open the Editing Components tab. Click Add Components,</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">select and click on the text bubble to add it. When selected, the entity will display the current</text>
    <text x="20" y="92" font-size="14" fill="#4A4B65">active text bubble effect. Click Advanced Editing to expand the editing tab.</text>

    <text x="20" y="124" font-size="14" font-weight="bold" fill="#1A1B2E">2. Editing Parameters</text>
    <text x="20" y="148" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Initially Effective Text Bubble</tspan> — Dropdown menu providing text bubble enumeration.</text>
    <text x="20" y="168" font-size="13" fill="#4A4B65">Modifying the checkbox changes the effective status, synchronized to the text bubble editing page.</text>
    <text x="20" y="192" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Text Bubble List</tspan> — Enumerates all text bubbles configured for the entity.</text>
  </g>

  <!-- III. Editing Text Bubbles -->
  <circle cx="80" cy="656" r="16" fill="#2D6BE4"/>
  <text x="80" y="657" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="657" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. Editing Text Bubbles</text>

  <g transform="translate(60, 684)">
    <rect width="1080" height="620" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" font-weight="bold" fill="#1A1B2E">1. Add Text Bubbles</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">Click the add button to create a new text bubble. The added bubble is initially effective by default.</text>
    <text x="20" y="76" font-size="14" fill="#4A4B65">Bubble X (where X is the bubble ID) serves as a node input to adjust initial activation parameters.</text>

    <text x="20" y="108" font-size="14" font-weight="bold" fill="#1A1B2E">2. Basic Settings</text>
    <text x="20" y="132" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Select Attach Point</tspan> — Preset attachment point of the entity or custom creator attachment point.</text>
    <text x="20" y="152" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Offset</tspan> — Adjustable offset relative to the selected attachment point.</text>
    <text x="20" y="172" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Font Size</tspan> — Font size configuration for the bubble text.</text>
    <text x="20" y="192" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Visible Radius (m)</tspan> — Effective distance of text bubbles. Logic runs only when character</text>
    <text x="20" y="212" font-size="13" fill="#4A4B65">and entity distance meets the configuration.</text>
    <text x="20" y="236" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Filter Node Graph</tspan> — Can reference local filter node graph for visibility.</text>
    <text x="20" y="256" font-size="13" fill="#4A4B65">• <tspan font-weight="bold" fill="#1A1B2E">Boolean type:</tspan> Returns "true" — bubble visible locally.</text>
    <text x="20" y="276" font-size="13" fill="#4A4B65">• <tspan font-weight="bold" fill="#1A1B2E">Integer type:</tspan> Returns value within effective integer range — bubble visible locally.</text>
    <text x="20" y="300" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Loop Playback</tspan> — If enabled, the text bubble plays in a loop; if disabled, plays once.</text>
    <text x="20" y="324" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Send End Event</tspan> — When enabled, an event is sent to the node graph after the last</text>
    <text x="20" y="344" font-size="13" fill="#4A4B65">dialogue line is completed. Only the entity node graph with this text bubble component mounted can receive it.</text>

    <!-- tip box inside card -->
    <rect x="20" y="368" width="1040" height="80" rx="10" fill="#E8EEFB"/>
    <rect x="20" y="368" width="4" height="80" rx="2" fill="#2D6BE4"/>
    <text x="36" y="390" font-size="13" fill="#4A4B65">When Send End Event is checked, the server records bubble completion by different characters.</text>
    <text x="36" y="410" font-size="13" fill="#4A4B65">If a character re-enters range or reconnects, the bubble will not be triggered again.</text>
    <text x="36" y="434" font-size="13" fill="#4A4B65">If not checked, the bubble dialogue re-triggers on re-entry or reconnection.</text>

    <text x="20" y="476" font-size="14" font-weight="bold" fill="#1A1B2E">3. Editing Bubble Text</text>
    <text x="20" y="500" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Duration</tspan> — Display time for the current bubble text content.</text>
    <text x="20" y="524" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Text Content</tspan> — Display text editing. Supports variable insertion, select custom variables</text>
    <text x="20" y="544" font-size="13" fill="#4A4B65">from the specified entity, which update in real-time.</text>
    <text x="20" y="568" font-size="13" fill="#4A4B65">Text size depends on the font size in basic configuration. The actual bubble size adapts</text>
    <text x="20" y="588" font-size="13" fill="#4A4B65">according to the text amount and font size.</text>
  </g>

  <!-- IV. Managing Through Node Graph -->
  <circle cx="80" cy="1340" r="16" fill="#2D6BE4"/>
  <text x="80" y="1341" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IV</text>
  <text x="108" y="1341" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">IV. Managing Text Bubbles Through Node Graph</text>

  <g transform="translate(60, 1368)">
    <rect width="1080" height="320" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" fill="#4A4B65">During entity runtime, active text bubbles can be managed through the node graph system.</text>

    <rect x="20" y="48" width="1040" height="80" rx="10" fill="#E8EEFB"/>
    <rect x="20" y="48" width="4" height="80" rx="2" fill="#2D6BE4"/>
    <text x="36" y="70" font-size="13" font-weight="bold" fill="#1A1B2E">Switch Active Text Bubble</text>
    <text x="36" y="92" font-size="13" fill="#4A4B65">Node that switches between configured text bubbles on an entity.</text>
    <text x="36" y="112" font-size="13" fill="#4A4B65">Takes the bubble ID as input to activate the corresponding text bubble.</text>

    <rect x="20" y="140" width="1040" height="80" rx="10" fill="#E8EEFB"/>
    <rect x="20" y="140" width="4" height="80" rx="2" fill="#2D6BE4"/>
    <text x="36" y="162" font-size="13" font-weight="bold" fill="#1A1B2E">When Text Bubble Is Completed</text>
    <text x="36" y="184" font-size="13" fill="#4A4B65">Event node triggered when a text bubble finishes playing all its dialogue lines.</text>
    <text x="36" y="204" font-size="13" fill="#4A4B65">Can be used to chain subsequent logic in the node graph.</text>

    <text x="20" y="250" font-size="14" font-weight="bold" fill="#1A1B2E">Local Filter Node Graph Nodes</text>
    <text x="20" y="274" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Get Self Entity</tspan> — Outputs the entity mounted with the text bubble component.</text>
    <text x="20" y="294" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Get Target Entity</tspan> — Outputs the character entity within active range of text bubble.</text>
    <text x="20" y="314" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Get Current Character</tspan> — Outputs the local character entity.</text>
  </g>

  <!-- V. Visual Workflow -->
  <circle cx="80" cy="1724" r="16" fill="#2D6BE4"/>
  <text x="80" y="1725" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">V</text>
  <text x="108" y="1725" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">V. Text Bubble Lifecycle</text>

  <g transform="translate(60, 1752)">
    <rect width="1080" height="200" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" font-weight="bold" fill="#1A1B2E">Text Bubble Lifecycle Flow</text>

    <!-- Flow steps -->
    <g transform="translate(20, 56)">
      <rect x="0" y="0" width="180" height="44" rx="8" fill="#E8EEFB"/>
