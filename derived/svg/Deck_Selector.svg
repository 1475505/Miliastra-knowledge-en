<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1350" width="1200" height="1350">
<defs>
<linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2D6BE4"/>
    <stop offset="100%" stop-color="#4A3F6B"/>
</linearGradient>
<filter id="card" xmlns="http://www.w3.org/2000/svg">
    <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
</filter>
<filter id="elevated" xmlns="http://www.w3.org/2000/svg">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
</filter>
</defs>

<rect width="1200" height="1350" fill="#F9F7F2"/>

<rect x="0" y="0" width="1200" height="6" fill="url(#topGrad)"/>

<rect x="40" y="30" width="1120" height="90" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
<rect x="40" y="30" width="4" height="90" rx="2" fill="#2D6BE4"/>
<text x="72" y="74" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#1A1B2E">Deck Selector UI Controls</text>
<text x="72" y="100" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#8B8DA0">Deck building interface for editing decision interactions with card selection and confirmation flow</text>

<text x="72" y="170" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#2D6BE4">I. Features</text>

<rect x="40" y="190" width="1120" height="160" rx="14" fill="#FFFFFF" filter="url(#card)"/>
<text x="72" y="222" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">The Deck Selector provides a simple interface for editing decision interactions during stage runtime:</text>
<text x="72" y="248" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Deck Building</tspan> — Select and configure decks with known or unknown card types</text>
<text x="72" y="272" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Card Selection</tspan> — Players choose from presented options with deck icon, title, and description</text>
<text x="72" y="296" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Layout Options</tspan> — List and Grid interface layout styles</text>
<text x="72" y="320" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Countdown &amp; Timeout</tspan> — Configurable countdown timer with pre-end warning flash effect</text>
<text x="72" y="344" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Confirmation Flow</tspan> — Decision completion with reveal animations and result display</text>

<text x="72" y="400" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#2D6BE4">II. Deck Configuration</text>

<rect x="40" y="420" width="1120" height="270" rx="14" fill="#FFFFFF" filter="url(#card)"/>

<text x="72" y="452" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#1A1B2E">Known Deck</text>
<text x="72" y="472" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Provides a clearly configurable icon, title, and description for the deck card.</text>

<rect x="72" y="486" width="220" height="120" rx="10" fill="#F0F4FA" stroke="#D0D8E8" stroke-width="1"/>
<rect x="84" y="498" width="40" height="40" rx="6" fill="#2D6BE4"/>
<text x="104" y="523" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">A</text>
<text x="138" y="518" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#1A1B2E">Deck Title</text>
<text x="138" y="538" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="11" fill="#4A4B65">Deck description text</text>
<text x="84" y="570" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="10" fill="#8B8DA0">Deck ID: 1</text>

<text x="380" y="452" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#1A1B2E">Unknown Deck</text>
<text x="380" y="472" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Provides only a question mark icon. Recommended with reveal after selection.</text>

<rect x="380" y="486" width="220" height="120" rx="10" fill="#F0F4FA" stroke="#D0D8E8" stroke-width="1"/>
<circle cx="490" cy="518" r="20" fill="#CCCCCC"/>
<text x="490" y="524" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">?</text>
<text x="490" y="550" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#1A1B2E" text-anchor="middle">Unknown</text>
<text x="490" y="566" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="11" fill="#4A4B65" text-anchor="middle">???</text>
<text x="392" y="598" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="10" fill="#8B8DA0">Deck ID: 2</text>

<text x="72" y="642" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan fill="#1A1B2E" font-weight="700">Deck Settings:</tspan> Each deck has a Deck ID (sequential, starting from 1), Deck Type (Known/Unknown), optional icon, title, description, tag color, and tag description.</text>

<rect x="40" y="708" width="1120" height="50" rx="14" fill="#E8EEFB"/>
<rect x="40" y="708" width="4" height="50" rx="2" fill="#2D6BE4"/>
<text x="72" y="738" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">The Deck Selector supports selection cancellation, manual collapse, and game pause in single-player mode.</text>

<text x="72" y="800" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#2D6BE4">III. Interface Controls</text>

<rect x="40" y="820" width="1120" height="170" rx="14" fill="#FFFFFF" filter="url(#card)"/>
<text x="72" y="852" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Show Title</tspan> — Toggle editable title at the top of the selector</text>
<text x="72" y="876" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Interface Layout</tspan> — Choose between List or Grid display</text>
<text x="72" y="900" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Show Selected Quantity</tspan> — Display current number of selected items</text>
<text x="72" y="924" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Show Reset Count Limit</tspan> — Display min/max resettable options</text>
<text x="72" y="948" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Show Remaining Time</tspan> — Countdown timer with pre-end warning effect and auto-close</text>
<text x="72" y="972" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Selection Can Be Canceled</tspan> — Add a close button, triggers Close Manually event</text>

<text x="72" y="1040" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#2D6BE4">IV. Node Graph Integration</text>

<rect x="40" y="1060" width="1120" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
<text x="72" y="1092" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Invoke Deck Selector</tspan> — Open the selector through Node Graph with configured deck data</text>
<text x="72" y="1116" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Close Deck Selector</tspan> — Close the selector programmatically</text>
<text x="72" y="1140" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">When Deck Selector Is Complete</tspan> — Event fires on timeout, selection made, or manual close</text>
<text x="72" y="1164" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Random Deck Selector Selection List</tspan> — Randomize deck options through Node Graph logic</text>

<text x="72" y="1230" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#8B8DA0">Related Documentation:</text>
<text x="72" y="1250" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#2D6BE4" text-decoration="underline">Deck Selector UI Controls</text>
<text x="300" y="1250" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#8B8DA0">https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh1g8q9w7x02</text>

<line x1="40" y1="1285" x2="1160" y2="1285" stroke="#E0E0E0" stroke-width="1"/>
<text x="600" y="1310" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>
