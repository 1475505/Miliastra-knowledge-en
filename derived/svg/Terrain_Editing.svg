<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 2120">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <style>
    text { font-family: 'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif; }
  </style>

  <rect width="1200" height="2120" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold">Terrain Editing</text>

  <!-- I. Overview -->
  <text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Overview</text>

  <rect x="48" y="164" width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="192" fill="#1A1B2E" font-size="14" font-weight="500">Entry Point</text>
  <text x="72" y="214" fill="#4A4B65" font-size="14">First button in the top tab bar; click to toggle Terrain Editing on/off.</text>
  <text x="72" y="240" fill="#1A1B2E" font-size="14" font-weight="500">Initial Creation</text>
  <text x="72" y="258" fill="#4A4B65" font-size="14">A 100 x 100 Terrain is generated automatically at world coordinates (0, 0, 0) when a save is created.</text>

  <rect x="48" y="276" width="1104" height="44" rx="10" fill="#E8EEFB"/>
  <rect x="48" y="276" width="4" height="44" rx="2" fill="#2D6BE4"/>
  <text x="72" y="303" fill="#4A4B65" font-size="13">Smallest operable unit: single-layer area (size 5 x 5; layer height 2.5).</text>

  <!-- II. Main Interface -->
  <text x="48" y="356" fill="#2D6BE4" font-size="18" font-weight="700">II. Main Interface Components</text>

  <!-- Assets Bar -->
  <rect x="48" y="372" width="356" height="200" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="400" fill="#1A1B2E" font-size="16" font-weight="500">Assets Bar (Left)</text>
  <text x="72" y="424" fill="#4A4B65" font-size="14">Toggle: upper-left button</text>
  <text x="72" y="450" fill="#1A1B2E" font-size="14" font-weight="500">Asset List:</text>
  <text x="72" y="472" fill="#4A4B65" font-size="14">- Area Material</text>
  <text x="72" y="494" fill="#4A4B65" font-size="14">- Custom Prefab</text>
  <text x="72" y="516" fill="#4A4B65" font-size="14">- Prefabricated Components</text>
  <text x="72" y="538" fill="#4A4B65" font-size="14">- Asset Library</text>

  <!-- Details Panel -->
  <rect x="422" y="372" width="356" height="200" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="446" y="400" fill="#1A1B2E" font-size="16" font-weight="500">Details Panel (Right)</text>
  <text x="446" y="424" fill="#4A4B65" font-size="14">Toggle: upper-right button</text>
  <text x="446" y="450" fill="#1A1B2E" font-size="14" font-weight="500">Terrain List:</text>
  <text x="446" y="472" fill="#4A4B65" font-size="14">- Rename (double-click name)</text>
  <text x="446" y="494" fill="#4A4B65" font-size="14">- Focus (camera to terrain)</text>
  <text x="446" y="516" fill="#4A4B65" font-size="14">- Create Terrain</text>
  <text x="446" y="542" fill="#1A1B2E" font-size="14" font-weight="500">Terrain Details:</text>
  <text x="446" y="564" fill="#4A4B65" font-size="14">Position (X,Y,Z), Rotation (Y), Area Material Replace</text>

  <!-- Pointer -->
  <rect x="796" y="372" width="356" height="200" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="820" y="400" fill="#1A1B2E" font-size="16" font-weight="500">Pointer</text>
  <text x="820" y="424" fill="#4A4B65" font-size="14">Available when Edit Mode is not active.</text>
  <text x="820" y="450" fill="#1A1B2E" font-size="14" font-weight="500">Selectable Content:</text>
  <text x="820" y="472" fill="#4A4B65" font-size="14">- Terrain (see Modification)</text>
  <text x="820" y="494" fill="#4A4B65" font-size="14">- Static Objects</text>
  <text x="820" y="516" fill="#4A4B65" font-size="14">- Dynamic Objects</text>
  <text x="820" y="538" fill="#4A4B65" font-size="14">- Creations</text>
  <text x="820" y="560" fill="#4A4B65" font-size="14">Toolbar changes based on selection.</text>

  <!-- III. Terrain Creation -->
  <text x="48" y="612" fill="#2D6BE4" font-size="18" font-weight="700">III. Terrain Creation</text>

  <rect x="48" y="628" width="1104" height="280" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="656" fill="#1A1B2E" font-size="16" font-weight="500">How to Enable</text>
  <text x="72" y="678" fill="#4A4B65" font-size="14">- Left Assets Bar: In Terrain Modification, click "Created Based on Grid Lines" button</text>
  <text x="72" y="700" fill="#4A4B65" font-size="14">- Right Details Panel: Terrain List &gt; Create Terrain</text>

  <text x="72" y="730" fill="#1A1B2E" font-size="16" font-weight="500">Creation Logic</text>
  <text x="72" y="752" fill="#4A4B65" font-size="14">Select material in material panel, set canvas height via height scale, choose brush mode in bottom toolbar.</text>
  <text x="72" y="774" fill="#4A4B65" font-size="14">Use pointer/brush to paint areas. Click "End Drawing" to generate terrain from painted content.</text>

  <text x="72" y="804" fill="#1A1B2E" font-size="16" font-weight="500">Material Panel</text>
  <text x="72" y="826" fill="#4A4B65" font-size="14">Switch brush material: 7 types available, click to choose.</text>

  <text x="72" y="856" fill="#1A1B2E" font-size="16" font-weight="500">Height Scale</text>
  <text x="72" y="878" fill="#4A4B65" font-size="14">Move slider or click to enter value. Focus on canvas height. Increase/decrease by 20.</text>

  <!-- IV. Bottom Toolbar Actions -->
  <text x="48" y="944" fill="#2D6BE4" font-size="18" font-weight="700">IV. Bottom Toolbar: Brush Actions</text>

  <!-- Area Actions -->
  <rect x="48" y="960" width="540" height="180" rx="14" fill="#fff" filter="url(#card)"/>
  <rect x="72" y="976" width="120" height="26" rx="13" fill="#E8EEFB"/>
  <text x="132" y="994" fill="#2D6BE4" font-size="12" font-weight="500" text-anchor="middle">Area Actions</text>
  <text x="72" y="1022" fill="#1A1B2E" font-size="14" font-weight="500">Brush Layers:</text>
  <text x="72" y="1044" fill="#4A4B65" font-size="14">Set the layer count per stroke.</text>
  <text x="72" y="1068" fill="#1A1B2E" font-size="14" font-weight="500">Create:</text>
  <text x="72" y="1090" fill="#4A4B65" font-size="14">Raise selected area by x layers. Entire stack adopts current brush material.</text>
  <text x="72" y="1114" fill="#1A1B2E" font-size="14" font-weight="500">Delete:</text>
  <text x="72" y="1132" fill="#4A4B65" font-size="14">Lower selected area by x layers.</text>

  <!-- Slope Actions -->
  <rect x="612" y="960" width="540" height="180" rx="14" fill="#fff" filter="url(#card)"/>
  <rect x="636" y="976" width="120" height="26" rx="13" fill="#E8EEFB"/>
  <text x="696" y="994" fill="#2D6BE4" font-size="12" font-weight="500" text-anchor="middle">Slope Actions</text>
  <text x="636" y="1022" fill="#4A4B65" font-size="14">Condition: brush selects only existing areas.</text>
  <text x="636" y="1048" fill="#1A1B2E" font-size="14" font-weight="500">Slope Direction:</text>
  <text x="636" y="1070" fill="#4A4B65" font-size="14">Forward / Left / Right</text>
  <text x="636" y="1094" fill="#1A1B2E" font-size="14" font-weight="500">Create Slope:</text>
  <text x="636" y="1116" fill="#4A4B65" font-size="14">Add one slope layer on top; arrow shows higher end.</text>
  <text x="636" y="1136" fill="#1A1B2E" font-size="14" font-weight="500">Delete Slope:</text>
  <text x="820" y="1136" fill="#4A4B65" font-size="14">Remove selected slope.</text>

  <!-- Water Body + Path -->
  <rect x="48" y="1152" width="540" height="140" rx="14" fill="#fff" filter="url(#card)"/>
  <rect x="72" y="1168" width="150" height="26" rx="13" fill="#E8EEFB"/>
  <text x="147" y="1186" fill="#2D6BE4" font-size="12" font-weight="500" text-anchor="middle">Water Body Actions</text>
  <text x="72" y="1214" fill="#4A4B65" font-size="14">Condition: brush works only on existing areas or water bodies.</text>
  <text x="72" y="1238" fill="#1A1B2E" font-size="14" font-weight="500">Create Water Body:</text>
  <text x="72" y="1260" fill="#4A4B65" font-size="14">Convert top layer of selected area to water body.</text>
  <text x="72" y="1282" fill="#1A1B2E" font-size="14" font-weight="500">Remove Water Body:</text>
  <text x="72" y="1282" fill="#4A4B65" font-size="14" dx="170">Convert top water layer back to area.</text>

  <rect x="612" y="1152" width="540" height="140" rx="14" fill="#fff" filter="url(#card)"/>
  <rect x="636" y="1168" width="130" height="26" rx="13" fill="#E8EEFB"/>
  <text x="701" y="1186" fill="#2D6BE4" font-size="12" font-weight="500" text-anchor="middle">Path Operation</text>
  <text x="636" y="1214" fill="#4A4B65" font-size="14">Condition: brush affects only existing areas.</text>
  <text x="636" y="1238" fill="#1A1B2E" font-size="14" font-weight="500">Create Path:</text>
  <text x="636" y="1260" fill="#4A4B65" font-size="14">Draw path on top surface of selected area.</text>
  <text x="636" y="1282" fill="#1A1B2E" font-size="14" font-weight="500">Delete Path:</text>
  <text x="636" y="1282" fill="#4A4B65" font-size="14" dx="110">Remove path from top surface.</text>

  <!-- Brush Actions + End Drawing -->
  <rect x="48" y="1304" width="1104" height="60" rx="10" fill="#E8EEFB"/>
  <rect x="48" y="1304" width="4" height="60" rx="2" fill="#2D6BE4"/>
  <text x="72" y="1328" fill="#4A4B65" font-size="13">Brush: Tap = apply once at position. Drag = apply at each valid position cursor passes.</text>
  <text x="72" y="1350" fill="#4A4B65" font-size="13">End Drawing: All connected areas form single terrain; disconnected areas create multiple terrains.</text>

  <!-- V. Terrain Modification - Pointer Mode -->
  <text x="48" y="1400" fill="#2D6BE4" font-size="18" font-weight="700">V. Terrain Modification - Pointer Mode</text>

  <rect x="48" y="1416" width="540" height="220" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1444" fill="#1A1B2E" font-size="16" font-weight="500">Single Terrain Selection</text>
  <text x="72" y="1470" fill="#1A1B2E" font-size="14" font-weight="500">Transform Tools:</text>
  <text x="72" y="1492" fill="#4A4B65" font-size="14">Motion (X,Y,Z), Rotation (Y). Space cycles tools.</text>
  <text x="72" y="1518" fill="#1A1B2E" font-size="14" font-weight="500">Layer Adjustment:</text>
  <text x="72" y="1540" fill="#4A4B65" font-size="14">Raise/Lower all areas by one layer.</text>
  <text x="72" y="1566" fill="#1A1B2E" font-size="14" font-weight="500">Area Selection:</text>
  <text x="72" y="1588" fill="#4A4B65" font-size="14">Enter Precise Editing. Shift+click to add areas.</text>
  <text x="72" y="1610" fill="#4A4B65" font-size="14">Raise / Lower / Split (detach to new terrain).</text>
  <text x="72" y="1630" fill="#1A1B2E" font-size="14" font-weight="500">Delete Terrain:</text>
  <text x="72" y="1630" fill="#4A4B65" font-size="14" dx="120">Delete all selected terrains.</text>

  <rect x="612" y="1416" width="540" height="220" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="636" y="1444" fill="#1A1B2E" font-size="16" font-weight="500">Multiple Terrain Selection</text>
  <text x="636" y="1470" fill="#4A4B65" font-size="14">Acts on all selected terrains simultaneously.</text>
  <text x="636" y="1496" fill="#1A1B2E" font-size="14" font-weight="500">Available Functions:</text>
  <text x="636" y="1518" fill="#4A4B65" font-size="14">- Transform Tools (move/rotate all)</text>
  <text x="636" y="1540" fill="#4A4B65" font-size="14">- Delete all selected</text>
  <text x="636" y="1570" fill="#1A1B2E" font-size="14" font-weight="500">Right-click Menu:</text>
  <text x="636" y="1592" fill="#4A4B65" font-size="14">Copy, Paste, Camera Focus, Delete,</text>
  <text x="636" y="1614" fill="#4A4B65" font-size="14">Assets Exporting, Character Dummy,</text>
  <text x="636" y="1636" fill="#4A4B65" font-size="14">Add to Entity Deployment Group</text>

  <!-- VI. Free Edit & Precise Editing -->
  <text x="48" y="1672" fill="#2D6BE4" font-size="18" font-weight="700">VI. Free Edit and Precise Editing</text>

  <rect x="48" y="1688" width="540" height="160" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1716" fill="#1A1B2E" font-size="16" font-weight="500">Free Edit</text>
  <text x="72" y="1740" fill="#4A4B65" font-size="14">Enable: Main interface, click any material button.</text>
  <text x="72" y="1764" fill="#4A4B65" font-size="14">Cursor starts in pointer mode. Click terrain to select, then switches to brush mode.</text>
  <text x="72" y="1788" fill="#4A4B65" font-size="14">Click another terrain to end drawing and generate.</text>
  <text x="72" y="1812" fill="#4A4B65" font-size="14">Functions: Material Panel, Area/Water/Path Actions (no Height Scale).</text>

  <rect x="612" y="1688" width="540" height="160" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="636" y="1716" fill="#1A1B2E" font-size="16" font-weight="500">Precise Editing</text>
  <text x="636" y="1740" fill="#4A4B65" font-size="14">Enable: Pointer mode, select terrain, use bottom toolbar.</text>
  <text x="636" y="1764" fill="#4A4B65" font-size="14">Edit only the selected terrain. Cursor in brush mode.</text>
  <text x="636" y="1788" fill="#4A4B65" font-size="14">Click End Drawing to generate terrains.</text>
  <text x="636" y="1812" fill="#4A4B65" font-size="14">Functions: Material Panel, Area/Water/Path Actions (no Height Scale).</text>

  <!-- VII. Shortcuts -->
  <text x="48" y="1884" fill="#2D6BE4" font-size="18" font-weight="700">VII. Shortcuts</text>

  <rect x="48" y="1900" width="1104" height="120" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1928" fill="#4A4B65" font-size="14">Available in any Edit Mode or when toolbar is in Area Actions mode (Creation, Modification, Precise Editing).</text>

  <text x="72" y="1958" fill="#1A1B2E" font-size="14" font-weight="500">Uniform Height (Alt):</text>
  <text x="72" y="1980" fill="#4A4B65" font-size="14">Hold Alt. First click samples area layer count; subsequent clicks apply that height to each valid area.</text>

  <text x="72" y="2006" fill="#1A1B2E" font-size="14" font-weight="500">Quick Generation (Shift):</text>
  <text x="72" y="2006" fill="#4A4B65" font-size="14" dx="200">Hold Shift, click to place start area, hover to preview end, click end to generate.</text>

  <!-- Source Links -->
  <text x="48" y="2056" fill="#8B8DA0" font-size="12">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhwe1n94b1x6" target="_blank">
    <text x="48" y="2074" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: Terrain Editing (Guide)</text>
  </a>

  <!-- Footer -->
  <text x="600" y="2100" fill="#8B8DA0" font-size="11" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>