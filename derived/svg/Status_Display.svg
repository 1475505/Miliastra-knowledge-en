<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 3000" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1200" height="3000" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>
  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">62-Status Display: Status Display Area Controls</text>

  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. Features of the Status Display Area</text>

  <g transform="translate(60, 164)">
    <rect width="1080" height="180" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="32" font-size="14" font-weight="bold" fill="#1A1B2E">Purpose</text>
    <text x="20" y="56" font-size="13" fill="#4A4B65">The Status Display Area can be configured in a UI layout. It monitors unit statuses</text>
    <text x="20" y="76" font-size="13" fill="#4A4B65">on entities and displays them in a custom style.</text>
    <text x="20" y="106" font-size="13" font-weight="bold" fill="#1A1B2E">Key Characteristics</text>
    <text x="20" y="130" font-size="13" fill="#4A4B65">- Information display only — cannot be interacted with</text>
    <text x="20" y="152" font-size="13" fill="#4A4B65">- Status items do not play additional animation effects when added or removed</text>
  </g>

  <g transform="translate(60, 372)">
    <rect width="1080" height="100" rx="14" fill="#E8EEFB"/>
    <rect x="0" y="0" width="4" height="100" rx="2" fill="#2D6BE4"/>
    <text x="24" y="28" font-size="13" font-weight="bold" fill="#1A1B2E">Status Items</text>
    <text x="24" y="52" font-size="13" fill="#4A4B65">Each status item can display buffs/debuffs, status icons, duration timers,</text>
    <text x="24" y="74" font-size="13" fill="#4A4B65">and stack counts. Items are dynamically added and removed based on unit status changes.</text>
  </g>

  <circle cx="80" cy="508" r="16" fill="#2D6BE4"/>
  <text x="80" y="509" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="509" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. Editing the Status Display Area</text>

  <g transform="translate(60, 536)">
    <rect width="1080" height="860" rx="14" fill="#FFFFFF" filter="url(#card)"/>

    <text x="20" y="30" font-size="15" font-weight="bold" fill="#1A1B2E">1. Adding the Status Display Area</text>
    <text x="20" y="56" font-size="13" fill="#4A4B65">In the UI Control Group Editing Window, add a UI control template — Status Display Area.</text>

    <text x="20" y="96" font-size="15" font-weight="bold" fill="#1A1B2E">2. Status Item Style Settings</text>
    <text x="20" y="122" font-size="13" fill="#4A4B65">Similar to Tab Controls and Single-Choice Viewport Controls, the style of status items</text>
    <text x="20" y="142" font-size="13" fill="#4A4B65">can be customized in the style settings.</text>
    <text x="20" y="166" font-size="13" fill="#4A4B65">Craftspeople can click [Detail Edit] to add any asset to the status item's Asset Group.</text>
    <text x="20" y="190" font-size="13" fill="#4A4B65">For example, add a UI animation that plays every time a new status item is added.</text>

    <text x="20" y="230" font-size="15" font-weight="bold" fill="#1A1B2E">3. Status Display Area Function Settings</text>

    <text x="30" y="258" font-size="13" fill="#1A1B2E" font-weight="bold">Initial Fill Point</text>
    <text x="150" y="258" font-size="13" fill="#4A4B65">Position when the first status item is added (e.g. Top-Left)</text>

    <text x="30" y="286" font-size="13" fill="#1A1B2E" font-weight="bold">Fill Direction</text>
    <text x="150" y="286" font-size="13" fill="#4A4B65">Direction status items are filled (Vertical or Horizontal)</text>

    <text x="30" y="314" font-size="13" fill="#1A1B2E" font-weight="bold">New Status Insertion Position</text>
    <text x="200" y="314" font-size="13" fill="#4A4B65">Start or End of the queue</text>

    <text x="30" y="342" font-size="13" fill="#1A1B2E" font-weight="bold">Alignment</text>
    <text x="150" y="342" font-size="13" fill="#4A4B65">Similar to text box alignment (top/bottom/left/right)</text>

    <text x="20" y="378" font-size="13" font-weight="bold" fill="#1A1B2E">Example (Layout Limit = Auto Wrap):</text>
    <text x="30" y="402" font-size="13" fill="#4A4B65">- Fill Point = Top-Left, Direction = Vertical, Insertion = Queue End</text>
    <text x="30" y="422" font-size="13" fill="#4A4B65">  &rarr; Items fill top to bottom</text>
    <text x="30" y="446" font-size="13" fill="#4A4B65">- Fill Point = Bottom-Left, Direction = Vertical, Insertion = Queue Start</text>
    <text x="30" y="466" font-size="13" fill="#4A4B65">  &rarr; Items fill bottom to top</text>

    <text x="20" y="506" font-size="15" font-weight="bold" fill="#1A1B2E">4. Notes — Layout Limit</text>
    <text x="20" y="532" font-size="13" fill="#4A4B65">Unlike the Message Queue, the Layout Limit parameter is affected by fill direction:</text>
    <text x="30" y="558" font-size="13" fill="#1A1B2E" font-weight="bold">Fixed Rows</text>
    <text x="130" y="558" font-size="13" fill="#4A4B65">Fill current column first, then wrap to new column</text>
    <text x="30" y="582" font-size="13" fill="#1A1B2E" font-weight="bold">Fixed Columns</text>
    <text x="160" y="582" font-size="13" fill="#4A4B65">Fill current row first, then wrap to new row</text>
  </g>

  <circle cx="80" cy="1432" r="16" fill="#2D6BE4"/>
  <text x="80" y="1433" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="1433" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. Steps to Display Status Items</text>

  <g transform="translate(60, 1460)">
    <rect width="1080" height="380" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="30" font-size="14" font-weight="bold" fill="#1A1B2E">Three Conditions Must Be Met Simultaneously</text>

    <text x="20" y="66" font-size="14" font-weight="bold" fill="#1A1B2E">1. Determine the Monitored Entity</text>
    <text x="20" y="90" font-size="13" fill="#4A4B65">In the Status Item Configuration under the Function tab, specify the entity to monitor.</text>

    <text x="20" y="130" font-size="14" font-weight="bold" fill="#1A1B2E">2. Associate a Unit Status</text>
    <text x="20" y="154" font-size="13" fill="#4A4B65">Click [Detail Edit] to open the interface, then click [Associate Unit Status]</text>
    <text x="20" y="174" font-size="13" fill="#4A4B65">to select the unit status to display.</text>

    <text x="20" y="214" font-size="14" font-weight="bold" fill="#1A1B2E">3. Add a Control Push Effect</text>
    <text x="20" y="238" font-size="13" fill="#4A4B65">For each unit status, add a "Status Display Area: Add Status" effect</text>
    <text x="20" y="258" font-size="13" fill="#4A4B65">in its configuration, and select the target control to push to.</text>
  </g>

  <g transform="translate(60, 1868)">
    <rect width="1080" height="130" rx="14" fill="#E8EEFB"/>
    <rect x="0" y="0" width="4" height="130" rx="2" fill="#2D6BE4"/>
    <text x="24" y="28" font-size="13" font-weight="bold" fill="#1A1B2E">Status Sorting &amp; Filtering</text>
    <text x="24" y="52" font-size="13" fill="#4A4B65">Status items can be sorted by priority or type. Filtering allows only specific</text>
    <text x="24" y="74" font-size="13" fill="#4A4B65">status categories (e.g. buffs only, debuffs only) to be displayed in the area.</text>
    <text x="24" y="96" font-size="13" fill="#4A4B65">Duration display shows remaining time for temporary status effects.</text>
  </g>

  <g transform="translate(60, 2026)">
    <rect width="1080" height="50" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="12" font-weight="bold" fill="#1A1B2E">Related Documentation:</text>
  </g>
  <a href="https://act.mihoyo.com/ys/ugc/tutorial/detail/mh4ve00q4j14">
    <text x="80" y="2106" font-size="12" fill="#2D6BE4" text-decoration="underline">Status Display Area Controls</text>
  </a>

  <text x="600" y="2160" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>
