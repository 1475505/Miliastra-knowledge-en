<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1920" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="1920" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">67-Floating Interaction Page Tab</text>

  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. Tab Overview</text>

  <g transform="translate(60, 164)">
    <rect width="1080" height="140" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="16" y="40" font-size="14" fill="#4A4B65">The Tab control allows players to switch between different content views within a Floating</text>
    <text x="16" y="64" font-size="14" fill="#4A4B65">Interaction Page. Each tab item can be linked to specific page containers, controlling which</text>
    <text x="16" y="88" font-size="14" fill="#4A4B65">containers and controls are shown or hidden when the tab is selected.</text>

    <rect x="16" y="108" width="1048" height="22" rx="6" fill="#E8EEFB"/>
    <rect x="16" y="108" width="4" height="22" rx="2" fill="#2D6BE4"/>
    <text x="28" y="124" font-size="11" fill="#4A4B65">Tab items support click feedback configuration, including opening tabs and toggling control visibility</text>
  </g>

  <circle cx="80" cy="340" r="16" fill="#2D6BE4"/>
  <text x="80" y="341" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="341" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. Tab Styles &amp; Settings</text>

  <g transform="translate(60, 368)">
    <rect width="520" height="340" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="80" height="26" rx="13" fill="#E8EEFB"/>
    <text x="56" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Styles</text>
    <text x="16" y="60" font-size="14" font-weight="bold" fill="#1A1B2E">Style Options</text>
    <text x="16" y="84" font-size="14" fill="#4A4B65">Available options are Preset Style and Custom.</text>
    <text x="16" y="108" font-size="14" fill="#4A4B65">Both styles require configuration of the</text>
    <text x="16" y="128" font-size="14" fill="#4A4B65">scroll direction: Horizontal or Vertical.</text>

    <text x="16" y="160" font-size="14" font-weight="bold" fill="#1A1B2E">Preset Styles</text>
    <text x="16" y="184" font-size="14" fill="#4A4B65">Different preset styles can be selected from</text>
    <text x="16" y="204" font-size="14" fill="#4A4B65">a variety of options. Some support customizing</text>
    <text x="16" y="224" font-size="14" fill="#4A4B65">icon, color, text, etc.</text>

    <text x="16" y="256" font-size="14" font-weight="bold" fill="#1A1B2E">Custom Styles</text>
    <text x="16" y="280" font-size="14" fill="#4A4B65">Supports adding styles to preconfigure</text>
    <text x="16" y="300" font-size="14" fill="#4A4B65">multiple tab item styles. Each style allows</text>
    <text x="16" y="320" font-size="14" fill="#4A4B65">configuring assets for Default, Hover,</text>
    <text x="16" y="340" font-size="14" fill="#4A4B65">Pressed, and Selected states.</text>
  </g>

  <g transform="translate(620, 368)">
    <rect width="520" height="340" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="110" height="26" rx="13" fill="#E8EEFB"/>
    <text x="71" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Tab Settings</text>
    <text x="16" y="60" font-size="14" font-weight="bold" fill="#1A1B2E">Configuration Parameters</text>

    <rect x="16" y="78" width="488" height="22" rx="6" fill="#F9F7F2"/>
    <text x="22" y="93" font-size="12" font-weight="bold" fill="#1A1B2E">Tab Item Size</text>
    <text x="170" y="93" font-size="12" fill="#4A4B65">General settings for each tab item</text>

    <rect x="16" y="106" width="488" height="22" rx="6" fill="#FFFFFF"/>
    <text x="22" y="121" font-size="12" font-weight="bold" fill="#1A1B2E">Spacing</text>
    <text x="170" y="121" font-size="12" fill="#4A4B65">Spacing between tab items</text>

    <rect x="16" y="134" width="488" height="22" rx="6" fill="#F9F7F2"/>
    <text x="22" y="149" font-size="12" font-weight="bold" fill="#1A1B2E">Padding</text>
    <text x="170" y="149" font-size="12" fill="#4A4B65">Margin settings for top, bottom, left, right sides</text>

    <rect x="16" y="162" width="488" height="22" rx="6" fill="#FFFFFF"/>
    <text x="22" y="177" font-size="12" font-weight="bold" fill="#1A1B2E">Center If Content Doesn't Fill</text>
    <text x="250" y="177" font-size="12" fill="#4A4B65">Auto-centers tab items when content is sparse</text>

    <rect x="16" y="196" width="488" height="52" rx="10" fill="#E8EEFB"/>
    <rect x="16" y="196" width="4" height="52" rx="2" fill="#2D6BE4"/>
    <text x="30" y="216" font-size="13" font-weight="bold" fill="#2D6BE4">Scroll Direction</text>
    <text x="30" y="236" font-size="11" fill="#4A4B65">Horizontal: tabs arranged left to right</text>
    <text x="30" y="250" font-size="11" fill="#4A4B65">Vertical: tabs arranged top to bottom</text>
  </g>

  <circle cx="80" cy="744" r="16" fill="#2D6BE4"/>
  <text x="80" y="745" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="745" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. Tab Item Configuration</text>

  <g transform="translate(60, 772)">
    <rect width="1080" height="220" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="0" y="16" width="1080" height="38" fill="#2D6BE4" rx="0"/>
    <text x="16" y="35" font-size="14" font-weight="bold" fill="#FFFFFF" dominant-baseline="middle">Setting</text>
    <text x="727" y="35" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Description</text>

    <rect x="0" y="54" width="1080" height="28" fill="#F9F7F2"/>
    <text x="16" y="73" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Tab Name</text>
    <text x="380" y="73" font-size="13" fill="#4A4B65" dominant-baseline="middle">Name displayed on the tab item</text>

    <rect x="0" y="82" width="1080" height="28" fill="#FFFFFF"/>
    <text x="16" y="101" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">ID</text>
    <text x="380" y="101" font-size="13" fill="#4A4B65" dominant-baseline="middle">Unique identifier for the tab item</text>

    <rect x="0" y="110" width="1080" height="28" fill="#F9F7F2"/>
    <text x="16" y="129" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Tab Style</text>
    <text x="380" y="129" font-size="13" fill="#4A4B65" dominant-baseline="middle">Select a style configured in Tab Style settings</text>

    <rect x="0" y="138" width="1080" height="28" fill="#FFFFFF"/>
    <text x="16" y="157" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Preview Selection State</text>
    <text x="380" y="157" font-size="13" fill="#4A4B65" dominant-baseline="middle">Show default display configuration in editing window</text>

    <rect x="0" y="166" width="1080" height="28" fill="#F9F7F2"/>
    <text x="16" y="185" font-size="13" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Return to Server Event</text>
    <text x="380" y="185" font-size="13" fill="#4A4B65" dominant-baseline="middle">Triggers Server Node Graph Event on click</text>
  </g>

  <g transform="translate(60, 1012)">
    <rect width="520" height="280" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="140" height="26" rx="13" fill="#E8EEFB"/>
    <text x="86" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Adding Tab Items</text>
    <text x="16" y="60" font-size="14" fill="#4A4B65">In the Edit Details interface, click the</text>
    <text x="16" y="80" font-size="14" fill="#4A4B65">plus sign (+) to add a new Tab Item.</text>
    <text x="16" y="104" font-size="14" fill="#4A4B65">Supports preconfiguring tab items, statically</text>
    <text x="16" y="124" font-size="14" fill="#4A4B65">linking associated tab items, and adjusting</text>
    <text x="16" y="144" font-size="14" fill="#4A4B65">displayed content through Node Graphs</text>
    <text x="16" y="164" font-size="14" fill="#4A4B65">during stage runtime.</text>

    <rect x="16" y="190" width="488" height="70" rx="10" fill="#E8EEFB"/>
    <rect x="16" y="190" width="4" height="70" rx="2" fill="#2D6BE4"/>
    <text x="30" y="210" font-size="13" font-weight="bold" fill="#2D6BE4">Node Graph Integration</text>
    <text x="30" y="230" font-size="11" fill="#4A4B65">Tabs and single-choice windows share similar features</text>
    <text x="30" y="246" font-size="11" fill="#4A4B65">and are collectively referred to as [List] when</text>
    <text x="30" y="262" font-size="11" fill="#4A4B65">referenced in Nodes or Output Parameters</text>
  </g>

  <g transform="translate(620, 1012)">
    <rect width="520" height="280" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="120" height="26" rx="13" fill="#E8EEFB"/>
    <text x="76" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">State Settings</text>

    <text x="16" y="64" font-size="14" font-weight="bold" fill="#1A1B2E">Container Status Settings</text>
    <text x="16" y="88" font-size="14" fill="#4A4B65">Supports adding page containers and</text>
    <text x="16" y="108" font-size="14" fill="#4A4B65">configuring whether each one is shown</text>
    <text x="16" y="128" font-size="14" fill="#4A4B65">or hidden when this tab is selected.</text>

    <text x="16" y="160" font-size="14" font-weight="bold" fill="#1A1B2E">Control Status Settings</text>
    <text x="16" y="184" font-size="14" fill="#4A4B65">Supports adding controls to page containers</text>
    <text x="16" y="204" font-size="14" fill="#4A4B65">and configuring whether each one is shown</text>
    <text x="16" y="224" font-size="14" fill="#4A4B65">or hidden when this tab is selected.</text>

    <rect x="16" y="244" width="488" height="22" rx="6" fill="#E8EEFB"/>
    <rect x="16" y="244" width="4" height="22" rx="2" fill="#2D6BE4"/>
    <text x="28" y="260" font-size="11" fill="#4A4B65">Formal variables can be linked to specified data or Player Custom Variables</text>
  </g>

  <circle cx="80" cy="1328" r="16" fill="#2D6BE4"/>
  <text x="80" y="1329" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IV</text>
  <text x="108" y="1329" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">IV. Interaction &amp; Controller Navigation</text>

  <g transform="translate(60, 1356)">
    <rect width="520" height="220" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="100" height="26" rx="13" fill="#E8EEFB"/>
    <text x="66" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Interaction</text>
    <text x="16" y="60" font-size="14" font-weight="bold" fill="#1A1B2E">Hotkey Interaction</text>
    <text x="16" y="84" font-size="14" fill="#4A4B65">When the corresponding hotkey is enabled,</text>
    <text x="16" y="104" font-size="14" fill="#4A4B65">the tab can be interacted with using the</text>
    <text x="16" y="124" font-size="14" fill="#4A4B65">configured hotkey. Interacting with the</text>
    <text x="16" y="144" font-size="14" fill="#4A4B65">tab triggers the configured sound effect.</text>

    <rect x="16" y="166" width="488" height="34" rx="10" fill="#E8EEFB"/>
    <rect x="16" y="166" width="4" height="34" rx="2" fill="#2D6BE4"/>
    <text x="30" y="190" font-size="11" fill="#4A4B65">When controller hotkeys are enabled, Controller Navigation cannot be triggered</text>
  </g>

  <g transform="translate(620, 1356)">
    <rect width="520" height="220" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="130" height="26" rx="13" fill="#E8EEFB"/>
    <text x="81" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Controller Nav</text>
    <text x="16" y="60" font-size="14" font-weight="bold" fill="#1A1B2E">Navigation Settings</text>
    <text x="16" y="84" font-size="14" fill="#4A4B65">Supports configuring navigation hint when</text>
    <text x="16" y="104" font-size="14" fill="#4A4B65">a tab button is focused with controller joystick.</text>
    <text x="16" y="128" font-size="14" fill="#4A4B65">Navigation Hint Target can be set to</text>
    <text x="16" y="148" font-size="14" fill="#4A4B65">Up, Down, Left, or Right.</text>
    <text x="16" y="172" font-size="14" fill="#4A4B65">By default, focus snaps to the nearest</text>
    <text x="16" y="192" font-size="14" fill="#4A4B65">control. Supports all configured containers.</text>
  </g>

  <text x="60" y="1624" font-size="12" fill="#8B8DA0">Related Documentation:</text>

  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhp5msi2uryk" target="_blank">
    <text x="60" y="1650" font-size="13" fill="#2D6BE4" text-decoration="underline">Floating Interaction Page Controls</text>
  </a>

  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhr3ngi2n74c" target="_blank">
    <text x="60" y="1676" font-size="13" fill="#2D6BE4" text-decoration="underline">Tab Component Guide</text>
  </a>

  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhs6ivixi684" target="_blank">
    <text x="60" y="1702" font-size="13" fill="#2D6BE4" text-decoration="underline">UI Controls</text>
  </a>

  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhkwucr8awfq" target="_blank">
    <text x="60" y="1728" font-size="13" fill="#2D6BE4" text-decoration="underline">Special Number Controls</text>
  </a>

  <text x="600" y="1790" font-size="11" fill="#8B8DA0" text-anchor="middle">Generated by AI based on official Miliastra Academy documentation. Version: Luminary</text>

</svg>