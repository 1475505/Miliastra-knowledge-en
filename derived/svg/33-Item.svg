<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 3200" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1200" height="3200" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>
  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">33-Item System</text>

  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. Definition &amp; Classification</text>

  <g transform="translate(60, 164)">
    <rect width="1080" height="200" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="15" font-weight="bold" fill="#1A1B2E">Definition</text>
    <text x="20" y="54" font-size="13" fill="#4A4B65">Items are virtual objects that players can obtain, use, or equip during gameplay. In Miliastra Wonderland,</text>
    <text x="20" y="74" font-size="13" fill="#4A4B65">items are categorized into multiple types and managed uniformly through the inventory.</text>
    <text x="20" y="104" font-size="15" font-weight="bold" fill="#1A1B2E">Item Classification</text>
    <text x="20" y="130" font-size="13" fill="#1A1B2E" font-weight="bold">Equipment</text>
    <text x="20" y="148" font-size="13" fill="#4A4B65">Items that can be equipped by characters to provide stat bonuses or special abilities</text>
    <text x="20" y="170" font-size="13" fill="#1A1B2E" font-weight="bold">Materials  |  Consumables  |  Very Special Items</text>
  </g>

  <circle cx="80" cy="400" r="16" fill="#2D6BE4"/>
  <text x="80" y="401" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="401" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. Creating Items</text>

  <g transform="translate(60, 428)">
    <rect width="1080" height="150" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="15" font-weight="bold" fill="#1A1B2E">Creation Process</text>
    <text x="20" y="54" font-size="13" fill="#4A4B65">1. Navigate to the Item tab in the editor</text>
    <text x="20" y="74" font-size="13" fill="#4A4B65">2. Click "New Item" button</text>
    <text x="20" y="94" font-size="13" fill="#4A4B65">3. Click Confirm in the pop-up to create a new item template</text>
    <text x="20" y="118" font-size="13" fill="#1A1B2E" font-weight="bold">Item Name</text>
    <text x="110" y="118" font-size="13" fill="#4A4B65">The name displayed in the interface during gameplay</text>
    <text x="20" y="138" font-size="13" fill="#1A1B2E" font-weight="bold">Configuration ID</text>
    <text x="135" y="138" font-size="13" fill="#4A4B65">The unique identifier used in Node Graphs</text>
  </g>

  <circle cx="80" cy="614" r="16" fill="#2D6BE4"/>
  <text x="80" y="615" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="615" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. Basic Settings</text>

  <g transform="translate(60, 642)">
    <rect width="520" height="400" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="100" height="26" rx="13" fill="#E8EEFB"/>
    <text x="66" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Display Info</text>
    <text x="16" y="60" font-size="13" fill="#1A1B2E" font-weight="bold">Rarity</text>
    <text x="80" y="60" font-size="13" fill="#4A4B65">Determines icon bg color: Gray, Green, Blue, Purple, Orange</text>
    <text x="16" y="84" font-size="13" fill="#1A1B2E" font-weight="bold">Stack Limit</text>
    <text x="105" y="84" font-size="13" fill="#4A4B65">Max items per inventory slot</text>
    <text x="16" y="108" font-size="13" fill="#1A1B2E" font-weight="bold">Item Icon</text>
    <text x="85" y="108" font-size="13" fill="#4A4B65">Icon displayed in the interface during gameplay</text>
    <text x="16" y="132" font-size="13" fill="#1A1B2E" font-weight="bold">Description</text>
    <text x="100" y="132" font-size="13" fill="#4A4B65">Item description shown during gameplay</text>
    <text x="16" y="160" font-size="13" fill="#1A1B2E" font-weight="bold">Associated Item Node Graph</text>
    <text x="16" y="180" font-size="13" fill="#4A4B65">When item enters inventory, the related Node Graph is</text>
    <text x="16" y="200" font-size="13" fill="#4A4B65">attached to the character unit</text>
    <text x="16" y="228" font-size="13" fill="#1A1B2E" font-weight="bold">Inventory Ownership Tab</text>
    <text x="16" y="248" font-size="13" fill="#4A4B65">Determines which tab the item sorts into in inventory</text>
    <text x="16" y="276" font-size="13" fill="#1A1B2E" font-weight="bold">Has Currency Value</text>
    <text x="16" y="296" font-size="13" fill="#4A4B65">Set "True" to relate currency value to item for shop module</text>
    <text x="16" y="318" font-size="13" fill="#4A4B65">transactions</text>
    <text x="16" y="342" font-size="13" fill="#1A1B2E" font-weight="bold">Display Currency Value</text>
    <text x="16" y="362" font-size="13" fill="#4A4B65">Show currency value in inventory</text>
  </g>

  <g transform="translate(620, 642)">
    <rect width="520" height="400" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="100" height="26" rx="13" fill="#E8EEFB"/>
    <text x="66" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Drop Settings</text>
    <text x="16" y="60" font-size="14" font-weight="bold" fill="#1A1B2E">Destruction Behavior (on defeat)</text>
    <text x="16" y="84" font-size="13" fill="#1A1B2E" font-weight="bold">Destruction Debris</text>
    <text x="130" y="84" font-size="13" fill="#4A4B65">Process when owner is defeated</text>
    <text x="16" y="108" font-size="13" fill="#1A1B2E" font-weight="bold">Loot</text>
    <text x="55" y="108" font-size="13" fill="#4A4B65">Items converted to loot entities in scene</text>
    <text x="16" y="132" font-size="13" fill="#1A1B2E" font-weight="bold">Destroy</text>
    <text x="75" y="132" font-size="13" fill="#4A4B65">Items are destroyed</text>
    <text x="16" y="156" font-size="13" fill="#1A1B2E" font-weight="bold">Save</text>
    <text x="60" y="156" font-size="13" fill="#4A4B65">Items saved in inventory (character only)</text>
    <text x="16" y="188" font-size="14" font-weight="bold" fill="#1A1B2E">Loot Drop Mechanics</text>
    <text x="16" y="212" font-size="13" fill="#1A1B2E" font-weight="bold">Shared Reward</text>
    <text x="120" y="212" font-size="13" fill="#4A4B65">All players share same loot; one pickup = gone</text>
    <text x="16" y="236" font-size="13" fill="#1A1B2E" font-weight="bold">Individualized Reward</text>
    <text x="145" y="236" font-size="13" fill="#4A4B65">Each player gets independent copy</text>
    <text x="16" y="264" font-size="14" font-weight="bold" fill="#1A1B2E">Corresponding Loot Appearance</text>
    <text x="16" y="286" font-size="13" fill="#4A4B65">Configure a loot prefab — a physical entity component.</text>
    <text x="16" y="306" font-size="13" fill="#4A4B65">When the virtual item is created in the scene, it will be</text>
    <text x="16" y="326" font-size="13" fill="#4A4B65">displayed using the corresponding loot model.</text>
  </g>

  <circle cx="80" cy="1078" r="16" fill="#2D6BE4"/>
  <text x="80" y="1079" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IV</text>
  <text x="108" y="1079" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">IV. Interaction Settings</text>

  <g transform="translate(60, 1106)">
    <rect width="1080" height="340" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="130" height="26" rx="13" fill="#E8EEFB"/>
    <text x="81" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Player Interaction</text>

    <text x="20" y="62" font-size="13" fill="#1A1B2E" font-weight="bold">Destructible</text>
    <text x="110" y="62" font-size="13" fill="#4A4B65">Players can destroy this item in inventory via interface</text>
    <text x="20" y="86" font-size="13" fill="#1A1B2E" font-weight="bold">Tradable</text>
    <text x="85" y="86" font-size="13" fill="#4A4B65">Item can be sold in the shop</text>
    <text x="20" y="110" font-size="13" fill="#1A1B2E" font-weight="bold">Usable</text>
    <text x="75" y="110" font-size="13" fill="#4A4B65">Players can use item through interface actions</text>
    <text x="20" y="134" font-size="13" fill="#1A1B2E" font-weight="bold">Allow Bulk Use</text>
    <text x="120" y="134" font-size="13" fill="#4A4B65">Multiple items can be used in a single operation</text>
    <text x="20" y="158" font-size="13" fill="#1A1B2E" font-weight="bold">Auto Use Upon Pickup</text>
    <text x="155" y="158" font-size="13" fill="#4A4B65">Item is automatically used upon acquisition</text>

    <text x="20" y="194" font-size="14" font-weight="bold" fill="#1A1B2E">Cooldown Settings</text>
    <text x="20" y="220" font-size="13" fill="#1A1B2E" font-weight="bold">Cooldown (s)</text>
    <text x="110" y="220" font-size="13" fill="#4A4B65">After using, item enters cooldown — cannot be used during this period</text>
    <text x="20" y="246" font-size="13" fill="#1A1B2E" font-weight="bold">Group Cooldown (s)</text>
    <text x="140" y="246" font-size="13" fill="#4A4B65">When item enters cooldown, all items in the Linked Cooldown Group</text>
    <text x="160" y="266" font-size="13" fill="#4A4B65">enter cooldown simultaneously with this duration</text>
    <text x="20" y="294" font-size="13" fill="#1A1B2E" font-weight="bold">Linked Cooldown Group</text>
    <text x="155" y="294" font-size="13" fill="#4A4B65">List of items that share the cooldown group</text>
  </g>

  <circle cx="80" cy="1482" r="16" fill="#2D6BE4"/>
  <text x="80" y="1483" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">V</text>
  <text x="108" y="1483" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">V. Inventory Integration</text>

  <g transform="translate(60, 1510)">
    <rect width="1080" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" font-weight="bold" fill="#1A1B2E">Inventory System</text>
    <text x="20" y="54" font-size="13" fill="#4A4B65">All items are managed uniformly through the inventory. Each item type is sorted into its designated</text>
    <text x="20" y="74" font-size="13" fill="#4A4B65">tab based on the "Inventory Ownership Tab" setting. Stack limit controls how many of the same item</text>
    <text x="20" y="94" font-size="13" fill="#4A4B65">can occupy a single slot. Items can enter inventory via loot, Node Graph triggers, or shop purchases.</text>
  </g>

  <g transform="translate(60, 1650)">
    <rect width="1080" height="82" rx="14" fill="#E8EEFB"/>
    <rect x="0" y="0" width="4" height="82" rx="2" fill="#2D6BE4"/>
    <text x="20" y="22" font-size="14" font-weight="bold" fill="#2D6BE4">Item Flow Overview</text>
    <text x="20" y="44" font-size="13" fill="#4A4B65">Create Item Template → Configure Basic/Drop/Interaction Settings → Item enters Inventory →</text>
    <text x="20" y="64" font-size="13" fill="#4A4B65">Player can Use, Equip, Trade, or Destroy → Node Graph triggers and cooldowns apply</text>
  </g>

  <text x="60" y="1790" font-size="12" fill="#8B8DA0">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh1wwh99g1re" target="_blank">
    <text x="60" y="1816" font-size="13" fill="#2D6BE4" text-decoration="underline">Item → https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh1wwh99g1re</text>
  </a>
  <text x="600" y="1850" font-size="11" fill="#8B8DA0" text-anchor="middle">Generated by AI based on official Miliastra Academy documentation. Version: Luminary</text>
</svg>