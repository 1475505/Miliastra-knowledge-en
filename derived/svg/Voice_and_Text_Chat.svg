<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 2610" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1200" height="2610" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="72" font-size="34" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Voice and Text Chat</text>

  <text x="48" y="148" font-size="18" font-weight="700" fill="#2D6BE4">I. Voice and Text Chat Features</text>

  <g transform="translate(48, 168)">
    <rect width="1104" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="24" y="28" font-size="15" font-weight="500" fill="#1A1B2E">Purpose</text>
    <text x="24" y="52" font-size="14" fill="#4A4B65">Gameplay-oriented chat features supporting multiple exclusive chat channels for different players or factions.</text>
    <text x="24" y="76" font-size="14" fill="#4A4B65">Same player can send messages in different chat channels simultaneously.</text>
    <text x="24" y="100" font-size="14" fill="#4A4B65">Supports real-time management of player chat channel permissions through node graphs.</text>
  </g>

  <text x="48" y="328" font-size="18" font-weight="700" fill="#2D6BE4">II. Voice and Text Chat Function Management</text>

  <g transform="translate(48, 348)">
    <rect width="1104" height="240" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="20" y="14" width="130" height="26" rx="13" fill="#E8EEFB"/>
    <text x="85" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Global Settings</text>
    <text x="24" y="56" font-size="14" fill="#4A4B65">Access via [System Menu] → [Manage Voice &amp; Text Chat]</text>

    <rect x="16" y="74" width="1072" height="44" rx="14" fill="#2D6BE4"/>
    <rect x="16" y="106" width="1072" height="12" fill="#2D6BE4"/>
    <text x="200" y="98" font-size="15" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Setting</text>
    <text x="700" y="98" font-size="15" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Description</text>

    <text x="24" y="142" font-size="14" fill="#1A1B2E" font-weight="500">Enable Real-Time Voice Chat?</text>
    <text x="310" y="142" font-size="14" fill="#4A4B65">Determines whether voice chat function is enabled</text>
    <line x1="24" y1="156" x2="1080" y2="156" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="176" font-size="14" fill="#1A1B2E" font-weight="500">Enable Team Voice Chat In-Game</text>
    <text x="330" y="176" font-size="14" fill="#4A4B65">Whether team voice chat is allowed during the game</text>
    <line x1="24" y1="190" x2="1080" y2="190" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="210" font-size="14" fill="#1A1B2E" font-weight="500">Enable Text Chat?</text>
    <text x="200" y="210" font-size="14" fill="#4A4B65">Determines whether text chat function is enabled</text>
    <line x1="24" y1="224" x2="1080" y2="224" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="244" font-size="14" fill="#1A1B2E" font-weight="500">Enable Team Text Chat In-Game</text>
    <text x="320" y="244" font-size="14" fill="#4A4B65">Whether team text chat is allowed during the game</text>
  </g>

  <text x="48" y="628" font-size="18" font-weight="700" fill="#2D6BE4">III. Chat Channel Editing</text>

  <g transform="translate(48, 648)">
    <rect width="1104" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="20" y="14" width="150" height="26" rx="13" fill="#E8EEFB"/>
    <text x="95" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Adding Channels</text>
    <text x="24" y="60" font-size="14" fill="#4A4B65">Click [Add Channel] button to add new chat channels.</text>
    <text x="24" y="84" font-size="14" fill="#4A4B65">Default global channel applies to all players — its config and name can be modified, but it cannot be deleted.</text>
    <text x="24" y="108" font-size="14" fill="#4A4B65">Press the channel icon to rename or delete the channel.</text>
  </g>

  <g transform="translate(48, 788)">
    <rect width="1104" height="500" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="20" y="14" width="140" height="26" rx="13" fill="#E8EEFB"/>
    <text x="90" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Channel Parameters</text>

    <rect x="16" y="54" width="1072" height="44" rx="14" fill="#2D6BE4"/>
    <rect x="16" y="86" width="1072" height="12" fill="#2D6BE4"/>
    <text x="160" y="78" font-size="15" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Parameter</text>
    <text x="600" y="78" font-size="15" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Description</text>

    <text x="24" y="122" font-size="14" fill="#1A1B2E" font-weight="500">Index</text>
    <text x="200" y="122" font-size="14" fill="#4A4B65">Unique identifier corresponding to the chat channel</text>
    <line x1="24" y1="136" x2="1080" y2="136" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="156" font-size="14" fill="#1A1B2E" font-weight="500">Text Chat Initially Active</text>
    <text x="270" y="156" font-size="14" fill="#4A4B65">Whether text chat is enabled/disabled when stage initially begins</text>
    <line x1="24" y1="170" x2="1080" y2="170" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="190" font-size="14" fill="#1A1B2E" font-weight="500">Channel Application Method</text>
    <text x="290" y="190" font-size="14" fill="#4A4B65">Apply by Player or by Faction</text>
    <line x1="24" y1="204" x2="1080" y2="204" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="224" font-size="14" fill="#1A1B2E" font-weight="500">Apply to Player/Team</text>
    <text x="230" y="224" font-size="14" fill="#4A4B65">Initial coverage of the channel in the level, multiple selections allowed</text>
    <line x1="24" y1="238" x2="1080" y2="238" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="258" font-size="14" fill="#1A1B2E" font-weight="500">Display Priority</text>
    <text x="200" y="258" font-size="14" fill="#4A4B65">Display order in chat system. Higher numbers appear at the top</text>
    <line x1="24" y1="272" x2="1080" y2="272" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="292" font-size="14" fill="#1A1B2E" font-weight="500">Select Icon</text>
    <text x="200" y="292" font-size="14" fill="#4A4B65">Controls the icon and color of the channel in the chat system</text>
    <line x1="24" y1="306" x2="1080" y2="306" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="326" font-size="14" fill="#1A1B2E" font-weight="500">Voice Chat Initially Active</text>
    <text x="260" y="326" font-size="14" fill="#4A4B65">Whether voice chat is enabled/disabled when stage initially begins</text>
    <line x1="24" y1="340" x2="1080" y2="340" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="360" font-size="14" fill="#1A1B2E" font-weight="500">Limit Voice Chat Range</text>
    <text x="240" y="360" font-size="14" fill="#4A4B65">Whether voice chat is restricted to a specific range</text>
    <line x1="24" y1="374" x2="1080" y2="374" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="394" font-size="14" fill="#1A1B2E" font-weight="500">Listening Radius (m)</text>
    <text x="220" y="394" font-size="14" fill="#4A4B65">Voice chat listening radius, ranging from 1 to 100 meters</text>
  </g>

  <g transform="translate(48, 1308)">
    <rect width="1104" height="68" rx="14" fill="#FFF3E0"/>
    <rect x="0" y="0" width="4" height="68" rx="2" fill="#E8840C"/>
    <text x="20" y="22" font-size="14" font-weight="bold" fill="#1A1B2E">Faction-Based Channel Application</text>
    <text x="20" y="46" font-size="13" fill="#4A4B65">When the channel is applied by faction, chat channel membership can only be adjusted by switching player factions.</text>
  </g>

  <g transform="translate(48, 1396)">
    <rect width="1104" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="20" y="14" width="130" height="26" rx="13" fill="#E8EEFB"/>
    <text x="85" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Quick Messages</text>
    <text x="24" y="60" font-size="14" fill="#4A4B65">Control quick chat messages for corresponding channels within the level.</text>
    <text x="24" y="84" font-size="14" fill="#4A4B65">Click "+" to add quick text, click the delete icon to remove text. At least 1 default text must be kept.</text>
    <text x="24" y="108" font-size="14" fill="#4A4B65">Quick messages are displayed as selectable options in the in-game chat interface.</text>
  </g>

  <text x="48" y="1556" font-size="18" font-weight="700" fill="#2D6BE4">IV. Node Graph Control</text>

  <g transform="translate(48, 1576)">
    <rect width="1104" height="300" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="20" y="14" width="200" height="26" rx="13" fill="#E8EEFB"/>
    <text x="120" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Text Chat Channel Nodes</text>

    <text x="24" y="60" font-size="14" fill="#1A1B2E" font-weight="500">Set Chat Channel Switch</text>
    <text x="250" y="60" font-size="14" fill="#4A4B65">Enable or disable a specific chat channel</text>
    <line x1="24" y1="74" x2="1080" y2="74" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="94" font-size="14" fill="#1A1B2E" font-weight="500">Set Player's Current Channel</text>
    <text x="300" y="94" font-size="14" fill="#4A4B65">Assign a player to a specific chat channel</text>
    <line x1="24" y1="108" x2="1080" y2="108" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="128" font-size="14" fill="#1A1B2E" font-weight="500">Modify Player Text Chat Permissions</text>
    <text x="370" y="128" font-size="14" fill="#4A4B65">Grant or revoke text chat permissions for a player</text>
    <line x1="24" y1="142" x2="1080" y2="142" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="162" font-size="14" fill="#1A1B2E" font-weight="500">Modify Player Channel Permission</text>
    <text x="350" y="162" font-size="14" fill="#4A4B65">Adjust channel-level permissions for a player</text>
  </g>

  <g transform="translate(48, 1896)">
    <rect width="1104" height="220" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="20" y="14" width="180" height="26" rx="13" fill="#E8EEFB"/>
    <text x="110" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Voice Chat Nodes</text>

    <text x="24" y="60" font-size="14" fill="#1A1B2E" font-weight="500">Set Player Voice Chat Range</text>
    <text x="300" y="60" font-size="14" fill="#4A4B65">Adjust the voice chat listening radius for a player</text>
    <line x1="24" y1="74" x2="1080" y2="74" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="94" font-size="14" fill="#1A1B2E" font-weight="500">Set Player Voice Chat Permissions</text>
    <text x="340" y="94" font-size="14" fill="#4A4B65">Grant or revoke voice chat permissions</text>
    <line x1="24" y1="108" x2="1080" y2="108" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="128" font-size="14" fill="#1A1B2E" font-weight="500">Check if Player is in Voice Chat</text>
    <text x="330" y="128" font-size="14" fill="#4A4B65">Query current voice chat status</text>
  </g>

  <g transform="translate(48, 2136)">
    <rect width="1104" height="68" rx="14" fill="#FDE8E6"/>
    <rect x="0" y="0" width="4" height="68" rx="2" fill="#D93025"/>
    <text x="20" y="22" font-size="14" font-weight="bold" fill="#D93025">Voice Chat Node Limitation</text>
    <text x="20" y="46" font-size="13" fill="#D93025">The "Check if player is in voice chat" node only functions in multiplayer sessions (Multiplayer Test Play or Multiplayer Play). It will not execute in single-player modes.</text>
  </g>

  <text x="48" y="2244" font-size="18" font-weight="700" fill="#2D6BE4">V. Additional Notes</text>

  <g transform="translate(48, 2264)">
    <rect width="1104" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="20" y="14" width="180" height="26" rx="13" fill="#FFF3E0"/>
    <text x="110" y="27" font-size="12" font-weight="bold" fill="#E8840C" text-anchor="middle" dominant-baseline="middle">Voice Chat Button Position</text>
    <text x="24" y="60" font-size="14" fill="#4A4B65">Voice chat buttons are included in the interface layout. Ensure your custom interface controls</text>
    <text x="24" y="80" font-size="14" fill="#4A4B65">do not obscure the voice chat buttons on PC and mobile platforms.</text>
    <text x="24" y="104" font-size="14" fill="#4A4B65">Adjust the position of interface controls appropriately to ensure normal use of this function.</text>
  </g>

  <g transform="translate(48, 2408)">
    <rect width="1104" height="82" rx="14" fill="#E8EEFB"/>
    <rect x="0" y="0" width="4" height="82" rx="2" fill="#2D6BE4"/>
    <text x="20" y="22" font-size="14" font-weight="bold" fill="#2D6BE4">Voice and Text Chat Workflow</text>
    <text x="20" y="44" font-size="13" fill="#4A4B65">Enable Voice/Text Chat Globally → Add Chat Channels → Configure Parameters (Index, Priority, Range) →</text>
    <text x="20" y="64" font-size="13" fill="#4A4B65">Set Quick Messages → Manage Permissions via Node Graph at Runtime</text>
  </g>

  <text x="48" y="2534" font-size="12" fill="#8B8DA0">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhaneb9qnvay" target="_blank">
    <text x="48" y="2556" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Voice and Text Chat</text>
  </a>
  <text x="600" y="2584" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>