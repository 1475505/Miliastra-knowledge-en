<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1350" width="1200" height="1350">
<defs>
<linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2D6BE4"/>
    <stop offset="100%" stop-color="#4A3F6B"/>
</linearGradient>
<filter id="card" xmlns="http://www.w3.org/2000/svg">
    <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
</filter>
<filter id="elevated" xmlns="http://www.w3.org/2000/svg">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
</filter>
</defs>

<rect width="1200" height="1350" fill="#F9F7F2"/>

<rect x="0" y="0" width="1200" height="6" fill="url(#topGrad)"/>

<rect x="40" y="30" width="1120" height="90" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
<rect x="40" y="30" width="4" height="90" rx="2" fill="#2D6BE4"/>
<text x="72" y="74" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#1A1B2E">Custom Button Controls</text>
<text x="72" y="100" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#8B8DA0">Fully customizable button UI control with preset and custom style options</text>

<text x="72" y="170" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#2D6BE4">I. Features</text>

<rect x="40" y="190" width="1120" height="180" rx="14" fill="#FFFFFF" filter="url(#card)"/>
<text x="72" y="222" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Custom Buttons are interactive buttons whose icon and displayed text can be fully configured. They support:</text>
<text x="72" y="248" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Preset Styles</tspan> — Choose from a variety of preset button styles with customizable icons, colors, and text</text>
<text x="72" y="272" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Custom Styles</tspan> — Freely configure assets for Default, Hover, and Pressed states</text>
<text x="72" y="296" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Key Types</tspan> — Supports Skill, Interactive Event, and Item key types when using custom style</text>
<text x="72" y="320" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Click Response Area</tspan> — Configurable click area with match button size or custom size options</text>
<text x="72" y="344" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Sound Effects</tspan> — Play configured sound effects on button trigger</text>

<rect x="40" y="388" width="1120" height="50" rx="14" fill="#E8EEFB"/>
<rect x="40" y="388" width="4" height="50" rx="2" fill="#2D6BE4"/>
<text x="72" y="418" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">When Style is set to Preset Style, the Key Type is locked to Interactive Event and cannot be edited.</text>

<text x="72" y="478" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#2D6BE4">II. Visual States</text>

<rect x="40" y="498" width="1120" height="210" rx="14" fill="#FFFFFF" filter="url(#card)"/>
<text x="72" y="530" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#1A1B2E">Default</text>
<text x="72" y="550" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Non-interactive state — the button at rest with no cursor or touch interaction.</text>

<rect x="72" y="565" width="160" height="36" rx="8" fill="#2D6BE4"/>
<text x="152" y="588" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Default Button</text>

<text x="72" y="630" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#1A1B2E">Hover</text>
<text x="72" y="650" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Cursor hovers over the button — indicated by an outline, brighter color, or subtle size increase.</text>

<rect x="72" y="665" width="160" height="36" rx="8" fill="#3B7BEE"/>
<rect x="72" y="665" width="160" height="36" rx="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
<text x="152" y="688" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Hover Button</text>

<rect x="420" y="530" width="160" height="36" rx="8" fill="#1B4FC0"/>
<text x="500" y="553" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Pressed Button</text>
<text x="420" y="530" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#1A1B2E">Pressed</text>
<text x="420" y="630" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#1A1B2E">Pressed</text>
<text x="420" y="650" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Button is being pressed during mouse or touch input — color darkens and size decreases slightly.</text>

<text x="72" y="750" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#2D6BE4">III. Recommended Configuration</text>

<rect x="40" y="770" width="1120" height="180" rx="14" fill="#FFFFFF" filter="url(#card)"/>
<text x="72" y="802" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#1A1B2E">Level 1</text>
<text x="72" y="822" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Core actions (upgrade equipment, enhance characters) — Height: 48–52</text>
<text x="72" y="852" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#1A1B2E">Level 2</text>
<text x="72" y="872" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Secondary actions (view details) — Height: 32–40</text>
<text x="72" y="902" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#1A1B2E">Level 3</text>
<text x="72" y="922" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Informational or hint buttons — Recommended 32 × 32</text>

<rect x="40" y="968" width="1120" height="50" rx="14" fill="#E8EEFB"/>
<rect x="40" y="968" width="4" height="50" rx="2" fill="#2D6BE4"/>
<text x="72" y="998" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">Custom Buttons cannot respond to multiple mappings using the same key simultaneously. Response priority follows creation order.</text>

<text x="72" y="1060" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#2D6BE4">IV. Node Graph Integration</text>

<rect x="40" y="1080" width="1120" height="100" rx="14" fill="#FFFFFF" filter="url(#card)"/>
<text x="72" y="1112" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• Custom Buttons can be dynamically added or removed during stage runtime through Node Graph logic</text>
<text x="72" y="1136" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• Click and hover events can be captured and routed to Server Node Graph Events</text>
<text x="72" y="1160" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• State changes affect response priority dynamically during runtime</text>

<text x="72" y="1230" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#8B8DA0">Related Documentation:</text>
<text x="72" y="1250" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#2D6BE4" text-decoration="underline">Custom Button Controls</text>
<text x="290" y="1250" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#8B8DA0">https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh72uu0inf60</text>

<line x1="40" y1="1285" x2="1160" y2="1285" stroke="#E0E0E0" stroke-width="1"/>
<text x="600" y="1310" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="11" fill="#8B8DA0" text-anchor="middle">Generated by AI based on official Miliastra Academy documentation. Version: Luminary</text>
</svg>
