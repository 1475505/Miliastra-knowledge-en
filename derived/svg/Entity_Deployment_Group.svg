<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1790" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1200" height="1790" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="72" font-size="34" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Entity Deployment Group</text>

  <text x="48" y="148" font-size="18" font-weight="700" fill="#2D6BE4">I. Functions of Entity Deployment Groups</text>

  <g transform="translate(48, 168)">
    <rect width="1104" height="160" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="24" y="28" font-size="15" font-weight="500" fill="#1A1B2E">Purpose</text>
    <text x="24" y="52" font-size="14" fill="#4A4B65">Quickly manage multiple entities; batch create and batch destroy entities through related nodes.</text>
    <text x="24" y="76" font-size="14" fill="#4A4B65">Use Entity Deployment Groups to quickly locate all units belonging to that group.</text>
    <text x="24" y="104" font-size="14" fill="#1A1B2E" font-weight="500">Supported Entity Types:</text>
    <text x="24" y="128" font-size="14" fill="#4A4B65">Creations, Characters, Objects (all unit types with physical entities in the scene), and Terrains.</text>
    <text x="24" y="152" font-size="14" fill="#4A4B65">The same entity can belong to multiple Entity Deployment Groups.</text>
  </g>

  <text x="48" y="368" font-size="18" font-weight="700" fill="#2D6BE4">II. Global Definition of Entity Deployment Groups</text>

  <g transform="translate(48, 388)">
    <rect width="1104" height="200" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="24" y="28" font-size="15" font-weight="500" fill="#1A1B2E">Setup Steps</text>

    <circle cx="36" cy="58" r="14" fill="#2D6BE4"/>
    <text x="36" y="59" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">1</text>
    <text x="60" y="59" font-size="14" fill="#4A4B65" dominant-baseline="middle">In the System menu, click [Manage Entity Deployment Groups] to open the management tool</text>

    <circle cx="36" cy="94" r="14" fill="#2D6BE4"/>
    <text x="36" y="95" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">2</text>
    <text x="60" y="95" font-size="14" fill="#4A4B65" dominant-baseline="middle">Left side: Management bar — browse existing groups or click [Add Entity Deployment Groups]</text>

    <circle cx="36" cy="130" r="14" fill="#2D6BE4"/>
    <text x="36" y="131" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">3</text>
    <text x="60" y="131" font-size="14" fill="#4A4B65" dominant-baseline="middle">Right side: Details panel — configure settings and view content list of selected group</text>

    <circle cx="36" cy="166" r="14" fill="#1B4FC0"/>
    <text x="36" y="167" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">4</text>
    <text x="60" y="167" font-size="14" fill="#4A4B65" dominant-baseline="middle">Create new tabs and categorize Entity Deployment Groups by tabs for organization</text>
  </g>

  <text x="48" y="628" font-size="18" font-weight="700" fill="#2D6BE4">III. Managing Entity Deployment Groups</text>
  <text x="380" y="628" font-size="13" fill="#8B8DA0">Adding entities and configuring details</text>

  <g transform="translate(48, 648)">
    <rect width="1104" height="280" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="20" y="14" width="170" height="26" rx="13" fill="#E8EEFB"/>
    <text x="105" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Adding Entities (3 Methods)</text>

    <text x="24" y="62" font-size="14" fill="#1A1B2E" font-weight="500">Method 1: Terrain Editing Tab</text>
    <text x="24" y="82" font-size="14" fill="#4A4B65">Right-click on the terrain → Add to Entity Deployment Group from pop-up menu</text>

    <text x="24" y="110" font-size="14" fill="#1A1B2E" font-weight="500">Method 2: Entity Placement Tab</text>
    <text x="24" y="130" font-size="14" fill="#4A4B65">Right-click an entity (Shift+left-click to select multiple) → Add to Entity Deployment Group</text>

    <text x="24" y="158" font-size="14" fill="#1A1B2E" font-weight="500">Method 3: Group Details Interface</text>
    <text x="24" y="178" font-size="14" fill="#4A4B65">Click [Select in Scene] → Enter selection mode → Box select or click entities to add</text>

    <line x1="24" y1="200" x2="1080" y2="200" stroke="#E8E4DA" stroke-width="1"/>

    <rect x="20" y="212" width="140" height="26" rx="13" fill="#E8EEFB"/>
    <text x="90" y="225" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Content List</text>
    <text x="24" y="258" font-size="14" fill="#4A4B65">Lists all units in the group. Right-click on a unit to remove it from the group or swap it to a different group.</text>
  </g>

  <g transform="translate(48, 948)">
    <rect width="1104" height="300" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="20" y="14" width="160" height="26" rx="13" fill="#E8EEFB"/>
    <text x="100" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Details Panel Settings</text>

    <rect x="16" y="54" width="1072" height="44" rx="14" fill="#2D6BE4"/>
    <rect x="16" y="86" width="1072" height="12" fill="#2D6BE4"/>
    <text x="160" y="78" font-size="15" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Setting</text>
    <text x="600" y="78" font-size="15" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Description</text>

    <text x="24" y="122" font-size="14" fill="#1A1B2E" font-weight="500">Group Name</text>
    <text x="200" y="122" font-size="14" fill="#4A4B65">Customizable name to distinguish between different Entity Deployment Groups</text>
    <line x1="24" y1="136" x2="1080" y2="136" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="156" font-size="14" fill="#1A1B2E" font-weight="500">Index</text>
    <text x="200" y="156" font-size="14" fill="#4A4B65">Unique identifier used for identification when modifying group data in a Node Graph</text>
    <line x1="24" y1="170" x2="1080" y2="170" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="190" font-size="14" fill="#1A1B2E" font-weight="500">Initial Create</text>
    <text x="200" y="190" font-size="14" fill="#4A4B65">Determines whether terrain and static objects in this group are created alongside the stage</text>
    <line x1="24" y1="204" x2="1080" y2="204" stroke="#E8E4DA" stroke-width="1"/>

    <text x="24" y="224" font-size="14" fill="#1A1B2E" font-weight="500">Content List</text>
    <text x="200" y="224" font-size="14" fill="#4A4B65">Lists all units contained within the group; right-click to remove or swap entities</text>
  </g>

  <g transform="translate(48, 1268)">
    <rect width="1104" height="120" rx="14" fill="#FFF3E0"/>
    <rect x="0" y="0" width="4" height="120" rx="2" fill="#E8840C"/>
    <text x="20" y="22" font-size="14" font-weight="bold" fill="#1A1B2E">Initial Create Logic</text>
    <text x="20" y="46" font-size="13" fill="#4A4B65">If either an Entity Group or an individual entity has Initial Create enabled, that entity will be created at stage start.</text>
    <text x="20" y="68" font-size="13" fill="#4A4B65">Example: Entities A and B are in Group G. A has Initial Create ON, B does not.</text>
    <text x="20" y="88" font-size="13" fill="#4A4B65">If Group G has Initial Create ON → both A and B are created. If Group G has it OFF → only A is created.</text>
  </g>

  <text x="48" y="1428" font-size="18" font-weight="700" fill="#2D6BE4">IV. Node Graph Management</text>

  <g transform="translate(48, 1448)">
    <rect width="530" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="280" height="26" rx="13" fill="#E8EEFB"/>
    <text x="156" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Get Active Deployment Group List</text>
    <text x="20" y="60" font-size="14" fill="#4A4B65">Retrieve the list of currently active</text>
    <text x="20" y="80" font-size="14" fill="#4A4B65">Entity Deployment Groups in the stage.</text>
  </g>

  <g transform="translate(622, 1448)">
    <rect width="530" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="260" height="26" rx="13" fill="#E8EEFB"/>
    <text x="146" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Activate/Disable Deployment Group</text>
    <text x="20" y="60" font-size="14" fill="#4A4B65">Toggle an Entity Deployment Group</text>
    <text x="20" y="80" font-size="14" fill="#4A4B65">between active and disabled states.</text>
  </g>

  <g transform="translate(48, 1592)">
    <rect width="1104" height="82" rx="14" fill="#E8EEFB"/>
    <rect x="0" y="0" width="4" height="82" rx="2" fill="#2D6BE4"/>
    <text x="20" y="22" font-size="14" font-weight="bold" fill="#2D6BE4">Entity Deployment Group Workflow</text>
    <text x="20" y="44" font-size="13" fill="#4A4B65">Define Groups Globally → Add Entities (right-click or Select in Scene) → Configure Initial Create →</text>
    <text x="20" y="64" font-size="13" fill="#4A4B65">Batch Create/Destroy via Node Graph at Runtime</text>
  </g>

  <text x="48" y="1718" font-size="12" fill="#8B8DA0">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhqmrlr6h58e" target="_blank">
    <text x="48" y="1740" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Entity Deployment Group</text>
  </a>
  <text x="600" y="1768" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>