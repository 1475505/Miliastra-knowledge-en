<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1480" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="1480" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="48" y="32" width="1104" height="96" rx="14" fill="#fff" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="96" rx="2" fill="#2D6BE4"/>
  <text x="72" y="76" fill="#1A1B2E" font-size="30" font-weight="bold">Floating Interaction Page</text>
  <text x="72" y="106" fill="#4A4B65" font-size="16">Single-Choice Window</text>
  <rect x="340" y="92" width="90" height="22" rx="11" fill="#FFF3E0"/>
  <text x="350" y="107" fill="#E65100" font-size="11" font-weight="500">Sub-section</text>

  <!-- I. Overview -->
  <text x="48" y="166" fill="#2D6BE4" font-size="18" font-weight="700">I. Single-Choice Window Overview</text>

  <rect x="48" y="182" width="1104" height="60" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="210" fill="#4A4B65" font-size="14">Single-Choice Windows provide a list-based selection mechanism within a Floating Interaction Page.</text>
  <text x="72" y="232" fill="#4A4B65" font-size="14">Tabs and single-choice windows have similar features; in Nodes or Output Parameters, both are collectively referred to as [List].</text>

  <!-- II. Styles -->
  <text x="48" y="278" fill="#2D6BE4" font-size="18" font-weight="700">II. Single-Choice Window Styles</text>

  <rect x="48" y="294" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="322" fill="#1A1B2E" font-size="14" font-weight="500">Single-choice windows support only Custom Style.</text>
  <text x="72" y="344" fill="#4A4B65" font-size="14">Styles can be added to preconfigure multiple list item styles.</text>
  <text x="72" y="366" fill="#4A4B65" font-size="14">Each style supports freely configuring the assets for the Default, Hover, Pressed, and Selected states.</text>

  <!-- III. Functions -->
  <text x="48" y="410" fill="#2D6BE4" font-size="18" font-weight="700">III. Single-Choice Window Functions</text>

  <!-- List Settings -->
  <rect x="48" y="426" width="1104" height="196" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="456" r="14" fill="#2D6BE4"/>
  <text x="80" y="461" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">a</text>
  <text x="106" y="460" fill="#1A1B2E" font-size="14" font-weight="500">List Settings</text>

  <rect x="106" y="472" width="150" height="26" rx="6" fill="#E8EEFB"/>
  <text x="116" y="490" fill="#2D6BE4" font-size="12" font-weight="500">Scroll Direction</text>
  <text x="270" y="490" fill="#4A4B65" font-size="13">Horizontal or Vertical.</text>

  <rect x="106" y="504" width="140" height="26" rx="6" fill="#E8EEFB"/>
  <text x="116" y="522" fill="#2D6BE4" font-size="12" font-weight="500">List Item Size</text>
  <text x="260" y="522" fill="#4A4B65" font-size="13">General settings for each list item.</text>

  <rect x="106" y="536" width="160" height="26" rx="6" fill="#E8EEFB"/>
  <text x="116" y="554" fill="#2D6BE4" font-size="12" font-weight="500">List Item Spacing</text>
  <text x="280" y="554" fill="#4A4B65" font-size="13">Spacing between list items.</text>

  <rect x="500" y="536" width="80" height="26" rx="6" fill="#E8EEFB"/>
  <text x="510" y="554" fill="#2D6BE4" font-size="12" font-weight="500">Padding</text>
  <text x="594" y="554" fill="#4A4B65" font-size="13">Margin settings for top, bottom, left, right sides relative to the border.</text>

  <rect x="106" y="568" width="110" height="26" rx="6" fill="#E8EEFB"/>
  <text x="116" y="586" fill="#2D6BE4" font-size="12" font-weight="500">Center Align</text>
  <text x="230" y="586" fill="#4A4B65" font-size="13">If enabled, the list items will automatically be centered as a whole.</text>

  <rect x="500" y="568" width="150" height="26" rx="6" fill="#E8EEFB"/>
  <text x="510" y="586" fill="#2D6BE4" font-size="12" font-weight="500">Layout Constraint</text>
  <text x="664" y="586" fill="#4A4B65" font-size="13">Auto Wrap or Fixed Rows.</text>

  <!-- List Item Configuration -->
  <rect x="48" y="634" width="1104" height="220" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="664" r="14" fill="#2D6BE4"/>
  <text x="80" y="669" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">b</text>
  <text x="106" y="668" fill="#1A1B2E" font-size="14" font-weight="500">List Item Configuration</text>
  <text x="106" y="692" fill="#4A4B65" font-size="13">Supports preconfiguring list items, statically linking associated list items, and adjusting displayed content through Node Graphs.</text>
  <text x="106" y="712" fill="#4A4B65" font-size="13">List items support click feedback configuration, including opening tabs and toggling control visibility.</text>

  <!-- Add List Items -->
  <text x="106" y="738" fill="#1A1B2E" font-size="14" font-weight="500">Add List Items:</text>
  <text x="240" y="738" fill="#4A4B65" font-size="13">Click the plus sign in Edit Details to add a new List Item.</text>
  <rect x="106" y="748" width="120" height="22" rx="6" fill="#E8EEFB"/>
  <text x="116" y="763" fill="#2D6BE4" font-size="11" font-weight="500">List Item Name</text>
  <text x="236" y="763" fill="#4A4B65" font-size="12">Name of the List Item</text>
  <rect x="420" y="748" width="30" height="22" rx="6" fill="#E8EEFB"/>
  <text x="430" y="763" fill="#2D6BE4" font-size="11" font-weight="500">ID</text>
  <text x="460" y="763" fill="#4A4B65" font-size="12">Unique Identifier for the List Item</text>

  <!-- Basic Settings -->
  <text x="106" y="792" fill="#1A1B2E" font-size="14" font-weight="500">Basic Settings:</text>
  <rect x="240" y="780" width="120" height="22" rx="6" fill="#E8EEFB"/>
  <text x="250" y="795" fill="#2D6BE4" font-size="11" font-weight="500">List Item Name</text>
  <rect x="370" y="780" width="110" height="22" rx="6" fill="#E8EEFB"/>
  <text x="380" y="795" fill="#2D6BE4" font-size="11" font-weight="500">List Item Style</text>
  <rect x="490" y="780" width="170" height="22" rx="6" fill="#E8EEFB"/>
  <text x="500" y="795" fill="#2D6BE4" font-size="11" font-weight="500">Preview Selection State</text>
  <rect x="670" y="780" width="180" height="22" rx="6" fill="#E8EEFB"/>
  <text x="680" y="795" fill="#2D6BE4" font-size="11" font-weight="500">Return to Server Event</text>
  <text x="106" y="820" fill="#4A4B65" font-size="12">List Item Style selects from the previous layer. Preview shows default display. Return to Server Event triggers [When Floating Interaction Page is Triggered].</text>

  <!-- Sub-settings cards -->
  <rect x="48" y="866" width="352" height="100" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="896" r="14" fill="#2D6BE4"/>
  <text x="80" y="901" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">c</text>
  <text x="106" y="900" fill="#1A1B2E" font-size="14" font-weight="500">Formal Variable Config</text>
  <text x="72" y="924" fill="#4A4B65" font-size="13">Link formal variables to specified data</text>
  <text x="72" y="942" fill="#4A4B65" font-size="13">or Player Custom Variables. Assets</text>
  <text x="72" y="960" fill="#4A4B65" font-size="13">referencing formal variables use real-time data.</text>

  <rect x="424" y="866" width="352" height="100" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="456" cy="896" r="14" fill="#2D6BE4"/>
  <text x="456" y="901" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">d</text>
  <text x="482" y="900" fill="#1A1B2E" font-size="14" font-weight="500">Container Status Settings</text>
  <text x="448" y="924" fill="#4A4B65" font-size="13">Add page containers and configure</text>
  <text x="448" y="942" fill="#4A4B65" font-size="13">whether each is shown or hidden.</text>
  <text x="448" y="960" fill="#4A4B65" font-size="13">Applied when this list item is selected.</text>

  <rect x="800" y="866" width="352" height="100" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="832" cy="896" r="14" fill="#2D6BE4"/>
  <text x="832" y="901" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">e</text>
  <text x="858" y="900" fill="#1A1B2E" font-size="14" font-weight="500">Control Status Settings</text>
  <text x="824" y="924" fill="#4A4B65" font-size="13">Add controls to page containers and</text>
  <text x="824" y="942" fill="#4A4B65" font-size="13">configure show/hide for each one.</text>
  <text x="824" y="960" fill="#4A4B65" font-size="13">Applied when this list item is selected.</text>

  <!-- IV. Interaction Settings -->
  <text x="48" y="1002" fill="#2D6BE4" font-size="18" font-weight="700">IV. Interaction Settings</text>

  <rect x="48" y="1018" width="1104" height="48" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1048" fill="#4A4B65" font-size="14">Interacting with this single-choice window triggers the configured sound effect.</text>

  <!-- V. Controller Navigation -->
  <text x="48" y="1102" fill="#2D6BE4" font-size="18" font-weight="700">V. Controller Navigation</text>

  <rect x="48" y="1118" width="1104" height="220" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1146" fill="#4A4B65" font-size="14">When the controller joystick hovers over a button, you can configure a navigation hint.</text>

  <rect x="72" y="1158" width="360" height="26" rx="6" fill="#E8EEFB"/>
  <text x="82" y="1176" fill="#2D6BE4" font-size="12" font-weight="500">Selectable via Controller Joystick Navigation</text>
  <text x="446" y="1176" fill="#4A4B65" font-size="13">Enable to display hints on focus.</text>

  <rect x="72" y="1190" width="240" height="26" rx="6" fill="#E8EEFB"/>
  <text x="82" y="1208" fill="#2D6BE4" font-size="12" font-weight="500">Controller Selection Behavior</text>
  <text x="326" y="1208" fill="#4A4B65" font-size="13">Select on focus change or after pressing Confirm.</text>

  <rect x="72" y="1222" width="260" height="26" rx="6" fill="#E8EEFB"/>
  <text x="82" y="1240" fill="#2D6BE4" font-size="12" font-weight="500">Controller Navigation Hint Style</text>
  <text x="346" y="1240" fill="#4A4B65" font-size="13">Select a preset style.</text>

  <rect x="72" y="1254" width="200" height="26" rx="6" fill="#E8EEFB"/>
  <text x="82" y="1272" fill="#2D6BE4" font-size="12" font-weight="500">Navigation Hint Target</text>
  <text x="286" y="1272" fill="#4A4B65" font-size="13">Up, Down, Left, or Right direction.</text>

  <rect x="72" y="1286" width="220" height="26" rx="6" fill="#E8EEFB"/>
  <text x="82" y="1304" fill="#2D6BE4" font-size="12" font-weight="500">Navigation Hint Offset</text>
  <text x="306" y="1304" fill="#4A4B65" font-size="13">Configure X/Y offset values.</text>

  <!-- Tip -->
  <rect x="48" y="1350" width="1104" height="56" rx="6" fill="#E8EEFB"/>
  <rect x="48" y="1350" width="4" height="56" rx="2" fill="#2D6BE4"/>
  <text x="68" y="1374" fill="#4A4B65" font-size="13">Left/Right/Up/Down: When controller focus moves from this control in the selected direction, it will prioritize snapping to the configured target.</text>
  <text x="68" y="1394" fill="#4A4B65" font-size="13">By default, focus snaps to the nearest control. Supports selecting controls from all configured containers.</text>

  <!-- Related Documentation -->
  <text x="48" y="1430" fill="#8B8DA0" font-size="12">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh2u2e9o3jn6" target="_blank">
    <text x="48" y="1446" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: Floating Interaction Page Controls</text>
  </a>

  <text x="600" y="1466" fill="#8B8DA0" font-size="11" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>