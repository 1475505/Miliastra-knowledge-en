<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 2054">
<defs>
  <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2D6BE4"/>
    <stop offset="100%" stop-color="#4A3F6B"/>
  </linearGradient>
  <filter id="card">
    <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
  </filter>
  <filter id="elevated">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
  </filter>
</defs>
<style>
  text { font-family: 'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif; }
</style>

<!-- Page Background -->
<rect width="1200" height="2054" fill="#F9F7F2"/>

<!-- Top Color Bar -->
<rect width="1200" height="6" fill="url(#topGrad)"/>

<!-- Title Card -->
<rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
<rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
<text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold">Interactive Button</text>
<text x="430" y="82" fill="#4A4B65" font-size="16">Player interaction triggers via clicks or external device inputs</text>

<!-- I. Interactive Button Functions -->
<text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Interactive Button Functions</text>

<rect x="48" y="162" width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="190" fill="#4A4B65" font-size="14">During stage runtime, clicks or external device inputs can trigger UI control interactions.</text>
<text x="72" y="214" fill="#4A4B65" font-size="14">Supports player interaction. When selecting "Interactive Event," sends a When UI Control Group Is Triggered event to the node graph after the interaction.</text>
<text x="72" y="240" fill="#4A4B65" font-size="14">This event is sent only to the node graph of the player who performed the interaction.</text>

<!-- II. Editing Interactive Buttons -->
<text x="48" y="298" fill="#2D6BE4" font-size="18" font-weight="700">II. Editing Interactive Buttons</text>

<!-- Key Mapping Cards -->
<rect x="48" y="312" width="540" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="340" r="14" fill="#2D6BE4"/>
<text x="76" y="345" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">1</text>
<text x="100" y="345" fill="#1A1B2E" font-size="16" font-weight="500">Key Mapping - Keyboard and Mouse</text>
<text x="72" y="372" fill="#4A4B65" font-size="14">Choose a numeric key for input. The selected key</text>
<text x="72" y="394" fill="#4A4B65" font-size="14">will be displayed below the button in the edit window.</text>

<rect x="612" y="312" width="540" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="640" cy="340" r="14" fill="#2D6BE4"/>
<text x="640" y="345" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">2</text>
<text x="664" y="345" fill="#1A1B2E" font-size="16" font-weight="500">Key Mapping - Gamepad</text>
<text x="636" y="372" fill="#4A4B65" font-size="14">Configure the gamepad button mapping</text>
<text x="636" y="394" fill="#4A4B65" font-size="14">for console and controller input support.</text>

<!-- Size Card -->
<rect x="48" y="424" width="540" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="452" r="14" fill="#2D6BE4"/>
<text x="76" y="457" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">3</text>
<text x="100" y="457" fill="#1A1B2E" font-size="16" font-weight="500">Size</text>
<text x="72" y="484" fill="#4A4B65" font-size="14">Modify the size of interactive buttons.</text>
<text x="72" y="506" fill="#1A1B2E" font-size="14" font-weight="500">Large: 64 x 64  |  Small: 40.96 x 40.96</text>

<!-- Type Card -->
<rect x="612" y="424" width="540" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="640" cy="452" r="14" fill="#2D6BE4"/>
<text x="640" y="457" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">4</text>
<text x="664" y="457" fill="#1A1B2E" font-size="16" font-weight="500">Type</text>
<text x="636" y="484" fill="#4A4B65" font-size="14">Configure the button type which determines</text>
<text x="636" y="506" fill="#4A4B65" font-size="14">its visual style and behavior pattern.</text>

<!-- Button Skill Card -->
<rect x="48" y="536" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="564" r="14" fill="#2D6BE4"/>
<text x="76" y="569" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">5</text>
<text x="100" y="569" fill="#1A1B2E" font-size="16" font-weight="500">Button Skill</text>
<text x="260" y="569" fill="#4A4B65" font-size="14">Specify a skill. The corresponding icon and function details can be edited in the character skill editor.</text>
<text x="72" y="600" fill="#4A4B65" font-size="14">The skill determines the button's behavior, cooldown, and resource costs during gameplay.</text>

<!-- Interactive Event Card -->
<rect x="48" y="628" width="540" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="656" r="14" fill="#2D6BE4"/>
<text x="76" y="661" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">6</text>
<text x="100" y="661" fill="#1A1B2E" font-size="16" font-weight="500">Interactive Event</text>
<text x="72" y="688" fill="#4A4B65" font-size="14">Sends triggers to the node graph when</text>
<text x="72" y="700" fill="#4A4B65" font-size="14">the player interacts with the button.</text>

<!-- Skill Icon Card -->
<rect x="612" y="628" width="540" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="640" cy="656" r="14" fill="#2D6BE4"/>
<text x="640" y="661" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">7</text>
<text x="664" y="661" fill="#1A1B2E" font-size="16" font-weight="500">Skill Icon</text>
<text x="636" y="688" fill="#4A4B65" font-size="14">Configure the button's display graphics.</text>
<text x="636" y="700" fill="#4A4B65" font-size="14">Shown in real-time in the edit window.</text>

<!-- Button CD Card -->
<rect x="48" y="720" width="1104" height="60" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="750" r="14" fill="#2D6BE4"/>
<text x="76" y="755" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">8</text>
<text x="100" y="755" fill="#1A1B2E" font-size="16" font-weight="500">Button CD</text>
<text x="240" y="755" fill="#4A4B65" font-size="14">Once a skill is used, wait for its configured cooldown to expire before it can be used again. During this time, the skill button will be grayed out.</text>

<!-- Button Usage Limit Card -->
<rect x="48" y="792" width="1104" height="200" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="820" r="14" fill="#2D6BE4"/>
<text x="76" y="825" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">9</text>
<text x="100" y="825" fill="#1A1B2E" font-size="16" font-weight="500">Button Usage Limit</text>
<text x="310" y="825" fill="#4A4B65" font-size="14">If enabled, activates the configuration and functionality for displaying the usage count.</text>

<text x="72" y="854" fill="#1A1B2E" font-size="14" font-weight="500">Configuration Details:</text>

<rect x="72" y="866" width="16" height="16" rx="8" fill="#2D6BE4"/>
<text x="80" y="878" fill="#fff" font-size="10" text-anchor="middle" font-weight="500">1</text>
<text x="96" y="878" fill="#4A4B65" font-size="14">Different usage limits can be configured for each player, and these limits can only read the custom variables assigned to that player.</text>

<rect x="72" y="890" width="16" height="16" rx="8" fill="#2D6BE4"/>
<text x="80" y="902" fill="#fff" font-size="10" text-anchor="middle" font-weight="500">2</text>
<text x="96" y="902" fill="#4A4B65" font-size="14">The default count you configure will be displayed on the button in the edit window.</text>

<rect x="72" y="914" width="16" height="16" rx="8" fill="#2D6BE4"/>
<text x="80" y="926" fill="#fff" font-size="10" text-anchor="middle" font-weight="500">3</text>
<text x="96" y="926" fill="#4A4B65" font-size="14">To adjust the number of uses, modify the player's custom variable in the node graph.</text>

<rect x="72" y="938" width="16" height="16" rx="8" fill="#1B4FC0"/>
<text x="80" y="950" fill="#fff" font-size="10" text-anchor="middle" font-weight="500">4</text>
<text x="96" y="950" fill="#4A4B65" font-size="14">When this custom variable changes, the button's displayed usage count updates automatically.</text>

<text x="72" y="978" fill="#1A1B2E" font-size="14" font-weight="500">Available only when the usage limit is enabled.</text>

<!-- Hide When No Usages Left Card -->
<rect x="48" y="1004" width="540" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="1032" r="14" fill="#2D6BE4"/>
<text x="76" y="1037" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">10</text>
<text x="100" y="1037" fill="#1A1B2E" font-size="16" font-weight="500">Hide When No Usages Left</text>
<text x="72" y="1064" fill="#4A4B65" font-size="14">Enable this to hide the button when the</text>
<text x="72" y="1078" fill="#4A4B65" font-size="14">configured custom variable reaches 0.</text>

<!-- Use Items Card -->
<rect x="612" y="1004" width="540" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="640" cy="1032" r="14" fill="#2D6BE4"/>
<text x="640" y="1037" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">11</text>
<text x="664" y="1037" fill="#1A1B2E" font-size="16" font-weight="500">Use Items</text>
<text x="636" y="1064" fill="#4A4B65" font-size="14">Configure item usage behavior for the</text>
<text x="636" y="1078" fill="#4A4B65" font-size="14">interactive button control.</text>

<!-- Select Variable Card -->
<rect x="48" y="1096" width="540" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="1124" r="14" fill="#2D6BE4"/>
<text x="76" y="1129" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">12</text>
<text x="100" y="1129" fill="#1A1B2E" font-size="16" font-weight="500">Select Variable</text>
<text x="72" y="1156" fill="#4A4B65" font-size="14">Choose variables associated with the</text>
<text x="72" y="1170" fill="#4A4B65" font-size="14">player's own entity for data binding.</text>

<!-- Behavior When No Items Card -->
<rect x="612" y="1096" width="540" height="120" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="640" cy="1124" r="14" fill="#2D6BE4"/>
<text x="640" y="1129" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">13</text>
<text x="664" y="1129" fill="#1A1B2E" font-size="16" font-weight="500">Behavior When No Items</text>
<text x="636" y="1156" fill="#4A4B65" font-size="14">Three behavior types when items are unavailable:</text>

<rect x="636" y="1168" width="130" height="22" rx="11" fill="#E8EEFB"/>
<text x="701" y="1183" fill="#2D6BE4" font-size="11" text-anchor="middle">Icon Grayed Out</text>
<rect x="776" y="1168" width="150" height="22" rx="11" fill="#FFF3E0"/>
<text x="851" y="1183" fill="#D93025" font-size="11" text-anchor="middle">Do Not Show Icon</text>
<rect x="936" y="1168" width="110" height="22" rx="11" fill="#FDE8E6"/>
<text x="991" y="1183" fill="#D93025" font-size="11" text-anchor="middle">Hide Button</text>

<!-- III. Managing Interactive Buttons Through Node Graphs -->
<text x="48" y="1256" fill="#2D6BE4" font-size="18" font-weight="700">III. Managing Interactive Buttons Through Node Graphs</text>

<rect x="48" y="1270" width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="1298" fill="#1A1B2E" font-size="16" font-weight="500">When UI Control Group Is Triggered</text>
<text x="72" y="1324" fill="#4A4B65" font-size="14">During stage runtime, when a player interacts with a button UI control group, it triggers the</text>
<text x="72" y="1346" fill="#4A4B65" font-size="14">"When UI Control Group Is Triggered" event in the node graph. This event is sent only to the node graph of the player who performed the interaction.</text>

<!-- Parameter Summary Table -->
<rect x="48" y="1386" width="1104" height="44" rx="14" fill="#2D6BE4"/>
<rect x="48" y="1416" width="1104" height="14" fill="#2D6BE4"/>
