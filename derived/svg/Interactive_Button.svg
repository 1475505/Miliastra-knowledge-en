<text x="200" y="1490" fill="#1A1B2E" font-size="13" text-anchor="middle" font-weight="500">Key Mapping (Gamepad)</text>
<text x="600" y="1490" fill="#4A4B65" font-size="13" text-anchor="middle">Gamepad button mapping</text>
<text x="980" y="1490" fill="#4A4B65" font-size="13" text-anchor="middle">Console/controller support</text>

<rect x="48" y="1502" width="1104" height="36" fill="#fff"/>
<line x1="48" y1="1538" x2="1152" y2="1538" stroke="#E8E4DA" stroke-width="1"/>
<text x="200" y="1526" fill="#1A1B2E" font-size="13" text-anchor="middle" font-weight="500">Size</text>
<text x="600" y="1526" fill="#4A4B65" font-size="13" text-anchor="middle">Large 64x64 or Small 40.96x40.96</text>
<text x="980" y="1526" fill="#4A4B65" font-size="13" text-anchor="middle">Two preset sizes</text>

<rect x="48" y="1538" width="1104" height="36" fill="#F4F1EA"/>
<line x1="48" y1="1574" x2="1152" y2="1574" stroke="#E8E4DA" stroke-width="1"/>
<text x="200" y="1562" fill="#1A1B2E" font-size="13" text-anchor="middle" font-weight="500">Type</text>
<text x="600" y="1562" fill="#4A4B65" font-size="13" text-anchor="middle">Button type determines style and behavior</text>
<text x="980" y="1562" fill="#4A4B65" font-size="13" text-anchor="middle">Multiple types available</text>

<rect x="48" y="1574" width="1104" height="36" fill="#fff"/>
<line x1="48" y1="1610" x2="1152" y2="1610" stroke="#E8E4DA" stroke-width="1"/>
<text x="200" y="1598" fill="#1A1B2E" font-size="13" text-anchor="middle" font-weight="500">Button Skill</text>
<text x="600" y="1598" fill="#4A4B65" font-size="13" text-anchor="middle">Links to a skill for icon and function</text>
<text x="980" y="1598" fill="#4A4B65" font-size="13" text-anchor="middle">Edit in skill editor</text>

<rect x="48" y="1610" width="1104" height="36" fill="#F4F1EA"/>
<line x1="48" y1="1646" x2="1152" y2="1646" stroke="#E8E4DA" stroke-width="1"/>
<text x="200" y="1634" fill="#1A1B2E" font-size="13" text-anchor="middle" font-weight="500">Interactive Event</text>
<text x="600" y="1634" fill="#4A4B65" font-size="13" text-anchor="middle">Sends trigger to node graph on interaction</text>
<text x="980" y="1634" fill="#4A4B65" font-size="13" text-anchor="middle">Player-specific event</text>

<rect x="48" y="1646" width="1104" height="36" fill="#fff"/>
<line x1="48" y1="1682" x2="1152" y2="1682" stroke="#E8E4DA" stroke-width="1"/>
<text x="200" y="1670" fill="#1A1B2E" font-size="13" text-anchor="middle" font-weight="500">Skill Icon</text>
<text x="600" y="1670" fill="#4A4B65" font-size="13" text-anchor="middle">Display graphics for the button</text>
<text x="980" y="1670" fill="#4A4B65" font-size="13" text-anchor="middle">Real-time preview</text>

<rect x="48" y="1682" width="1104" height="36" fill="#F4F1EA"/>
<line x1="48" y1="1718" x2="1152" y2="1718" stroke="#E8E4DA" stroke-width="1"/>
<text x="200" y="1706" fill="#1A1B2E" font-size="13" text-anchor="middle" font-weight="500">Button CD</text>
<text x="600" y="1706" fill="#4A4B65" font-size="13" text-anchor="middle">Cooldown period, button grayed out</text>
<text x="980" y="1706" fill="#4A4B65" font-size="13" text-anchor="middle">Configured per skill</text>

<rect x="48" y="1718" width="1104" height="36" fill="#fff"/>
<line x1="48" y1="1754" x2="1152" y2="1754" stroke="#E8E4DA" stroke-width="1"/>
<text x="200" y="1742" fill="#1A1B2E" font-size="13" text-anchor="middle" font-weight="500">Button Usage Limit</text>
<text x="600" y="1742" fill="#4A4B65" font-size="13" text-anchor="middle">Per-player usage count via custom variables</text>
<text x="980" y="1742" fill="#4A4B65" font-size="13" text-anchor="middle">Auto-updates on change</text>

<rect x="48" y="1754" width="1104" height="36" fill="#F4F1EA"/>
<line x1="48" y1="1790" x2="1152" y2="1790" stroke="#E8E4DA" stroke-width="1"/>
<text x="200" y="1778" fill="#1A1B2E" font-size="13" text-anchor="middle" font-weight="500">Hide When No Usages</text>
<text x="600" y="1778" fill="#4A4B65" font-size="13" text-anchor="middle">Hide button when variable reaches 0</text>
<text x="980" y="1778" fill="#4A4B65" font-size="13" text-anchor="middle">Toggle on/off</text>

<rect x="48" y="1790" width="1104" height="36" fill="#fff"/>
<line x1="48" y1="1826" x2="1152" y2="1826" stroke="#E8E4DA" stroke-width="1"/>
<text x="200" y="1814" fill="#1A1B2E" font-size="13" text-anchor="middle" font-weight="500">Use Items</text>
<text x="600" y="1814" fill="#4A4B65" font-size="13" text-anchor="middle">Configure item usage behavior</text>
<text x="980" y="1814" fill="#4A4B65" font-size="13" text-anchor="middle">Item-based interaction</text>

<rect x="48" y="1826" width="1104" height="36" fill="#F4F1EA"/>
<line x1="48" y1="1862" x2="1152" y2="1862" stroke="#E8E4DA" stroke-width="1"/>
<text x="200" y="1850" fill="#1A1B2E" font-size="13" text-anchor="middle" font-weight="500">Select Variable</text>
<text x="600" y="1850" fill="#4A4B65" font-size="13" text-anchor="middle">Variables from player's own entity</text>
<text x="980" y="1850" fill="#4A4B65" font-size="13" text-anchor="middle">Data binding</text>

<rect x="48" y="1862" width="1104" height="36" rx="0" fill="#fff"/>
<rect x="48" y="1884" width="1104" height="14" rx="14" fill="#fff"/>
<text x="200" y="1886" fill="#1A1B2E" font-size="13" text-anchor="middle" font-weight="500">No Items Behavior</text>
<text x="600" y="1886" fill="#4A4B65" font-size="13" text-anchor="middle">Grayed Out / Do Not Show / Hide Button</text>
<text x="980" y="1886" fill="#4A4B65" font-size="13" text-anchor="middle">Three behavior options</text>

<!-- Tip Box -->
<rect x="48" y="1914" width="1104" height="60" rx="10" fill="#E8EEFB"/>
<rect x="48" y="1914" width="4" height="60" rx="2" fill="#2D6BE4"/>
<text x="72" y="1940" fill="#4A4B65" font-size="14">Tip: The "When UI Control Group Is Triggered" event is sent only to the interacting player's node graph. Use this to create</text>
<text x="72" y="1962" fill="#4A4B65" font-size="14">player-specific responses. For usage limits, modify custom variables in the node graph to dynamically adjust remaining uses.</text>

