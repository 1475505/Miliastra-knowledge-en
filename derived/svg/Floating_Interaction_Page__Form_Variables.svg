<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1020" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="1020" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="48" y="32" width="1104" height="96" rx="14" fill="#fff" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="96" rx="2" fill="#2D6BE4"/>
  <text x="72" y="76" fill="#1A1B2E" font-size="30" font-weight="bold">Floating Interaction Page</text>
  <text x="72" y="106" fill="#4A4B65" font-size="16">Form Variables</text>
  <rect x="250" y="92" width="90" height="22" rx="11" fill="#FFF3E0"/>
  <text x="260" y="107" fill="#E65100" font-size="11" font-weight="500">Sub-section</text>

  <!-- I. Overview -->
  <text x="48" y="166" fill="#2D6BE4" font-size="18" font-weight="700">I. Form Variable Overview</text>

  <rect x="48" y="182" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="210" fill="#4A4B65" font-size="14">Each Floating Interaction Page supports configuring a set of formal variables.</text>
  <text x="72" y="232" fill="#4A4B65" font-size="14">If a corresponding formal variable is referenced in the Asset Library, the value configured in the current Floating Interaction Page will be used.</text>
  <text x="72" y="254" fill="#1A1B2E" font-size="14" font-weight="500">For formal variable mapping, ensure that the data types match.</text>

  <!-- II. Formal Variable Management -->
  <text x="48" y="298" fill="#2D6BE4" font-size="18" font-weight="700">II. Formal Variable Management</text>

  <rect x="48" y="314" width="1104" height="60" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="342" fill="#4A4B65" font-size="14">Formal Variable Management is configured in the Functions tab of the Floating Interaction Page settings.</text>
  <text x="72" y="364" fill="#4A4B65" font-size="14">This allows each Floating Interaction Page instance to supply different data to the same underlying asset templates.</text>

  <!-- III. Usage in Tab Items -->
  <text x="48" y="410" fill="#2D6BE4" font-size="18" font-weight="700">III. Formal Variables in Tab Items</text>

  <rect x="48" y="426" width="1104" height="120" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="456" r="14" fill="#2D6BE4"/>
  <text x="80" y="461" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">1</text>
  <text x="106" y="460" fill="#1A1B2E" font-size="14" font-weight="500">Formal Variable Configuration (Tab)</text>

  <text x="106" y="486" fill="#4A4B65" font-size="14">Link formal variables to specified data or Player Custom Variables.</text>
  <text x="106" y="508" fill="#4A4B65" font-size="14">If any assets in this tab item reference formal variables, they will use the real-time data of the corresponding configured custom variables.</text>
  <text x="106" y="530" fill="#4A4B65" font-size="14">This enables dynamic content per tab without duplicating asset configurations.</text>

  <!-- IV. Usage in Single-Choice Window List Items -->
  <text x="48" y="582" fill="#2D6BE4" font-size="18" font-weight="700">IV. Formal Variables in Single-Choice Window List Items</text>

  <rect x="48" y="598" width="1104" height="120" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="628" r="14" fill="#2D6BE4"/>
  <text x="80" y="633" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">2</text>
  <text x="106" y="632" fill="#1A1B2E" font-size="14" font-weight="500">Formal Variable Configuration (Single-Choice Window)</text>

  <text x="106" y="658" fill="#4A4B65" font-size="14">Link formal variables to specified data or Player Custom Variables.</text>
  <text x="106" y="680" fill="#4A4B65" font-size="14">If any assets in this list item reference formal variables, they will use the real-time data of the corresponding configured custom variables.</text>
  <text x="106" y="702" fill="#4A4B65" font-size="14">This works identically to Tab Item formal variable configuration.</text>

  <!-- V. Data Flow -->
  <text x="48" y="758" fill="#2D6BE4" font-size="18" font-weight="700">V. Data Flow Summary</text>

  <!-- Flow diagram as step cards -->
  <rect x="48" y="774" width="240" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="804" r="14" fill="#2D6BE4"/>
  <text x="80" y="809" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">1</text>
  <text x="106" y="800" fill="#1A1B2E" font-size="13" font-weight="500">Asset Library</text>
  <text x="72" y="820" fill="#4A4B65" font-size="12">References formal variables</text>
  <text x="72" y="838" fill="#4A4B65" font-size="12">in asset templates</text>

  <text x="300" y="814" fill="#8B8DA0" font-size="20">--></text>

  <rect x="340" y="774" width="240" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="372" cy="804" r="14" fill="#2D6BE4"/>
  <text x="372" y="809" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">2</text>
  <text x="398" y="800" fill="#1A1B2E" font-size="13" font-weight="500">Formal Variable Config</text>
  <text x="364" y="820" fill="#4A4B65" font-size="12">Map to Player Custom</text>
  <text x="364" y="838" fill="#4A4B65" font-size="12">Variables or static data</text>

  <text x="592" y="814" fill="#8B8DA0" font-size="20">--></text>

  <rect x="632" y="774" width="240" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="664" cy="804" r="14" fill="#2D6BE4"/>
  <text x="664" y="809" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">3</text>
  <text x="690" y="800" fill="#1A1B2E" font-size="13" font-weight="500">Runtime Resolution</text>
  <text x="656" y="820" fill="#4A4B65" font-size="12">Assets use real-time data</text>
  <text x="656" y="838" fill="#4A4B65" font-size="12">from mapped variables</text>

  <text x="884" y="814" fill="#8B8DA0" font-size="20">--></text>

  <rect x="924" y="774" width="228" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="956" cy="804" r="14" fill="#1B4FC0"/>
  <text x="956" y="809" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">4</text>
  <text x="982" y="800" fill="#1A1B2E" font-size="13" font-weight="500">Display</text>
  <text x="948" y="820" fill="#4A4B65" font-size="12">Dynamic content rendered</text>
  <text x="948" y="838" fill="#4A4B65" font-size="12">in the Floating Interaction Page</text>

  <!-- Tip -->
  <rect x="48" y="870" width="1104" height="60" rx="6" fill="#E8EEFB"/>
  <rect x="48" y="870" width="4" height="60" rx="2" fill="#2D6BE4"/>
  <text x="68" y="894" fill="#4A4B65" font-size="13">Formal variables are configured per Floating Interaction Page instance. This means the same asset template can display different data</text>
  <text x="68" y="914" fill="#4A4B65" font-size="13">depending on which Floating Interaction Page references it. Always ensure data types match between the formal variable and its mapped value.</text>

  <!-- Warning -->
  <rect x="48" y="942" width="1104" height="36" rx="6" fill="#FDE8E6"/>
  <rect x="48" y="942" width="4" height="36" rx="2" fill="#D93025"/>
  <text x="68" y="965" fill="#D93025" font-size="13">Data type mismatch between formal variables and their mapped values will cause incorrect or missing data display.</text>

  <!-- Related Documentation -->
  <text x="48" y="1000" fill="#8B8DA0" font-size="12">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh2u2e9o3jn6" target="_blank">
    <text x="48" y="1016" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: Floating Interaction Page Controls</text>
  </a>

  <text x="600" y="1036" fill="#8B8DA0" font-size="11" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>