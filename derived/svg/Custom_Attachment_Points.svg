<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1580">
<defs>
<linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#2D6BE4"/>
<stop offset="100%" stop-color="#4A3F6B"/>
</linearGradient>
<filter id="card">
<feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
</filter>
<filter id="elevated">
<feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
</filter>
</defs>
<rect width="1200" height="1580" fill="#F9F7F2"/>
<rect width="1200" height="6" fill="url(#topGrad)"/>

<!-- Title Card -->
<rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
<rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
<text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Custom Attachment Points</text>

<!-- I. Overview -->
<text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">I. Overview</text>
<rect x="48" y="162" width="1104" height="120" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="190" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">
<tspan x="72" dy="0">Attachment points are specific positions on the skeleton or structure of an entity, used to attach</tspan>
<tspan x="72" dy="22">other units or special effects.</tspan>
<tspan x="72" dy="30" font-weight="500" fill="#1A1B2E">Key characteristics:</tspan>
<tspan x="72" dy="22">- Creators can freely choose any position as the unit's attachment point</tspan>
<tspan x="72" dy="22">- Offset from center origin is fixed; does not change with skeletal movement</tspan>
</text>

<!-- II. Adding the Component -->
<text x="48" y="318" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">II. Adding the Component</text>
<text x="310" y="318" fill="#8B8DA0" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Step-by-step setup</text>

<rect x="48" y="332" width="1104" height="160" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="84" cy="364" r="16" fill="#2D6BE4"/>
<text x="84" y="369" fill="#fff" font-size="13" text-anchor="middle" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">1</text>
<text x="112" y="369" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Open Entity / Prefab Editing Interface</text>
<text x="112" y="389" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Navigate to the Components tab in the entity or prefab editor.</text>

<circle cx="84" cy="420" r="16" fill="#2D6BE4"/>
<text x="84" y="425" fill="#fff" font-size="13" text-anchor="middle" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">2</text>
<text x="112" y="425" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Add Custom Attachment Point Component</text>
<text x="112" y="445" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Click "Add Common Components", then select "Custom Attachment Point" to add it.</text>

<circle cx="84" cy="472" r="16" fill="#1B4FC0"/>
<text x="84" y="477" fill="#fff" font-size="13" text-anchor="middle" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">3</text>
<text x="112" y="477" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Open Advanced Editing</text>
<text x="112" y="497" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Click "Advanced Editing" to expand the editing tab and access point configuration.</text>

<!-- III. Configuring Attachment Points -->
<text x="48" y="534" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">III. Configuring Attachment Points</text>
<text x="380" y="534" fill="#8B8DA0" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Parameters per point</text>

<rect x="48" y="548" width="1104" height="180" rx="14" fill="#fff" filter="url(#card)"/>
<!-- Table header -->
<rect x="72" y="568" width="1056" height="36" rx="10" fill="#2D6BE4"/>
<text x="200" y="591" fill="#fff" font-size="14" font-weight="500" text-anchor="middle" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Parameter</text>
<text x="700" y="591" fill="#fff" font-size="14" font-weight="500" text-anchor="middle" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Description</text>
<line x1="72" y1="604" x2="1128" y2="604" stroke="#E8E4DA"/>
<rect x="72" y="604" width="1056" height="36" fill="#fff"/>
<text x="100" y="627" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Attachment Point Name</text>
<text x="380" y="627" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Name for the point, referenceable by other systems</text>
<line x1="72" y1="640" x2="1128" y2="640" stroke="#E8E4DA"/>
<rect x="72" y="640" width="1056" height="36" fill="#F4F1EA"/>
<text x="100" y="663" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Offset</text>
<text x="380" y="663" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Position offset relative to the prefab or entity center origin</text>
<line x1="72" y1="676" x2="1128" y2="676" stroke="#E8E4DA"/>
<rect x="72" y="676" width="1056" height="36" fill="#fff"/>
<text x="100" y="699" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Rotation</text>
<text x="380" y="699" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Orientation offset relative to the prefab or entity center origin</text>

<!-- IV. Native vs Custom Points -->
<text x="48" y="770" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">IV. Native vs Custom Points</text>

<rect x="48" y="784" width="540" height="140" rx="14" fill="#fff" filter="url(#card)"/>
<rect x="72" y="804" width="90" height="28" rx="14" fill="#E8EEFB"/>
<text x="117" y="823" fill="#2D6BE4" font-size="12" font-weight="500" text-anchor="middle" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Native</text>
<text x="72" y="856" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Default Skeleton Nodes</text>
<text x="72" y="878" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Objects: only root node</text>
<text x="72" y="900" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Creations/Characters: multiple skeleton nodes</text>

<rect x="612" y="784" width="540" height="140" rx="14" fill="#fff" filter="url(#card)"/>
<rect x="636" y="804" width="90" height="28" rx="14" fill="#E5F2E9"/>
<text x="681" y="823" fill="#34A853" font-size="12" font-weight="500" text-anchor="middle" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Custom</text>
<text x="636" y="856" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">User-Defined Points</text>
<text x="636" y="878" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Add via "Add Custom Attachment Point" button</text>
<text x="636" y="900" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Multiple points supported; name, offset, rotation editable</text>

<!-- V. Practical Usage -->
<text x="48" y="966" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">V. Practical Usage</text>
<text x="230" y="966" fill="#8B8DA0" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Common use cases from tutorial</text>

<rect x="48" y="980" width="1104" height="180" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="1008" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Use Case 1: Generate VFX at Specific Positions</text>
<text x="72" y="1030" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Bind VFX Playing Group effects to different attachment points (e.g., flames on hands, light at bottom).</text>
<line x1="72" y1="1048" x2="1128" y2="1048" stroke="#E8E4DA"/>
<text x="72" y="1072" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Use Case 2: Attach Items After Pickup</text>
<text x="72" y="1094" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Use Follow Motion Device + attachment points (e.g., "RHand") to attach items to character's hand after pickup.</text>
<line x1="72" y1="1112" x2="1128" y2="1112" stroke="#E8E4DA"/>
<text x="72" y="1136" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Use Case 3: Quest Guide Effects</text>
<text x="72" y="1158" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Create item guide effects at custom positions to direct players toward objectives.</text>

<!-- VI. Node Graph Integration -->
<text x="48" y="1202" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">VI. Node Graph Integration</text>
<text x="310" y="1202" fill="#8B8DA0" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Extended workflow</text>

<rect x="48" y="1216" width="1104" height="180" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="1244" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Pickup and Attach Workflow (Node Graph)</text>
<rect x="72" y="1258" width="1056" height="120" rx="10" fill="#F4F1EA"/>
<text x="96" y="1282" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">
<tspan x="96" dy="0">1. Tool prefab: Add Tabs component, configure "Pick Up" option with trigger area</tspan>
<tspan x="96" dy="22">2. Clone object: Add Follow Motion Device component (controlled via node graph)</tspan>
<tspan x="96" dy="22">3. Player: Add Custom Variables, trigger events on variable change</tspan>
<tspan x="96" dy="22">4. Tool node graph: On Tab Selected > Change variable > Destroy original item</tspan>
<tspan x="96" dy="22">5. Player node graph: On variable change > Create Prefab > Switch Follow Motion Device Target to "RHand"</tspan>
</text>

<!-- Tip Box -->
<rect x="48" y="1412" width="1104" height="56" rx="10" fill="#E8EEFB"/>
<rect x="48" y="1412" width="4" height="56" rx="2" fill="#2D6BE4"/>
<text x="72" y="1436" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">
<tspan fill="#2D6BE4" font-weight="500">Tip: </tspan>Attachment points can be referenced by VFX Playing, Collision Trigger Source, and Follow Motion Device components.
</text>
<text x="72" y="1456" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Custom points are ideal for positions not covered by native skeleton nodes.</text>

