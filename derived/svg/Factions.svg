<rect width="1200" height="1320" fill="#F9F7F2"/>
<rect width="1200" height="6" fill="url(#topGrad)"/>

<rect x="100" y="24" width="1000" height="70" rx="14" fill="#FFF" filter="url(#elevated)"/>
<rect x="100" y="24" width="4" height="70" fill="#2D6BE4" rx="2"/>
<text x="120" y="58" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="24" font-weight="bold" fill="#1A1B2E">Factions</text>
<text x="120" y="76" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#8B8DA0">Faction system for competitive gameplay, relationships, and faction management</text>

<text x="100" y="124" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">I. What are Factions</text>

<rect x="100" y="142" width="1000" height="75" rx="14" fill="#FFF" filter="url(#card)"/>
<text x="120" y="166" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Faction Definition</text>
<text x="120" y="190" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">In competitive gameplay, entities are divided into groups where players sharing the same group have the same game objectives. These groups are called factions.</text>
<text x="120" y="210" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">In team-based games, factions serve as criteria for settlement objectives and score calculation.</text>

<text x="100" y="257" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">II. Default Factions</text>

<rect x="100" y="275" width="1000" height="155" rx="14" fill="#FFF" filter="url(#card)"/>
<text x="120" y="299" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Global Faction Configuration</text>
<text x="120" y="323" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Factions are defined in the faction tab of stage settings before selection in Basic Info.</text>
<text x="120" y="346" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Faction Name:</tspan> The name given to this faction</text>
<text x="120" y="366" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Default Faction Unit:</tspan> New players/objects/creations are categorized into this default faction</text>
<text x="120" y="386" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Players Included:</tspan> List of players initially belonging to this faction</text>
<text x="120" y="406" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Entities Included:</tspan> List of objects and creations initially belonging to this faction</text>

<text x="100" y="470" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">III. Faction Relations</text>

<rect x="100" y="488" width="1000" height="70" rx="14" fill="#FFF" filter="url(#card)"/>
<text x="120" y="512" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Relationship Types</text>
<text x="120" y="536" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Between any two factions, two relationship types exist: <tspan font-weight="bold" fill="#1A1B2E">Hostile</tspan> and <tspan font-weight="bold" fill="#1A1B2E">Friendly</tspan>. Faction relations are one-way: Faction 1 may be hostile to Faction 2 while Faction 2 is friendly to Faction 1.</text>
<text x="120" y="550" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">Faction relationships affect targeting in other systems such as ability targeting and combat AI.</text>

<rect x="100" y="578" width="1000" height="200" rx="14" fill="#FFF" filter="url(#card)"/>
<text x="120" y="602" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Classic Mode Faction Relationship Matrix</text>
<text x="120" y="622" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#8B8DA0">Rows = initiating party, Columns = receiving party</text>

