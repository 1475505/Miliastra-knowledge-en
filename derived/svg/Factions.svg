<text x="100" y="854" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">IV. Classic Mode Restrictions</text>

<rect x="100" y="872" width="1000" height="105" rx="14" fill="#FFF" filter="url(#card)"/>
<text x="120" y="896" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Classic Mode Limitations</text>
<text x="120" y="920" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">All players and characters belong to the Player Faction (cannot be modified).</text>
<text x="120" y="940" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">All creations belong to the Creation Faction (cannot be modified).</text>
<text x="120" y="960" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Objects can be assigned to Player, Creation, or Object Factions 1-3.</text>
<text x="120" y="977" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#8B8DA0">Dynamic faction changes and relationship modifications are not available in Classic Mode.</text>

<text x="100" y="1017" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">V. Beyond Mode Dynamic Factions</text>

<rect x="100" y="1035" width="1000" height="85" rx="14" fill="#FFF" filter="url(#card)"/>
<text x="120" y="1059" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Dynamic Faction Control (Beyond Mode Only)</text>
<text x="120" y="1083" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Entity factions can be changed dynamically using node graphs. Available nodes include:</text>
<text x="120" y="1103" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Entity Faction Change Events</tspan> | <tspan font-weight="bold" fill="#1A1B2E">Modify Entity Faction</tspan> | <tspan font-weight="bold" fill="#1A1B2E">Query Entity Faction</tspan></text>

<rect x="100" y="1140" width="1000" height="50" rx="8" fill="#E8EEFB"/>
<rect x="100" y="1140" width="4" height="50" fill="#2D6BE4" rx="2"/>
<text x="118" y="1158" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" font-weight="bold" fill="#1A1B2E">Object Faction 3 Note</text>
<text x="118" y="1176" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">Object Faction 3 is typically used for objects friendly to the Player Faction that can assist in attacking constructs.</text>

