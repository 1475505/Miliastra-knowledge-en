    <text x="48" y="1976" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Factions</text>
  </a>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/course/detail/mh99bn93wjzu" target="_blank">
    <text x="48" y="1998" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Faction Settings — Tag Detection and Attack Logic</text>
  </a>

  <!-- Footer -->
  <text x="600" y="2024" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>