<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1096">
<defs>
  <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2D6BE4"/>
    <stop offset="100%" stop-color="#4A3F6B"/>
  </linearGradient>
  <filter id="card">
    <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
  </filter>
  <filter id="elevated">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
  </filter>
</defs>
<style>
  text { font-family: 'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif; }
</style>

<!-- Page Background -->
<rect width="1200" height="1096" fill="#F9F7F2"/>

<!-- Top Color Bar -->
<rect width="1200" height="6" fill="url(#topGrad)"/>

<!-- Title Card -->
<rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
<rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
<text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold">Image</text>
<text x="200" y="82" fill="#4A4B65" font-size="16">Display images in the UI Layout for visual enrichment</text>

<!-- I. Image Features -->
<text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Image Features</text>

<rect x="48" y="162" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="190" fill="#4A4B65" font-size="14">Images can be configured in the UI Layout to display the corresponding images. They are a type of UI control</text>
<text x="72" y="212" fill="#4A4B65" font-size="14">used to beautify the interface and enrich its visual presentation. During stage runtime, Image Controls can be triggered through Node Graphs.</text>

<!-- II. Editing Images -->
<text x="48" y="278" fill="#2D6BE4" font-size="18" font-weight="700">II. Editing Images</text>

<!-- Add Image Card -->
<rect x="48" y="292" width="1104" height="60" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="322" r="14" fill="#2D6BE4"/>
<text x="76" y="327" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">1</text>
<text x="100" y="327" fill="#1A1B2E" font-size="16" font-weight="500">Add an Image</text>
<text x="280" y="327" fill="#4A4B65" font-size="14">In the UI Control Group Editor window, add the UI Control Template — Image.</text>

<!-- Image Settings Card -->
<rect x="48" y="364" width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="392" r="14" fill="#2D6BE4"/>
<text x="76" y="397" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">2</text>
<text x="100" y="397" fill="#1A1B2E" font-size="16" font-weight="500">Image Settings</text>

<text x="72" y="424" fill="#1A1B2E" font-size="14" font-weight="500">Image Source</text>
<text x="180" y="424" fill="#4A4B65" font-size="14">Enumerate: Supports Static Reference, Dynamic Reference, Item, State, Skill, and Unit Status.</text>
<text x="72" y="448" fill="#4A4B65" font-size="14">The selected option affects the subsequent configuration parameters available.</text>

<!-- Static Reference Card -->
<rect x="48" y="476" width="1104" height="280" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="504" fill="#1A1B2E" font-size="16" font-weight="500">When Image Source = Static Reference</text>

<rect x="72" y="518" width="160" height="24" rx="12" fill="#E8EEFB"/>
<text x="152" y="534" fill="#2D6BE4" font-size="12" text-anchor="middle">Reference Asset</text>
<text x="242" y="534" fill="#4A4B65" font-size="14">Select a preset asset. Some assets support color configuration.</text>

<rect x="72" y="550" width="100" height="24" rx="12" fill="#E8EEFB"/>
<text x="122" y="566" fill="#2D6BE4" font-size="12" text-anchor="middle">Fill Color</text>
<text x="182" y="566" fill="#4A4B65" font-size="14">Image assets are divided into monochrome and full-color types. Colors can be adjusted using the color selector.</text>
<text x="182" y="588" fill="#4A4B65" font-size="14">Monochrome assets generally produce better results when recolored.</text>

<rect x="72" y="604" width="110" height="24" rx="12" fill="#E8EEFB"/>
<text x="127" y="620" fill="#2D6BE4" font-size="12" text-anchor="middle">Image Type</text>
<text x="192" y="620" fill="#4A4B65" font-size="14">Supports Basic and Stretch types. Some image assets support stretching (filter in Image Asset Library).</text>

<!-- Image Type Table -->
<rect x="72" y="640" width="1056" height="36" rx="10" fill="#2D6BE4"/>
<text x="200" y="664" fill="#fff" font-size="14" text-anchor="middle" font-weight="500">Image Attribute</text>
<text x="500" y="664" fill="#fff" font-size="14" text-anchor="middle" font-weight="500">Property</text>
<text x="880" y="664" fill="#fff" font-size="14" text-anchor="middle" font-weight="500">Common Uses</text>

<rect x="72" y="676" width="1056" height="36" fill="#fff"/>
<line x1="72" y1="712" x2="1128" y2="712" stroke="#E8E4DA" stroke-width="1"/>
<text x="200" y="700" fill="#1A1B2E" font-size="13" text-anchor="middle" font-weight="500">Normal</text>
<text x="500" y="700" fill="#4A4B65" font-size="13" text-anchor="middle">All four corners deform when stretched</text>
<text x="880" y="700" fill="#4A4B65" font-size="13" text-anchor="middle">Combining specific shapes or basic patterns</text>

<rect x="72" y="712" width="1056" height="36" fill="#F4F1EA"/>
<line x1="72" y1="748" x2="1128" y2="748" stroke="#E8E4DA" stroke-width="1"/>
<text x="200" y="736" fill="#1A1B2E" font-size="13" text-anchor="middle" font-weight="500">3-Panel Layout</text>
<text x="500" y="736" fill="#4A4B65" font-size="13" text-anchor="middle">Corners retain shape in one direction</text>
<text x="880" y="736" fill="#4A4B65" font-size="13" text-anchor="middle">Custom-styled buttons, tabs, similar controls</text>

<!-- Dynamic Reference Card -->
<rect x="48" y="768" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="796" fill="#1A1B2E" font-size="16" font-weight="500">When Image Source = Other Types (Dynamic, Item, State, Skill, Unit Status)</text>
<text x="72" y="822" fill="#4A4B65" font-size="14">Supports configuring custom variables for use as identifiers for the corresponding images. The image displayed is determined dynamically at runtime.</text>

<!-- 3x3 Grid type note -->
<rect x="48" y="860" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="888" fill="#1A1B2E" font-size="14" font-weight="500">3 x 3 Grid Image Type</text>
<text x="72" y="912" fill="#4A4B65" font-size="14">When stretched in the horizontal or vertical direction, the four corners retain their original shape.</text>
<text x="72" y="932" fill="#4A4B65" font-size="14">Used for: Surfaces for list items in single-choice windows, or background images of controls such as tabs and single-choice windows.</text>

<!-- Tip Box -->
<rect x="48" y="956" width="1104" height="60" rx="10" fill="#E8EEFB"/>
<rect x="48" y="956" width="4" height="60" rx="2" fill="#2D6BE4"/>
<text x="72" y="982" fill="#4A4B65" font-size="14">Tip: Use the filter options in the Image Asset Library to find assets that support stretching. Monochrome assets are best for</text>
<text x="72" y="1004" fill="#4A4B65" font-size="14">recoloring, while full-color assets should use their default colors for optimal visual quality.</text>

<!-- Related Documentation Label -->
<text x="48" y="1040" fill="#8B8DA0" font-size="12">Related Documentation:</text>

<!-- Source Links -->
<a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh2oih9jou22" target="_blank">
  <text x="48" y="1058" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: Image Controls</text>
</a>

<!-- Footer -->
<text x="600" y="1082" fill="#8B8DA0" font-size="11" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>

</svg>