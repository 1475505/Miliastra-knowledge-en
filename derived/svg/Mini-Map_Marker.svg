  </a>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhgkan9wgil6" target="_blank">
    <text x="60" y="2238" font-size="13" fill="#2D6BE4" text-decoration="underline">Light Source</text>
  </a>

  <!-- Footer -->
  <text x="600" y="2280" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>