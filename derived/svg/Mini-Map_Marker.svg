<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 3000" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1A1B2E" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1A1B2E" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="3000" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">30-Mini-Map Marker: Component, Marker Types &amp; Node Graph Control</text>

  <!-- I. Functions -->
  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. Mini-Map Marker Component Functions</text>

  <g transform="translate(60, 164)">
    <rect width="1080" height="160" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" fill="#4A4B65">The Mini-Map Marker Component supports displaying entities on the prefabricated Mini-Map UI</text>
    <text x="20" y="48" font-size="14" fill="#4A4B65">Controls through visual indicators such as icons/ranges.</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">The component must be mounted on entities. Supports <tspan font-weight="bold" fill="#1A1B2E">players</tspan>, <tspan font-weight="bold" fill="#1A1B2E">objects</tspan>, and</text>
    <text x="20" y="92" font-size="14" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">creations</tspan>.</text>
    <text x="20" y="116" font-size="14" fill="#4A4B65">Markers can be enabled/disabled through default settings, or controlled through node graphs.</text>
    <text x="20" y="144" font-size="14" font-weight="bold" fill="#1A1B2E">Key Capabilities:</text>
    <text x="20" y="168" font-size="13" fill="#4A4B65">• Mountable on players, objects, creations</text>
    <text x="370" y="168" font-size="13" fill="#4A4B65">• Multiple marker types (Icon, AoE, Marker, etc.)</text>
    <text x="720" y="168" font-size="13" fill="#4A4B65">• Node graph activation/visibility control</text>
  </g>

  <!-- II. Editing Components -->
  <circle cx="80" cy="360" r="16" fill="#2D6BE4"/>
  <text x="80" y="361" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="361" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. Editing Mini-Map Marker Components</text>

  <g transform="translate(60, 388)">
    <rect width="1080" height="180" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" font-weight="bold" fill="#1A1B2E">1. Adding Components</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">In the Entity or Prefab editing interface, open the Component Editing Tab. Click</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">"Add Components", then select "Mini-map Marker". Click "Advanced Editing" to expand.</text>

    <text x="20" y="100" font-size="14" font-weight="bold" fill="#1A1B2E">2. Basic Information</text>
    <text x="20" y="124" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Initially Effective</tspan> — Dropdown menu providing a list of mini-map markers.</text>
    <text x="20" y="144" font-size="13" fill="#4A4B65">Use the checkbox to toggle the marker's active state.</text>
    <text x="20" y="168" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Mini-Map Marker List</tspan> — Enumerates all mini-map markers for entity configuration.</text>
  </g>

  <!-- III. Marker Parameters -->
  <circle cx="80" cy="604" r="16" fill="#2D6BE4"/>
  <text x="80" y="605" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="605" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. Mini-Map Marker Parameter Descriptions</text>

  <g transform="translate(60, 632)">
    <rect width="1080" height="340" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" font-weight="bold" fill="#1A1B2E">Display Settings</text>
    <text x="20" y="52" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Initially Visible to All Players</tspan> — When enabled, marker visible to all eligible players.</text>
    <text x="20" y="76" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Follow Object Visibility</tspan> — When entity is hidden, mini-map marker hides too.</text>
    <text x="20" y="100" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Display Priority</tspan> — Higher number = higher priority when markers overlap.</text>

    <text x="20" y="132" font-size="14" font-weight="bold" fill="#1A1B2E">Marker Style</text>
    <text x="20" y="156" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Select Type</tspan> — Divided into Icon, Range (AoE), Marker, Player's Marker, Creation Icon.</text>
    <text x="20" y="180" font-size="13" fill="#4A4B65">Each type has different configuration parameters.</text>
    <text x="20" y="204" font-size="13" fill="#4A4B65"><tspan font-weight="bold" fill="#1A1B2E">Show Height Difference</tspan> — When enabled, entities with height differences exceeding 10m</text>
    <text x="20" y="224" font-size="13" fill="#4A4B65">are also marked on the mini-map.</text>

    <text x="20" y="256" font-size="14" font-weight="bold" fill="#1A1B2E">Logic-Driven Colors</text>
    <text x="20" y="280" font-size="13" fill="#4A4B65">Background border color supports specific colors and logic-driven colors:</text>
    <text x="40" y="304" font-size="13" fill="#4A4B65">• <tspan font-weight="bold" fill="#1A1B2E">Hostility</tspan> — Enemies red, friends green, self blue</text>
    <text x="40" y="324" font-size="13" fill="#4A4B65">• <tspan font-weight="bold" fill="#1A1B2E">Follow Own Faction</tspan> — Based on current faction's colors</text>
    <text x="40" y="344" font-size="13" fill="#4A4B65">• <tspan font-weight="bold" fill="#1A1B2E">Follow Owner's Faction</tspan> — Based on owner entity's faction colors</text>
  </g>

  <!-- IV. Selection Types -->
  <circle cx="80" cy="1008" r="16" fill="#2D6BE4"/>
  <text x="80" y="1009" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IV</text>
  <text x="108" y="1009" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">IV. Classification of Selection Types</text>

  <g transform="translate(60, 1036)">
    <rect width="1080" height="540" rx="14" fill="#FFFFFF" filter="url(#card)"/>

    <!-- Icon -->
    <rect x="20" y="20" width="500" height="100" rx="8" fill="#E8EEFB"/>
    <text x="36" y="42" font-size="13" font-weight="bold" fill="#1A1B2E">Icon</text>
    <text x="36" y="64" font-size="12" fill="#4A4B65">Select from a variety of icons.</text>
    <text x="36" y="82" font-size="12" fill="#4A4B65">Background: None or Circle.</text>
    <text x="36" y="100" font-size="12" fill="#4A4B65">Supports Clickable option + Text Content.</text>

    <!-- Range/AoE -->
    <rect x="540" y="20" width="500" height="100" rx="8" fill="#E8EEFB"/>
    <text x="556" y="42" font-size="13" font-weight="bold" fill="#1A1B2E">Range (AoE)</text>
    <text x="556" y="64" font-size="12" fill="#4A4B65">Border: solid or dotted line.</text>
    <text x="556" y="82" font-size="12" fill="#4A4B65">Color: specific or logic-driven.</text>
    <text x="556" y="100" font-size="12" fill="#4A4B65">Area Size (m) displayed proportionally.</text>

    <!-- Marker -->
    <rect x="20" y="132" width="500" height="100" rx="8" fill="#E8EEFB"/>
    <text x="36" y="154" font-size="13" font-weight="bold" fill="#1A1B2E">Marker</text>
    <text x="36" y="176" font-size="12" fill="#4A4B65">Fixed style, not modifiable.</text>
    <text x="36" y="194" font-size="12" fill="#4A4B65">Not clickable on world map.</text>
    <text x="36" y="212" font-size="12" fill="#4A4B65">Color: specific or logic-driven.</text>

    <!-- Player's Marker -->
    <rect x="540" y="132" width="500" height="100" rx="8" fill="#E8EEFB"/>
    <text x="556" y="154" font-size="13" font-weight="bold" fill="#1A1B2E">Player's Marker</text>
    <text x="556" y="176" font-size="12" fill="#4A4B65">Icon needs to be passed through nodes.</text>
    <text x="556" y="194" font-size="12" fill="#4A4B65">Not clickable on world map.</text>
    <text x="556" y="212" font-size="12" fill="#4A4B65">Color: specific or logic-driven.</text>

    <!-- Creation Icon -->
    <rect x="20" y="244" width="500" height="100" rx="8" fill="#E8EEFB"/>
    <text x="36" y="266" font-size="13" font-weight="bold" fill="#1A1B2E">Creation Icon</text>
    <text x="36" y="288" font-size="12" fill="#4A4B65">Only set for creations.</text>
    <text x="36" y="306" font-size="12" fill="#4A4B65">Supports Clickable option.</text>
    <text x="36" y="324" font-size="12" fill="#4A4B65">Marker Name + Text Content configurable.</text>

    <text x="20" y="380" font-size="14" fill="#4A4B65">Marker X (where X is an ID) can be used as a node input to adjust the initial activation</text>
    <text x="20" y="400" font-size="14" fill="#4A4B65">parameters of the mini-map marker.</text>
    <text x="20" y="424" font-size="13" fill="#4A4B65">• Added markers are initially effective by default</text>
    <text x="20" y="448" font-size="13" fill="#4A4B65">• Use checkbox to toggle effective status, synchronized to advanced editing</text>
    <text x="20" y="472" font-size="13" fill="#4A4B65">• Each entity can have multiple markers configured</text>
    <text x="20" y="496" font-size="13" fill="#4A4B65">• Clickable markers open settings info on the world map</text>
  </g>

  <!-- V. Node Graph Management -->
  <circle cx="80" cy="1612" r="16" fill="#2D6BE4"/>
  <text x="80" y="1613" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">V</text>
  <text x="108" y="1613" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">V. Managing Mini-Map Markers Through Node Graphs</text>

  <g transform="translate(60, 1640)">
    <rect width="1080" height="480" rx="14" fill="#FFFFFF" filter="url(#card)"/>

    <rect x="20" y="20" width="500" height="60" rx="8" fill="#E8EEFB"/>
    <text x="36" y="42" font-size="12" font-weight="bold" fill="#1A1B2E">Modify Mini-Map Marker Activation Status</text>
    <text x="36" y="62" font-size="11" fill="#4A4B65">Batch modify states via marker ID input list.</text>

    <rect x="540" y="20" width="520" height="60" rx="8" fill="#E8EEFB"/>
    <text x="556" y="42" font-size="12" font-weight="bold" fill="#1A1B2E">Modify Player List for Visible Markers</text>
    <text x="556" y="62" font-size="11" fill="#4A4B65">Control which players see which markers.</text>

    <rect x="20" y="92" width="500" height="60" rx="8" fill="#E8EEFB"/>
    <text x="36" y="114" font-size="12" font-weight="bold" fill="#1A1B2E">Modify Player Markers on the Mini-Map</text>
    <text x="36" y="134" font-size="11" fill="#4A4B65">Update player icon markers.</text>

    <rect x="540" y="92" width="520" height="60" rx="8" fill="#E8EEFB"/>
    <text x="556" y="114" font-size="12" font-weight="bold" fill="#1A1B2E">Modify Mini-Map Zoom</text>
    <text x="556" y="134" font-size="11" fill="#4A4B65">Adjust the zoom level of the mini-map.</text>

    <rect x="20" y="164" width="500" height="60" rx="8" fill="#E8EEFB"/>
    <text x="36" y="186" font-size="12" font-weight="bold" fill="#1A1B2E">Modify Player List for Tracking Markers</text>
    <text x="36" y="206" font-size="11" fill="#4A4B65">Set which markers are tracked for which players.</text>

    <rect x="540" y="164" width="520" height="60" rx="8" fill="#E8EEFB"/>
    <text x="556" y="186" font-size="12" font-weight="bold" fill="#1A1B2E">Query Specified Mini-Map Marker Info</text>
    <text x="556" y="206" font-size="11" fill="#4A4B65">Retrieve marker configuration details.</text>

    <rect x="20" y="236" width="500" height="60" rx="8" fill="#E8EEFB"/>
    <text x="36" y="258" font-size="12" font-weight="bold" fill="#1A1B2E">Get Entity's Mini-Map Marker Status</text>
    <text x="36" y="278" font-size="11" fill="#4A4B65">Returns active/visible status of markers.</text>

    <text x="20" y="340" font-size="14" font-weight="bold" fill="#1A1B2E">Summary</text>
    <text x="20" y="364" font-size="13" fill="#4A4B65">Mini-Map Markers provide flexible visual representation on the mini-map:</text>
    <text x="40" y="388" font-size="13" fill="#4A4B65">• 5 distinct marker types for different use cases</text>
    <text x="40" y="408" font-size="13" fill="#4A4B65">• Logic-driven colors via hostility/faction</text>
    <text x="40" y="428" font-size="13" fill="#4A4B65">• 7 node graph operations for runtime control</text>
    <text x="40" y="448" font-size="13" fill="#4A4B65">• Height difference, display priority, visibility management</text>
  </g>

  <!-- Source Links -->
  <text x="60" y="2160" font-size="12" fill="#8B8DA0">Related Documentation:</text>
