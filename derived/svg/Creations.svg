<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 2124" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="2100" fill="#F9F7F2"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">07-Creations: Autonomous Entities with Behavior Modes</text>

  <!-- ==================== SECTION I ==================== -->
  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. Definition of Creations</text>

  <g transform="translate(60, 164)">
    <rect width="1080" height="180" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">What are Creations</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">Creations is a collective term for humanoid beings, elemental beings,</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">abyssal monsters, mutant beasts, small animals, mechanical combat</text>
    <text x="20" y="92" font-size="14" fill="#4A4B65">units, and other entity types.</text>
    <text x="20" y="120" font-size="14" fill="#4A4B65">Creations can autonomously react to entities from hostile factions,</text>
    <text x="20" y="140" font-size="14" fill="#4A4B65">including but not limited to entering battle or tracking targets.</text>
    <text x="20" y="168" font-size="14" fill="#4A4B65">Creations follow all general rules that apply to entities.</text>
  </g>

  <!-- ==================== SECTION II ==================== -->
  <circle cx="80" cy="380" r="16" fill="#2D6BE4"/>
  <text x="80" y="381" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="381" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. Creation Features</text>

  <g transform="translate(60, 408)">
    <rect width="1080" height="240" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">Behavior Logic</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">The behavior logic of creation entities depends on the behavior mode</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">configured during editing and cannot be dynamically switched during</text>
    <text x="20" y="92" font-size="14" fill="#4A4B65">runtime. A creation entity adheres to a single behavior mode throughout</text>
    <text x="20" y="112" font-size="14" fill="#4A4B65">its entire life cycle.</text>
    <text x="20" y="140" font-size="14" font-weight="bold" fill="#1A1B2E">Hurtbox</text>
    <text x="20" y="164" font-size="14" fill="#4A4B65">When a creation entity is running, it has a hurtbox matching its model</text>
    <text x="20" y="184" font-size="14" fill="#4A4B65">size by default, allowing it to receive battle information accurately.</text>
    <text x="20" y="212" font-size="14" fill="#4A4B65">Creation entities follow all general entity rules and can be edited with</text>
    <text x="20" y="232" font-size="14" fill="#4A4B65">components, node graphs, and specialized settings.</text>
  </g>

  <!-- ==================== SECTION III ==================== -->
  <circle cx="80" cy="684" r="16" fill="#2D6BE4"/>
  <text x="80" y="685" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="685" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. Behavior Modes of Creations</text>

  <g transform="translate(60, 712)">
    <rect width="1080" height="340" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">Overview</text>
    <text x="20" y="50" font-size="14" fill="#4A4B65">Behavior modes are drawn from a predefined behavior pool. The number</text>
    <text x="20" y="70" font-size="14" fill="#4A4B65">and type of configurable modes vary per creation entity. Selection is</text>
    <text x="20" y="90" font-size="14" fill="#4A4B65">supported during editing, but dynamic switching at runtime is not.</text>
    <text x="20" y="118" font-size="14" fill="#4A4B65">Each behavior mode is divided into two parts:</text>
    <text x="20" y="148" font-size="14" font-weight="bold" fill="#1A1B2E">(1) Not-in-Battle</text>
    <text x="20" y="172" font-size="14" fill="#4A4B65">After a creation is created, it is in a Not-in-Battle state by default.</text>
    <text x="20" y="192" font-size="14" fill="#4A4B65">When a creation leaves battle for various reasons, it returns to this state.</text>
    <text x="20" y="222" font-size="14" font-weight="bold" fill="#1A1B2E">(2) Entering Battle</text>
    <text x="20" y="246" font-size="14" fill="#4A4B65">When a creation detects a character through Range Detection or FOV</text>
    <text x="20" y="266" font-size="14" fill="#4A4B65">Detection, it will target that character and switch from the Not-in-Battle</text>
    <text x="20" y="286" font-size="14" fill="#4A4B65">state to the Entering Battle state.</text>
    <text x="20" y="314" font-size="14" fill="#4A4B65">Both parts provide corresponding pattern configurations with different</text>
    <text x="20" y="334" font-size="14" fill="#4A4B65">configuration parameters offered for each behavior mode.</text>
  </g>

  <!-- ==================== SECTION IV ==================== -->
  <circle cx="80" cy="1088" r="16" fill="#2D6BE4"/>
  <text x="80" y="1089" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IV</text>
  <text x="108" y="1089" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">IV. Editing Creations</text>

  <g transform="translate(60, 1116)">
    <rect width="1080" height="180" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">1. Basic Information</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">The first section in the menu bar is for Basic Information. This includes</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">Transform settings — rotation on spatial X and Z axes is not supported,</text>
    <text x="20" y="92" font-size="14" fill="#4A4B65">only Y-axis (horizontal orientation) editing is allowed.</text>
    <text x="20" y="120" font-size="14" font-weight="bold" fill="#1A1B2E">Other Basic attributes include:</text>
    <text x="20" y="144" font-size="14" fill="#4A4B65">Model replacement, visibility settings, create settings (disable initial</text>
    <text x="20" y="164" font-size="14" fill="#4A4B65">creation), faction assignment, unit tags, and deployment group management.</text>
  </g>

  <g transform="translate(60, 1312)">
    <rect width="1080" height="300" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">2. Specialized Settings</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">The second section in the menu bar contains specialized settings.</text>
    <text x="20" y="80" font-size="14" font-weight="bold" fill="#1A1B2E">(1) Basic Combat Attributes</text>
    <text x="20" y="104" font-size="14" fill="#4A4B65">From both level attributes and fixed attributes, support creators in</text>
    <text x="20" y="124" font-size="14" fill="#4A4B65">adjusting parameters and planning growth curves for creations.</text>
    <text x="20" y="152" font-size="14" font-weight="bold" fill="#1A1B2E">(2) Aggro Configuration</text>
    <text x="20" y="176" font-size="14" fill="#4A4B65">Configure how creations detect and target hostile entities.</text>
    <text x="20" y="204" font-size="14" font-weight="bold" fill="#1A1B2E">(3) General Settings</text>
    <text x="20" y="228" font-size="14" fill="#4A4B65">Additional configuration options for creation behavior and properties.</text>
    <text x="20" y="256" font-size="14" fill="#4A4B65">Hurtbox settings, combat settings, and ability units can also be</text>
    <text x="20" y="276" font-size="14" fill="#4A4B65">configured to add combat-related logic to entities.</text>
  </g>

  <g transform="translate(60, 1628)">
    <rect width="1080" height="240" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">3. Component Functions</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">The third section in the menu bar is for common components. Use the</text>
    <text x="20" y="72" font-size="14" fill="#4A4B65">Add Components button to mount components as needed. Each component</text>
    <text x="20" y="92" font-size="14" fill="#4A4B65">can only be mounted once.</text>
    <text x="20" y="120" font-size="14" fill="#4A4B65">Available components include: Tab, Collision Trigger, Custom Variables,</text>
    <text x="20" y="140" font-size="14" fill="#4A4B65">Global Timer, Unit Status, VFX Playing, Unit Attachment Points,</text>
    <text x="20" y="160" font-size="14" fill="#4A4B65">Collision Trigger Source, Sound Effect Player, Inventory, Loot,</text>
    <text x="20" y="180" font-size="14" fill="#4A4B65">Nameplate, Text Bubble, Shop, Scan Tag, and Mini-Map Marker.</text>
    <text x="20" y="208" font-size="14" fill="#4A4B65">These components add diverse functionality to creation entities</text>
    <text x="20" y="228" font-size="14" fill="#4A4B65">during runtime.</text>
  </g>

  <g transform="translate(60, 1884)">
    <rect width="1080" height="140" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="26" font-size="14" font-weight="bold" fill="#1A1B2E">4. Node Graph Functions</text>
    <text x="20" y="52" font-size="14" fill="#4A4B65">The fourth section in the menu bar is for Node Graph configuration.</text>
    <text x="20" y="76" font-size="14" fill="#4A4B65">Reference pre-configured entity node graphs to add custom logical</text>
    <text x="20" y="96" font-size="14" fill="#4A4B65">functions to creations.</text>
    <text x="20" y="124" font-size="14" fill="#4A4B65">Node graphs enable advanced behaviors beyond the built-in behavior modes.</text>
  </g>

  <!-- Source Links -->
  <text x="60" y="2060" font-size="12" fill="#8B8DA0">Related Documentation:</text>

  <text x="60" y="2082" font-size="12" fill="#2D6BE4" text-decoration="underline">
    <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh893x0weae8">Miliastra Academy Documentation: Creations</a>
  </text>

  <text x="600" y="2100" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>
