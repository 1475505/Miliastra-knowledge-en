<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1300" width="1200" height="1300">
<defs>
<linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2D6BE4"/>
    <stop offset="100%" stop-color="#4A3F6B"/>
</linearGradient>
<filter id="card" xmlns="http://www.w3.org/2000/svg">
    <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
</filter>
<filter id="elevated" xmlns="http://www.w3.org/2000/svg">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
</filter>
</defs>

<rect width="1200" height="1300" fill="#F9F7F2"/>

<rect x="0" y="0" width="1200" height="6" fill="url(#topGrad)"/>

<rect x="40" y="30" width="1120" height="90" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
<rect x="40" y="30" width="4" height="90" rx="2" fill="#2D6BE4"/>
<text x="72" y="74" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#1A1B2E">Custom Switch Controls</text>
<text x="72" y="100" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#8B8DA0">Toggleable UI switch with customizable on/off states, visual styling, and node graph binding</text>

<text x="72" y="170" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#2D6BE4">I. Features</text>

<rect x="40" y="190" width="1120" height="150" rx="14" fill="#FFFFFF" filter="url(#card)"/>
<text x="72" y="222" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Custom Switches can be toggled on and off by clicking or through mapped custom variables, triggering different functional logic:</text>
<text x="72" y="248" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Toggle Behavior</tspan> — Switch on/off via click, keyboard, gamepad, or custom variable mapping</text>
<text x="72" y="272" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Preset Styles</tspan> — Choose from preset designs with customizable icon, color, and text</text>
<text x="72" y="296" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Custom Styles</tspan> — Configure assets for each visual state: Default, Hover, and Pressed</text>
<text x="72" y="320" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Sound Effects</tspan> — Separate SFX configuration for enabling and disabling the switch</text>

<text x="72" y="390" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#2D6BE4">II. Toggle States</text>

<rect x="40" y="410" width="1120" height="270" rx="14" fill="#FFFFFF" filter="url(#card)"/>

<text x="72" y="442" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#1A1B2E">On State</text>
<text x="72" y="462" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">When the switch is active/enabled:</text>

<rect x="72" y="476" width="88" height="38" rx="19" fill="#2D6BE4"/>
<circle cx="146" cy="495" r="14" fill="#FFFFFF"/>
<text x="72" y="498" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">On — Default</text>

<rect x="72" y="526" width="88" height="38" rx="19" fill="#3B7BEE"/>
<circle cx="146" cy="545" r="14" fill="#FFFFFF"/>
<rect x="72" y="526" width="88" height="38" rx="19" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
<text x="72" y="548" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">On — Hover</text>

<rect x="72" y="576" width="88" height="38" rx="19" fill="#1B4FC0"/>
<circle cx="146" cy="595" r="14" fill="#E0E0E0"/>
<text x="72" y="598" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">On — Pressed</text>

<text x="420" y="442" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#1A1B2E">Off State</text>
<text x="420" y="462" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">When the switch is inactive/disabled:</text>

<rect x="420" y="476" width="88" height="38" rx="19" fill="#CCCCCC"/>
<circle cx="434" cy="495" r="14" fill="#FFFFFF"/>
<text x="420" y="498" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">Off — Default</text>

<rect x="420" y="526" width="88" height="38" rx="19" fill="#BBBBBB"/>
<circle cx="434" cy="545" r="14" fill="#FFFFFF"/>
<rect x="420" y="526" width="88" height="38" rx="19" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
<text x="420" y="548" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">Off — Hover</text>

<rect x="420" y="576" width="88" height="38" rx="19" fill="#AAAAAA"/>
<circle cx="434" cy="595" r="14" fill="#E0E0E0"/>
<text x="420" y="598" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#4A4B65">Off — Pressed</text>

<rect x="40" y="698" width="1120" height="50" rx="14" fill="#E8EEFB"/>
<rect x="40" y="698" width="4" height="50" rx="2" fill="#2D6BE4"/>
<text x="72" y="728" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">The switch updates automatically when its mapped Player Boolean Custom Variable changes. Variable and switch state stay synchronized.</text>

<text x="72" y="790" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#2D6BE4">III. Key Settings</text>

<rect x="40" y="810" width="1120" height="160" rx="14" fill="#FFFFFF" filter="url(#card)"/>
<text x="72" y="842" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Switch Custom Variable Mapping</tspan> — Link to a Player Boolean Custom Variable for automatic state sync</text>
<text x="72" y="866" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Key Mapping</tspan> — Configure keyboard, mouse, and gamepad shortcuts</text>
<text x="72" y="890" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Click Response Area</tspan> — Match button size or custom size with location offset and dimensions</text>
<text x="72" y="914" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Enable/Disable SFX</tspan> — Separate sound effects for turning the switch on and off</text>
<text x="72" y="938" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• <tspan fill="#1A1B2E" font-weight="700">Hint Offsets</tspan> — Display offset configuration for keyboard, mouse, and controller hints</text>

<text x="72" y="1020" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#2D6BE4">IV. Node Graph Integration</text>

<rect x="40" y="1040" width="1120" height="90" rx="14" fill="#FFFFFF" filter="url(#card)"/>
<text x="72" y="1072" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• Read and write switch state through mapped custom variables in the Node Graph</text>
<text x="72" y="1096" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• State change events propagate through the Node Graph for complex conditional logic</text>
<text x="72" y="1120" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">• Dynamic switch state affects UI control group behavior during stage runtime</text>

<text x="72" y="1180" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#8B8DA0">Related Documentation:</text>
<text x="72" y="1200" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#2D6BE4" text-decoration="underline">Custom Switch Controls</text>
<text x="290" y="1200" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#8B8DA0">https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhy48t9sr3ka</text>

<line x1="40" y1="1235" x2="1160" y2="1235" stroke="#E0E0E0" stroke-width="1"/>
<text x="600" y="1260" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>
