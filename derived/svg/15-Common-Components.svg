<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 600" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="40" y="14" width="1120" height="68" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="40" y="14" width="4" height="68" rx="2" fill="#2D6BE4"/>
  <text x="68" y="58" font-size="26" font-weight="700" fill="#1A1B2E">Common Components</text>

  <!-- Section I: Editing Common Components -->
  <rect x="40" y="100" width="1120" height="150" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="68" y="132" font-size="18" font-weight="700" fill="#2D6BE4">I. Editing Common Components</text>
  <text x="68" y="162" font-size="14" fill="#4A4B65">Components are functions that add capabilities to entities. After adding a component, entities</text>
  <text x="68" y="186" font-size="14" fill="#4A4B65">can use the corresponding functions, and data can be modified through the node graph.</text>
  <text x="68" y="210" font-size="14" fill="#4A4B65"><tspan font-weight="700" fill="#1A1B2E">Configuration:</tspan> View, add, or delete components in the Common Components tab on the right</text>
  <text x="68" y="234" font-size="14" fill="#4A4B65">panel when a prefab or entity is selected. Some units have default components.</text>

  <!-- Section II: Component Life Cycle -->
  <rect x="40" y="270" width="1120" height="160" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="68" y="302" font-size="18" font-weight="700" fill="#2D6BE4">II. Component Life Cycle</text>
  <text x="68" y="332" font-size="14" fill="#4A4B65"><tspan font-weight="700" fill="#1A1B2E">Edit-Time Only:</tspan> Components can only be added or removed during editing. They cannot</text>
  <text x="68" y="356" font-size="14" fill="#4A4B65">be dynamically added or removed during gameplay.</text>
  <text x="68" y="380" font-size="14" fill="#4A4B65"><tspan font-weight="700" fill="#1A1B2E">Runtime Control:</tspan> Some components can be enabled or disabled through node graphs.</text>
  <text x="68" y="404" font-size="14" fill="#4A4B65"><tspan font-weight="700" fill="#1A1B2E">Active Duration:</tspan> Component functions remain active while the entity exists in the scene.</text>
  <text x="68" y="428" font-size="14" fill="#4A4B65"><tspan font-weight="700" fill="#1A1B2E">Destruction:</tspan> When an entity is destroyed or removed, its component functions stop.</text>

  <!-- Tip Box -->
  <rect x="40" y="450" width="1120" height="50" rx="14" fill="#E8EEFB"/>
  <rect x="40" y="450" width="4" height="50" rx="2" fill="#2D6BE4"/>
  <text x="68" y="472" font-size="14" font-weight="700" fill="#1A1B2E">Tip</text>
  <text x="68" y="490" font-size="13" fill="#4A4B65">Modify component data and logic through the node graph. Component editing is done on prefabs and entities, not at runtime.</text>

  <!-- Source Links -->
  <text x="68" y="530" font-size="12" fill="#8B8DA0">Related Documentation:</text>

  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhhitrrv4166" target="_blank">
    <text x="68" y="554" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Common Components</text>
  </a>

  <!-- Footer -->
  <text x="600" y="588" font-size="11" fill="#8B8DA0" text-anchor="middle">Generated by AI based on official Miliastra Academy documentation. Version: Luminary</text>
</svg>
