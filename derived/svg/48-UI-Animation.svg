<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 3800" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1200" height="3800" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>
  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">48-UI Animation: Creating Animations, Keyframes, Timeline &amp; Playback Control</text>

  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. UI Animation Features</text>

  <g transform="translate(60, 164)">
    <rect width="1080" height="140" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="15" font-weight="bold" fill="#1A1B2E">Purpose</text>
    <text x="20" y="54" font-size="13" fill="#4A4B65">UI Animations display special effect assets within the UI Layout. They are a type of UI control</text>
    <text x="20" y="74" font-size="13" fill="#4A4B65">used to beautify the interface and enrich its visual presentation.</text>
    <text x="20" y="104" font-size="15" font-weight="bold" fill="#1A1B2E">Runtime Control</text>
    <text x="20" y="130" font-size="13" fill="#4A4B65">During stage runtime, UI Animation Controls can be triggered and managed through Node Graphs.</text>
  </g>

  <circle cx="80" cy="340" r="16" fill="#2D6BE4"/>
  <text x="80" y="341" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="341" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. Editing UI Animation</text>

  <g transform="translate(60, 368)">
    <rect width="1080" height="540" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="110" height="26" rx="13" fill="#E8EEFB"/>
    <text x="71" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Add Animation</text>

    <text x="20" y="62" font-size="14" font-weight="bold" fill="#1A1B2E">1. Add UI Animation</text>
    <text x="20" y="86" font-size="13" fill="#4A4B65">In the UI Control Group Editor window, add the UI Control Template: UI Animation.</text>

    <text x="20" y="118" font-size="14" font-weight="bold" fill="#1A1B2E">2. UI Animation Settings</text>
    <text x="20" y="144" font-size="13" fill="#1A1B2E" font-weight="bold">Select UI Animation</text>
    <text x="145" y="144" font-size="13" fill="#4A4B65">Select the special effect asset to display in the UI Layout</text>
    <text x="20" y="168" font-size="13" fill="#1A1B2E" font-weight="bold">Play Sound Effect</text>
    <text x="135" y="168" font-size="13" fill="#4A4B65">If enabled, the sound effect included with the asset will also play</text>
    <text x="20" y="192" font-size="13" fill="#1A1B2E" font-weight="bold">Layer</text>
    <text x="65" y="192" font-size="13" fill="#4A4B65">Above All Controls or Below All Controls (default: Above All Controls)</text>

    <text x="20" y="226" font-size="14" font-weight="bold" fill="#1A1B2E">3. Preview Settings</text>
    <text x="20" y="252" font-size="13" fill="#4A4B65">Enable this in the top-right settings to keep UI animations always visible in preview while</text>
    <text x="20" y="272" font-size="13" fill="#4A4B65">editing, regardless of layer order.</text>

    <rect x="16" y="296" width="1048" height="60" rx="8" fill="#E8EEFB"/>
    <rect x="16" y="296" width="4" height="60" rx="2" fill="#2D6BE4"/>
    <text x="32" y="318" font-size="12" fill="#4A4B65">UI Animation supports keyframe-based animation of UI properties including position, scale,</text>
    <text x="32" y="338" font-size="12" fill="#4A4B65">rotation, opacity, and color. Keyframes are created on a timeline with configurable duration.</text>
  </g>

  <circle cx="80" cy="944" r="16" fill="#2D6BE4"/>
  <text x="80" y="945" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="945" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. Animating UI Properties</text>

  <g transform="translate(60, 972)">
    <rect width="1080" height="340" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" font-weight="bold" fill="#1A1B2E">Animatable Properties</text>
    <text x="20" y="54" font-size="13" fill="#4A4B65">UI Animation supports keyframe animation for the following UI element properties:</text>

    <rect x="20" y="72" width="200" height="50" rx="8" fill="#E8EEFB"/>
    <text x="120" y="92" font-size="12" font-weight="bold" fill="#1A1B2E" text-anchor="middle">Position</text>
    <text x="120" y="110" font-size="11" fill="#4A4B65" text-anchor="middle">X, Y coordinates</text>

    <rect x="235" y="72" width="200" height="50" rx="8" fill="#E8EEFB"/>
    <text x="335" y="92" font-size="12" font-weight="bold" fill="#1A1B2E" text-anchor="middle">Scale</text>
    <text x="335" y="110" font-size="11" fill="#4A4B65" text-anchor="middle">Width, Height</text>

    <rect x="450" y="72" width="200" height="50" rx="8" fill="#E8EEFB"/>
    <text x="550" y="92" font-size="12" font-weight="bold" fill="#1A1B2E" text-anchor="middle">Rotation</text>
    <text x="550" y="110" font-size="11" fill="#4A4B65" text-anchor="middle">Angle in degrees</text>

    <rect x="665" y="72" width="200" height="50" rx="8" fill="#E8EEFB"/>
    <text x="765" y="92" font-size="12" font-weight="bold" fill="#1A1B2E" text-anchor="middle">Opacity</text>
    <text x="765" y="110" font-size="11" fill="#4A4B65" text-anchor="middle">0.0 to 1.0</text>

    <rect x="880" y="72" width="180" height="50" rx="8" fill="#E8EEFB"/>
    <text x="970" y="92" font-size="12" font-weight="bold" fill="#1A1B2E" text-anchor="middle">Color</text>
    <text x="970" y="110" font-size="11" fill="#4A4B65" text-anchor="middle">RGBA values</text>

    <text x="20" y="160" font-size="14" font-weight="bold" fill="#1A1B2E">Timeline &amp; Keyframes</text>
    <text x="20" y="184" font-size="13" fill="#4A4B65">The timeline displays the animation duration and keyframe markers. Each keyframe stores the</text>
    <text x="20" y="204" font-size="13" fill="#4A4B65">property values at a specific point in time. Between keyframes, values are interpolated.</text>

    <text x="20" y="236" font-size="14" font-weight="bold" fill="#1A1B2E">Animation Events</text>
    <text x="20" y="260" font-size="13" fill="#4A4B65">Events can be attached to specific keyframes or timeline positions. Supported events include</text>
    <text x="20" y="280" font-size="13" fill="#4A4B65">triggering Node Graph execution, playing sound effects, and controlling animation flow.</text>
  </g>

  <circle cx="80" cy="1348" r="16" fill="#2D6BE4"/>
  <text x="80" y="1349" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IV</text>
  <text x="108" y="1349" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">IV. Animation Playback Control via Node Graph</text>

  <g transform="translate(60, 1376)">
    <rect width="1080" height="340" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" font-weight="bold" fill="#1A1B2E">Play UI Animation on Control</text>
    <text x="20" y="54" font-size="13" fill="#4A4B65">The primary Node Graph node for controlling UI Animation playback during runtime.</text>

    <text x="20" y="86" font-size="14" font-weight="bold" fill="#1A1B2E">Playback Controls</text>
    <rect x="20" y="104" width="240" height="44" rx="8" fill="#E8EEFB"/>
    <text x="140" y="126" font-size="12" font-weight="bold" fill="#1A1B2E" text-anchor="middle">Play</text>
    <text x="140" y="142" font-size="10" fill="#4A4B65" text-anchor="middle">Start animation playback</text>

    <rect x="275" y="104" width="240" height="44" rx="8" fill="#E8EEFB"/>
    <text x="395" y="126" font-size="12" font-weight="bold" fill="#1A1B2E" text-anchor="middle">Pause</text>
    <text x="395" y="142" font-size="10" fill="#4A4B65" text-anchor="middle">Pause at current frame</text>

    <rect x="530" y="104" width="240" height="44" rx="8" fill="#E8EEFB"/>
    <text x="650" y="126" font-size="12" font-weight="bold" fill="#1A1B2E" text-anchor="middle">Stop</text>
    <text x="650" y="142" font-size="10" fill="#4A4B65" text-anchor="middle">Stop and reset animation</text>

    <rect x="785" y="104" width="275" height="44" rx="8" fill="#E8EEFB"/>
    <text x="922" y="126" font-size="12" font-weight="bold" fill="#1A1B2E" text-anchor="middle">Loop</text>
    <text x="922" y="142" font-size="10" fill="#4A4B65" text-anchor="middle">Configure looping behavior</text>

    <text x="20" y="180" font-size="14" font-weight="bold" fill="#1A1B2E">Animation Events</text>
    <text x="20" y="204" font-size="13" fill="#4A4B65">The node graph can listen for animation lifecycle events:</text>
    <text x="20" y="228" font-size="13" fill="#4A4B65">On Animation Started | On Animation Completed | On Animation Looped</text>
    <text x="20" y="252" font-size="13" fill="#4A4B65">On Keyframe Reached | On Animation Paused | On Animation Stopped</text>

    <rect x="16" y="276" width="1048" height="50" rx="8" fill="#E8EEFB"/>
    <rect x="16" y="276" width="4" height="50" rx="2" fill="#2D6BE4"/>
    <text x="32" y="296" font-size="12" fill="#4A4B65">UI Animation playback is controlled entirely via the Node Graph, allowing dynamic and</text>
    <text x="32" y="314" font-size="12" fill="#4A4B65">conditional animation sequences based on game state and player interactions.</text>
  </g>

  <text x="60" y="1776" font-size="12" fill="#8B8DA0">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhxyow9ocdz6" target="_blank">
    <text x="60" y="1802" font-size="13" fill="#2D6BE4" text-decoration="underline">UI Animation Controls → https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhxyow9ocdz6</text>
  </a>
