    <text x="60" y="1828" font-size="13" fill="#2D6BE4" text-decoration="underline">Deck Selector UI Controls → https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh2teu0bmfbc</text>
  </a>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhp02viyg2dg" target="_blank">
    <text x="60" y="1854" font-size="13" fill="#2D6BE4" text-decoration="underline">Fullscreen UI Animation Controls → https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhp02viyg2dg</text>
  </a>

  <text x="600" y="1890" font-size="11" fill="#8B8DA0" text-anchor="middle">Generated by AI based on official Miliastra Academy documentation. Version: Luminary</text>
</svg>