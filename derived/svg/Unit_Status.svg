<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1620" width="1200" height="1620">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1620" fill="#F9F7F2"/>

  <!-- Top Bar -->
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="60" y="20" width="1080" height="100" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="20" width="4" height="100" fill="#2D6BE4" rx="2"/>
  <text x="90" y="60" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="26" font-weight="bold" fill="#1A1B2E">Unit Status</text>
  <text x="90" y="92" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Status management module for managing additional functions and attributes of Entities during Stage runtime.</text>

  <!-- Section I -->
  <text x="60" y="145" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">I. Unit Status Overview</text>

  <rect x="60" y="165" width="1080" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="85" y="192" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">
    <tspan x="85" dy="0">Unit Status is a status management module for Entities during runtime. Each Unit Status</tspan>
    <tspan x="85" dy="22">must have a defined <tspan fill="#1A1B2E" font-weight="bold">Applier Entity</tspan>. Entities can dynamically hold multiple statuses.</tspan>
    <tspan x="85" dy="22">Each status has a defined <tspan fill="#1A1B2E" font-weight="bold">Runtime Duration</tspan> and grants <tspan fill="#1A1B2E" font-weight="bold">Additional Effects</tspan></tspan>
    <tspan x="85" dy="22">plus <tspan fill="#1A1B2E" font-weight="bold">Additional Node Graph</tspan> functionality while active. Each active status</tspan>
    <tspan x="85" dy="22">has independent <tspan fill="#1A1B2E" font-weight="bold">Stack Layers</tspan>. A status ends when its duration expires or all stacks are depleted.</tspan>
  </text>

  <!-- Section II -->
  <text x="60" y="315" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">II. Status Effects &amp; Effect Pool</text>

  <rect x="60" y="335" width="520" height="200" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="85" y="362" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Additional Effects</text>
  <text x="85" y="390" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="85" dy="0">All effects come from the predefined Effect Pool:</tspan>
    <tspan x="85" dy="20">- Mount Looping Effects (visual)</tspan>
    <tspan x="85" dy="20">- Motion Speed Change (-40% to +40%)</tspan>
    <tspan x="85" dy="20">- Elemental Effects (one per status)</tspan>
    <tspan x="85" dy="20">- Max HP, ATK, DEF adjustment</tspan>
    <tspan x="85" dy="20">- Special Statuses: Invincible, HP Locked, Struggle</tspan>
  </text>

  <rect x="620" y="335" width="520" height="200" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="645" y="362" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Effective Target &amp; Intensity</text>
  <text x="645" y="390" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="645" dy="0"><tspan fill="#1A1B2E" font-weight="bold">Effective Target:</tspan> Each effect applies to one</tspan>
    <tspan x="645" dy="20">or more of Characters, Creations, or Objects.</tspan>
    <tspan x="645" dy="24">If a target type mismatches, the status fails.</tspan>
    <tspan x="645" dy="24"><tspan fill="#1A1B2E" font-weight="bold">Effect Intensity:</tspan> Multiple same-type effects</tspan>
    <tspan x="645" dy="20">stack within a valid range (e.g., Speed Change</tspan>
    <tspan x="645" dy="20">is clamped between -40% and +40%).</tspan>
  </text>

  <!-- Tip Box -->
  <rect x="60" y="555" width="1080" height="60" rx="8" fill="#E8EEFB"/>
  <rect x="60" y="555" width="4" height="60" fill="#2D6BE4" rx="2"/>
  <text x="85" y="578" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" font-weight="bold" fill="#1A1B2E">Effect Pool Formula</text>
  <text x="85" y="598" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">Final Value = (Base Value + Change Value) x (1 + Adjustment Rate) x Multiplier + Correction Value</text>

  <!-- Section III -->
  <text x="60" y="645" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">III. Configuration Rules</text>

  <rect x="60" y="665" width="520" height="200" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="85" y="692" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Stacking Rules</text>
  <text x="85" y="720" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="85" dy="0">New stack layers add to existing, capped at</tspan>
    <tspan x="85" dy="20"><tspan fill="#1A1B2E" font-weight="bold">Maximum Stack Layers</tspan>. When exceeding limit:</tspan>
    <tspan x="85" dy="24"><tspan fill="#1A1B2E" font-weight="bold">Overlapping Data Update</tspan>: replace oldest</tspan>
    <tspan x="85" dy="20">Or discard overlapping data. No change = invalid.</tspan>
  </text>

  <rect x="620" y="665" width="520" height="200" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="645" y="692" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Timing Rules</text>
  <text x="645" y="720" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="645" dy="0">Each status has a <tspan fill="#1A1B2E" font-weight="bold">Life Cycle</tspan>. Enable Infinite</tspan>
    <tspan x="645" dy="20">Duration to prevent auto-removal.</tspan>
    <tspan x="645" dy="24"><tspan fill="#1A1B2E" font-weight="bold">Stack Shared Duration:</tspan> When disabled, each</tspan>
    <tspan x="645" dy="20">stack expires independently. When enabled,</tspan>
    <tspan x="645" dy="20">all stacks are removed together on expiry.</tspan>
    <tspan x="645" dy="20">Extended Duration can be limited by Max Duration.</tspan>
  </text>

  <rect x="60" y="885" width="1080" height="160" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="85" y="912" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Status Coexistence &amp; Replacement</text>
  <text x="85" y="940" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="85" dy="0"><tspan fill="#1A1B2E" font-weight="bold">Coexistence Limit:</tspan> When same-name statuses from different Appliers, set a limit and</tspan>
    <tspan x="85" dy="20">update strategy: Cannot Update, Min Time Remaining, Earliest Update Time, Earliest Application.</tspan>
    <tspan x="85" dy="24"><tspan fill="#1A1B2E" font-weight="bold">Yielding Status List:</tspan> If target holds any yielding status, new application fails.</tspan>
    <tspan x="85" dy="20"><tspan fill="#1A1B2E" font-weight="bold">Replacement Status List:</tspan> Existing matching statuses are removed before applying new one.</tspan>
    <tspan x="85" dy="24">Same Applier cannot apply two instances of the same-name status to one target.</tspan>
  </text>

  <!-- Section IV -->
  <text x="60" y="1075" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">IV. Execution &amp; Node Graph Integration</text>

  <rect x="60" y="1095" width="520" height="220" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="85" y="1122" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Apply via Component &amp; Server Nodes</text>
  <text x="85" y="1150" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="85" dy="0"><tspan fill="#1A1B2E" font-weight="bold">Unit Status Component:</tspan> Configure default</tspan>
    <tspan x="85" dy="20">statuses applied on entity creation.</tspan>
    <tspan x="85" dy="24"><tspan fill="#1A1B2E" font-weight="bold">Add Unit Status node:</tspan> Apply status to target.</tspan>
    <tspan x="85" dy="20">Returns: New status applied / Slot stacking /</tspan>
    <tspan x="85" dy="20">Failed (unexpected error, paused, limit, full stacks).</tspan>
    <tspan x="85" dy="24"><tspan fill="#1A1B2E" font-weight="bold">Remove Unit Status node:</tspan> Remove by remover</tspan>
    <tspan x="85" dy="20">entity. Options: all coexisting, fastest stack loss,</tspan>
    <tspan x="85" dy="20">or self-applied removal.</tspan>
  </text>

  <rect x="620" y="1095" width="520" height="220" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="645" y="1122" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Events &amp; Other Execution Methods</text>
  <text x="645" y="1150" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="645" dy="0"><tspan fill="#1A1B2E" font-weight="bold">When Status Added node:</tspan> Triggered when</tspan>
    <tspan x="645" dy="20">target gains or updates a unit status.</tspan>
    <tspan x="645" dy="24"><tspan fill="#1A1B2E" font-weight="bold">When Status Removed node:</tspan> Triggered when</tspan>
    <tspan x="645" dy="20">target loses a status (replaced, expired, dispelled,</tspan>
    <tspan x="645" dy="20">class changed, duration exceeded).</tspan>
    <tspan x="645" dy="24"><tspan fill="#1A1B2E" font-weight="bold">Ability Units:</tspan> Add/remove statuses on</tspan>
    <tspan x="645" dy="20">projectile hit.</tspan>
    <tspan x="645" dy="20"><tspan fill="#1A1B2E" font-weight="bold">Skill Node Graphs:</tspan> Apply/remove by name.</tspan>
    <tspan x="645" dy="20"><tspan fill="#1A1B2E" font-weight="bold">Has Status node:</tspan> Check if target holds a status.</tspan>
  </text>

  <!-- Parameter Dictionary note -->
  <rect x="60" y="1335" width="1080" height="65" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="85" y="1360" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" font-weight="bold" fill="#1A1B2E">Unit Status Parameter Dictionary</text>
  <text x="85" y="1382" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">Statuses can have override tags. The Add Unit Status node accepts a parameter dictionary to dynamically override configuration values at runtime.</text>

  <!-- Footer -->
  <text x="600" y="1470" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>

  <!-- Source Links -->
  <text x="60" y="1510" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#1A1B2E">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh1lsn90mml6" target="_blank">
    <text x="60" y="1532" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#2D6BE4" text-decoration="underline">Unit Status - Tutorial Detail</text>
  </a>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhklw3rba8we" target="_blank">
    <text x="60" y="1554" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#2D6BE4" text-decoration="underline">Unit Status Effect Pool - Tutorial Detail</text>
  </a>
</svg>
