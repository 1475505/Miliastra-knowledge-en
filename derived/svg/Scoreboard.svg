<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 750" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="#F9F7F2"/>

  <!-- Top bar -->
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold">Scoreboard</text>
  <text x="310" y="82" fill="#4A4B65" font-size="16">UI Controls</text>

  <!-- I. Scoreboard Functions -->
  <text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Scoreboard Functions</text>

  <rect x="48" y="164" width="1104" height="56" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="198" fill="#4A4B65" font-size="14">Displays the player's custom variables during stage runtime and ranks them accordingly.</text>

  <!-- II. Editing the Scoreboard -->
  <text x="48" y="256" fill="#2D6BE4" font-size="18" font-weight="700">II. Editing the Scoreboard</text>

  <rect x="48" y="272" width="1104" height="120" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="300" fill="#1A1B2E" font-size="16" font-weight="500">Configuration Parameters</text>

  <rect x="72" y="312" width="120" height="28" rx="6" fill="#E8EEFB"/>
  <text x="82" y="331" fill="#2D6BE4" font-size="13" font-weight="500">Sort</text>
  <text x="208" y="331" fill="#4A4B65" font-size="14">Provide ascending and descending order for values</text>

  <rect x="72" y="350" width="120" height="28" rx="6" fill="#E8EEFB"/>
  <text x="82" y="369" fill="#2D6BE4" font-size="13" font-weight="500">Type</text>
  <text x="208" y="369" fill="#4A4B65" font-size="14">The selection of Self, Faction, or Type affects the configuration of the remaining parameters</text>

  <!-- III. Types of Scoreboard -->
  <text x="48" y="428" fill="#2D6BE4" font-size="18" font-weight="700">III. Types of Scoreboard</text>

  <!-- Self Type Card -->
  <rect x="48" y="444" width="540" height="192" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="474" r="16" fill="#2D6BE4"/>
  <text x="80" y="479" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">1</text>
  <text x="108" y="479" fill="#1A1B2E" font-size="16" font-weight="500">Self</text>

  <text x="72" y="508" fill="#1A1B2E" font-size="14" font-weight="500">Style Settings</text>
  <text x="72" y="526" fill="#4A4B65" font-size="13">Customize the visual appearance of the scoreboard</text>

  <text x="72" y="550" fill="#1A1B2E" font-size="14" font-weight="500">Data Settings</text>
  <text x="72" y="568" fill="#4A4B65" font-size="13">Configure which data fields to display</text>

  <text x="72" y="592" fill="#1A1B2E" font-size="14" font-weight="500">Displayable Content</text>
  <rect x="72" y="600" width="44" height="22" rx="11" fill="#E8EEFB"/>
  <text x="82" y="615" fill="#2D6BE4" font-size="11" font-weight="500">Rank</text>
  <rect x="124" y="600" width="54" height="22" rx="11" fill="#E5F2E9"/>
  <text x="134" y="615" fill="#34A853" font-size="11" font-weight="500">Score</text>
  <rect x="186" y="600" width="82" height="22" rx="11" fill="#FFF3E0"/>
  <text x="196" y="615" fill="#E65100" font-size="11" font-weight="500">Team Icon</text>
  <rect x="276" y="600" width="98" height="22" rx="11" fill="#E8EEFB"/>
  <text x="286" y="615" fill="#2D6BE4" font-size="11" font-weight="500">Player Name</text>
  <rect x="382" y="600" width="104" height="22" rx="11" fill="#E5F2E9"/>
  <text x="392" y="615" fill="#34A853" font-size="11" font-weight="500">Player Avatar</text>

  <!-- Faction Type Card -->
  <rect x="612" y="444" width="540" height="192" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="644" cy="474" r="16" fill="#1B4FC0"/>
  <text x="644" y="479" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">2</text>
  <text x="672" y="479" fill="#1A1B2E" font-size="16" font-weight="500">Faction</text>

  <text x="636" y="508" fill="#1A1B2E" font-size="14" font-weight="500">Style Settings</text>
  <text x="636" y="526" fill="#4A4B65" font-size="13">Customize the visual appearance of the scoreboard</text>

  <text x="636" y="550" fill="#1A1B2E" font-size="14" font-weight="500">Data Settings</text>
  <text x="636" y="568" fill="#4A4B65" font-size="13">Configure which faction data to display</text>

  <text x="636" y="592" fill="#1A1B2E" font-size="14" font-weight="500">Displayable Content</text>
  <rect x="636" y="600" width="44" height="22" rx="11" fill="#E8EEFB"/>
  <text x="646" y="615" fill="#2D6BE4" font-size="11" font-weight="500">Rank</text>
  <rect x="688" y="600" width="54" height="22" rx="11" fill="#E5F2E9"/>
  <text x="698" y="615" fill="#34A853" font-size="11" font-weight="500">Score</text>

  <!-- Tip Box -->
  <rect x="48" y="652" width="1104" height="40" rx="6" fill="#E8EEFB"/>
  <rect x="48" y="652" width="4" height="40" rx="2" fill="#2D6BE4"/>
  <text x="68" y="677" fill="#4A4B65" font-size="13">The Type selection (Self / Faction) directly affects which configuration parameters are available for the remaining settings.</text>

  <!-- Related Documentation -->
  <text x="48" y="712" fill="#8B8DA0" font-size="12">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhesro0hyn5k" target="_blank">
    <text x="48" y="728" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: Scoreboard UI Controls</text>
  </a>

  <!-- Footer -->
  <text x="600" y="744" fill="#8B8DA0" font-size="11" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>