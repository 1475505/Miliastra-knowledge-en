<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 2500" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1200" height="2500" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>
  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">60-Scoreboard: Scoreboard UI Controls</text>

  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. Scoreboard Functions</text>

  <g transform="translate(60, 164)">
    <rect width="1080" height="100" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="32" font-size="14" font-weight="bold" fill="#1A1B2E">Purpose</text>
    <text x="20" y="56" font-size="13" fill="#4A4B65">Displays the player's custom variables during stage runtime and ranks them accordingly.</text>
    <text x="20" y="76" font-size="13" fill="#4A4B65">Supports multiple scoreboard types: Self, Faction, and Type configurations.</text>
  </g>

  <circle cx="80" cy="300" r="16" fill="#2D6BE4"/>
  <text x="80" y="301" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="301" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. Editing the Scoreboard</text>

  <g transform="translate(60, 328)">
    <rect width="1080" height="520" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="30" font-size="14" font-weight="bold" fill="#1A1B2E">Configuration Parameters</text>

    <rect x="20" y="46" width="520" height="26" rx="6" fill="#F0F0F5"/>
    <text x="30" y="59" font-size="12" fill="#1A1B2E" font-weight="bold">Parameter</text>
    <text x="200" y="59" font-size="12" fill="#1A1B2E" font-weight="bold">Description</text>

    <text x="30" y="91" font-size="12" fill="#1A1B2E" font-weight="bold">Sort</text>
    <text x="200" y="91" font-size="12" fill="#4A4B65">Provides ascending and descending order for values</text>

    <text x="30" y="123" font-size="12" fill="#1A1B2E" font-weight="bold">Type</text>
    <text x="200" y="123" font-size="12" fill="#4A4B65">Selection of Self, Faction, or Type affects remaining parameter configuration</text>

    <text x="20" y="168" font-size="14" font-weight="bold" fill="#1A1B2E">Score Formatting</text>
    <text x="20" y="194" font-size="13" fill="#4A4B65">Scores can be displayed in various formats:</text>
    <text x="30" y="218" font-size="13" fill="#4A4B65">- Raw Numbers: Direct integer/decimal display</text>
    <text x="30" y="242" font-size="13" fill="#4A4B65">- Time: Duration format (MM:SS, HH:MM:SS)</text>
    <text x="30" y="266" font-size="13" fill="#4A4B65">- Percentage: Value as a percentage</text>
    <text x="30" y="290" font-size="13" fill="#4A4B65">- Custom Format: Creator-defined display template</text>

    <text x="20" y="330" font-size="14" font-weight="bold" fill="#1A1B2E">Column Configuration</text>
    <text x="20" y="356" font-size="13" fill="#4A4B65">Each scoreboard column can be configured with:</text>
    <text x="30" y="380" font-size="13" fill="#4A4B65">- Column Name: Display header text</text>
    <text x="30" y="404" font-size="13" fill="#4A4B65">- Data Binding: Linked variable or expression</text>
    <text x="30" y="428" font-size="13" fill="#4A4B65">- Display Width: Column width in the scoreboard</text>
    <text x="30" y="452" font-size="13" fill="#4A4B65">- Sortable: Enable/disable sorting for this column</text>

    <text x="20" y="490" font-size="14" font-weight="bold" fill="#1A1B2E">Row Data Binding</text>
    <text x="20" y="514" font-size="13" fill="#4A4B65">Rows are populated through data binding to player variables or stage variables.</text>
    <text x="20" y="536" font-size="13" fill="#4A4B65">Each row represents a player, faction, or team with their associated score data.</text>
  </g>

  <circle cx="80" cy="884" r="16" fill="#2D6BE4"/>
  <text x="80" y="885" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="885" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. Types of Scoreboard</text>

  <g transform="translate(60, 912)">
    <rect width="520" height="280" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="60" height="26" rx="13" fill="#E8EEFB"/>
    <text x="46" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Self</text>
    <text x="20" y="60" font-size="14" font-weight="bold" fill="#1A1B2E">Self Scoreboard</text>
    <text x="20" y="86" font-size="13" fill="#4A4B65">Displays individual player data:</text>
    <text x="30" y="110" font-size="13" fill="#4A4B65">- Rank position</text>
    <text x="30" y="134" font-size="13" fill="#4A4B65">- Score value</text>
    <text x="30" y="158" font-size="13" fill="#4A4B65">- Team icon</text>
    <text x="30" y="182" font-size="13" fill="#4A4B65">- Player name</text>
    <text x="30" y="206" font-size="13" fill="#4A4B65">- Player avatar</text>
    <text x="20" y="240" font-size="13" fill="#4A4B65">Supports setting content to be displayed</text>
    <text x="20" y="262" font-size="13" fill="#4A4B65">for each row in the scoreboard.</text>
  </g>

  <g transform="translate(620, 912)">
    <rect width="520" height="280" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="80" height="26" rx="13" fill="#E8EEFB"/>
    <text x="56" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Faction</text>
    <text x="20" y="60" font-size="14" font-weight="bold" fill="#1A1B2E">Faction Scoreboard</text>
    <text x="20" y="86" font-size="13" fill="#4A4B65">Displays faction/team data:</text>
    <text x="30" y="110" font-size="13" fill="#4A4B65">- Rank position</text>
    <text x="30" y="134" font-size="13" fill="#4A4B65">- Score value</text>
    <text x="30" y="158" font-size="13" fill="#4A4B65">- Faction name</text>
    <text x="30" y="182" font-size="13" fill="#4A4B65">- Faction icon</text>
    <text x="20" y="228" font-size="13" fill="#4A4B65">Supports setting rank and score</text>
    <text x="20" y="250" font-size="13" fill="#4A4B65">display for faction-based scoring.</text>
  </g>

  <circle cx="80" cy="1228" r="16" fill="#2D6BE4"/>
  <text x="80" y="1229" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IV</text>
  <text x="108" y="1229" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">IV. Node Graph Data Update</text>

  <g transform="translate(60, 1256)">
    <rect width="1080" height="200" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="30" font-size="14" font-weight="bold" fill="#1A1B2E">Scoreboard Node Graph Binding</text>
    <text x="20" y="56" font-size="13" fill="#4A4B65">Scoreboard data is updated through the node graph system. Creators can:</text>
    <text x="30" y="84" font-size="13" fill="#4A4B65">- Update Score Values: Modify individual player/faction scores</text>
    <text x="30" y="108" font-size="13" fill="#4A4B65">- Refresh Display: Force the scoreboard to re-render</text>
    <text x="30" y="132" font-size="13" fill="#4A4B65">- Toggle Visibility: Show or hide scoreboard sections</text>
    <text x="30" y="156" font-size="13" fill="#4A4B65">- Reset Scores: Clear all scores for a new round</text>
    <text x="20" y="186" font-size="13" fill="#4A4B65">The scoreboard reflects real-time changes as data is updated through connected node graph events.</text>
  </g>

  <g transform="translate(60, 1484)">
    <rect width="1080" height="50" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="12" font-weight="bold" fill="#1A1B2E">Related Documentation:</text>
  </g>
  <a href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhaeur0m48ls">
    <text x="80" y="1564" font-size="12" fill="#2D6BE4" text-decoration="underline">Scoreboard UI Controls</text>
  </a>

  <text x="600" y="1620" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>
