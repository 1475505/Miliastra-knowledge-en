<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1050" width="1200" height="1050">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1050" fill="#F9F7F2"/>

  <!-- Top Bar -->
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="60" y="20" width="1080" height="100" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="20" width="4" height="100" fill="#2D6BE4" rx="2"/>
  <text x="90" y="60" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="26" font-weight="bold" fill="#1A1B2E">Custom Attachment Points</text>
  <text x="90" y="92" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="14" fill="#4A4B65">Define specific positions on an entity's skeleton or structure for attaching other units or visual effects.</text>

  <!-- Section I -->
  <text x="60" y="145" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">I. Definition &amp; Purpose</text>

  <rect x="60" y="165" width="1080" height="130" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="85" y="192" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Attachment Points Overview</text>
  <text x="85" y="218" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="85" dy="0">Attachment points are specific positions on the skeleton or structure of an entity, used to attach</tspan>
    <tspan x="85" dy="22">other units or special effects. The custom attachment point component allows creators to freely</tspan>
    <tspan x="85" dy="22">choose any position as the unit's attachment point.</tspan>
    <tspan x="85" dy="24">After adding attachment points, their offset from the center origin is fixed and does not change</tspan>
    <tspan x="85" dy="22">relative displacement with the entity's skeletal movement. Multiple points can be added.</tspan>
  </text>

  <!-- Section II -->
  <text x="60" y="325" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">II. Component &amp; Configuration</text>

  <rect x="60" y="345" width="520" height="200" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="85" y="372" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Adding the Component</text>
  <text x="85" y="398" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="85" dy="0">1. Open the entity/prefab editing</tspan>
    <tspan x="85" dy="22">interface and switch to the</tspan>
    <tspan x="85" dy="22">Components tab.</tspan>
    <tspan x="85" dy="24">2. Click Add Common Components</tspan>
    <tspan x="85" dy="22">and select Custom Attachment Point.</tspan>
    <tspan x="85" dy="22">3. Click Advanced Editing to expand</tspan>
    <tspan x="85" dy="22">the editing tab.</tspan>
  </text>

  <rect x="620" y="345" width="520" height="200" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="645" y="372" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Adding Attachment Points</text>
  <text x="645" y="398" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="645" dy="0">On the Details tab of the custom</tspan>
    <tspan x="645" dy="22">attachment point component, press</tspan>
    <tspan x="645" dy="22">[Add Custom Attachment Point] to</tspan>
    <tspan x="645" dy="22">create a new attachment point.</tspan>
    <tspan x="645" dy="24">Configure the following properties:</tspan>
    <tspan x="645" dy="22">- <tspan fill="#1A1B2E" font-weight="bold">Attachment Point Name</tspan></tspan>
    <tspan x="645" dy="22">- <tspan fill="#1A1B2E" font-weight="bold">Offset</tspan> (position relative to center)</tspan>
    <tspan x="645" dy="22">- <tspan fill="#1A1B2E" font-weight="bold">Rotation</tspan> (orientation offset)</tspan>
  </text>

  <!-- Section III -->
  <text x="60" y="575" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">III. Relative Transforms</text>

  <rect x="60" y="595" width="1080" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="85" y="622" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Transform Properties</text>
  <text x="85" y="648" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="85" dy="0"><tspan fill="#1A1B2E" font-weight="bold">Offset:</tspan> The position offset of the attachment point relative to the prefab or entity center origin.</tspan>
    <tspan x="85" dy="22"><tspan fill="#1A1B2E" font-weight="bold">Rotation:</tspan> The orientation offset of the attachment point relative to the prefab or entity center origin.</tspan>
    <tspan x="85" dy="22">These values are fixed once configured - they do not change with the entity's skeletal movement.</tspan>
  </text>

  <!-- Section IV -->
  <text x="60" y="745" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="18" font-weight="bold" fill="#2D6BE4">IV. Usage in Other Systems</text>

  <rect x="60" y="765" width="1080" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
  <text x="85" y="792" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="15" font-weight="bold" fill="#1A1B2E">Referencing Attachment Points</text>
  <text x="85" y="818" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="13" fill="#4A4B65">
    <tspan x="85" dy="0">Custom attachment points are referenced by name in other systems such as:</tspan>
    <tspan x="85" dy="24"><tspan fill="#1A1B2E" font-weight="bold">VFX Playing:</tspan> Select a custom attachment point as the effect's Attachment Point parameter.</tspan>
    <tspan x="85" dy="22"><tspan fill="#1A1B2E" font-weight="bold">Collision Trigger Source:</tspan> Position trigger sources relative to attachment points.</tspan>
    <tspan x="85" dy="22">The attachment point name serves as a reference key that other components use to locate the transform.</tspan>
  </text>

  <!-- Footer -->
  <text x="600" y="920" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="11" fill="#8B8DA0" text-anchor="middle">Generated by AI based on official Miliastra Academy documentation. Version: Luminary</text>

  <!-- Source Links -->
  <text x="60" y="955" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#1A1B2E">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhrkb7ifvbvo" target="_blank">
    <text x="60" y="977" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif" font-size="12" fill="#2D6BE4" text-decoration="underline">Custom Attachment Points - Tutorial Detail</text>
  </a>
</svg>
