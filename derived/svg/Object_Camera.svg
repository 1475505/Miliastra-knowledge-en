<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1110" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1200" height="1110" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="72" font-size="34" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">Object Camera</text>

  <text x="48" y="148" font-size="18" font-weight="700" fill="#2D6BE4">I. Functions of the Object Camera Component</text>

  <g transform="translate(48, 168)">
    <rect width="1104" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="24" y="28" font-size="15" font-weight="500" fill="#1A1B2E">Purpose</text>
    <text x="24" y="52" font-size="14" fill="#4A4B65">Mount additional cameras to dynamic objects/creations and switch between them</text>
    <text x="24" y="72" font-size="14" fill="#4A4B65">while the stage is running for better visual presentation.</text>
    <text x="24" y="100" font-size="14" fill="#4A4B65">Object Cameras follow object/creation entities. Currently only Third-Person Camera mode is supported.</text>
  </g>

  <text x="48" y="328" font-size="18" font-weight="700" fill="#2D6BE4">II. Editing Object Camera Components</text>

  <g transform="translate(48, 348)">
    <rect width="1104" height="260" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="20" y="14" width="140" height="26" rx="13" fill="#E8EEFB"/>
    <text x="90" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Adding Component</text>

    <circle cx="36" cy="64" r="14" fill="#2D6BE4"/>
    <text x="36" y="65" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">1</text>
    <text x="60" y="65" font-size="14" fill="#4A4B65" dominant-baseline="middle">In the Entity/Prefab Editing interface, open the Component Editing Tab</text>

    <circle cx="36" cy="100" r="14" fill="#2D6BE4"/>
    <text x="36" y="101" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">2</text>
    <text x="60" y="101" font-size="14" fill="#4A4B65" dominant-baseline="middle">Click "Add Common Component" below, then select and click "Object Camera" to add it</text>

    <circle cx="36" cy="136" r="14" fill="#2D6BE4"/>
    <text x="36" y="137" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">3</text>
    <text x="60" y="137" font-size="14" fill="#4A4B65" dominant-baseline="middle">Click "Edit Details" to expand the editing tab</text>

    <line x1="24" y1="162" x2="1080" y2="162" stroke="#E8E4DA" stroke-width="1"/>

    <rect x="20" y="174" width="160" height="26" rx="13" fill="#E8EEFB"/>
    <text x="100" y="187" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Editing Component</text>

    <text x="24" y="220" font-size="14" fill="#4A4B65">Click "+ New Object Camera", then use "Select Camera" to choose a preconfigured Object Camera Template.</text>
    <text x="24" y="244" font-size="14" fill="#4A4B65">Use [Manage Cameras] to open [Main Camera Management], where you can edit the cameras.</text>
  </g>

  <text x="48" y="648" font-size="18" font-weight="700" fill="#2D6BE4">III. Managing Object Cameras Through Node Graphs</text>

  <g transform="translate(48, 668)">
    <rect width="1104" height="140" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="24" y="28" font-size="15" font-weight="500" fill="#1A1B2E">Node Graph Operations</text>
    <text x="24" y="56" font-size="14" fill="#4A4B65">Select a camera, then use [Enter Preview Mode] to preview it before switching.</text>
    <text x="24" y="80" font-size="14" fill="#4A4B65">Switch object cameras via Node Graph nodes during stage runtime.</text>
    <text x="24" y="104" font-size="14" fill="#4A4B65">The target camera must be attached to an object/entity that is present in the scene.</text>
    <text x="24" y="128" font-size="14" fill="#4A4B65">If the attached entity is not in the scene, the camera switch will fail.</text>
  </g>

  <g transform="translate(48, 828)">
    <rect width="1104" height="68" rx="14" fill="#FDE8E6"/>
    <rect x="0" y="0" width="4" height="68" rx="2" fill="#D93025"/>
    <text x="20" y="22" font-size="14" font-weight="bold" fill="#D93025">Important Constraint</text>
    <text x="20" y="46" font-size="13" fill="#D93025">When switching object cameras, ensure the object/entity the target camera is attached to is present in the scene; otherwise, the switch will fail.</text>
  </g>

  <g transform="translate(48, 916)">
    <rect width="1104" height="82" rx="14" fill="#E8EEFB"/>
    <rect x="0" y="0" width="4" height="82" rx="2" fill="#2D6BE4"/>
    <text x="20" y="22" font-size="14" font-weight="bold" fill="#2D6BE4">Object Camera Workflow</text>
    <text x="20" y="44" font-size="13" fill="#4A4B65">Add Object Camera Component to Entity/Prefab → Create New Object Camera →</text>
    <text x="20" y="64" font-size="13" fill="#4A4B65">Select Camera Template → Manage Cameras → Switch via Node Graph at Runtime</text>
  </g>

  <text x="48" y="1040" font-size="12" fill="#8B8DA0">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhx9b60or59k" target="_blank">
    <text x="48" y="1062" font-size="12" fill="#2D6BE4" text-decoration="underline">Miliastra Academy Documentation: Object Camera</text>
  </a>
  <text x="600" y="1090" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>