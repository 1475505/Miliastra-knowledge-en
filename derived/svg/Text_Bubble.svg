<text x="660" y="1678" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">When Text Bubble Is Completed</text>

<!-- Tip Box -->
<rect x="48" y="1718" width="1104" height="56" rx="10" fill="#E8EEFB"/>
