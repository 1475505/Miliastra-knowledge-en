<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1870">
<defs>
<linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#2D6BE4"/>
<stop offset="100%" stop-color="#4A3F6B"/>
</linearGradient>
<filter id="card">
<feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
</filter>
<filter id="elevated">
<feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
</filter>
</defs>
<rect width="1200" height="1870" fill="#F9F7F2"/>
<rect width="1200" height="6" fill="url(#topGrad)"/>

<!-- Title Card -->
<rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
<rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
<text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Text Bubble</text>

<!-- I. Component Functions -->
<text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">I. Component Functions</text>

<rect x="48" y="162" width="1104" height="140" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="190" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">
<tspan x="72" dy="0">Text Bubble Component provides text bubble functionality mounted on entities. It can reference</tspan>
<tspan x="72" dy="22">custom variable data to display configured content during stage runtime.</tspan>
<tspan x="72" dy="30" font-weight="500" fill="#1A1B2E">Supported entity types: Objects and Creations</tspan>
<tspan x="72" dy="22">- Multiple text bubbles configurable, but only one active at a time</tspan>
<tspan x="72" dy="22">- Controlled via default config, node graph switching, or local filters</tspan>
</text>

<!-- II. Adding the Component -->
<text x="48" y="344" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">II. Adding the Component</text>

<rect x="48" y="358" width="1104" height="120" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="84" cy="390" r="16" fill="#2D6BE4"/>
<text x="84" y="395" fill="#fff" font-size="13" text-anchor="middle" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">1</text>
<text x="112" y="395" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">In entity/prefab editing interface, open the Editing Components tab</text>

<circle cx="84" cy="426" r="16" fill="#2D6BE4"/>
<text x="84" y="431" fill="#fff" font-size="13" text-anchor="middle" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">2</text>
<text x="112" y="431" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Click "Add Components", select and click on the text bubble to add</text>

<circle cx="84" cy="462" r="16" fill="#1B4FC0"/>
<text x="84" y="467" fill="#fff" font-size="13" text-anchor="middle" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">3</text>
<text x="112" y="467" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Click "Advanced Editing" to expand the editing tab</text>

<!-- III. Component Configuration -->
<text x="48" y="520" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">III. Component Configuration</text>

<rect x="48" y="534" width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<rect x="72" y="554" width="1056" height="60" rx="10" fill="#F4F1EA"/>
<text x="100" y="575" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Initially Effective Text Bubble</text>
<text x="380" y="575" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Dropdown enumeration; checkbox toggles effective status (synced to editing page)</text>
<text x="100" y="605" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Text Bubble List</text>
<text x="380" y="605" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Enumerates all text bubbles configured for the entity</text>

<!-- IV. Basic Settings -->
<text x="48" y="676" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">IV. Text Bubble Basic Settings</text>

<rect x="48" y="690" width="1104" height="300" rx="14" fill="#fff" filter="url(#card)"/>
<rect x="72" y="710" width="1056" height="36" rx="10" fill="#2D6BE4"/>
<text x="200" y="733" fill="#fff" font-size="14" font-weight="500" text-anchor="middle" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Parameter</text>
<text x="700" y="733" fill="#fff" font-size="14" font-weight="500" text-anchor="middle" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Description</text>

<rect x="72" y="746" width="1056" height="48" fill="#fff"/>
<text x="100" y="767" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Select Attach Point</text>
<text x="380" y="767" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Preset or custom attachment point; bubble position uses this as base</text>
<line x1="72" y1="794" x2="1128" y2="794" stroke="#E8E4DA"/>

<rect x="72" y="794" width="1056" height="32" fill="#F4F1EA"/>
<text x="100" y="815" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Offset</text>
<text x="380" y="815" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Adjustable offset relative to the selected attachment point</text>
<line x1="72" y1="826" x2="1128" y2="826" stroke="#E8E4DA"/>

<rect x="72" y="826" width="1056" height="32" fill="#fff"/>
<text x="100" y="847" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Font Size</text>
<text x="380" y="847" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Font size configuration</text>
<line x1="72" y1="858" x2="1128" y2="858" stroke="#E8E4DA"/>

<rect x="72" y="858" width="1056" height="32" fill="#F4F1EA"/>
<text x="100" y="879" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Visible Radius (m)</text>
<text x="380" y="879" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Effective distance; bubble logic runs only when within this range</text>
<line x1="72" y1="890" x2="1128" y2="890" stroke="#E8E4DA"/>

<rect x="72" y="890" width="1056" height="48" fill="#fff"/>
<text x="100" y="911" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Filter Node Graph</text>
<text x="380" y="911" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Local filter to determine visibility</text>
<text x="400" y="931" fill="#4A4B65" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Boolean: visible when "true"  |  Integer: visible when within effective integer range</text>
<line x1="72" y1="938" x2="1128" y2="938" stroke="#E8E4DA"/>

<rect x="72" y="938" width="1056" height="32" fill="#F4F1EA"/>
<text x="100" y="959" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Loop Playback</text>
<text x="380" y="959" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Enabled: plays in loop  |  Disabled: plays only once</text>

<!-- V. Send End Event -->
<text x="48" y="1032" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">V. Send End Event</text>

<rect x="48" y="1046" width="1104" height="140" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="1074" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">When "Send End Event" is enabled:</text>
<rect x="72" y="1088" width="1056" height="80" rx="10" fill="#F4F1EA"/>
<text x="96" y="1110" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">
<tspan x="96" dy="0">- Sends event to node graph after last dialogue line completes</tspan>
<tspan x="96" dy="22">- Only the entity node graph with this component can receive it</tspan>
<tspan x="96" dy="22">- Server records completion per character; re-entering range or reconnecting will NOT re-trigger</tspan>
</text>

<rect x="48" y="1202" width="1104" height="56" rx="10" fill="#FDE8E6"/>
<rect x="48" y="1202" width="4" height="56" rx="2" fill="#D93025"/>
<text x="72" y="1226" fill="#D93025" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">When "Send End Event" is NOT checked:</text>
<text x="72" y="1248" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Bubble dialogue re-triggers when character re-enters range or after disconnect/reconnect.</text>

<!-- VI. Editing Bubble Text -->
<text x="48" y="1300" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">VI. Editing Bubble Text</text>

<rect x="48" y="1314" width="1104" height="180" rx="14" fill="#fff" filter="url(#card)"/>
<rect x="72" y="1334" width="1056" height="36" rx="10" fill="#2D6BE4"/>
<text x="200" y="1357" fill="#fff" font-size="14" font-weight="500" text-anchor="middle" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Parameter</text>
<text x="700" y="1357" fill="#fff" font-size="14" font-weight="500" text-anchor="middle" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Description</text>

<rect x="72" y="1370" width="1056" height="32" fill="#fff"/>
<text x="100" y="1391" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Duration</text>
<text x="380" y="1391" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Display time for the current bubble text content</text>
<line x1="72" y1="1402" x2="1128" y2="1402" stroke="#E8E4DA"/>

<rect x="72" y="1402" width="1056" height="80" fill="#F4F1EA"/>
<text x="100" y="1423" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Text Content</text>
<text x="380" y="1423" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Display text editing with variable insertion support</text>
<text x="400" y="1445" fill="#4A4B65" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Text size depends on font size in basic config; bubble size adapts to text amount</text>
<text x="400" y="1465" fill="#4A4B65" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Multiple lines of text supported, played in sequence</text>

<!-- Preview -->
<rect x="48" y="1510" width="1104" height="56" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="1538" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Preview Bubble Text</text>
<text x="380" y="1538" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Click "Preview" to test position, font size, duration, and loop playback</text>

<!-- VII. Node Graph Management -->
<text x="48" y="1608" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">VII. Node Graph Management</text>

<rect x="48" y="1622" width="540" height="80" rx="14" fill="#fff" filter="url(#card)"/>
