<text x="72" y="1742" fill="#2D6BE4" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Tip: Bubble ID</text>
<text x="72" y="1764" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">"Bubble X" (X = bubble ID) serves as a node input to adjust initial activation parameters of the text bubble.</text>

