<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 908">
<defs>
  <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2D6BE4"/>
    <stop offset="100%" stop-color="#4A3F6B"/>
  </linearGradient>
  <filter id="card">
    <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
  </filter>
  <filter id="elevated">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
  </filter>
</defs>
<style>
  text { font-family: 'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif; }
</style>

<!-- Page Background -->
<rect width="1200" height="908" fill="#F9F7F2"/>

<!-- Top Color Bar -->
<rect width="1200" height="6" fill="url(#topGrad)"/>

<!-- Title Card -->
<rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
<rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
<text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold">UI Animation</text>
<text x="360" y="82" fill="#4A4B65" font-size="16">Display special effect assets in the UI Layout</text>

<!-- I. UI Animation Features -->
<text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. UI Animation Features</text>

<rect x="48" y="162" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="190" fill="#4A4B65" font-size="14">UI Animations can be configured in the UI Layout and display the corresponding special effect asset.</text>
<text x="72" y="212" fill="#4A4B65" font-size="14">It is a type of UI control used to beautify the interface and enrich its visual presentation. During stage runtime, UI Animation Controls can be triggered through Node Graphs.</text>

<!-- II. Editing UI Animation -->
<text x="48" y="278" fill="#2D6BE4" font-size="18" font-weight="700">II. Editing UI Animation</text>

<!-- Add UI Animation Card -->
<rect x="48" y="292" width="1104" height="60" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="322" r="14" fill="#2D6BE4"/>
<text x="76" y="327" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">1</text>
<text x="100" y="327" fill="#1A1B2E" font-size="16" font-weight="500">Add UI Animation</text>
<text x="300" y="327" fill="#4A4B65" font-size="14">In the UI Control Group Editor window, add the UI Control Template: UI Animation.</text>

<!-- UI Animation Settings Card -->
<rect x="48" y="364" width="1104" height="160" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="392" r="14" fill="#2D6BE4"/>
<text x="76" y="397" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">2</text>
<text x="100" y="397" fill="#1A1B2E" font-size="16" font-weight="500">UI Animation Settings</text>

<rect x="72" y="418" width="180" height="24" rx="12" fill="#E8EEFB"/>
<text x="162" y="434" fill="#2D6BE4" font-size="12" text-anchor="middle">Select UI Animation</text>
<text x="262" y="434" fill="#4A4B65" font-size="14">Select the special effect asset to be displayed in the UI Layout.</text>

<rect x="72" y="450" width="160" height="24" rx="12" fill="#E8EEFB"/>
<text x="152" y="466" fill="#2D6BE4" font-size="12" text-anchor="middle">Play Sound Effect</text>
<text x="242" y="466" fill="#4A4B65" font-size="14">If set to Yes, the sound effect included with the asset will also play.</text>

<rect x="72" y="482" width="70" height="24" rx="12" fill="#E8EEFB"/>
<text x="107" y="498" fill="#2D6BE4" font-size="12" text-anchor="middle">Layer</text>
<text x="152" y="498" fill="#4A4B65" font-size="14">Only supports Above All Controls and Below All Controls. Default is Above All Controls.</text>

<!-- Preview Settings Card -->
<rect x="48" y="536" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="564" r="14" fill="#2D6BE4"/>
<text x="76" y="569" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">3</text>
<text x="100" y="569" fill="#1A1B2E" font-size="16" font-weight="500">Preview Settings</text>
<text x="72" y="596" fill="#4A4B65" font-size="14">Enable this in the top-right settings to keep UI animations always visible in preview while editing, regardless of layer order.</text>

<!-- III. Manage UI Animation through Node Graphs -->
<text x="48" y="656" fill="#2D6BE4" font-size="18" font-weight="700">III. Manage UI Animation through Node Graphs</text>

<rect x="48" y="670" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="698" fill="#1A1B2E" font-size="16" font-weight="500">Play UI Animation on Control</text>
<text x="72" y="724" fill="#4A4B65" font-size="14">Use the node graph to trigger UI animation playback on a specific control during stage runtime.</text>
<text x="72" y="744" fill="#4A4B65" font-size="14">The animation plays on the configured UI Animation control and respects its layer settings.</text>

<!-- Tip Box -->
<rect x="48" y="768" width="1104" height="60" rx="10" fill="#E8EEFB"/>
<rect x="48" y="768" width="4" height="60" rx="2" fill="#2D6BE4"/>
<text x="72" y="794" fill="#4A4B65" font-size="14">Tip: Use the Preview Settings to keep animations visible while editing. This helps you position and size the animation</text>
<text x="72" y="816" fill="#4A4B65" font-size="14">control correctly without needing to run the stage. Layer order determines rendering priority at runtime.</text>

