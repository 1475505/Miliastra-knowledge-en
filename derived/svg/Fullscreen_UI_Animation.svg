<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1036">
<defs>
  <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2D6BE4"/>
    <stop offset="100%" stop-color="#4A3F6B"/>
  </linearGradient>
  <filter id="card">
    <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
  </filter>
  <filter id="elevated">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
  </filter>
</defs>
<style>
  text { font-family: 'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif; }
</style>

<!-- Page Background -->
<rect width="1200" height="1036" fill="#F9F7F2"/>

<!-- Top Color Bar -->
<rect width="1200" height="6" fill="url(#topGrad)"/>

<!-- Title Card -->
<rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
<rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
<text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold">Fullscreen UI Animation</text>
<text x="530" y="82" fill="#4A4B65" font-size="16">Full-screen special effect assets in the UI Layout</text>

<!-- I. Fullscreen UI Animation Features -->
<text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Fullscreen UI Animation Features</text>

<rect x="48" y="162" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="190" fill="#4A4B65" font-size="14">Fullscreen UI Animations can be configured in the UI Layout and display the corresponding special effect asset.</text>
<text x="72" y="212" fill="#4A4B65" font-size="14">It is a type of UI control used to beautify the interface and enrich its visual presentation. During stage runtime, Fullscreen UI Animation Controls can be triggered through Node Graphs.</text>

<!-- II. Editing Fullscreen UI Animation -->
<text x="48" y="278" fill="#2D6BE4" font-size="18" font-weight="700">II. Editing Fullscreen UI Animation</text>

<!-- Add Fullscreen UI Animation Card -->
<rect x="48" y="292" width="1104" height="60" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="322" r="14" fill="#2D6BE4"/>
<text x="76" y="327" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">1</text>
<text x="100" y="327" fill="#1A1B2E" font-size="16" font-weight="500">Add Fullscreen UI Animation</text>
<text x="420" y="327" fill="#4A4B65" font-size="14">In the UI Control Group Editor window, add the UI Control Template — Fullscreen UI Animation.</text>

<!-- Fullscreen UI Animation Settings Card -->
<rect x="48" y="364" width="1104" height="120" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="392" r="14" fill="#2D6BE4"/>
<text x="76" y="397" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">2</text>
<text x="100" y="397" fill="#1A1B2E" font-size="16" font-weight="500">Fullscreen UI Animation Settings</text>

<rect x="72" y="418" width="180" height="24" rx="12" fill="#E8EEFB"/>
<text x="162" y="434" fill="#2D6BE4" font-size="12" text-anchor="middle">Select UI Animation</text>
<text x="262" y="434" fill="#4A4B65" font-size="14">Select the special effect asset to be displayed in the UI Layout.</text>

<rect x="72" y="450" width="160" height="24" rx="12" fill="#E8EEFB"/>
<text x="152" y="466" fill="#2D6BE4" font-size="12" text-anchor="middle">Play Sound Effect</text>
<text x="242" y="466" fill="#4A4B65" font-size="14">If set to Yes, the sound effect included with the asset will also play.</text>

<!-- III. Differences Between Fullscreen UI Animation and UI Animation -->
<text x="48" y="524" fill="#2D6BE4" font-size="18" font-weight="700">III. Differences: Fullscreen UI Animation vs UI Animation</text>

<rect x="48" y="538" width="1104" height="200" rx="14" fill="#fff" filter="url(#card)"/>

<!-- Comparison Table -->
<rect x="72" y="558" width="1056" height="36" rx="10" fill="#2D6BE4"/>
<text x="280" y="582" fill="#fff" font-size="14" text-anchor="middle" font-weight="500">Feature</text>
<text x="600" y="582" fill="#fff" font-size="14" text-anchor="middle" font-weight="500">UI Animation</text>
<text x="920" y="582" fill="#fff" font-size="14" text-anchor="middle" font-weight="500">Fullscreen UI Animation</text>

<rect x="72" y="594" width="1056" height="36" fill="#fff"/>
<line x1="72" y1="630" x2="1128" y2="630" stroke="#E8E4DA" stroke-width="1"/>
<text x="280" y="618" fill="#1A1B2E" font-size="14" text-anchor="middle" font-weight="500">Layer Order</text>
<text x="600" y="618" fill="#4A4B65" font-size="14" text-anchor="middle">Configurable (Above/Below All Controls)</text>
<text x="920" y="618" fill="#1A1B2E" font-size="14" text-anchor="middle" font-weight="500">Always on top of all layers (cannot change)</text>

<rect x="72" y="630" width="1056" height="36" fill="#F4F1EA"/>
<line x1="72" y1="666" x2="1128" y2="666" stroke="#E8E4DA" stroke-width="1"/>
<text x="280" y="654" fill="#1A1B2E" font-size="14" text-anchor="middle" font-weight="500">Coverage Area</text>
<text x="600" y="654" fill="#4A4B65" font-size="14" text-anchor="middle">Positioned within the UI layout</text>
<text x="920" y="654" fill="#1A1B2E" font-size="14" text-anchor="middle" font-weight="500">Covers the entire screen (cannot modify)</text>

<rect x="72" y="666" width="1056" height="36" fill="#fff"/>
<line x1="72" y1="702" x2="1128" y2="702" stroke="#E8E4DA" stroke-width="1"/>
<text x="280" y="690" fill="#1A1B2E" font-size="14" text-anchor="middle" font-weight="500">Typical Use Case</text>
<text x="600" y="690" fill="#4A4B65" font-size="14" text-anchor="middle">Localized effects on specific UI controls</text>
<text x="920" y="690" fill="#1A1B2E" font-size="14" text-anchor="middle" font-weight="500">On-screen atmospheric effects</text>

<rect x="72" y="702" width="1056" height="36" rx="0" fill="#F4F1EA"/>
<rect x="72" y="724" width="1056" height="14" rx="10" fill="#F4F1EA"/>
<text x="280" y="726" fill="#1A1B2E" font-size="14" text-anchor="middle" font-weight="500">Size Configuration</text>
<text x="600" y="726" fill="#4A4B65" font-size="14" text-anchor="middle">Adjustable size and position</text>
<text x="920" y="726" fill="#1A1B2E" font-size="14" text-anchor="middle" font-weight="500">Fixed full-screen (not adjustable)</text>

<!-- IV. Manage through Node Graphs -->
<text x="48" y="784" fill="#2D6BE4" font-size="18" font-weight="700">IV. Manage UI Animation through Node Graphs</text>

<rect x="48" y="798" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="826" fill="#1A1B2E" font-size="16" font-weight="500">Play UI Animation on Control</text>
<text x="72" y="852" fill="#4A4B65" font-size="14">Use the node graph to trigger Fullscreen UI animation playback during stage runtime.</text>
<text x="72" y="872" fill="#4A4B65" font-size="14">The animation covers the entire screen and renders above all other UI layers.</text>

<!-- Tip Box -->
<rect x="48" y="896" width="1104" height="60" rx="10" fill="#E8EEFB"/>
<rect x="48" y="896" width="4" height="60" rx="2" fill="#2D6BE4"/>
<text x="72" y="922" fill="#4A4B65" font-size="14">Tip: Use Fullscreen UI Animation for on-screen atmospheric effects like weather, transitions, or dramatic moments.</text>
<text x="72" y="944" fill="#4A4B65" font-size="14">Use regular UI Animation for localized effects on specific controls. Fullscreen animations always render on top of all layers.</text>

