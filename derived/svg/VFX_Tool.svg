<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 3600" width="100%" height="100%" style="background:#F9F7F2;font-family:'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif;">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1200" height="3600" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>
  <rect x="60" y="24" width="1080" height="76" rx="14" fill="#FFFFFF" filter="url(#elevated)"/>
  <rect x="60" y="24" width="4" height="76" rx="2" fill="#2D6BE4"/>
  <text x="84" y="68" font-size="22" font-weight="bold" fill="#1A1B2E" dominant-baseline="middle">34-VFX Tools</text>

  <circle cx="80" cy="136" r="16" fill="#2D6BE4"/>
  <text x="80" y="137" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">I</text>
  <text x="108" y="137" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">I. What Are VFX Tools?</text>

  <g transform="translate(60, 164)">
    <rect width="1080" height="120" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="15" font-weight="bold" fill="#1A1B2E">Definition</text>
    <text x="20" y="54" font-size="13" fill="#4A4B65">VFX Tools are composite assets consisting of visual effects (VFX) and sound effects (SFX) managed</text>
    <text x="20" y="74" font-size="13" fill="#4A4B65">via a timeline. Craftspeople can Play or Mount them the same way as regular special effects.</text>
    <text x="20" y="100" font-size="13" fill="#4A4B65">Access: Combat Preset tab → VFX Tool → [New VFX Tool]</text>
  </g>

  <circle cx="80" cy="320" r="16" fill="#2D6BE4"/>
  <text x="80" y="321" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">II</text>
  <text x="108" y="321" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">II. VFX Tool Classification</text>

  <g transform="translate(60, 348)">
    <rect width="520" height="220" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="80" height="26" rx="13" fill="#E8EEFB"/>
    <text x="56" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Timed</text>
    <text x="16" y="60" font-size="14" font-weight="bold" fill="#1A1B2E">Timed VFX Tools</text>
    <text x="16" y="82" font-size="13" fill="#4A4B65">Fixed duration. Once playback reaches the Duration, the VFX</text>
    <text x="16" y="102" font-size="13" fill="#4A4B65">Tool auto-destroys.</text>
    <text x="16" y="126" font-size="13" fill="#4A4B65">Can only be triggered via [Play Timed Effects] node.</text>
    <text x="16" y="150" font-size="13" fill="#1A1B2E" font-weight="bold">Choose type at creation — cannot be changed later.</text>
    <text x="16" y="172" font-size="13" fill="#4A4B65">After creating a Timed VFX Tool, enter the editing</text>
    <text x="16" y="192" font-size="13" fill="#4A4B65">interface to adjust its duration.</text>
  </g>

  <g transform="translate(620, 348)">
    <rect width="520" height="220" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="100" height="26" rx="13" fill="#E8EEFB"/>
    <text x="66" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Persistent</text>
    <text x="16" y="60" font-size="14" font-weight="bold" fill="#1A1B2E">Persistent VFX Tools</text>
    <text x="16" y="82" font-size="13" fill="#4A4B65">Infinite duration — will not destroy itself.</text>
    <text x="16" y="106" font-size="13" fill="#4A4B65">Can be destroyed in Node Graph using:</text>
    <text x="16" y="126" font-size="13" fill="#4A4B65">• Special Effects Asset Configuration ID</text>
    <text x="16" y="146" font-size="13" fill="#4A4B65">• Special Effect Instance ID</text>
    <text x="16" y="170" font-size="13" fill="#4A4B65">Can only be mounted via [Mount Looping Effects] node.</text>
    <text x="16" y="194" font-size="13" fill="#1A1B2E" font-weight="bold">Choose type at creation — cannot be changed later.</text>
  </g>

  <circle cx="80" cy="604" r="16" fill="#2D6BE4"/>
  <text x="80" y="605" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">III</text>
  <text x="108" y="605" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">III. Effect Tracks</text>

  <g transform="translate(60, 632)">
    <rect width="1080" height="180" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="15" font-weight="bold" fill="#1A1B2E">Track System</text>
    <text x="20" y="54" font-size="13" fill="#4A4B65">A VFX Tool can consist of multiple Effect Tracks. Click [New Track] to add a track to the timeline.</text>
    <text x="20" y="74" font-size="13" fill="#4A4B65">You can configure visual effects (VFX) or sound effects (SFX) on any track. The system plays these</text>
    <text x="20" y="94" font-size="13" fill="#4A4B65">effects at their designated time points along the timeline. Click a specific track to modify its properties.</text>
    <text x="20" y="124" font-size="15" font-weight="bold" fill="#1A1B2E">Visibility Settings</text>
    <text x="20" y="148" font-size="13" fill="#4A4B65">Visible Faction List: Hostile / Allied / Own faction visibility filters (all selected = visible to all)</text>
    <text x="20" y="168" font-size="13" fill="#4A4B65">Local Filter: Updated per-client; returns True = visible, False = hidden</text>
  </g>

  <circle cx="80" cy="848" r="16" fill="#2D6BE4"/>
  <text x="80" y="849" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IV</text>
  <text x="108" y="849" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">IV. Loop Segment Settings</text>

  <g transform="translate(60, 876)">
    <rect width="1080" height="220" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="15" font-weight="bold" fill="#1A1B2E">Loop Configuration</text>
    <text x="20" y="54" font-size="13" fill="#1A1B2E" font-weight="bold">Enable Loop Segment</text>
    <text x="150" y="54" font-size="13" fill="#4A4B65">Turns track into a loop segment track</text>
    <text x="20" y="78" font-size="13" fill="#1A1B2E" font-weight="bold">Loop Segment Start Time (s)</text>
    <text x="185" y="78" font-size="13" fill="#4A4B65">Start position of loop on timeline</text>
    <text x="20" y="102" font-size="13" fill="#1A1B2E" font-weight="bold">Loop Segment Duration (s)</text>
    <text x="190" y="102" font-size="13" fill="#4A4B65">Duration from start to end of loop</text>
    <text x="20" y="126" font-size="13" fill="#1A1B2E" font-weight="bold">Infinite Loop</text>
    <text x="120" y="126" font-size="13" fill="#4A4B65">Keeps looping until VFX Tool's Life Cycle ends</text>
    <text x="20" y="150" font-size="13" fill="#1A1B2E" font-weight="bold">Number of Loops</text>
    <text x="140" y="150" font-size="13" fill="#4A4B65">Specifies exact loop count (when Infinite Loop disabled)</text>
    <text x="20" y="178" font-size="13" fill="#4A4B65">A blue box marks the loop segment area on the track.</text>
    <text x="20" y="198" font-size="13" fill="#4A4B65">Note: If Timed duration is reached, active loop effects are cut off.</text>
  </g>

  <circle cx="80" cy="1132" r="16" fill="#2D6BE4"/>
  <text x="80" y="1133" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">V</text>
  <text x="108" y="1133" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">V. Effect (SFX) Blocks</text>

  <g transform="translate(60, 1160)">
    <rect width="1080" height="200" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="15" font-weight="bold" fill="#1A1B2E">SFX Block Configuration</text>
    <text x="20" y="54" font-size="13" fill="#4A4B65">Place Effect (SFX) Blocks anywhere along an effect track. Each references a sound asset and</text>
    <text x="20" y="74" font-size="13" fill="#4A4B65">configures its duration within the track. The effect asset can be Timed or Continuous.</text>
    <text x="20" y="104" font-size="14" font-weight="bold" fill="#1A1B2E">Life Cycle Settings</text>
    <text x="20" y="128" font-size="13" fill="#4A4B65">Continuous Playback: Play until naturally finishes or VFX Tool is destroyed</text>
    <text x="20" y="148" font-size="13" fill="#4A4B65">Non-Continuous: Configure Duration; effect destroyed when duration ends</text>
    <text x="20" y="172" font-size="13" fill="#4A4B65">[Set to Asset Duration]: Matches effect duration to asset's duration</text>
  </g>

  <circle cx="80" cy="1396" r="16" fill="#2D6BE4"/>
  <text x="80" y="1397" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">VI</text>
  <text x="108" y="1397" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">VI. Behavior on Destroy / Hide</text>

  <g transform="translate(60, 1424)">
    <rect width="520" height="440" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="110" height="26" rx="13" fill="#E8EEFB"/>
    <text x="71" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Timed Effects</text>
    <text x="16" y="60" font-size="14" font-weight="bold" fill="#1A1B2E">Behavior When Destroyed</text>
    <text x="16" y="82" font-size="13" fill="#4A4B65">Stop Particle Emission: Stops emission, existing</text>
    <text x="16" y="100" font-size="13" fill="#4A4B65">particles continue until Life Cycle ends</text>
    <text x="16" y="124" font-size="13" fill="#4A4B65">Stop and Clear Effects: Stops emission and removes</text>
    <text x="16" y="142" font-size="13" fill="#4A4B65">all visual presentation instantly</text>
    <text x="16" y="166" font-size="13" fill="#4A4B65">Has Behavior on Destruction disabled: Effect continues</text>
    <text x="16" y="184" font-size="13" fill="#4A4B65">playing until its own lifecycle completes</text>
    <text x="16" y="214" font-size="14" font-weight="bold" fill="#1A1B2E">Behavior When Hidden</text>
    <text x="16" y="236" font-size="13" fill="#4A4B65">None: Effect not affected when hidden</text>
    <text x="16" y="256" font-size="13" fill="#4A4B65">Destroy Effect: Effect destroyed when hidden;</text>
    <text x="16" y="274" font-size="13" fill="#4A4B65">will not resume when visible again</text>
    <text x="16" y="304" font-size="13" fill="#1A1B2E" font-weight="bold">Special Note:</text>
    <text x="16" y="324" font-size="13" fill="#4A4B65">If a Timed Effect has "Has Behavior on Destruction"</text>
    <text x="16" y="344" font-size="13" fill="#4A4B65">disabled, it cannot be destroyed by the system — may</text>
    <text x="16" y="364" font-size="13" fill="#4A4B65">continue playing even after VFX Tool is destroyed</text>
  </g>

  <g transform="translate(620, 1424)">
    <rect width="520" height="440" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="120" height="26" rx="13" fill="#E8EEFB"/>
    <text x="76" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Looping Effects</text>
    <text x="16" y="60" font-size="14" font-weight="bold" fill="#1A1B2E">Behavior When Destroyed</text>
    <text x="16" y="82" font-size="13" fill="#4A4B65">Stop Particle Emission: Stops emission, existing</text>
    <text x="16" y="100" font-size="13" fill="#4A4B65">particles continue until Life Cycle ends</text>
    <text x="16" y="124" font-size="13" fill="#4A4B65">Stop and Clear Effects: Stops emission and removes</text>
    <text x="16" y="142" font-size="13" fill="#4A4B65">all visual presentation instantly</text>
    <text x="16" y="172" font-size="14" font-weight="bold" fill="#1A1B2E">Behavior When Hidden</text>
    <text x="16" y="194" font-size="13" fill="#4A4B65">None: Effect not affected when hidden</text>
    <text x="16" y="218" font-size="13" fill="#4A4B65">Sync Hidden Effects: Looping effect hides when VFX</text>
    <text x="16" y="236" font-size="13" fill="#4A4B65">Tool hidden; reappears when VFX Tool visible again</text>
  </g>

  <circle cx="80" cy="1900" r="16" fill="#2D6BE4"/>
  <text x="80" y="1901" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">VII</text>
  <text x="108" y="1901" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">VII. Regular Effect Blocks</text>

  <g transform="translate(60, 1928)">
    <rect width="1080" height="260" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="15" font-weight="bold" fill="#1A1B2E">Adding Regular Effect Blocks</text>
    <text x="20" y="52" font-size="13" fill="#4A4B65">Right-click the track → [Add Event] → [VFX Effect]</text>
    <text x="20" y="82" font-size="14" font-weight="bold" fill="#1A1B2E">Parameters</text>
    <text x="20" y="106" font-size="13" fill="#1A1B2E" font-weight="bold">Effect Asset</text>
    <text x="110" y="106" font-size="13" fill="#4A4B65">Select any Regular Effect Asset (Timed / Looping)</text>
    <text x="20" y="130" font-size="13" fill="#1A1B2E" font-weight="bold">Play VFX Default Sound Effect</text>
    <text x="195" y="130" font-size="13" fill="#4A4B65">Enable/disable built-in default sound effect</text>
    <text x="20" y="154" font-size="13" fill="#1A1B2E" font-weight="bold">Additional Element Type</text>
    <text x="165" y="154" font-size="13" fill="#4A4B65">Modifies visual style to match Elemental Type</text>
    <text x="20" y="178" font-size="13" fill="#1A1B2E" font-weight="bold">Effect Playback Speed</text>
    <text x="150" y="178" font-size="13" fill="#4A4B65">Multiplier (default 1). Does not affect audio speed</text>
    <text x="20" y="206" font-size="13" fill="#1A1B2E" font-weight="bold">General Parameters:</text>
    <text x="150" y="206" font-size="13" fill="#4A4B65">Offset (location), Rotation, Zoom (uniform scale)</text>
  </g>

  <circle cx="80" cy="2224" r="16" fill="#2D6BE4"/>
  <text x="80" y="2225" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">VIII</text>
  <text x="108" y="2225" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">VIII. Warning Effect Blocks</text>

  <g transform="translate(60, 2252)">
    <rect width="1080" height="620" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="16" y="14" width="100" height="26" rx="13" fill="#E8EEFB"/>
    <text x="66" y="27" font-size="12" font-weight="bold" fill="#2D6BE4" text-anchor="middle" dominant-baseline="middle">Shapes</text>
    <text x="20" y="60" font-size="13" fill="#4A4B65">Warning effects allow free configuration of static parameters: Circular, Rectangular, and Sector.</text>
    <text x="20" y="80" font-size="13" fill="#4A4B65">All warning effects are timed effects and can also be called directly as timed effects.</text>

    <text x="20" y="112" font-size="14" font-weight="bold" fill="#1A1B2E">Circular</text>
    <text x="20" y="134" font-size="13" fill="#4A4B65">Outer Radius (m), Inner Radius (m), Fill Time (s), Duration, Ground Height, Fill Color</text>

    <text x="20" y="164" font-size="14" font-weight="bold" fill="#1A1B2E">Rectangular</text>
    <text x="20" y="186" font-size="13" fill="#4A4B65">X-Axis Length (m), Z-Axis Length (m), Fill Direction (Linear Fill / Inside Out),</text>
    <text x="20" y="206" font-size="13" fill="#4A4B65">Fill Time (s), Duration, Ground Height, Fill Color</text>

    <text x="20" y="236" font-size="14" font-weight="bold" fill="#1A1B2E">Sector</text>
    <text x="20" y="258" font-size="13" fill="#4A4B65">Outer Radius (m), Inner Radius (m), Sector Angle, Fill Direction (Clockwise /</text>
    <text x="20" y="278" font-size="13" fill="#4A4B65">Counterclockwise / Inside Out), Fill Time (s), Duration, Ground Height, Fill Color</text>

    <text x="20" y="308" font-size="14" font-weight="bold" fill="#1A1B2E">General Parameters (all shapes)</text>
    <text x="20" y="330" font-size="13" fill="#4A4B65">Offset, Rotation, Zoom — adjust position/rotation/scale relative to VFX Tool origin</text>
  </g>

  <circle cx="80" cy="2908" r="16" fill="#2D6BE4"/>
  <text x="80" y="2909" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">IX</text>
  <text x="108" y="2909" font-size="18" font-weight="bold" fill="#2D6BE4" dominant-baseline="middle">IX. Using VFX Tools</text>

  <g transform="translate(60, 2936)">
    <rect width="1080" height="200" rx="14" fill="#FFFFFF" filter="url(#card)"/>
    <text x="20" y="28" font-size="14" font-weight="bold" fill="#1A1B2E">Node Graph Integration</text>
    <text x="20" y="54" font-size="13" fill="#4A4B65">VFX Tools are used the same way as regular effects. Use [Play Timed Effects] node:</text>
    <text x="20" y="78" font-size="13" fill="#4A4B65">• Effect Asset: Select a VFX Tool by configuration ID or search</text>
    <text x="20" y="98" font-size="13" fill="#4A4B65">• Target Entity: Owner of the VFX Tool</text>
    <text x="20" y="118" font-size="13" fill="#4A4B65">• Attachment Point Name: Origin placed at corresponding attachment point</text>
    <text x="20" y="138" font-size="13" fill="#4A4B65">• Move/Rotate With the Target, Location/Rotation Offset, Zoom Ratio</text>
    <text x="20" y="158" font-size="13" fill="#4A4B65">• Play Built-In Sound Effect: Yes = per-effect setting; No = no default sounds</text>
  </g>

  <text x="60" y="3190" font-size="12" fill="#8B8DA0">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh78er0n24r4" target="_blank">
    <text x="60" y="3216" font-size="13" fill="#2D6BE4" text-decoration="underline">VFX Tools → https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh78er0n24r4</text>
  </a>
  <text x="600" y="3250" font-size="11" fill="#8B8DA0" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>