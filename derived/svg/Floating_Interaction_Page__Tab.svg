<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1840" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="1840" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="48" y="32" width="1104" height="96" rx="14" fill="#fff" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="96" rx="2" fill="#2D6BE4"/>
  <text x="72" y="76" fill="#1A1B2E" font-size="30" font-weight="bold">Floating Interaction Page</text>
  <text x="72" y="106" fill="#4A4B65" font-size="16">Tab</text>
  <rect x="120" y="92" width="90" height="22" rx="11" fill="#FFF3E0"/>
  <text x="130" y="107" fill="#E65100" font-size="11" font-weight="500">Sub-section</text>

  <!-- I. Tab Overview (from Floating Interaction Page) -->
  <text x="48" y="166" fill="#2D6BE4" font-size="18" font-weight="700">I. Tab Overview</text>

  <rect x="48" y="182" width="1104" height="60" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="210" fill="#4A4B65" font-size="14">Tabs provide advanced configuration options within a Floating Interaction Page, enabling organized content navigation.</text>
  <text x="72" y="232" fill="#4A4B65" font-size="14">Supports player interaction and can trigger Server Node Graph Events when tabs are opened or closed.</text>

  <!-- II. Tab Styles -->
  <text x="48" y="278" fill="#2D6BE4" font-size="18" font-weight="700">II. Tab Styles</text>

  <rect x="48" y="294" width="1104" height="176" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="322" fill="#1A1B2E" font-size="16" font-weight="500">Style Configuration</text>
  <text x="72" y="344" fill="#4A4B65" font-size="14">Available options: Preset Style and Custom. Both styles require configuration of the scroll direction.</text>

  <rect x="72" y="356" width="500" height="48" rx="10" fill="#F4F1EA"/>
  <text x="82" y="376" fill="#1A1B2E" font-size="14" font-weight="500">Horizontal</text>
  <text x="82" y="396" fill="#4A4B65" font-size="13">Tabs scroll horizontally across the page.</text>

  <rect x="596" y="356" width="532" height="48" rx="10" fill="#F4F1EA"/>
  <text x="606" y="376" fill="#1A1B2E" font-size="14" font-weight="500">Vertical</text>
  <text x="606" y="396" fill="#4A4B65" font-size="13">Tabs scroll vertically along the page.</text>

  <text x="72" y="428" fill="#1A1B2E" font-size="14" font-weight="500">Preset Styles:</text>
  <text x="200" y="428" fill="#4A4B65" font-size="13">Different preset styles can be selected for quick setup.</text>

  <text x="72" y="454" fill="#1A1B2E" font-size="14" font-weight="500">Custom Styles:</text>
  <text x="200" y="454" fill="#4A4B65" font-size="13">Supports adding styles to preconfigure multiple tab item styles.</text>
  <text x="72" y="470" fill="#4A4B65" font-size="13">Each style allows assets for Default, Hover, Pressed, and Selected states to be configured freely.</text>

  <!-- III. Tab Functions -->
  <text x="48" y="506" fill="#2D6BE4" font-size="18" font-weight="700">III. Tab Functions</text>

  <!-- Tab Settings -->
  <rect x="48" y="522" width="1104" height="140" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="552" r="14" fill="#2D6BE4"/>
  <text x="80" y="557" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">a</text>
  <text x="106" y="556" fill="#1A1B2E" font-size="14" font-weight="500">Tab Settings</text>

  <rect x="106" y="568" width="130" height="26" rx="6" fill="#E8EEFB"/>
  <text x="116" y="586" fill="#2D6BE4" font-size="12" font-weight="500">Tab Item Size</text>
  <text x="250" y="586" fill="#4A4B65" font-size="13">General settings for each tab item.</text>

  <rect x="106" y="600" width="80" height="26" rx="6" fill="#E8EEFB"/>
  <text x="116" y="618" fill="#2D6BE4" font-size="12" font-weight="500">Spacing</text>
  <text x="200" y="618" fill="#4A4B65" font-size="13">Spacing between tab items.</text>

  <rect x="500" y="600" width="80" height="26" rx="6" fill="#E8EEFB"/>
  <text x="510" y="618" fill="#2D6BE4" font-size="12" font-weight="500">Padding</text>
  <text x="594" y="618" fill="#4A4B65" font-size="13">Margin settings for top, bottom, left, right sides relative to the border.</text>

  <rect x="106" y="632" width="240" height="26" rx="6" fill="#E8EEFB"/>
  <text x="116" y="650" fill="#2D6BE4" font-size="12" font-weight="500">Center If Content Doesn't Fill</text>
  <text x="360" y="650" fill="#4A4B65" font-size="13">If enabled, tab items automatically center as a whole.</text>

  <!-- Tab Item Configuration -->
  <rect x="48" y="674" width="1104" height="200" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="704" r="14" fill="#2D6BE4"/>
  <text x="80" y="709" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">b</text>
  <text x="106" y="708" fill="#1A1B2E" font-size="14" font-weight="500">Tab Item Configuration</text>
  <text x="106" y="730" fill="#4A4B65" font-size="13">Supports preconfiguring tab items, statically linking associated tab items, and adjusting displayed content through Node Graphs.</text>
  <text x="106" y="750" fill="#4A4B65" font-size="13">Tab items support click feedback configuration, including opening tabs and toggling control visibility.</text>

  <!-- Add Tab Items -->
  <text x="106" y="776" fill="#1A1B2E" font-size="14" font-weight="500">Add Tab Items:</text>
  <text x="240" y="776" fill="#4A4B65" font-size="13">Click the plus sign in Edit Details to add a new Tab Item.</text>
  <rect x="106" y="786" width="80" height="22" rx="6" fill="#E8EEFB"/>
  <text x="116" y="801" fill="#2D6BE4" font-size="11" font-weight="500">Tab Name</text>
  <text x="196" y="801" fill="#4A4B65" font-size="12">Name of the Tab Item</text>
  <rect x="400" y="786" width="30" height="22" rx="6" fill="#E8EEFB"/>
  <text x="410" y="801" fill="#2D6BE4" font-size="11" font-weight="500">ID</text>
  <text x="440" y="801" fill="#4A4B65" font-size="12">Unique Identifier for the Tab Item</text>

  <!-- Basic Settings -->
  <text x="106" y="828" fill="#1A1B2E" font-size="14" font-weight="500">Basic Settings:</text>
  <rect x="240" y="816" width="90" height="22" rx="6" fill="#E8EEFB"/>
  <text x="250" y="831" fill="#2D6BE4" font-size="11" font-weight="500">Tab Name</text>
  <rect x="340" y="816" width="80" height="22" rx="6" fill="#E8EEFB"/>
  <text x="350" y="831" fill="#2D6BE4" font-size="11" font-weight="500">Tab Style</text>
  <rect x="430" y="816" width="170" height="22" rx="6" fill="#E8EEFB"/>
  <text x="440" y="831" fill="#2D6BE4" font-size="11" font-weight="500">Preview Selection State</text>
  <rect x="610" y="816" width="180" height="22" rx="6" fill="#E8EEFB"/>
  <text x="620" y="831" fill="#2D6BE4" font-size="11" font-weight="500">Return to Server Event</text>
  <text x="106" y="856" fill="#4A4B65" font-size="12">Tab Style selects a style from the previous layer. Preview Selection State shows default display. Return to Server Event triggers [When Floating Interaction Page is Triggered].</text>

  <!-- Formal Variable, Container Status, Control Status -->
  <rect x="48" y="886" width="352" height="100" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="916" r="14" fill="#2D6BE4"/>
  <text x="80" y="921" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">c</text>
  <text x="106" y="920" fill="#1A1B2E" font-size="14" font-weight="500">Formal Variable Config</text>
  <text x="72" y="944" fill="#4A4B65" font-size="13">Link formal variables to specified data</text>
  <text x="72" y="962" fill="#4A4B65" font-size="13">or Player Custom Variables. Assets</text>
  <text x="72" y="980" fill="#4A4B65" font-size="13">referencing formal variables use real-time data.</text>

  <rect x="424" y="886" width="352" height="100" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="456" cy="916" r="14" fill="#2D6BE4"/>
  <text x="456" y="921" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">d</text>
  <text x="482" y="920" fill="#1A1B2E" font-size="14" font-weight="500">Container Status Settings</text>
  <text x="448" y="944" fill="#4A4B65" font-size="13">Add page containers and configure</text>
  <text x="448" y="962" fill="#4A4B65" font-size="13">whether each is shown or hidden.</text>
  <text x="448" y="980" fill="#4A4B65" font-size="13">Applied when this tab item is selected.</text>

  <rect x="800" y="886" width="352" height="100" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="832" cy="916" r="14" fill="#2D6BE4"/>
  <text x="832" y="921" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">e</text>
  <text x="858" y="920" fill="#1A1B2E" font-size="14" font-weight="500">Control Status Settings</text>
  <text x="824" y="944" fill="#4A4B65" font-size="13">Add controls to page containers and</text>
  <text x="824" y="962" fill="#4A4B65" font-size="13">configure show/hide for each one.</text>
  <text x="824" y="980" fill="#4A4B65" font-size="13">Applied when this tab item is selected.</text>

  <!-- IV. Interaction Settings -->
  <text x="48" y="1022" fill="#2D6BE4" font-size="18" font-weight="700">IV. Interaction Settings</text>

  <rect x="48" y="1038" width="1104" height="56" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1062" fill="#4A4B65" font-size="14">When the corresponding hotkey is enabled, this tab can be interacted with using the hotkey.</text>
  <text x="72" y="1082" fill="#4A4B65" font-size="14">Interacting with this tab triggers the configured sound effect.</text>

  <!-- V. Controller Navigation -->
  <text x="48" y="1130" fill="#2D6BE4" font-size="18" font-weight="700">V. Controller Navigation</text>

  <rect x="48" y="1146" width="1104" height="200" rx="14" fill="#fff" filter="url(#card)"/>

  <rect x="72" y="1160" width="1056" height="28" rx="6" fill="#FFF3E0"/>
  <rect x="72" y="1160" width="4" height="28" rx="2" fill="#E65100"/>
  <text x="92" y="1179" fill="#E65100" font-size="13">When controller hotkeys are enabled for a tab, Controller Navigation cannot be triggered.</text>

  <text x="72" y="1206" fill="#4A4B65" font-size="14">If controller hotkeys are not enabled, the following navigation options are available:</text>

  <rect x="72" y="1218" width="360" height="26" rx="6" fill="#E8EEFB"/>
  <text x="82" y="1236" fill="#2D6BE4" font-size="12" font-weight="500">Selectable via Controller Joystick Navigation</text>
  <text x="446" y="1236" fill="#4A4B65" font-size="13">Enable to display hints on focus.</text>

  <rect x="72" y="1250" width="260" height="26" rx="6" fill="#E8EEFB"/>
  <text x="82" y="1268" fill="#2D6BE4" font-size="12" font-weight="500">Controller Navigation Hint Style</text>
  <text x="346" y="1268" fill="#4A4B65" font-size="13">Select a preset style.</text>

  <rect x="72" y="1282" width="200" height="26" rx="6" fill="#E8EEFB"/>
  <text x="82" y="1300" fill="#2D6BE4" font-size="12" font-weight="500">Navigation Hint Target</text>
  <text x="286" y="1300" fill="#4A4B65" font-size="13">Up, Down, Left, or Right direction.</text>

  <rect x="72" y="1314" width="220" height="26" rx="6" fill="#E8EEFB"/>
  <text x="82" y="1332" fill="#2D6BE4" font-size="12" font-weight="500">Navigation Hint Offset</text>
  <text x="306" y="1332" fill="#4A4B65" font-size="13">Configure X/Y offset values.</text>

  <!-- VI. Tab Component (Entity) -->
  <text x="48" y="1388" fill="#2D6BE4" font-size="18" font-weight="700">VI. Tab Component (Entity-Level)</text>
  <text x="400" y="1388" fill="#8B8DA0" font-size="13">Separate from Floating Interaction Page tabs</text>

  <rect x="48" y="1404" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1432" fill="#4A4B65" font-size="14">The Tab component enables players to configure and interact with dynamic objects and creations.</text>
  <text x="72" y="1454" fill="#4A4B65" font-size="14">After adding this component to an entity, it supports configuring and applying multiple tabs simultaneously.</text>
  <text x="72" y="1476" fill="#4A4B65" font-size="14">Each tab supports using a local filter to determine visibility for each player. The entity type that triggers the tab function is Character.</text>

  <!-- Tab Component Editing -->
  <rect x="48" y="1496" width="540" height="164" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="1524" fill="#1A1B2E" font-size="14" font-weight="500">Tab List Configuration</text>

  <rect x="72" y="1536" width="160" height="22" rx="6" fill="#E8EEFB"/>
  <text x="82" y="1551" fill="#2D6BE4" font-size="11" font-weight="500">Initially Effective Tab</text>
  <text x="242" y="1551" fill="#4A4B65" font-size="12">Dropdown enumeration</text>

  <rect x="72" y="1562" width="80" height="22" rx="6" fill="#E8EEFB"/>
  <text x="82" y="1577" fill="#2D6BE4" font-size="11" font-weight="500">Option ID</text>
  <text x="162" y="1577" fill="#4A4B65" font-size="12">For node graph input parameter</text>

  <rect x="72" y="1588" width="130" height="22" rx="6" fill="#E8EEFB"/>
  <text x="82" y="1603" fill="#2D6BE4" font-size="11" font-weight="500">Option Tab Icon</text>
  <text x="212" y="1603" fill="#4A4B65" font-size="12">Switch icon in front of tab</text>

  <rect x="72" y="1614" width="130" height="22" rx="6" fill="#E8EEFB"/>
  <text x="82" y="1629" fill="#2D6BE4" font-size="11" font-weight="500">Initially Effective</text>
  <text x="212" y="1629" fill="#4A4B65" font-size="12">Takes effect on entity creation</text>

  <rect x="72" y="1640" width="90" height="22" rx="6" fill="#E8EEFB"/>
  <text x="82" y="1655" fill="#2D6BE4" font-size="11" font-weight="500">Sort Level</text>
  <text x="172" y="1655" fill="#4A4B65" font-size="12">Higher = further forward</text>

  <rect x="612" y="1496" width="540" height="164" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="636" y="1524" fill="#1A1B2E" font-size="14" font-weight="500">Trigger Option Area</text>

  <rect x="636" y="1536" width="160" height="22" rx="6" fill="#E8EEFB"/>
  <text x="646" y="1551" fill="#2D6BE4" font-size="11" font-weight="500">Trigger Area Shape</text>
  <text x="806" y="1551" fill="#4A4B65" font-size="12">Cuboid, sphere, capsule</text>

  <rect x="636" y="1562" width="70" height="22" rx="6" fill="#E8EEFB"/>
  <text x="646" y="1577" fill="#2D6BE4" font-size="11" font-weight="500">Center</text>
  <text x="716" y="1577" fill="#4A4B65" font-size="12">Offset relative to entity center</text>

  <rect x="636" y="1588" width="80" height="22" rx="6" fill="#E8EEFB"/>
  <text x="646" y="1603" fill="#2D6BE4" font-size="11" font-weight="500">Rotation</text>
  <text x="726" y="1603" fill="#4A4B65" font-size="12">Orientation along different axes</text>

  <rect x="636" y="1614" width="130" height="22" rx="6" fill="#E8EEFB"/>
  <text x="646" y="1629" fill="#2D6BE4" font-size="11" font-weight="500">Zoom Multiplier</text>
  <text x="776" y="1629" fill="#4A4B65" font-size="12">Scaling along different axes</text>

  <text x="636" y="1655" fill="#1A1B2E" font-size="14" font-weight="500">Local Filter</text>
  <text x="740" y="1655" fill="#4A4B65" font-size="12">Boolean or integer filters. Monitors while character is in range.</text>

  <!-- VII. Node Graph Management -->
  <text x="48" y="1700" fill="#2D6BE4" font-size="18" font-weight="700">VII. Node Graph Management</text>

  <rect x="48" y="1716" width="352" height="48" rx="10" fill="#E8EEFB"/>
  <text x="68" y="1745" fill="#2D6BE4" font-size="13" font-weight="500">Activate / Disable Tab (by Tab ID)</text>

  <rect x="416" y="1716" width="352" height="48" rx="10" fill="#E5F2E9"/>
  <text x="436" y="1745" fill="#34A853" font-size="13" font-weight="500">When Tab Is Selected (sends event)</text>

  <rect x="784" y="1716" width="368" height="48" rx="10" fill="#FFF3E0"/>
  <text x="804" y="1736" fill="#E65100" font-size="13" font-weight="500">Event outputs: Source Entity, Source GUID,</text>
  <text x="804" y="1754" fill="#E65100" font-size="13" font-weight="500">Tab ID, Selector Entity</text>

  <!-- Related Documentation -->
  <text x="48" y="1792" fill="#8B8DA0" font-size="12">Related Documentation:</text>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh2u2e9o3jn6" target="_blank">
    <text x="48" y="1808" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: Floating Interaction Page Controls</text>
  </a>
  <a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mh5jko05fzyw" target="_blank">
    <text x="48" y="1824" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: Tab</text>
  </a>

  <text x="600" y="1844" fill="#8B8DA0" font-size="11" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>