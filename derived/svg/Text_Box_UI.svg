<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1256">
<defs>
  <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2D6BE4"/>
    <stop offset="100%" stop-color="#4A3F6B"/>
  </linearGradient>
  <filter id="card">
    <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
  </filter>
  <filter id="elevated">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
  </filter>
</defs>
<style>
  text { font-family: 'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif; }
</style>

<!-- Page Background -->
<rect width="1200" height="1256" fill="#F9F7F2"/>

<!-- Top Color Bar -->
<rect width="1200" height="6" fill="url(#topGrad)"/>

<!-- Title Card -->
<rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
<rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
<text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold">Text Box UI</text>
<text x="340" y="82" fill="#4A4B65" font-size="16">Display and manage text content in the UI Layout</text>

<!-- I. Text Box Functions -->
<text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Text Box Functions</text>

<rect x="48" y="162" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="190" fill="#4A4B65" font-size="14">During stage runtime, display pre-edited text content. If the text content contains custom variables,</text>
<text x="72" y="212" fill="#4A4B65" font-size="14">it will update the display in real-time as the variable values change.</text>

<!-- II. Editing the Text Box -->
<text x="48" y="278" fill="#2D6BE4" font-size="18" font-weight="700">II. Editing the Text Box</text>

<!-- Background Color Card -->
<rect x="48" y="292" width="352" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="320" r="14" fill="#2D6BE4"/>
<text x="76" y="325" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">1</text>
<text x="100" y="325" fill="#1A1B2E" font-size="16" font-weight="500">Background Color</text>
<text x="72" y="352" fill="#4A4B65" font-size="14">Choose a transparent or</text>
<text x="72" y="374" fill="#4A4B65" font-size="14">semi-transparent black background.</text>

<!-- Font Size Card -->
<rect x="424" y="292" width="352" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="452" cy="320" r="14" fill="#2D6BE4"/>
<text x="452" y="325" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">2</text>
<text x="476" y="325" fill="#1A1B2E" font-size="16" font-weight="500">Font Size</text>
<text x="448" y="352" fill="#4A4B65" font-size="14">Configure the font size for the</text>
<text x="448" y="374" fill="#4A4B65" font-size="14">text box content display.</text>

<!-- Align Card -->
<rect x="800" y="292" width="352" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="828" cy="320" r="14" fill="#2D6BE4"/>
<text x="828" y="325" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">3</text>
<text x="852" y="325" fill="#1A1B2E" font-size="16" font-weight="500">Alignment</text>
<text x="824" y="352" fill="#4A4B65" font-size="14">Choose alignment based on the</text>
<text x="824" y="374" fill="#4A4B65" font-size="14">position and content of the text.</text>

<!-- Text Content Card -->
<rect x="48" y="404" width="1104" height="180" rx="14" fill="#fff" filter="url(#card)"/>
<circle cx="76" cy="432" r="14" fill="#2D6BE4"/>
<text x="76" y="437" fill="#fff" font-size="13" text-anchor="middle" font-weight="500">4</text>
<text x="100" y="437" fill="#1A1B2E" font-size="16" font-weight="500">Text Content</text>
<text x="72" y="464" fill="#4A4B65" font-size="14">Edit the text box's content; supports characters, text, numbers, and custom variables.</text>
<text x="72" y="488" fill="#4A4B65" font-size="14">By inserting variables, you can select custom variables predefined on stage entities and player entities.</text>
<text x="72" y="512" fill="#4A4B65" font-size="14">When an inserted custom variable changes, the displayed text updates at runtime.</text>

<text x="72" y="540" fill="#1A1B2E" font-size="14" font-weight="500">Rich Text Variable Format:  {Type:Prefix.VariableName}</text>
<rect x="72" y="554" width="60" height="22" rx="11" fill="#E8EEFB"/>
<text x="102" y="569" fill="#2D6BE4" font-size="11" text-anchor="middle">Type</text>
<text x="142" y="569" fill="#4A4B65" font-size="13">= 1 (when referencing a custom variable)</text>

<!-- Variable Prefix Table -->
<rect x="48" y="596" width="1104" height="44" rx="14" fill="#2D6BE4"/>
<rect x="48" y="626" width="1104" height="14" fill="#2D6BE4"/>
<text x="300" y="624" fill="#fff" font-size="15" text-anchor="middle" font-weight="500">Custom Variable Target</text>
<text x="700" y="624" fill="#fff" font-size="15" text-anchor="middle" font-weight="500">Prefix</text>
<text x="1000" y="624" fill="#fff" font-size="15" text-anchor="middle" font-weight="500">Example</text>

<rect x="48" y="640" width="1104" height="36" fill="#fff"/>
<line x1="48" y1="676" x2="1152" y2="676" stroke="#E8E4DA" stroke-width="1"/>
<text x="300" y="664" fill="#1A1B2E" font-size="14" text-anchor="middle">Players 1 - 8</text>
<text x="700" y="664" fill="#4A4B65" font-size="14" text-anchor="middle">p1 ~ p8</text>
<text x="1000" y="664" fill="#4A4B65" font-size="14" text-anchor="middle">{1:p4.Test2}</text>

<rect x="48" y="676" width="1104" height="36" fill="#F4F1EA"/>
<line x1="48" y1="712" x2="1152" y2="712" stroke="#E8E4DA" stroke-width="1"/>
<text x="300" y="700" fill="#1A1B2E" font-size="14" text-anchor="middle">Stage Entity</text>
<text x="700" y="700" fill="#4A4B65" font-size="14" text-anchor="middle">lv</text>
<text x="1000" y="700" fill="#4A4B65" font-size="14" text-anchor="middle">{1:lv.Score}</text>

<rect x="48" y="712" width="1104" height="36" rx="0" fill="#fff"/>
<rect x="48" y="734" width="1104" height="14" rx="14" fill="#fff"/>
<text x="300" y="736" fill="#1A1B2E" font-size="14" text-anchor="middle">Player's Own Entity</text>
<text x="700" y="736" fill="#4A4B65" font-size="14" text-anchor="middle">ps</text>
<text x="1000" y="736" fill="#4A4B65" font-size="14" text-anchor="middle">{1:ps.Health}</text>

<!-- Alignment Details Card -->
<rect x="48" y="764" width="1104" height="180" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="792" fill="#1A1B2E" font-size="16" font-weight="500">Alignment Options</text>

<text x="72" y="820" fill="#1A1B2E" font-size="14" font-weight="500">Horizontal Alignment</text>
<rect x="72" y="832" width="100" height="24" rx="12" fill="#E8EEFB"/>
<text x="122" y="848" fill="#2D6BE4" font-size="12" text-anchor="middle">Left Align</text>
<rect x="182" y="832" width="140" height="24" rx="12" fill="#E8EEFB"/>
<text x="252" y="848" fill="#2D6BE4" font-size="12" text-anchor="middle">Horizontal Center</text>
<rect x="332" y="832" width="100" height="24" rx="12" fill="#E8EEFB"/>
<text x="382" y="848" fill="#2D6BE4" font-size="12" text-anchor="middle">Right Align</text>

<text x="72" y="884" fill="#1A1B2E" font-size="14" font-weight="500">Vertical Alignment</text>
<rect x="72" y="896" width="100" height="24" rx="12" fill="#E8EEFB"/>
<text x="122" y="912" fill="#2D6BE4" font-size="12" text-anchor="middle">Top Align</text>
<rect x="182" y="896" width="130" height="24" rx="12" fill="#E8EEFB"/>
<text x="247" y="912" fill="#2D6BE4" font-size="12" text-anchor="middle">Vertical Center</text>
<rect x="322" y="896" width="120" height="24" rx="12" fill="#E8EEFB"/>
<text x="382" y="912" fill="#2D6BE4" font-size="12" text-anchor="middle">Bottom Align</text>

<text x="520" y="850" fill="#4A4B65" font-size="14">Choose the appropriate horizontal alignment based on</text>
<text x="520" y="872" fill="#4A4B65" font-size="14">where the text box is positioned and its content flow.</text>
<text x="520" y="912" fill="#4A4B65" font-size="14">Vertical alignment controls how text is positioned</text>
<text x="520" y="934" fill="#4A4B65" font-size="14">within the text box boundaries vertically.</text>

<!-- III. Adjusting Text Box Layout -->
<text x="48" y="984" fill="#2D6BE4" font-size="18" font-weight="700">III. Adjusting Text Box Layout in the UI</text>

<rect x="48" y="998" width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="1026" fill="#4A4B65" font-size="14">Resize the text box by dragging its borders in the edit window when the cursor changes to a resize arrow.</text>
<text x="72" y="1050" fill="#4A4B65" font-size="14">Its position and size update automatically after adjustment.</text>

<rect x="72" y="1066" width="100" height="22" rx="11" fill="#FFF3E0"/>
<text x="122" y="1081" fill="#D93025" font-size="12" text-anchor="middle">Note</text>
<text x="182" y="1081" fill="#4A4B65" font-size="13">Position and size values are automatically saved and reflected in the Transform properties panel.</text>

<!-- Tip Box -->
<rect x="48" y="1116" width="1104" height="60" rx="10" fill="#E8EEFB"/>
<rect x="48" y="1116" width="4" height="60" rx="2" fill="#2D6BE4"/>
<text x="72" y="1142" fill="#4A4B65" font-size="14">Tip: When inserting custom variables, use the rich text format {1:Prefix.VariableName} to ensure proper real-time</text>
<text x="72" y="1164" fill="#4A4B65" font-size="14">updates. Test variable references at runtime to confirm they display the correct values for each player.</text>

<!-- Related Documentation Label -->
<text x="48" y="1200" fill="#8B8DA0" font-size="12">Related Documentation:</text>

<!-- Source Links -->
<a xlink:href="https://act.hoyoverse.com/ys/ugc/tutorial/detail/mhnltrr3g966" target="_blank">
  <text x="48" y="1218" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: Text Box UI Controls</text>
</a>

<!-- Footer -->
<text x="600" y="1242" fill="#8B8DA0" font-size="11" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>

</svg>