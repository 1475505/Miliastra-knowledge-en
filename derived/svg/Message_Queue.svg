<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 980" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6BE4"/>
      <stop offset="100%" stop-color="#4A3F6B"/>
    </linearGradient>
    <filter id="card">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
    </filter>
    <filter id="elevated">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="980" fill="#F9F7F2"/>
  <rect width="1200" height="6" fill="url(#topGrad)"/>

  <!-- Title Card -->
  <rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
  <rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
  <text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold">Message Queue</text>
  <text x="380" y="82" fill="#4A4B65" font-size="16">Controls</text>

  <!-- I. Features -->
  <text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700">I. Features of the Message Queue</text>

  <rect x="48" y="164" width="1104" height="120" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="192" fill="#4A4B65" font-size="14">The Message Queue can be configured in a UI layout and pushes messages in a specified style in real time via the node graph.</text>

  <text x="72" y="218" fill="#4A4B65" font-size="14">Suitable for pushing and displaying various in-game information during gameplay, such as score updates, resource acquisition, and stage progress changes.</text>

  <rect x="72" y="244" width="140" height="24" rx="12" fill="#FFF3E0"/>
  <text x="82" y="261" fill="#E65100" font-size="12" font-weight="500">Display only</text>
  <text x="224" y="261" fill="#4A4B65" font-size="13">Cannot be interacted with.</text>

  <rect x="460" y="244" width="200" height="24" rx="12" fill="#E5F2E9"/>
  <text x="470" y="261" fill="#34A853" font-size="12" font-weight="500">Animation effects</text>
  <text x="672" y="261" fill="#4A4B65" font-size="13">Played when messages are added or removed.</text>

  <!-- II. Editing -->
  <text x="48" y="320" fill="#2D6BE4" font-size="18" font-weight="700">II. Editing the Message Queue</text>

  <!-- Step 1 -->
  <rect x="48" y="336" width="1104" height="52" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="362" r="14" fill="#2D6BE4"/>
  <text x="80" y="367" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">1</text>
  <text x="106" y="358" fill="#1A1B2E" font-size="14" font-weight="500">Adding the Message Queue</text>
  <text x="106" y="376" fill="#4A4B65" font-size="13">In the UI Control Group Editing Window, add a UI control template: Message Queue.</text>

  <!-- Step 2 -->
  <rect x="48" y="400" width="1104" height="104" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="430" r="14" fill="#2D6BE4"/>
  <text x="80" y="435" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">2</text>
  <text x="106" y="434" fill="#1A1B2E" font-size="14" font-weight="500">Message Item Style Settings</text>
  <text x="106" y="456" fill="#4A4B65" font-size="13">Similar to Tab Controls and Single-Choice Viewport Controls, the style of message items can be customized.</text>
  <text x="106" y="476" fill="#4A4B65" font-size="13">Click [Detail Edit] to add any asset to the message item's Asset Group (e.g., a UI animation for new messages).</text>

  <!-- Warning tip -->
  <rect x="106" y="484" width="1020" height="12" rx="4" fill="#FDE8E6"/>
  <rect x="106" y="484" width="4" height="12" rx="2" fill="#D93025"/>
  <text x="126" y="494" fill="#D93025" font-size="11">Messages default to fade-in/fade-out animations. Large simultaneous updates may cause visible display delays.</text>

  <!-- Step 3 -->
  <rect x="48" y="516" width="1104" height="200" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="546" r="14" fill="#2D6BE4"/>
  <text x="80" y="551" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">3</text>
  <text x="106" y="550" fill="#1A1B2E" font-size="14" font-weight="500">Message Queue Function Settings</text>

  <rect x="106" y="562" width="140" height="26" rx="6" fill="#E8EEFB"/>
  <text x="116" y="580" fill="#2D6BE4" font-size="12" font-weight="500">Initial Fill Point</text>
  <text x="260" y="580" fill="#4A4B65" font-size="13">The initial fill position when the first message item is added to the queue.</text>

  <rect x="106" y="596" width="140" height="26" rx="6" fill="#E8EEFB"/>
  <text x="116" y="614" fill="#2D6BE4" font-size="12" font-weight="500">Fill Direction</text>
  <text x="260" y="614" fill="#4A4B65" font-size="13">The direction in which message items are filled.</text>

  <rect x="106" y="630" width="240" height="26" rx="6" fill="#E8EEFB"/>
  <text x="116" y="648" fill="#2D6BE4" font-size="12" font-weight="500">New Message Insertion Position</text>
  <text x="360" y="648" fill="#4A4B65" font-size="13">Combined with Fill Direction and Initial Fill Point.</text>

  <rect x="106" y="664" width="90" height="26" rx="6" fill="#E8EEFB"/>
  <text x="116" y="682" fill="#2D6BE4" font-size="12" font-weight="500">Alignment</text>
  <text x="210" y="682" fill="#4A4B65" font-size="13">Sets the alignment of all message items relative to their parent control (top/bottom/left/right).</text>

  <!-- Example box -->
  <rect x="106" y="696" width="1020" height="12" rx="4" fill="#F4F1EA"/>
  <text x="116" y="706" fill="#1A1B2E" font-size="11" font-weight="500">Example (Auto Wrap): Top-Left + Vertical + End = top-to-bottom | Bottom-Left + Vertical + Start = bottom-to-top</text>

  <!-- Step 4: Notes -->
  <rect x="48" y="728" width="1104" height="68" rx="14" fill="#fff" filter="url(#card)"/>
  <circle cx="80" cy="758" r="14" fill="#1B4FC0"/>
  <text x="80" y="763" fill="#fff" font-size="12" text-anchor="middle" font-weight="500">4</text>
  <text x="106" y="756" fill="#1A1B2E" font-size="14" font-weight="500">Notes</text>
  <text x="106" y="776" fill="#4A4B65" font-size="13">When max messages exceed the visible range, UI animations in the Asset Group cannot be clipped.</text>

  <!-- Warning tip -->
  <rect x="48" y="808" width="1104" height="36" rx="6" fill="#FDE8E6"/>
  <rect x="48" y="808" width="4" height="36" rx="2" fill="#D93025"/>
  <text x="68" y="831" fill="#D93025" font-size="13">Recommendation: It is not recommended to configure the maximum message count to exceed the size of the Message Queue control.</text>

  <!-- III. Updating -->
  <text x="48" y="880" fill="#2D6BE4" font-size="18" font-weight="700">III. Updating the Message Queue</text>

  <rect x="48" y="896" width="1104" height="56" rx="14" fill="#fff" filter="url(#card)"/>
  <text x="72" y="920" fill="#4A4B65" font-size="14">Use the server node Update Message Queue to push messages.</text>
  <text x="72" y="940" fill="#1A1B2E" font-size="13" font-weight="500">Message queue updates can only push data as a complete struct: one struct per push operation.</text>

  <!-- Related Documentation -->
  <text x="48" y="976" fill="#8B8DA0" font-size="12">Related Documentation:</text>
  <a xlink:href="https://act.mihoyo.com/ys/ugc/tutorial/detail/mhs1f7ibtc6c" target="_blank">
    <text x="48" y="992" fill="#2D6BE4" font-size="12" text-decoration="underline">Miliastra Academy Documentation: Message Queue Controls</text>
  </a>

  <text x="600" y="1012" fill="#8B8DA0" font-size="11" text-anchor="middle">AI Generated, based on Craftspeople Academy. Version: Luna 7</text>
</svg>