<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 1560">
<defs>
  <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2D6BE4"/>
    <stop offset="100%" stop-color="#4A3F6B"/>
  </linearGradient>
  <filter id="card">
    <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#2D6BE4" flood-opacity="0.06"/>
  </filter>
  <filter id="elevated">
    <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.07"/>
  </filter>
</defs>

<rect width="1200" height="1560" fill="#F9F7F2"/>
<rect width="1200" height="6" fill="url(#topGrad)"/>

<!-- Title Card -->
<rect x="48" y="32" width="1104" height="80" rx="14" fill="#fff" filter="url(#elevated)"/>
<rect x="48" y="32" width="4" height="80" rx="2" fill="#2D6BE4"/>
<text x="72" y="82" fill="#1A1B2E" font-size="34" font-weight="bold" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Global Timer</text>

<!-- I. Component Functions -->
<text x="48" y="148" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">I. Global Timer Component Functions</text>

<rect x="48" y="162" width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="188" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">The global timer component provides timing capabilities. It supports pausing, restarting,</text>
<text x="72" y="208" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">and modifying timers, and can synchronize with UI controls to display the timer's time.</text>
<text x="72" y="234" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Key Properties:</text>
<text x="200" y="234" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Supports configuring multiple sets of static timer data. Global timers run</text>
<text x="72" y="254" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">independently on different active entities.</text>

<!-- II. How to Use -->
<text x="48" y="298" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">II. How to Use Global Timers</text>

<rect x="48" y="312" width="540" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<rect x="60" y="324" width="80" height="28" rx="14" fill="#E8EEFB"/>
<text x="100" y="343" fill="#2D6BE4" font-size="12" text-anchor="middle" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Method 1</text>
<text x="72" y="372" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Entity editing component: set a reference timer that</text>
<text x="72" y="388" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">will be activated when the entity is created.</text>

<rect x="604" y="312" width="548" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<rect x="616" y="324" width="80" height="28" rx="14" fill="#E8EEFB"/>
<text x="656" y="343" fill="#2D6BE4" font-size="12" text-anchor="middle" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Method 2</text>
<text x="628" y="372" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Node graph execution node: activate the timer when</text>
<text x="628" y="388" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">the node is executed during gameplay.</text>

<!-- III. Global Timer Management Tool -->
<text x="48" y="428" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">III. Global Timer Management Tool</text>

<rect x="48" y="442" width="1104" height="80" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="468" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Predefine all global timers via the timer management tool. The Global Timer List enumerates</text>
<text x="72" y="488" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">all predefined global timers in the current stage. Use the Add Timer button to create new timers.</text>
<text x="72" y="512" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Name and ID:</text>
<text x="172" y="512" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Click the icon to rename or delete a specified timer. The name is the global timer's reference.</text>

<!-- IV. Editing Global Timers -->
<text x="48" y="558" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">IV. Editing Global Timers</text>
<text x="260" y="558" fill="#8B8DA0" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Basic Information Parameters</text>

<rect x="48" y="572" width="1104" height="100" rx="14" fill="#fff" filter="url(#card)"/>

<!-- Table header -->
<rect x="48" y="572" width="1104" height="36" rx="14" fill="#2D6BE4"/>
<rect x="48" y="594" width="1104" height="14" fill="#2D6BE4"/>
<text x="72" y="596" fill="#fff" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Parameter</text>
<text x="360" y="596" fill="#fff" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Description</text>

<text x="72" y="630" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Global Timer Type</text>
<text x="360" y="630" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Provides two types: Countdown and Stopwatch.</text>
<line x1="68" y1="640" x2="1132" y2="640" stroke="#E8E4DA" stroke-width="1"/>

<text x="72" y="660" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Duration (s)</text>
<text x="360" y="660" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">When the timer type is Countdown, a duration needs to be set.</text>

<!-- V. Global Timer Reference -->
<text x="48" y="708" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">V. Global Timer Reference</text>

<rect x="48" y="722" width="540" height="130" rx="14" fill="#fff" filter="url(#card)"/>
<text x="72" y="748" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Via UI Controls</text>
<text x="72" y="770" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Select Timer UI Controls "Timer" to execute logic.</text>
<text x="72" y="792" fill="#1A1B2E" font-size="13" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Type:</text>
<text x="110" y="792" fill="#4A4B65" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Stopwatch or Countdown</text>
<text x="72" y="812" fill="#1A1B2E" font-size="13" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Specify Timer:</text>
<text x="175" y="812" fill="#4A4B65" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Enumerates all predefined timers matching Type</text>
<text x="72" y="832" fill="#1A1B2E" font-size="13" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Source Entity:</text>
<text x="175" y="832" fill="#4A4B65" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Stage entity (default) or player entity</text>
<text x="72" y="848" fill="#4A4B65" font-size="12" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Source entity needs a global timer component.</text>

<rect x="604" y="722" width="548" height="130" rx="14" fill="#fff" filter="url(#card)"/>
<text x="628" y="748" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Via Component</text>
<text x="628" y="770" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Add Global Timer component to entity/prefab.</text>
<text x="628" y="792" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Click "Add Timer" to select from predefined timers.</text>
<text x="628" y="814" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">A referenced timer is activated when the entity is created.</text>
<text x="628" y="836" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Click "Manage Timer" to open the management tool.</text>

<!-- Tip -->
<rect x="48" y="864" width="1104" height="36" rx="10" fill="#E8EEFB"/>
<rect x="48" y="864" width="4" height="36" rx="2" fill="#2D6BE4"/>
<text x="68" y="887" fill="#4A4B65" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">If the timer is not active when the source entity is running, UI controls display default value 00:00.</text>

<!-- VI. Node Graph Operations -->
<text x="48" y="936" fill="#2D6BE4" font-size="18" font-weight="700" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">VI. Node Graph Operations</text>
<text x="270" y="936" fill="#8B8DA0" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Only predefined timers are valid as references</text>

<rect x="48" y="950" width="1104" height="480" rx="14" fill="#fff" filter="url(#card)"/>

<!-- Table header -->
<rect x="48" y="950" width="1104" height="36" rx="14" fill="#2D6BE4"/>
<rect x="48" y="972" width="1104" height="14" fill="#2D6BE4"/>
<text x="72" y="974" fill="#fff" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Node</text>
<text x="300" y="974" fill="#fff" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Type</text>
<text x="420" y="974" fill="#fff" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Description</text>

<!-- Row 1 -->
<text x="72" y="1008" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Start Global Timer</text>
<text x="300" y="1008" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Execute</text>
<text x="420" y="1008" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Reference and start a global timer with the running entity as carrier.</text>
<line x1="68" y1="1018" x2="1132" y2="1018" stroke="#E8E4DA" stroke-width="1"/>

<!-- Row 2 -->
<text x="72" y="1040" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Stop Global Timer</text>
<text x="300" y="1040" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Execute</text>
<text x="420" y="1040" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Stop running a global timer early.</text>
<line x1="68" y1="1050" x2="1132" y2="1050" stroke="#E8E4DA" stroke-width="1"/>

<!-- Row 3 -->
<text x="72" y="1072" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Pause Global Timer</text>
<text x="300" y="1072" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Execute</text>
<text x="420" y="1072" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Pause a running timer. Linked UI controls also pause display.</text>
<line x1="68" y1="1082" x2="1132" y2="1082" stroke="#E8E4DA" stroke-width="1"/>

<!-- Row 4 -->
<text x="72" y="1104" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Recover Global Timer</text>
<text x="300" y="1104" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Execute</text>
<text x="420" y="1104" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Resume a timer paused by "Pause Global Timer". UI display resumes.</text>
<line x1="68" y1="1114" x2="1132" y2="1114" stroke="#E8E4DA" stroke-width="1"/>

<!-- Row 5 -->
<text x="72" y="1136" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Increase Timer Value</text>
<text x="300" y="1136" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Execute</text>
<text x="420" y="1136" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Adjust a running timer. Countdown: positive = more remaining time,</text>
<text x="420" y="1154" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">negative = less. Stopwatch: positive = more accumulated, negative = less.</text>
<line x1="68" y1="1164" x2="1132" y2="1164" stroke="#E8E4DA" stroke-width="1"/>

<!-- Row 6 -->
<text x="72" y="1186" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">When Timer Triggered</text>
<text x="300" y="1186" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Event</text>
<text x="420" y="1186" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">When countdown ends, sends event to the node graph.</text>
<line x1="68" y1="1196" x2="1132" y2="1196" stroke="#E8E4DA" stroke-width="1"/>

<!-- Row 7 -->
<text x="72" y="1218" fill="#1A1B2E" font-size="14" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Get Current Time</text>
<text x="300" y="1218" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Query</text>
<text x="420" y="1218" fill="#4A4B65" font-size="14" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Countdown: returns remaining time. Stopwatch: returns accumulated time.</text>

<!-- Warning tip -->
<rect x="48" y="1442" width="1104" height="56" rx="10" fill="#FFF3E0"/>
<rect x="48" y="1442" width="4" height="56" rx="2" fill="#D93025"/>
<text x="68" y="1462" fill="#D93025" font-size="13" font-weight="500" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">Important: Increase Timer Value Edge Cases</text>
<text x="68" y="1482" fill="#4A4B65" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">If paused then reduced to 0s, resuming triggers "When Timer Triggered". But if paused, reduced to 0s,</text>
<text x="68" y="1494" fill="#4A4B65" font-size="13" font-family="'Roboto','HYWenHei 85W','Noto Sans','Segoe UI',sans-serif">then increased again before resuming, the event will NOT be triggered. Minimum modified time is 0 seconds.</text>

